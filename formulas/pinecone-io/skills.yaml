schemaVersion: 1
id: pinecone-io/skills
name: Pinecone Agent Skills
description: Pinecone Agent Skills lib → Pinecone workflows, CLI, MCP, Assistant, FTS.
source:
  type: git
  url: https://github.com/pinecone-io/skills
  revision: 1154c3e71c40b74d3807885769f4326b5ee64e1d
capabilities:
  - id: pinecone-assistant
    kind: skill
    path: skills/pinecone-assistant
    description: Create, manage, and chat with Pinecone Assistants for document Q&A
      with citations. Handles all assistant operations - create, upload, sync,
      chat, context retrieval, and list. Recognizes natural language like
      "create an assistant from my docs", "ask my assistant about X", or "upload
      my docs to Pinecone".
  - id: pinecone-cli
    kind: skill
    path: skills/pinecone-cli
    description: Guide for using the Pinecone CLI (pc) to manage Pinecone resources
      from the terminal. The CLI supports ALL index types (standard, integrated,
      sparse) and all vector operations — unlike the MCP which only supports
      integrated indexes. Use for batch operations, vector management, backups,
      namespaces, CI/CD automation, and full control over Pinecone resources.
  - id: pinecone-docs
    kind: skill
    path: skills/pinecone-docs
    description: Curated documentation reference for developers building with
      Pinecone. Contains links to official docs organized by topic and data
      format references. Use when writing Pinecone code, looking up API
      parameters, or needing the correct format for vectors or records.
  - id: pinecone-full-text-search
    kind: skill
    path: skills/pinecone-full-text-search
    description: Create, ingest into, and query a Pinecone full-text-search (FTS)
      index using the preview API (2026-01.alpha, public preview). Use when the
      user or agent asks to build a text search index on Pinecone, add dense or
      sparse vector fields, ingest documents, construct score_by clauses (text /
      query_string / dense_vector / sparse_vector), or compose with text-match
      filters ($match_phrase / $match_all / $match_any). Ships
      `scripts/ingest.py` for safe bulk ingestion (batch_upsert + error
      inspection + readiness polling); query construction is documented inline
      in this skill — write `documents.search(...)` calls directly, validated
      against `pc.preview.indexes.describe(...)` output.
  - id: pinecone-help
    kind: skill
    path: skills/pinecone-help
    description: Overview of all available Pinecone skills and what a user needs to
      get started. Invoke when a user asks what skills are available, how to get
      started with Pinecone, or what they need to set up before using any
      Pinecone skill.
  - id: pinecone-mcp
    kind: skill
    path: skills/pinecone-mcp
    description: Reference for the Pinecone MCP server tools. Documents all
      available tools - list-indexes, describe-index, describe-index-stats,
      create-index-for-model, upsert-records, search-records, cascading-search,
      and rerank-documents. Use when an agent needs to understand what Pinecone
      MCP tools are available, how to use them, or what parameters they accept.
  - id: pinecone-n8n
    kind: skill
    path: skills/pinecone-n8n
    description: Build n8n workflows using the Pinecone Assistant node or Pinecone
      Vector Store node. Use when building RAG pipelines, chat-with-docs
      workflows, configuring Pinecone nodes in n8n, troubleshooting Pinecone n8n
      nodes, or asking about best practices for Pinecone in n8n.
  - id: pinecone-query
    kind: skill
    path: skills/pinecone-query
    description: Query integrated indexes using text with Pinecone MCP. IMPORTANT -
      This skill ONLY works with integrated indexes (indexes with built-in
      Pinecone embedding models like multilingual-e5-large). For standard
      indexes or advanced vector operations, use the CLI skill instead. Requires
      PINECONE_API_KEY environment variable and Pinecone MCP server to be
      configured.
  - id: pinecone-quickstart
    kind: skill
    path: skills/pinecone-quickstart
    description: Interactive Pinecone quickstart for new developers. Choose between
      two paths - Database (create an integrated index, upsert data, and query
      using Pinecone MCP + Python) or Assistant (create a Pinecone Assistant for
      document Q&A). Use when a user wants to get started with Pinecone for the
      first time or wants a guided tour of Pinecone's tools.
requirements:
  env:
    - PINECONE_API_KEY
hooks:
  mode: explicit
  entries: []
advisories: []
