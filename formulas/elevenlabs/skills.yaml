schemaVersion: 1
id: elevenlabs/skills
name: ElevenLabs Skills
description: Agent skills for ElevenLabs dev products.
source:
  type: git
  url: https://github.com/elevenlabs/skills
  revision: 00b692378e8533554a5b858ae89b5d076c526140
capabilities:
  - id: update-skills-from-changelog
    kind: skill
    path: .agents/skills/update-skills-from-changelog
    description: >
      Update ElevenLabs agent skills from a merged weekly changelog in
      elevenlabs-dx, then open a pull request in elevenlabs/skills. Trigger
      after a changelog merges to main on elevenlabs-dx, or when asked to update
      skills from changelog YYYY-MM-DD.
  - id: agents
    kind: skill
    path: agents
    description: Build voice AI agents with ElevenLabs. Use when creating voice
      assistants, customer service bots, interactive voice characters, or any
      real-time voice conversation experience.
  - id: music
    kind: skill
    path: music
    description: Generate music using ElevenLabs Music API. Use when creating
      instrumental tracks, songs with lyrics, background music, jingles, or any
      AI-generated music composition. Supports prompt-based generation,
      composition plans for granular control, and detailed output with metadata.
  - id: setup-api-key
    kind: skill
    path: setup-api-key
    description: Guides users through setting up an ElevenLabs API key for
      ElevenLabs MCP tools. Use when the user needs to configure an ElevenLabs
      API key, when ElevenLabs tools fail due to missing API key, or when the
      user mentions needing access to ElevenLabs. First checks whether
      ELEVENLABS_API_KEY is already configured and valid, and only runs full
      setup when needed.
  - id: sound-effects
    kind: skill
    path: sound-effects
    description: Generate sound effects from text descriptions using ElevenLabs. Use
      when creating sound effects, generating audio textures, producing ambient
      sounds, cinematic impacts, UI sounds, or any audio that isn't speech.
      Supports looping, duration control, and prompt influence tuning.
  - id: speech-engine
    kind: skill
    path: speech-engine
    description: Add real-time voice conversations to a custom agent runtime with
      ElevenLabs Speech Engine. Use when building Speech Engine servers,
      WebSocket handlers, WebRTC browser clients, conversation token endpoints,
      interruption-aware streaming responses, or voice-enabled chat agents that
      connect developer-owned server logic to ElevenLabs speech-to-text and
      text-to-speech.
  - id: speech-to-text
    kind: skill
    path: speech-to-text
    description: Transcribe audio to text using ElevenLabs Scribe v2. Use when
      converting audio/video to text, generating subtitles, transcribing
      meetings, or processing spoken content.
  - id: text-to-speech
    kind: skill
    path: text-to-speech
    description: Convert text to speech using ElevenLabs voice AI. Use when
      generating audio from text, creating voiceovers, building voice apps, or
      synthesizing speech in 70+ languages.
  - id: voice-changer
    kind: skill
    path: voice-changer
    description: Transform the voice in an audio recording into a different target
      voice while preserving emotion, timing, and delivery using the ElevenLabs
      Voice Changer (speech-to-speech) API. Use when converting one voice to
      another, changing the speaker/narrator of an existing recording, dubbing a
      voice-over in a different voice, creating character voices from a scratch
      performance, anonymizing a speaker, or any "voice conversion / voice
      transfer / speech-to-speech" task. Make sure to use this skill whenever
      the user mentions voice changing, voice conversion, speech-to-speech,
      swapping a voice in audio, re-voicing a clip, or applying a different
      voice to an existing recording — even if they don't explicitly say "voice
      changer".
  - id: voice-isolator
    kind: skill
    path: voice-isolator
    description: Remove background noise and isolate vocals/speech from audio using
      ElevenLabs Voice Isolator (audio isolation) API. Use when cleaning up
      noisy recordings, removing music or background ambience from dialogue,
      isolating speech from field recordings, preparing audio for transcription,
      extracting vocals, or any "denoise / clean up / isolate voice" task.
requirements:
  env:
    - ELEVENLABS_API_KEY
hooks:
  mode: explicit
  entries: []
advisories: []
