# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: global.datasite.com/datasite
name: Datasite
description: Datasite remote MCP server at https://mcp.global.datasite.com/mcp.
  Manage your M&A data room from Claude. Setup guides for Claude Code, Codex,
  Cursor, and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/datasite
capabilities:
  - id: datasite
    kind: mcp
    spec:
      serverName: datasite
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://mcp.global.datasite.com/mcp
