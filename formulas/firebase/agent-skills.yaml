schemaVersion: 1
id: firebase/agent-skills
name: Firebase Agent Skills
description: Firebase agent skill pack; CLI/MCP setup + task-specific Firebase guidance.
source:
  type: git
  url: https://github.com/firebase/agent-skills
  revision: 7eb6e6572ceee31f02aec722cbc02b3f5e2b0ca7
capabilities:
  - id: firebase
    kind: mcp
    path: .mcp.json
  - id: firebase-local
    kind: mcp
    path: kiro/mcp.json
  - id: firebase-ai-logic-basics
    kind: skill
    path: skills/firebase-ai-logic-basics
    description: Official skill for integrating Firebase AI Logic (Gemini API) into
      web applications. Covers setup, multimodal inference, structured output,
      and security.
  - id: firebase-app-hosting-basics
    kind: skill
    path: skills/firebase-app-hosting-basics
    description: Deploy and manage web apps with Firebase App Hosting. Use this
      skill when deploying Next.js/Angular apps with backends.
  - id: firebase-auth-basics
    kind: skill
    path: skills/firebase-auth-basics
    description: Guide for setting up and using Firebase Authentication. Use this
      skill when the user's app requires user sign-in, user management, or
      secure data access using auth rules.
  - id: firebase-basics
    kind: skill
    path: skills/firebase-basics
    description: Provides foundational setup, authentication, and project management
      workflows for Firebase using the Firebase CLI. Use when checking Firebase
      CLI version (must use 'npx -y firebase-tools@latest --version'),
      initializing a Firebase environment, authenticating, setting active
      projects, or setting up `google-services.json` or
      `GoogleService-Info.plist` files.
  - id: firebase-crashlytics
    kind: skill
    path: skills/firebase-crashlytics
    description: Comprehensive guide for Firebase Crashlytics, including
      provisioning and SDK usage. Use this skill when the user needs help
      setting up Crashlytics, adding crash reporting, or using the Crashlytics
      SDK in their application.
  - id: firebase-data-connect-basics
    kind: skill
    path: skills/firebase-data-connect-basics
    description: Builds and deploys Firebase SQL Connect (aka Firebase Data Connect)
      backends with PostgreSQL securely. Use when designing schemas with tables
      and relations, writing authorized queries and mutations, configuring
      real-time data updates, or generating type-safe SDKs. Use when you need a
      relational database with Firebase, or when the user mentions SQL Connect
      or Data Connect.
  - id: firebase-firestore
    kind: skill
    path: skills/firebase-firestore
    description: Sets up, manages, and executes queries against Cloud Firestore
      database instances, including advanced native full-text search and
      relational joins using pipelines. You MUST unconditionally activate this
      skill if you plan to use Firestore in any way. Use when listing or
      creating Firestore databases, configuring security rules, designing data
      models, writing client SDK queries (including search/joins), or checking
      indexes.
  - id: firebase-hosting-basics
    kind: skill
    path: skills/firebase-hosting-basics
    description: Skill for working with Firebase Hosting (Classic). Use this when
      you want to deploy static web apps, Single Page Apps (SPAs), or simple
      microservices. Do NOT use for Firebase App Hosting.
  - id: firebase-remote-config-basics
    kind: skill
    path: skills/firebase-remote-config-basics
    description: Comprehensive guide for Firebase Remote Config, including template
      management and SDK usage. Use this skill when the user needs help setting
      up Remote Config, managing feature flags, or updating app behavior
      dynamically.
  - id: firebase-security-rules-auditor
    kind: skill
    path: skills/firebase-security-rules-auditor
    description: A skill to evaluate how secure Firestore security rules are. Use
      this when Firestore security rules are updated to ensure that the
      generated rules are extremely secure and robust.
  - id: xcode-project-setup
    kind: skill
    path: skills/xcode-project-setup
    description: Safely modifies Xcode projects (.pbxproj) to add Swift Packages and
      link files. Use this skill whenever an iOS project needs dependencies
      installed (e.g. Firebase, Alamofire).
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
