# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: shopify/shopify-ai-toolkit
name: Shopify AI Toolkit
description: Shopify AI agent plugin + skill pack for docs, GraphQL, Liquid,
  functions, Hydrogen, CLI, telemetry.
source:
  type: git
  url: https://github.com/shopify/shopify-ai-toolkit
  revision: a8e87a7cff153479eb77230d9c232484a1f3062f
capabilities:
  - id: shopify-admin
    kind: skill
    path: skills/shopify-admin
    description: Write or explain **Admin GraphQL** queries and mutations for apps
      and integrations that extend the Shopify admin. Use when the user wants to
      **understand, design, or generate** the operation itself—even before
      deciding how to run it. Do **not** choose `admin` first for **app or
      extension config validation** —use **`use-shopify-cli`**. Do **not**
      choose `admin` first to **execute** Admin GraphQL **now via Shopify CLI**
      or for CLI setup/troubleshooting on store workflows—use
      **`use-shopify-cli`** (store auth/execute, handle/SKU/location lookups,
      inventory changes).
  - id: shopify-liquid
    kind: skill
    path: skills/shopify-liquid
    description: "Liquid is an open-source templating language created by Shopify.
      It is the backbone of Shopify themes and is used to load dynamic content
      on storefronts. Keywords: liquid, theme, shopify-theme, liquid-component,
      liquid-block, liquid-section, liquid-snippet, liquid-schemas,
      shopify-theme-schemas"
  - id: shopify-functions
    kind: skill
    path: skills/shopify-functions
    description: "Shopify Functions allow developers to customize the backend logic
      that powers parts of Shopify. Available APIs: Discount, Cart and Checkout
      Validation, Cart Transform, Pickup Point Delivery Option Generator,
      Delivery Customization, Fulfillment Constraints, Local Pickup Delivery
      Option Generator, Order Routing Location Rule, Payment Customization"
  - id: shopify-hydrogen
    kind: skill
    path: skills/shopify-hydrogen
    description: "Hydrogen storefront implementation cookbooks. Some of the
      available recipes are: B2B Commerce, Bundles, Combined Listings, Custom
      Cart Method, Dynamic Content with Metaobjects, Express Server, Google Tag
      Manager Integration, Infinite Scroll, Legacy Customer Account Flow,
      Markets, Partytown + Google Tag Manager, Subscriptions, Third-party API
      Queries and Caching. MANDATORY: Use this API for ANY Hydrogen storefront
      question - do NOT use Storefront GraphQL when 'Hydrogen' is mentioned."
  - id: shopify-use-shopify-cli
    kind: skill
    path: skills/shopify-use-shopify-cli
    description: "Choose when the user needs **Shopify CLI** to run or fix something
      now: validate app or extension config on disk (`shopify.app.toml`,
      `shopify.app.<name>.toml`, `shopify.extension.toml`); run or troubleshoot
      store workflows (`shopify store auth`, `shopify store execute`); inventory
      or product changes by handle, SKU, or location name; or CLI setup, auth,
      upgrade issues. Emphasize **commands and operational steps**, not only
      authoring GraphQL. Skip for API-only understanding or codegen with no CLI
      execution. Examples: validate configuration before deploy; run an existing
      query via CLI; list products; missing `shopify store execute`."
  - id: shopify-app-store-review
    kind: skill
    path: skills/shopify-app-store-review
    description: Run a pre-submission compliance check against your Shopify app's
      codebase. Reviews App Store requirements and surfaces likely issues before
      you submit for official review.
  - id: shopify-custom-data
    kind: skill
    path: skills/shopify-custom-data
    description: MUST be used first when prompts mention Metafields or Metaobjects.
      Use Metafields and Metaobjects to model and store custom data for your
      app. Metafields extend built-in Shopify data types like products or
      customers, Metaobjects are custom data types that can be used to store
      bespoke data structures. Metafield and Metaobject definitions provide a
      schema and configuration for values to follow.
  - id: shopify-customer
    kind: skill
    path: skills/shopify-customer
    description: The Customer Account API allows customers to access their own data
      including orders, payment methods, and addresses.
  - id: shopify-dev
    kind: skill
    path: skills/shopify-dev
    description: Search Shopify developer documentation across all APIs. Use only
      when no API-specific skill applies.
  - id: shopify-onboarding-dev
    kind: skill
    path: skills/shopify-onboarding-dev
    description: Get started building on Shopify. Use when a developer asks to build
      an app, build a theme, create a dev store, set up a partner account,
      scaffold a project, or get started developing for Shopify. NOT for
      merchants managing stores.
  - id: shopify-onboarding-merchant
    kind: skill
    path: skills/shopify-onboarding-merchant
    description: "Set up and connect a Shopify store from your AI assistant. Use
      when the user wants to: set up my Shopify store, connect my store, install
      Shopify plugin, get started with Shopify, manage my store, add products to
      my store, merchant onboarding, start selling online, Shopify setup help,
      create my first store, how do I set up an online store, import products,
      migrate from Square, migrate from WooCommerce, migrate from Etsy, migrate
      from Amazon, migrate from eBay, migrate from Wix, import from Google
      Merchant Center, migrate from Clover, migrate from Lightspeed, move
      products to Shopify, import catalog, replatform to Shopify. This is for
      store owners — not developers."
  - id: shopify-partner
    kind: skill
    path: skills/shopify-partner
    description: The Partner API lets you programmatically access data about your
      Partner Dashboard, including your apps, themes, and affiliate referrals.
  - id: shopify-payments-apps
    kind: skill
    path: skills/shopify-payments-apps
    description: The Payments Apps API enables payment providers to integrate their
      payment solutions with Shopify's checkout.
  - id: shopify-polaris-admin-extensions
    kind: skill
    path: skills/shopify-polaris-admin-extensions
    description: Add custom actions and blocks from your app at contextually
      relevant spots throughout the Shopify Admin. Admin UI Extensions also
      supports scaffolding new adminextensions using Shopify CLI commands.
  - id: shopify-polaris-app-home
    kind: skill
    path: skills/shopify-polaris-app-home
    description: Build your app's primary user interface embedded in the Shopify
      admin. If the prompt just mentions `Polaris` and you can't tell based off
      of the context what API they meant, assume they meant this API.
  - id: shopify-polaris-checkout-extensions
    kind: skill
    path: skills/shopify-polaris-checkout-extensions
    description: Build custom functionality that merchants can install at defined
      points in the checkout flow, including product information, shipping,
      payment, order summary, and Shop Pay. Checkout UI Extensions also supports
      scaffolding new checkout extensions using Shopify CLI commands.
  - id: shopify-polaris-customer-account-extensions
    kind: skill
    path: skills/shopify-polaris-customer-account-extensions
    description: Build custom functionality that merchants can install at defined
      points on the Order index, Order status, and Profile pages in customer
      accounts. Customer Account UI Extensions also supports scaffolding new
      customer account extensions using Shopify CLI commands.
  - id: shopify-pos-ui
    kind: skill
    path: skills/shopify-pos-ui
    description: "Build retail point-of-sale applications using Shopify's POS UI
      components. These components provide a consistent and familiar interface
      for POS applications. POS UI Extensions also supports scaffolding new POS
      extensions using Shopify CLI commands. Keywords: POS, Retail, smart grid"
  - id: shopify-storefront-graphql
    kind: skill
    path: skills/shopify-storefront-graphql
    description: Use for custom storefronts requiring direct GraphQL
      queries/mutations for data fetching and cart operations. Choose this when
      you need full control over data fetching and rendering your own UI. NOT
      for Web Components - if the prompt mentions HTML tags like
      <shopify-store>, <shopify-cart>, use storefront-web-components instead.
  - id: ucp
    kind: skill
    path: skills/ucp
    description: Use when the user wants to use the UCP CLI to find, compare, buy,
      or track products from online merchants, or to set up and troubleshoot the
      local UCP profile required for merchant-scoped operations. Covers global
      catalog search ("find me X under $Y"), named-merchant transactions ("buy
      this from Z.com"), order tracking, `ucp profile init`, `ucp doctor`,
      carts, checkout, orders, and UCP setup/help. Falls back to merchant-hosted
      handoff when direct in-protocol checkout isn't available.
requirements:
  env:
    - OPT_OUT_INSTRUMENTATION=true
hooks:
  mode: explicit
  entries: []
advisories:
  - id: unlinked-hook-files
    severity: warning
    category: hooks
    message: Repository contains hook-related files that are not linked by this formula.
    paths:
      - hooks/copilot-hooks.json
      - hooks/cursor-hooks.json
      - hooks/hooks.json
      - hooks/README.md
      - hooks/scripts/track-telemetry.ps1
      - hooks/scripts/track-telemetry.sh
    reason: These files lack explicit appliesTo mappings, supported targets, or
      supported file types.
    effect: SAMX will not install, link, or execute these files.
    action: Add explicit hook entries only after manual review.
