schemaVersion: 1
id: shopify/liquid-skills
name: liquid-skills
description: Claude Code plugin marketplace for Shopify Liquid theme dev.
source:
  type: git
  url: https://github.com/shopify/liquid-skills
  revision: ae3e4cc3f454923e388bbd841fd931f0c7bf5be4
capabilities:
  - id: liquid-theme-a11y
    kind: skill
    path: plugins/liquid-skills/skills/liquid-theme-a11y
    description: Implement WCAG 2.2 accessibility patterns in Shopify Liquid themes.
      Covers e-commerce-specific components including product cards, carousels,
      cart drawers, price display, forms, filters, and modals. Use when building
      accessible theme components, fixing accessibility issues, or reviewing
      ARIA patterns in .liquid files.
  - id: liquid-theme-standards
    kind: skill
    path: plugins/liquid-skills/skills/liquid-theme-standards
    description: CSS, JavaScript, and HTML coding standards for Shopify Liquid
      themes. Covers BEM naming inside stylesheet tags, design tokens, CSS
      custom properties, Web Components for themes, defensive CSS, and
      progressive enhancement. Use when writing CSS/JS/HTML in .liquid files or
      theme asset files.
  - id: shopify-liquid-themes
    kind: skill
    path: plugins/liquid-skills/skills/shopify-liquid-themes
    description: Generate Shopify Liquid theme code (sections, blocks, snippets)
      with correct schema JSON, LiquidDoc headers, translation keys, and CSS/JS
      patterns. Use when creating or editing .liquid files for Shopify themes,
      working with schema, doc, stylesheet, javascript tags, or Shopify Liquid
      objects/filters/tags.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
