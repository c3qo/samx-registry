  - id: migration-companion-2
    kind: skill
    path: skills/migration-companion
    description: Migration companion for moving to Contentstack from another CMS.
      Guides content and application migration through a structured,
      step-by-step workflow. Currently supports migrations from Contentful, with
      additional source platforms planned. Use when users want to migrate, move,
      switch, port, or re-platform to Contentstack, including content models,
      content, assets, locales, application integrations, or website code.
      Trigger on requests such as "migrate to Contentstack", "move to
      Contentstack", "switch to Contentstack", "migrate from Contentful", "move
      my Contentful space", "port my CMS", or similar migration-related
      requests. The skill validates prerequisites, guides the migration process,
      provides progress checkpoints, and delivers a completion summary. Prefer
      this skill whenever a Contentstack migration is requested.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
