# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: exploreomni/omni-agent-skills
name: Omni Agent Skills
description: Omni Analytics skills pkg for agents; querying, modeling, content,
  admin, embed, eval, optimizer, integrations.
source:
  type: git
  url: https://github.com/exploreomni/omni-agent-skills
  revision: 5ed52c9a277bff38bc4dd827e55d374efe9f35ec
capabilities:
  - id: omni-admin
    kind: skill
    path: skills/omni-admin
    description: Administer an Omni Analytics instance — manage connections, users,
      groups, user attributes, permissions, schedules, and schema refreshes via
      the Omni CLI. Use this skill whenever someone wants to manage users or
      groups, set up permissions on a dashboard or folder, configure user
      attributes, create or modify schedules, manage database connections,
      refresh a schema, set up access controls, provision users, or any variant
      of "add a user", "give access to", "set up permissions", "who has access",
      "configure connection", "refresh the schema", or "schedule a delivery".
  - id: omni-ai-eval
    kind: skill
    path: skills/omni-ai-eval
    description: Evaluate Omni AI query generation accuracy by running test prompts
      through the Omni CLI, comparing generated query JSON against expected
      results, and scoring accuracy. Use this skill whenever someone wants to
      evaluate Omni AI, benchmark Blobby, run regression tests, compare AI
      output across branches or configurations, test prompt variations, measure
      AI quality, run A/B tests on model changes, assess impact of context
      changes, or any variant of "run evals", "test Blobby", "benchmark query
      generation", "compare AI results", "regression test", "how accurate is the
      AI", or "measure the impact of my changes".
  - id: omni-ai-optimizer
    kind: skill
    path: skills/omni-ai-optimizer
    description: Optimize your Omni Analytics model for Blobby, the Omni Agent —
      configure ai_context, ai_fields, sample_queries, and create AI-specific
      topic extensions. Use this skill whenever someone wants to improve AI
      accuracy in Omni, make Blobby smarter, configure AI context, add example
      questions, tune AI responses, set up sample queries, curate fields for AI,
      create AI-optimized topics, troubleshoot why Blobby gives wrong answers,
      or any variant of "make the AI better", "Blobby isn't answering
      correctly", "add context for AI", "optimize for AI", or "teach the AI
      about our data".
  - id: omni-content-builder
    kind: skill
    path: skills/omni-content-builder
    description: Create, update, and manage Omni Analytics documents and dashboards
      programmatically — document lifecycle, drafts, tiles, visualizations,
      filters, controls, and layouts — using the Omni CLI. Use this skill
      whenever someone wants to build a dashboard, create a workbook, add tiles
      or charts, configure dashboard filters or controls, update an existing
      dashboard's model, set up a KPI view, create visualizations, lay out a
      dashboard, arrange tiles or pages, create a document, edit a dashboard as
      a draft, publish a draft, change dashboard settings, rename a workbook,
      delete a dashboard, move a document to a folder, duplicate a dashboard, or
      any variant of "build a dashboard for", "create a report showing", "add a
      chart to", "make a dashboard", "update the dashboard layout", "rename this
      document", "publish this draft", "move to folder", or "delete this
      dashboard". Also use when modifying dashboard-level model customizations
      like workbook-specific joins or fields.
  - id: omni-content-explorer
    kind: skill
    path: skills/omni-content-explorer
    description: Find, browse, and organize content in Omni Analytics — dashboards,
      workbooks, folders, and labels — using the Omni CLI. Use this skill
      whenever someone wants to find an existing dashboard, search for content,
      list workbooks, browse folders, see what dashboards exist, find popular
      reports, download a dashboard as PDF or PNG, favorite content, manage
      labels on documents, or any variant of "find the dashboard about", "what
      reports do we have", "show me our dashboards", "where is the sales
      report", or "download this dashboard".
  - id: omni-embed
    kind: skill
    path: skills/omni-embed
    description: Embed Omni Analytics dashboards in external applications — URL
      signing, custom themes, iframe events, entity workspaces, and
      permission-aware content — using the @omni-co/embed SDK and Omni CLI. Use
      this skill whenever someone wants to embed a dashboard, sign an embed URL,
      customize the embedded theme, handle embed events, listen for clicks or
      drills in the iframe, send filters to an embedded dashboard, set up entity
      workspaces, look up embed users, build a permission-aware content list,
      white-label an embedded dashboard, or any variant of "embed this
      dashboard", "customize the iframe theme", "handle click events from the
      embed", "filter the embedded dashboard", "set up embedding", or "what
      dashboards can this user see".
  - id: omni-to-databricks-metric-views
    kind: skill
    path: skills/omni-integrations/skills/omni-to-databricks-metric-views
    description: Convert an Omni Analytics topic into a Databricks Metric View
      definition in Unity Catalog. Use this skill whenever someone wants to
      export Omni metrics to Databricks, create a Metric View from an Omni
      topic, harden BI metrics into Unity Catalog, or bridge Omni's semantic
      layer with Databricks AI/BI dashboards and Genie spaces.
  - id: omni-to-snowflake-semantic-view
    kind: skill
    path: skills/omni-integrations/skills/omni-to-snowflake-semantic-view
    description: Convert an Omni Analytics topic into a Snowflake Semantic View YAML
      definition. Use this skill whenever someone wants to export Omni metrics
      to Snowflake, create a Semantic View from an Omni topic, harden BI metrics
      into the warehouse, or bridge Omni's semantic layer with Snowflake Cortex
      Analyst.
  - id: omni-model-builder
    kind: skill
    path: skills/omni-model-builder
    description: Create and edit Omni Analytics semantic model definitions — views,
      topics, dimensions, measures, relationships, and query views — using YAML
      through the Omni CLI. Use this skill whenever someone wants to add a
      field, create a new dimension or measure, define a topic, set up joins
      between tables, modify the data model, build a new view, add a calculated
      field, create a relationship, edit YAML, work on a branch, promote model
      changes, or any variant of "model this data", "add this metric", "create a
      view for", or "set up a join between". Also use for migrating modeling
      patterns since Omni's YAML is conceptually similar to other semantic layer
      definitions.
  - id: omni-model-explorer
    kind: skill
    path: skills/omni-model-explorer
    description: Discover and inspect Omni Analytics models, topics, views, fields,
      dimensions, measures, and relationships using the Omni CLI. Use this skill
      whenever someone wants to understand what data is available in Omni,
      explore their semantic model, find specific fields or views, check how
      tables join together, see what topics exist, or asks any variant of "what
      can I query", "what fields are available", "show me the model", "what data
      do we have", or "how is this data modeled". Also use when you need to
      understand the Omni model structure before building or modifying anything.
  - id: omni-query
    kind: skill
    path: skills/omni-query
    description: Run queries against Omni Analytics' semantic layer using the Omni
      CLI, interpret results, and chain queries for multi-step analysis. Use
      this skill whenever someone wants to query data through Omni, run a
      report, get metrics, pull numbers, analyze data, ask "how many", "what's
      the trend", "show me the data", retrieve dashboard query results, or
      perform any data retrieval through Omni's query engine. Also use when
      someone wants to programmatically extract data from an existing Omni
      dashboard or workbook.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
