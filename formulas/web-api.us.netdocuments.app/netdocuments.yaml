schemaVersion: 1
id: web-api.us.netdocuments.app/netdocuments
name: NetDocuments
description: NetDocuments remote MCP server at
  https://web-api.us.netdocuments.app/connect/mcp. Securely access your
  documents in NetDocuments. Setup guides for Claude Code, Codex, Cursor, and VS
  Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/netdocuments
capabilities:
  - id: netdocuments
    kind: mcp
    spec:
      serverName: netdocuments
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://web-api.us.netdocuments.app/connect/mcp
