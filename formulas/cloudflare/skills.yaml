schemaVersion: 1
id: cloudflare/skills
name: Cloudflare Skills
description: Cloudflare agent skills pack for Workers, One, AI, storage, obs, MCP.
source:
  type: git
  url: https://github.com/cloudflare/skills
  revision: ffcc622bf112eccc49c4b433faa5dd28e9ede2ea
capabilities:
  - id: cloudflare
    kind: skill
    path: skills/cloudflare
    description: Comprehensive Cloudflare platform skill covering Workers, Pages,
      storage (KV, D1, R2), AI (Workers AI, Vectorize, Agents SDK), feature
      flags (Flagship), networking (Tunnel, Spectrum), security (WAF, DDoS), and
      infrastructure-as-code (Terraform, Pulumi). Use for any Cloudflare
      development task. Biases towards retrieval from Cloudflare docs over
      pre-trained knowledge.
  - id: agents-sdk
    kind: skill
    path: skills/agents-sdk
    description: Build AI agents on Cloudflare Workers using the Agents SDK. Load
      when creating stateful agents, durable workflows, real-time WebSocket
      apps, scheduled tasks, MCP servers, chat applications, voice agents, or
      browser automation. Covers Agent class, state management, callable RPC,
      Workflows, durable execution, queues, retries, observability, and React
      hooks. Biases towards retrieval from Cloudflare docs over pre-trained
      knowledge.
  - id: cloudflare-one
    kind: skill
    path: skills/cloudflare-one
    description: "Guides Cloudflare One Zero Trust and SASE work across Access,
      Gateway, WARP, Tunnel, Cloudflare WAN, DLP, CASB, device posture, and
      identity. Use when designing, configuring, troubleshooting, or reviewing
      Cloudflare One deployments. Retrieval-first: use current Cloudflare
      docs/API schemas instead of embedded product docs."
  - id: wrangler
    kind: skill
    path: skills/wrangler
    description: Cloudflare Workers CLI for deploying, developing, and managing
      Workers, KV, R2, D1, Vectorize, Hyperdrive, Workers AI, Containers,
      Queues, Workflows, Pipelines, and Secrets Store. Load before running
      wrangler commands to ensure correct syntax and best practices. Biases
      towards retrieval from Cloudflare docs over pre-trained knowledge.
  - id: cloudflare-email-service
    kind: skill
    path: skills/cloudflare-email-service
    description: Send and receive transactional emails with Cloudflare Email Service
      (Email Sending + Email Routing). Use when building email sending (Workers
      binding or REST API), email routing, Agents SDK email handling, or
      integrating email into any app — Workers, Node.js, Python, Go, etc. Also
      use for email deliverability, SPF/DKIM/DMARC, wrangler email setup, MCP
      email tools, or when a coding agent needs to send emails. Even for simple
      requests like "add email to my Worker" — this skill has critical config
      details.
  - id: cloudflare-one-migrations
    kind: skill
    path: skills/cloudflare-one-migrations
    description: Plans migrations from Zscaler ZIA/ZPA, Palo Alto, legacy VPN, SWG,
      or SASE stacks to Cloudflare One. Use for migration assessments, policy
      mapping, rollout plans, and parity/gap analysis.
  - id: durable-objects
    kind: skill
    path: skills/durable-objects
    description: Create and review Cloudflare Durable Objects. Use when building
      stateful coordination (chat rooms, multiplayer games, booking systems),
      implementing RPC methods, SQLite storage, alarms, WebSockets, or reviewing
      DO code for best practices. Covers Workers integration, wrangler config,
      and testing with Vitest. Biases towards retrieval from Cloudflare docs
      over pre-trained knowledge.
  - id: sandbox-sdk
    kind: skill
    path: skills/sandbox-sdk
    description: Build sandboxed applications for secure code execution. Load when
      building AI code execution, code interpreters, CI/CD systems, interactive
      dev environments, or executing untrusted code. Covers Sandbox SDK
      lifecycle, commands, files, code interpreter, and preview URLs. Biases
      towards retrieval from Cloudflare docs over pre-trained knowledge.
  - id: turnstile-spin
    kind: skill
    path: skills/turnstile-spin
    description: Set up Cloudflare Turnstile end-to-end in a project — scan the
      codebase, create the widget via the Cloudflare API, deploy the managed
      siteverify Worker, write the frontend snippets, validate, and persist the
      skill. Load this when a user asks to add Turnstile, set up CAPTCHA,
      protect a form from bots, or fix a Turnstile integration. Mirrors
      developers.cloudflare.com/turnstile/spin.
  - id: web-perf
    kind: skill
    path: skills/web-perf
    description: Analyzes web performance using Chrome DevTools MCP. Measures Core
      Web Vitals (LCP, INP, CLS) and supplementary metrics (FCP, TBT, Speed
      Index), identifies render-blocking resources, network dependency chains,
      layout shifts, caching issues, and accessibility gaps. Use when asked to
      audit, profile, debug, or optimize page load performance, Lighthouse
      scores, or site speed. Biases towards retrieval from current documentation
      over pre-trained knowledge.
  - id: workers-best-practices
    kind: skill
    path: skills/workers-best-practices
    description: Reviews and authors Cloudflare Workers code against production best
      practices. Load when writing new Workers, reviewing Worker code,
      configuring wrangler.jsonc, or checking for common Workers anti-patterns
      (streaming, floating promises, global state, secrets, bindings,
      observability). Biases towards retrieval from Cloudflare docs over
      pre-trained knowledge.
requirements:
