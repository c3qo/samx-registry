# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: cloudflare/sandbox-sdk
name: Cloudflare Sandbox SDK
description: SDK + bridge for isolated code exec in Cloudflare containers.
source:
  type: git
  url: https://github.com/cloudflare/sandbox-sdk
  revision: 71f67bcc9a0fa5dc33f3b8fb252aa49824dacd1f
capabilities:
  - id: architecture
    kind: skill
    path: .agents/skills/architecture
    description: Use when navigating the codebase for the first time, adding a new
      client method, adding a new container handler/service, or understanding
      how a request flows from Worker through the Sandbox DO into the container.
      Covers the three-layer architecture, client pattern, container runtime
      structure, and monorepo layout. (project)
  - id: changesets
    kind: skill
    path: .agents/skills/changesets
    description: Use when creating a changeset, preparing a release, or bumping
      versions. Covers which packages to reference, how to write user-facing
      changeset descriptions, the release automation flow, and the npm/Docker
      version sync requirement. (project)
  - id: sandbox-bridge
    kind: skill
    path: .agents/skills/sandbox-bridge
    description: Use when you need to exercise a real, running Sandbox deployment
      via HTTP — for example to validate SDK changes against a live container,
      reproduce a user-reported issue, or experiment with the API (including
      FUSE bucket mounts) without spinning up `wrangler dev`. Documents the
      Sandbox bridge worker reachable via `SANDBOX_WORKER_URL` +
      `SANDBOX_API_KEY` when the host injects them.
  - id: testing
    kind: skill
    path: .agents/skills/testing
    description: Use when writing or running tests for this project. Covers unit vs
      E2E test decisions, test file locations, mock patterns, and
      project-specific testing conventions. (project)
  - id: coding-standards
    kind: skill
    path: .agents/skills/coding-standards
    description: Use when writing or reviewing TypeScript in this repo. Covers the
      no-`any` rule and where to put new types, the uppercase-acronym style
      guide, and the rules for code comments (no historical context). (project)
  - id: examples
    kind: skill
    path: .agents/skills/examples
    description: Use when working in the examples/ directory, running an example
      with wrangler dev, adding a new example, or answering questions about
      EXPOSE directives and the local Docker dev loop. (project)
  - id: git-commit
    kind: skill
    path: .agents/skills/git-commit
    description: Use when creating git commits to ensure commit messages follow
      project standards. Applies the 7 rules for great commit messages with
      focus on conciseness and imperative mood.
  - id: logging
    kind: skill
    path: .agents/skills/logging
    description: Use when adding logs, debugging, or working with the Logger across
      the SDK and container runtime. Covers the constructor-injection pattern,
      child loggers, env-var configuration, and test mocking. (project)
  - id: session-execution
    kind: skill
    path: .agents/skills/session-execution
    description: Use when working on or reviewing session execution, command
      handling, shell state, FIFO-based streaming, or stdout/stderr separation.
      Relevant for session.ts, command handlers, exec/execStream, or anything
      involving shell process management. (project)
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
