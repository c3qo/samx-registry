# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: cloudflare/polystella
name: PolyStella
description: Astro i18n/localization pkg; AI build-time translation + R2 cache.
source:
  type: git
  url: https://github.com/cloudflare/polystella
  revision: ef270af7a668d82d6b8538252f9ab3110d61bc4f
capabilities:
  - id: polystella-consumer
    kind: skill
    path: skills/polystella-consumer
    description: Add or maintain PolyStella in an existing Astro project. Use when
      integrating AI-driven build-time content localization, configuring R2
      caching, wiring locale-prefixed routes, or debugging an existing
      PolyStella setup in a downstream project.
  - id: polystella-contributor
    kind: skill
    path: skills/polystella-contributor
    description: Edit the PolyStella package source. Use when adding a file-format
      adapter, adding a CLI subcommand, adding a translation provider, modifying
      the cache contract, debugging a translation regression, or otherwise
      working on the package itself (not consuming it).
requirements:
  env:
    - astro ^6.0.0
hooks:
  mode: explicit
  entries: []
advisories: []
