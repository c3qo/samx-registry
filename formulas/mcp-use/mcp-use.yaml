  - id: openapi-to-mcp
    kind: skill
    path: skills/openapi-to-mcp
    description: Build and deploy an MCP server from an OpenAPI / Swagger spec using
      the mcp-use TypeScript SDK. Use this skill whenever the user wants to
      "turn this OpenAPI spec into an MCP server", "make this API usable from
      Claude/ChatGPT", "wrap this Swagger doc as MCP tools", "expose this REST
      API to an LLM", "generate MCP tools from a spec", or pastes/attaches an
      `openapi.yaml`, `openapi.json`, or `swagger.json` and asks for a
      Claude-compatible version. Trigger even if the user doesn't say "MCP" — if
      they describe an existing HTTP API (REST endpoints, an internal service, a
      third-party API they have a key for) and want an LLM to call it, this is
      the right skill. Covers spec ingestion (file path, URL, or pasted),
      operation-to-tool mapping, auth wiring (apiKey, bearer, basic, OAuth
      bearer), scaffolding with `create-mcp-use-app`, tool generation with
      proper zod schemas, live testing in the mcp-use inspector, and deploying
      to Manufact / mcp-use cloud.
