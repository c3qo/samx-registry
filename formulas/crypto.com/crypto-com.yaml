# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: crypto.com/crypto-com
name: Crypto Com
description: Crypto.com remote MCP server at
  https://mcp.crypto.com/market-data/mcp. Real time prices, orders, charts, and
  more for crypto. Setup guides for Claude Code, Codex, Cursor, and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/crypto-com
capabilities:
  - id: crypto-com
    kind: mcp
    spec:
      serverName: crypto-com
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://mcp.crypto.com/market-data/mcp
