# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: supabase.com/supabase
name: Supabase
description: Supabase remote MCP server at https://mcp.supabase.com/mcp.
  Projects, database, docs. Setup guides for Claude Code, Codex, Cursor, and VS
  Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/supabase
capabilities:
  - id: supabase
    kind: mcp
    spec:
      serverName: supabase
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://mcp.supabase.com/mcp
