# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: mixpanel.com/mixpanel
name: Mixpanel
description: Mixpanel remote MCP server at https://mcp.mixpanel.com/mcp.
  Analyze, query, and manage your Mixpanel data. Setup guides for Claude Code,
  Codex, Cursor, and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/mixpanel
capabilities:
  - id: mixpanel
    kind: mcp
    spec:
      serverName: mixpanel
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://mcp.mixpanel.com/mcp
