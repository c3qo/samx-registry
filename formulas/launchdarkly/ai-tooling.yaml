schemaVersion: 1
id: launchdarkly/ai-tooling
name: LaunchDarkly AI Tooling
description: LaunchDarkly agent skills + MCP for configs, flags, evals, metrics.
source:
  type: git
  url: https://github.com/launchdarkly/ai-tooling
  revision: 913b74564ca49ba40fa0c21d230f2389466a8b18
capabilities:
  - id: launchdarkly
    kind: mcp
    path: .mcp.json
  - id: configs-create
    kind: skill
    path: skills/agentcontrol/configs-create
    description: Create and configure configs in LaunchDarkly. Helps you choose
      between agent vs completion mode, create the config, add variations with
      models and prompts, and verify the setup.
  - id: tools
    kind: skill
    path: skills/agentcontrol/tools
    description: Give your agents capabilities through tools (function calling).
      Helps you identify what your agent needs to do, create tool definitions,
      and attach them to config variations.
  - id: onboarding
    kind: skill
    path: skills/onboarding
    description: "Onboard a project to LaunchDarkly: kickoff roadmap, resumable log,
      explore repo, MCP, companion flag skills, nested SDK install
      (detect/plan/apply), first flag. Use when adding LaunchDarkly, setting up
      or integrating feature flags in a project, SDK integration, or 'onboard
      me'."
  - id: agent-graphs
    kind: skill
    path: skills/agentcontrol/agent-graphs
    description: Create and manage agent graphs — directed graphs of configs
      connected by edges with handoff logic. Use when building multi-agent
      workflows where configs route to each other.
  - id: aiconfig-agent-graphs
    kind: skill
    path: skills/agentcontrol/aiconfig-agent-graphs
    description: DEPRECATED redirect — this skill was renamed to agent-graphs. Do
      not use this skill; invoke agent-graphs instead. Kept only so old
      references to aiconfig-agent-graphs still point users to the new name.
  - id: aiconfig-ai-metrics
    kind: skill
    path: skills/agentcontrol/aiconfig-ai-metrics
