      aiconfig-tools still point users to the new name.
  - id: aiconfig-update
    kind: skill
    path: skills/agentcontrol/aiconfig-update
    description: DEPRECATED redirect — this skill was renamed to configs-update. Do
      not use this skill; invoke configs-update instead. Kept only so old
