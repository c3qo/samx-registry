schemaVersion: 1
id: langfuse/skills
name: Langfuse Skills
description: "Agent skills for Langfuse: tracing, prompt mgmt, eval, CLI/API
  access, docs lookup."
source:
  type: git
  url: https://github.com/langfuse/skills
  revision: c39789078b848160a695947907db3ba40b7a2bce
capabilities:
  - id: skill-creator
    kind: skill
    path: .cursor/skills/skill-creator
    description: Guide for creating effective skills. This skill should be used when
      users want to create a new skill (or update an existing skill) that
      extends Claude's capabilities with specialized knowledge, workflows, or
      tool integrations.
  - id: langfuse
    kind: skill
    path: skills/langfuse
    description: Interact with Langfuse and access its documentation. Use when
      needing to (1) query or modify Langfuse data programmatically via the CLI
      — traces, prompts, datasets, scores, sessions, and any other API resource,
      (2) look up Langfuse documentation, concepts, integration guides, or SDK
      usage, or (3) understand how any Langfuse feature works. This skill covers
      CLI-based API access (via npx) and multiple documentation retrieval
      methods.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
