# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: resend/resend-skills
name: Resend Skills
description: Resend AI-agent/email skill pack + MCP.
source:
  type: git
  url: https://github.com/resend/resend-skills
  revision: 406ba99b78d48c2cdbc1ebc9010ad2c12c7f5ba6
capabilities:
  - id: resend
    kind: mcp
    path: .mcp.json
  - id: react-email
    kind: skill
    path: skills/react-email
    description: Use when building HTML email templates with React components,
      adding a visual email editor to an application using the React Email
      visual editor, rendering emails to HTML, or sending emails with Resend.
      Covers welcome emails, password resets, notifications, order
      confirmations, newsletters, transactional emails, and the embeddable email
      editor component.
  - id: email-best-practices
    kind: skill
    path: skills/email-best-practices
    description: Use when building email features, emails going to spam, high bounce
      rates, setting up SPF/DKIM/DMARC authentication, implementing email
      capture, ensuring compliance (CAN-SPAM, GDPR, CASL), handling webhooks,
      retry logic, making emails accessible (alt text, headings, contrast,
      screen readers), or deciding transactional vs marketing.
  - id: agent-email-inbox
    kind: skill
    path: skills/agent-email-inbox
    description: Use when building any system where email content triggers actions —
      AI agent inboxes, automated support handlers, email-to-task pipelines, or
      any workflow processing untrusted inbound email. Always use this skill
      when the user wants to receive emails and act on them programmatically,
      even if they don't mention "agent" — the skill contains critical security
      patterns (sender allowlists, content filtering, sandboxed processing) that
      prevent untrusted email from controlling your system.
  - id: resend-cli
    kind: skill
    path: skills/resend-cli
    description: >
      Operate the Resend platform from the terminal — send emails (including
      React Email .tsx templates via --react-email), manage domains, contacts,
      broadcasts, templates, webhooks, API keys, logs, automations, and events
      via the `resend` CLI. Use when the user wants to run Resend commands in
      the shell, scripts, or CI/CD pipelines, or send/preview React Email
      templates. Always load this skill before running `resend` commands — it
      contains the non-interactive flag contract and gotchas that prevent silent
      failures.
  - id: resend-2
    kind: mcp
    path: mcp.json
  - id: resend-3
    kind: skill
    path: skills/resend
    description: Use when working with the Resend email API — sending transactional
      emails (single or batch), receiving inbound emails via webhooks, managing
      email templates, tracking delivery events, managing domains, contacts,
      broadcasts, webhooks, API keys, automations, events, viewing API request
      logs, or setting up the Resend SDK. Always use this skill when the user
      mentions Resend, even for simple tasks like "send an email with Resend" —
      the skill contains critical gotchas (idempotency keys, webhook
      verification, template variable syntax) that prevent common production
      issues.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
