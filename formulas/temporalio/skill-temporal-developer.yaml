# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: temporalio/skill-temporal-developer
name: Temporal Development Skill
description: Skill for building and debugging Temporal apps.
source:
  type: git
  url: https://github.com/temporalio/skill-temporal-developer
  revision: 3973e73202f72cb6b157b827f270c04f96ad8c1f
capabilities:
  - id: temporal-developer
    kind: skill
    path: .
    description: Develop, debug, and manage Temporal applications across Python,
      TypeScript, Go, Java, .NET, Ruby, and Rust. Use when the user is building
      workflows, activities, or workers with a Temporal SDK, debugging issues
      like non-determinism errors, stuck workflows, or activity retries, using
      Temporal CLI, Temporal Server, or Temporal Cloud, or working with durable
      execution concepts like signals, queries, heartbeats, versioning,
      continue-as-new, child workflows, or saga patterns. Also use when the user
      mentions "run a Temporal workflow from the CLI", "start a dev server",
      "run temporal server start-dev", "temporal workflow start", "temporal
      workflow execute", "temporal workflow signal", "temporal workflow query",
      "temporal workflow update".
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
