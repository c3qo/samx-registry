# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: temporalio/skills-temporal-cloud
name: Temporal Cloud Skill
description: Troubleshoot Temporal Cloud connectivity, auth, config.
source:
  type: git
  url: https://github.com/temporalio/skills-temporal-cloud
  revision: 2d867d1f96ae388ed27f1c48aec817f210b6cd3d
capabilities:
  - id: temporal-cloud
    kind: skill
    path: .
    description: Fix Temporal Cloud connection, auth, and config problems. Use when
      users hit login failures, can't connect to Cloud, get x509/TLS errors,
      have namespace or endpoint mismatches, paste broken SDK connection
      snippets, are confused about which endpoint to use, see "no pollers" or
      RESOURCE_EXHAUSTED, struggle with PrivateLink/PSC, or need help setting up
      a new namespace. Also use for HA namespace failover and DNS issues. Not
      for worker performance tuning or scaling.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
