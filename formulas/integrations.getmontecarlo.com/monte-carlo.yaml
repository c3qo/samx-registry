# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: integrations.getmontecarlo.com/monte-carlo
name: Monte Carlo
description: Monte Carlo remote MCP server at
  https://integrations.getmontecarlo.com/mcp. Data & AI observability. Setup
  guides for Claude Code, Codex, Cursor, and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/monte-carlo
capabilities:
  - id: monte-carlo
    kind: mcp
    spec:
      serverName: monte-carlo
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://integrations.getmontecarlo.com/mcp
