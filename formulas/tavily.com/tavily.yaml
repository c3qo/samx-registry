# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: tavily.com/tavily
name: Tavily
description: Tavily remote MCP server at https://mcp.tavily.com/mcp. Connect
  your AI agents to the web. Setup guides for Claude Code, Codex, Cursor, and VS
  Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/tavily
capabilities:
  - id: tavily
    kind: mcp
    spec:
      serverName: tavily
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://mcp.tavily.com/mcp
