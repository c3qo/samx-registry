schemaVersion: 1
id: connect.squareup.com/cash-app
name: Cash App
description: Cash App remote MCP server at
  https://connect.squareup.com/v2/mcp/cash-app. Discover local food spots and
  order with a conversation. Setup guides for Claude Code, Codex, Cursor, and VS
  Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/cash-app
capabilities:
  - id: cash-app
    kind: mcp
    spec:
      serverName: cash-app
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://connect.squareup.com/v2/mcp/cash-app
