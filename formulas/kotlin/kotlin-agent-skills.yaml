# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: kotlin/kotlin-agent-skills
name: AI agent skills for Kotlin
description: Collection of Kotlin-focused agent skills.
source:
  type: git
  url: https://github.com/kotlin/kotlin-agent-skills
  revision: daf0a035ee33b5e4863609827d80f7cea550a76b
capabilities:
  - id: kotlin-backend-jpa-entity-mapping
    kind: skill
    path: skills/kotlin-backend-jpa-entity-mapping
    description: >
      Model Kotlin persistence code correctly for Spring Data JPA and Hibernate.
      Covers entity design, identity and equality, uniqueness constraints,
      relationships, fetch plans, and common ORM (Object-Relational Mapping)
      traps  specific to Kotlin. Use when creating or reviewing JPA (Java
      Persistence API)  entities, diagnosing N+1 or LazyInitializationException,
      placing indexes and  uniqueness rules, or preventing Kotlin-specific bugs
      such as data class  entities and broken equals/hashCode.
  - id: kotlin-tooling-agp9-migration
    kind: skill
    path: skills/kotlin-tooling-agp9-migration
    description: >
      Migrates Kotlin Multiplatform (KMP) projects to Android Gradle Plugin
      9.0+. Handles plugin replacement
      (com.android.kotlin.multiplatform.library), module splitting, DSL
      migration, and the new default project structure. Use when upgrading AGP,
      when build fails due to KMP+AGP incompatibility, or when the user mentions
      AGP 9.0, android multiplatform plugin, KMP migration, or
      com.android.kotlin.multiplatform.library.
  - id: kotlin-tooling-cocoapods-spm-migration
    kind: skill
    path: skills/kotlin-tooling-cocoapods-spm-migration
    description: Migrate KMP projects from CocoaPods (kotlin("native.cocoapods")) to
      Swift Package Manager (swiftPMDependencies DSL) — replaces pod() with
      swiftPackage(), transforms cocoapods.* imports to swiftPMImport.*, and
      reconfigures the Xcode project.
  - id: kotlin-tooling-immutable-collections-0-5-x-migration
    kind: skill
    path: skills/kotlin-tooling-immutable-collections-0-5-x-migration
    description: >
      Migrate Kotlin (and Java) code from kotlinx.collections.immutable 0.3.x /
      0.4.x to the latest 0.5.x. The 0.5.x line renames every copy-returning
      method on PersistentList / PersistentMap / PersistentSet /
      PersistentCollection to a participial form per KEEP-0459 (add→adding,
      removeAt→removingAt, set→replacingAt, put→putting, clear→cleared, …) and
      deprecates the old names (WARNING, with ReplaceWith). Driven by the
      compiler: bump the version, recompile, and apply the rename each
      deprecation warning names. Use when the user mentions
      kotlinx.collections.immutable 0.5.x, PersistentList migration, "Use
      adding() instead", KEEP-0459, or sees deprecation warnings from
      kotlinx.collections.immutable.
  - id: kotlin-tooling-java-to-kotlin
    kind: skill
    path: skills/kotlin-tooling-java-to-kotlin
    description: >
      Use when converting Java source files to idiomatic Kotlin, when user
      mentions "java to kotlin", "j2k", "convert java", "migrate java to
      kotlin", or when working with .java files that need to become .kt files.
      Handles framework-aware conversion for Spring, Lombok, Hibernate, Jackson,
      Micronaut, Quarkus, Dagger/Hilt, RxJava, JUnit, Guice, Retrofit, and
      Mockito.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
