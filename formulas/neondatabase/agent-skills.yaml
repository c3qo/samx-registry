schemaVersion: 1
id: neondatabase/agent-skills
name: Agent Skills
description: Neon agent skills + MCP pkg.
source:
  type: git
  url: https://github.com/neondatabase/agent-skills
  revision: e09dafdc62a11fc8a20134afcb70dc2aab2feb88
capabilities:
  - id: neon
    kind: mcp
    path: plugins/neon-postgres/mcp.json
  - id: neon-postgres
    kind: skill
    path: skills/neon-postgres
    description: Guides and best practices for working with Neon Serverless
      Postgres. Covers setup, connection methods, branching, autoscaling,
      scale-to-zero, read replicas, connection pooling, Neon Auth, and the Neon
      CLI, MCP server, REST API, TypeScript SDK, and Python SDK. Use when users
      ask about "Neon setup", "connect to Neon", "Neon project", "DATABASE_URL",
      "serverless Postgres", "Neon CLI", "neonctl", "Neon MCP", "Neon Auth",
      "@neondatabase/serverless", "@neondatabase/neon-js", "scale to zero",
      "Neon autoscaling", "Neon read replica", or "Neon connection pooling".
  - id: neon-functions
    kind: skill
    path: skills/neon-functions
    description: Long-running, serverless Node.js HTTP functions deployed onto your
      Neon branch, with DATABASE_URL injected automatically and compute that
      runs next to your data. Use when a user wants to host an API, an AI agent
      with long streaming responses, a WebSocket or server-sent-events (SSE)
      server, a webhook handler, a Discord bot, or any request/response workload
      that risks timing out on short, lambda-style serverless functions — and
      wants it to branch with their database. Triggers include "serverless
      function", "deploy an API", "long-running function", "streaming agent",
      "SSE server", "WebSocket server", "webhook handler", "run code next to my
      database", "function that won't time out", "Neon Functions", and "Neon
      Compute".
  - id: neon-object-storage
    kind: skill
    path: skills/neon-object-storage
    description: S3-compatible object storage that branches with your Neon project,
      so files and the database stay in sync across every branch. Use when a
      user wants object storage, a bucket, blob/file storage, or somewhere to
      put uploads, images, documents, avatars, or user-generated files for their
      app or agent — especially when they already use (or are setting up) Neon
      Postgres and don't want to add a separate storage provider like AWS S3,
      Cloudflare R2, or Supabase Storage. Triggers include "object storage",
      "bucket", "blob storage", "file storage", "store uploads/images/files",
      "S3-compatible storage", "presigned URL", "where do I put files", "Neon
      Object Storage", "Neon Storage", and "storage that branches with my
      database".
  - id: neon-ai-gateway
    kind: skill
    path: skills/neon-ai-gateway
    description: One API and one credential for frontier and open-source LLMs, built
      into your Neon branch and powered by Databricks. Use when a user wants to
      call an LLM, add AI/chat/an agent to their app, route between model
      providers (OpenAI, Anthropic, Google/Gemini, Meta, Alibaba, DeepSeek), or
      avoid juggling separate provider API keys and accounts — especially when
      they already use Neon and want AI requests to branch with their project.
      Works with the OpenAI SDK, Anthropic SDK, google-genai, the Vercel AI SDK,
      and Mastra by changing only the base URL. Triggers include "call an LLM",
      "add AI to my app", "chat completion", "model routing", "LLM
      proxy/gateway", "one API for all models", "use Claude/GPT/Gemini", "AI
      SDK", "Mastra agent", "Neon AI Gateway", and "log/rate-limit AI calls".
  - id: neon-postgres-egress-optimizer
    kind: skill
    path: skills/neon-postgres-egress-optimizer
    description: Diagnose and fix excessive Postgres egress (network data transfer)
      in a codebase. Use when a user mentions high database bills, unexpected
      data transfer costs, network transfer charges, egress spikes, "why is my
      Neon bill so high", "database costs jumped", SELECT * optimization, query
      overfetching, reduce Neon costs, optimize database usage, or wants to
      reduce data sent from their database to their application. Also use when
      reviewing query patterns for cost efficiency, even if the user doesn't
      explicitly mention egress or data transfer.
  - id: score-eval
    kind: skill
    path: evals/neon-postgres-egress-optimizer/.claude/skills/score-eval
    description: Score the eval diff at $ARGUMENTS against the eval rubric.
  - id: claimable-postgres
    kind: skill
    path: skills/claimable-postgres
    description: 'Provision instant temporary Postgres databases via Claimable
      Postgres by Neon (neon.new) with no login, signup, or credit card.
      Supports REST API, CLI, and SDK. Use when users ask for a quick Postgres
      environment, a throwaway DATABASE_URL for prototyping/tests, or "just give
      me a DB now". Triggers include: "quick postgres", "temporary postgres",
      "no signup database", "no credit card database", "instant DATABASE_URL",
      "npx neon-new", "neon.new", "neon.new API", "claimable postgres API".'
  - id: neon-postgres-branches
    kind: skill
    path: skills/neon-postgres-branches
    description: Choose and create the right Neon branch type for testing and
      development. Use when users ask about Neon branching, migration testing
      with real data, isolated test environments, schema-only branch workflows
      for sensitive data, or branch creation via Neon CLI or Neon MCP. Triggers
      include "Neon branch", "test migrations safely", "branch production data",
      "schema-only branch", "reset branch" and "sensitive data testing".
  - id: neon-2
    kind: skill
    path: skills/neon
    description: 'Overview of the Neon platform for apps and agents, spanning
      Postgres, Auth, Data API, and the new services: Object Storage, Compute
      Functions, and AI Gateway. Use whenever "Neon" is mentioned for an
      overview of how to work with Neon and how to get started. Otherwise, the
      individual capabilities are the triggers: "object storage" or
      "S3-compatible storage", "serverless functions", "background jobs", or
      "run code near my database", "AI gateway", "LLM proxy", "model routing",
      or "call an LLM" → AI Gateway; "database", "Postgres", or "authentication"
      → Postgres and Auth.'
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
