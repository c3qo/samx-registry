schemaVersion: 1
id: vercel-labs/claude-skills
name: Claude Skills
description: Agent skill pack for React, Vercel, web design, writing, deploy, optimize.
source:
  type: git
  url: https://github.com/vercel-labs/claude-skills
  revision: f8a72b9603728bb92a217a879b7e62e43ad76c81
capabilities:
  - id: composition-patterns
    kind: skill
    path: skills/composition-patterns
    description: React composition patterns that scale. Use when refactoring
      components with boolean prop proliferation, building flexible component
      libraries, or designing reusable APIs. Triggers on tasks involving
      compound components, render props, context providers, or component
      architecture. Includes React 19 API changes.
  - id: deploy-to-vercel
    kind: skill
    path: skills/deploy-to-vercel
    description: Deploy applications and websites to Vercel. Use when the user
      requests deployment actions like "deploy my app", "deploy and give me the
      link", "push this live", or "create a preview deployment".
  - id: react-best-practices
    kind: skill
    path: skills/react-best-practices
    description: React and Next.js performance optimization guidelines from Vercel
      Engineering. This skill should be used when writing, reviewing, or
      refactoring React/Next.js code to ensure optimal performance patterns.
      Triggers on tasks involving React components, Next.js pages, data
      fetching, bundle optimization, or performance improvements.
  - id: react-native-skills
    kind: skill
    path: skills/react-native-skills
    description: React Native and Expo best practices for building performant mobile
      apps. Use when building React Native components, optimizing list
      performance, implementing animations, or working with native modules.
      Triggers on tasks involving React Native, Expo, mobile performance, or
      native platform APIs.
  - id: react-view-transitions
    kind: skill
    path: skills/react-view-transitions
    description: Guide for implementing smooth, native-feeling animations using
      React's View Transition API (`<ViewTransition>` component,
      `addTransitionType`, and CSS view transition pseudo-elements). Use this
      skill whenever the user wants to add page transitions, animate route
      changes, create shared element animations, animate enter/exit of
      components, animate list reorder, implement directional (forward/back)
      navigation animations, or integrate view transitions in Next.js. Also use
      when the user mentions view transitions, `startViewTransition`,
      `ViewTransition`, transition types, or asks about animating between UI
      states in React without third-party animation libraries.
  - id: vercel-cli-with-tokens
    kind: skill
    path: skills/vercel-cli-with-tokens
    description: Deploy and manage projects on Vercel using token-based
      authentication. Use when working with Vercel CLI using access tokens
      rather than interactive login — e.g. "deploy to vercel", "set up vercel",
      "add environment variables to vercel".
  - id: vercel-optimize
    kind: skill
    path: skills/vercel-optimize
    description: Use for Vercel cost and performance optimization on deployed
      projects, especially Next.js, SvelteKit, Nuxt, and limited Astro apps.
      Collect Vercel metrics, usage, project config, and code scan results
      first; investigate only metric-backed candidates; produce ranked
      recommendations grounded in verified files and version-aware
      Vercel/framework docs. Trigger for Vercel bill reduction, slow or
      expensive routes, caching opportunities, Function Invocations, Build
      Minutes, Fast Data Transfer, Core Web Vitals, Bot Management, Fluid
      compute, or cost breakdown requests.
  - id: web-design-guidelines
    kind: skill
    path: skills/web-design-guidelines
    description: Review UI code for Web Interface Guidelines compliance. Use when
      asked to "review my UI", "check accessibility", "audit design", "review
      UX", or "check my site against best practices".
  - id: writing-guidelines
    kind: skill
    path: skills/writing-guidelines
    description: Review docs/prose for Writing Guidelines compliance. Use when asked
      to "review my docs", "check writing style", "audit prose", "review docs
      voice and tone", or "check this page against the writing handbook".
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
