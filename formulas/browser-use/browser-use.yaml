# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: browser-use/browser-use
name: Browser Use
description: AI browser automation lib/CLI + cloud/SDK docs.
source:
  type: git
  url: https://github.com/browser-use/browser-use
  revision: da3d6a3e81c751b5970a5e40a4210072fef98ae5
capabilities:
  - id: browser-use
    kind: skill
    path: skills/browser-use
    description: Automates browser interactions for web testing, form filling,
      screenshots, and data extraction. Use when the user needs to navigate
      websites, interact with web pages, fill forms, take screenshots, or
      extract information from web pages.
  - id: cloud
    kind: skill
    path: skills/cloud
    description: >
      Documentation reference for using Browser Use Cloud — the hosted API and
      SDK for browser automation. Use this skill whenever the user needs help
      with the Cloud REST API (v2 or v3), browser-use-sdk (Python or
      TypeScript), X-Browser-Use-API-Key authentication, cloud sessions, browser
      profiles, profile sync, CDP WebSocket connections, stealth browsers,
      residential proxies, CAPTCHA handling, webhooks, workspaces, skills
      marketplace, liveUrl streaming, pricing, or integration patterns (chat UI,
      subagent, adding browser tools to existing agents). Also trigger for
      questions about n8n/Make/Zapier integration, Playwright/
      Puppeteer/Selenium on cloud infrastructure, or 1Password vault
      integration. Do NOT use this for the open-source Python library (Agent,
      Browser, Tools config) — use the open-source skill instead.
  - id: open-source
    kind: skill
    path: skills/open-source
    description: >
      Documentation reference for writing Python code using the browser-use
      open-source library. Use this skill whenever the user needs help with
      Agent, Browser, or Tools configuration, is writing code that imports from
      browser_use, asks about @sandbox deployment, supported LLM models, Actor
      API, custom tools, lifecycle hooks, MCP server setup, or
      monitoring/observability with Laminar or OpenLIT. Also trigger for
      questions about browser-use installation, prompting strategies, or
      sensitive data handling. Do NOT use this for Cloud API/SDK usage or
      pricing — use the cloud skill instead. Do NOT use this for directly
      automating a browser via CLI commands — use the browser-use skill instead.
  - id: remote-browser
    kind: skill
    path: skills/remote-browser
    description: Controls a local browser from a sandboxed remote machine. Use when
      the agent is running in a sandbox (no GUI) and needs to navigate websites,
      interact with web pages, fill forms, take screenshots, or expose local dev
      servers via tunnels.
  - id: x402
    kind: skill
    path: skills/x402
    description: Set up Browser Use Cloud payments with x402 — pay per request from
      a crypto wallet (USDC on Base mainnet), no signup or API key. Two setups
      it works out up front — "just use it" (set up a wallet so you or Claude
      Code can run cloud browser tasks paid from the wallet — Claude writes and
      runs throwaway scripts, nothing touches your codebase) or "build it in"
      (install the SDK and write the key + code into your project). Walks
      through wallet setup, funding, .env, and a ~$1 test run. Use when the user
      asks about x402, pay-per-use, USDC payments, or wants Browser Use Cloud
      without an API key. For the free-tier signup (reverse-CAPTCHA → API key),
      use `browser-use cloud signup` or the `cloud` skill instead.
  - id: references
    kind: agent
    path: skills/open-source/references
    entry: agent.md
    description: "- [Basic Usage](#basic-usage)"
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
