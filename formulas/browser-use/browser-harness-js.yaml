# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: browser-use/browser-harness-js
name: Browser Harness JS
description: Typed CDP bridge for Chrome via a persistent JS CLI.
source:
  type: git
  url: https://github.com/browser-use/browser-harness-js
  revision: 95b7a22a923714c45d2f7234b2bfa8fa6322c2eb
capabilities:
  - id: cdp
    kind: skill
    path: .
    description: Drive Chrome via the DevTools Protocol from JavaScript. Run JS
      snippets through the `browser-harness-js` CLI — it auto-spawns a
      long-lived bun HTTP server holding a fully-typed CDP `Session`, and every
      call (`browser-harness-js 'await session.Page.navigate(...)'`) executes
      against the same persistent connection. Session, active target, and
      globals survive across calls. Use when the user wants to automate, script,
      or inspect a Chrome browser via CDP — single tab or multi-tab, attach to
      existing Chrome or to a new one launched with --remote-debugging-port.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
