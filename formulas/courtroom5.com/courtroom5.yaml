# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: courtroom5.com/courtroom5
name: Courtroom5
description: Courtroom5 remote MCP server at https://mcp.courtroom5.com/v1.
  Civil legal guidance for self-represented litigants. Setup guides for Claude
  Code, Codex, Cursor, and VS Code.
source:
