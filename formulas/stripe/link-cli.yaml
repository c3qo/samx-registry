schemaVersion: 1
id: stripe/link-cli
name: Link CLI
description: CLI/MCP for Link payment creds; auth, spend reqs, MPP.
source:
  type: git
  url: https://github.com/stripe/link-cli
  revision: fc9547dff213098d68e758d0f6ebc0d4a1c98310
capabilities:
  - id: link
    kind: mcp
    path: .mcp.json
  - id: create-payment-credential
    kind: skill
    path: skills/create-payment-credential
    description: >
      Gets secure, one-time-use payment credentials (cards, tokens) from a Link
      wallet so agents can complete purchases on behalf of users. Use when the
      user says "get me a card", "buy something", "pay for X", "make a
      purchase", "I need to pay", "complete checkout", or asks to transact on
      any merchant site. Use when the user asks to connect or log in to or sign
      up for their Link account.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
