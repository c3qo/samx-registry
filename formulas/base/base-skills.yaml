schemaVersion: 1
id: base/base-skills
name: Base Skills
description: Base build skills pack → Base dev, MCP wallet, skill authoring.
source:
  type: git
  url: https://github.com/base/base-skills
  revision: d8afaad2c1b102e9d1c2ac8ec13da132a1dbd7b7
capabilities:
  - id: skill-creator
    kind: skill
    path: .claude/skills/skill-creator
    description: Guide for creating effective skills. This skill should be used when
      users want to create a new skill (or update an existing skill) that
      extends Claude's capabilities with specialized knowledge, workflows, or
      tool integrations.
  - id: base-mcp
    kind: skill
    path: skills/base-mcp
    description: Base MCP — gives your AI assistant access to a Base Account via the
      Base MCP server (mcp.base.org). Wallet, portfolio, sending, swapping,
      signing, x402 payments, batched contract calls, and transaction history
      across supported chains.
  - id: build-on-base
    kind: skill
    path: skills/build-on-base
    description: >
      Complete Base development playbook. Covers: (1) Network — Base RPC URLs,
      chain IDs (8453/84532), explorer config, testnet setup, connect to Base,
      Base Sepolia; (2) Contracts — Foundry deployment, forge create, BaseScan
      verification, CDP faucet, testnet ETH, deploy contract to Base; (3)
      Builder Codes — ERC-8021 attribution suffix, referral fees, dataSuffix for
      Wagmi/Viem/Privy/ ethers.js/window.ethereum, transaction attribution, earn
      referral fees, append builder code; (4) Base Account SDK — Sign in with
      Base (SIWB), Base Pay, USDC payments, paymasters, gas sponsorship,
      sub-accounts, spend permissions, prolinks, batch transactions, smart
      wallet, payment link, recurring subscription; (5) Agent registration —
      trading bots, AI agents, automated senders, ERC-8021 attribution wiring,
      base.dev API, register agent, builder code registration; (6) Node
      operation — run Base node, Reth setup, hardware requirements, self-hosted
      RPC, sync; (7) Migrations — migrate OnchainKit, OnchainKitProvider to
      WagmiProvider, wagmi migration, remove onchainkit dependency, MiniKit to
      Farcaster SDK, convert miniapp, Farcaster miniapp to regular app, convert
      Farcaster miniapp.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
