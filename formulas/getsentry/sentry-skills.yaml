schemaVersion: 1
id: getsentry/sentry-skills
name: Sentry Skills
description: Sentry employee agent skills pack.
source:
  type: git
  url: https://github.com/getsentry/sentry-skills
  revision: b39c7c4b6056f0579b340b7c5c4e811e400368e8
capabilities:
  - id: agents-md
    kind: skill
    path: skills/agents-md
    description: Creates and maintains concise AGENTS.md and CLAUDE.md project
      instruction files. Use when asked to create AGENTS.md, update AGENTS.md,
      maintain agent docs, set up CLAUDE.md, document repository agent
      conventions, or keep coding-agent instructions minimal and
      reference-backed.
  - id: blog-writing-guide
    kind: skill
    path: skills/blog-writing-guide
    description: Write, review, and improve blog posts for the Sentry engineering
      blog following Sentry's specific writing standards, voice, and quality
      bar. Use this skill whenever someone asks to write a blog post, draft a
      technical article, review blog content, improve a draft, write a product
      announcement, create an engineering deep-dive, or produce any written
      content destined for the Sentry blog or developer audience. Also trigger
      when the user mentions "blog post," "blog draft," "write-up,"
      "announcement post," "engineering post," "deep dive," "postmortem," or
      asks for help with technical writing for Sentry. Even if the user just
      says "help me write about [feature/topic]" — if it sounds like it could
      become a Sentry blog post, use this skill.
  - id: brand-guidelines
    kind: skill
    path: skills/brand-guidelines
    description: Write copy following Sentry brand guidelines. Use when writing UI
      text, error messages, empty states, onboarding flows, 404 pages,
      documentation, marketing copy, or any user-facing content. Covers both
      Plain Speech (default) and Sentry Voice tones.
  - id: claude-settings-audit
    kind: skill
    path: skills/claude-settings-audit
    description: Analyze a repository to generate recommended Claude Code
      settings.json permissions. Use when setting up a new project, auditing
      existing settings, or determining which read-only bash commands to allow.
      Detects tech stack, build tools, and monorepo structure.
  - id: code-review
    kind: skill
    path: skills/code-review
    description: Perform code reviews following Sentry engineering practices. Use
      when reviewing pull requests, examining code changes, or providing
      feedback on code quality. Covers security, performance, testing, and
      design review.
  - id: code-simplifier
    kind: skill
    path: skills/code-simplifier
    description: Simplifies and refines code for clarity, consistency, and
      maintainability while preserving all functionality. Use when asked to
      "simplify code", "clean up code", "refactor for clarity", "improve
      readability", or review recently modified code for elegance. Focuses on
      project-specific best practices.
  - id: commit
    kind: skill
    path: skills/commit
    description: ALWAYS use this skill when committing code changes — never commit
      directly without it. Creates commits following Sentry conventions with
      proper conventional commit format and issue references. Trigger on any
      commit, git commit, save changes, or commit message task.
  - id: create-branch
    kind: skill
    path: skills/create-branch
    description: Create a git branch following Sentry naming conventions. Use when
      asked to "create a branch", "new branch", "start a branch", "make a
      branch", "switch to a new branch", or when starting new work on the
      default branch.
  - id: django-access-review
    kind: skill
    path: skills/django-access-review
    description: 'Django access control and IDOR security review. Use when reviewing
      Django views, DRF viewsets, ORM queries, or any Python/Django code
      handling user authorization. Trigger keywords: "IDOR", "access control",
      "authorization", "Django permissions", "object permissions", "tenant
      isolation", "broken access".'
  - id: django-perf-review
    kind: skill
    path: skills/django-perf-review
    description: Django performance code review. Use when asked to "review Django
      performance", "find N+1 queries", "optimize Django", "check queryset
      performance", "database performance", "Django ORM issues", or audit Django
      code for performance problems.
  - id: doc-coauthoring
    kind: skill
    path: skills/doc-coauthoring
    description: Guide users through a structured workflow for co-authoring
      documentation. Use when user wants to write documentation, proposals,
      technical specs, decision docs, or similar structured content. This
      workflow helps users efficiently transfer context, refine content through
      iteration, and verify the doc works for readers. Trigger when user
      mentions writing docs, creating proposals, drafting specs, or similar
      documentation tasks.
  - id: document-api-endpoint
    kind: skill
    path: skills/document-api-endpoint
    description: Document and type a Sentry API endpoint. Write or fix
      @extend_schema decorators, specify response TypedDicts, type request
      parameters, correct type drift between the declared schema and the runtime
      response, and validate the generated spec. Use when asked to "document an
      endpoint", "add OpenAPI docs", "add/fix @extend_schema", "type an endpoint
      response", "fix the response type", "fix type drift", "reuse a response
      type", "split an overloaded endpoint", "specify the response schema", "add
      a TypedDict response", "migrate a legacy api-docs path", "fix a parameter
      type", or "make an endpoint public" / "promote an endpoint" (promotion is
      one section here).
  - id: find-bugs
    kind: skill
    path: skills/find-bugs
    description: Find bugs, security vulnerabilities, and code quality issues in
      local branch changes. Use when asked to review changes, find bugs,
      security review, or audit code on the current branch.
  - id: gh-review-requests
    kind: skill
    path: skills/gh-review-requests
    description: Fetch unread GitHub notifications for open PRs where review is
      requested from a specified team or opened by a team member. Use when asked
      to "find PRs I need to review", "show my review requests", "what needs my
      review", "fetch GitHub review requests", or "check team review queue".
  - id: gha-security-review
    kind: skill
    path: skills/gha-security-review
    description: GitHub Actions security review for workflow exploitation
      vulnerabilities. Use when asked to "review GitHub Actions", "audit
      workflows", "check CI security", "GHA security", "workflow security
      review", or review .github/workflows/ for pwn requests, expression
      injection, credential theft, and supply chain attacks.
      Exploitation-focused with concrete PoC scenarios.
  - id: iterate-pr
    kind: skill
    path: skills/iterate-pr
    description: Iterate on a PR until actionable CI passes and high/medium review
      feedback is addressed. Use for PR CI failures, review feedback, or
      green-check loops; do not wait for human approval, draft status, or merge
      gates.
  - id: pr-link-issue
    kind: skill
    path: skills/pr-link-issue
    description: Append a GitHub issue link and its Linear ticket to the current
      PR's description. Use when asked to "link issue to pr", "fill in issue and
      linear in pr", "add issue refs to pr", or when given a GitHub issue URL
      and asked to attach it to the current PR. Resolves the Linear ticket
      automatically from the issue's linear-linkback comment.
  - id: pr-writer
    kind: skill
    path: skills/pr-writer
    description: Create, refresh, and rewrite PR titles and descriptions following
      Sentry conventions. Use when opening a PR, writing or updating a PR
      title/body/description, refreshing an existing PR after material changes,
      or preparing branch changes for review.
  - id: presentation-creator
    kind: skill
    path: skills/presentation-creator
    description: Create data-driven presentation slides using React, Vite, and
      Recharts with Sentry branding. Use when asked to "create a presentation",
      "build slides", "make a deck", "create a data presentation", "build a
      Sentry presentation". Scaffolds a complete slide-based app with charts,
      animations, and single-file HTML output.
  - id: prompt-optimizer
    kind: skill
    path: skills/prompt-optimizer
    description: Creates, optimizes, and iteratively refines agent prompts, system
      prompts, developer prompts, and reusable prompt templates. Use when asked
      to improve a prompt, optimize a system prompt, rewrite an agent prompt,
      tune prompt wording, make a prompt more reliable, port prompts between
      OpenAI, Claude, or Gemini, or build prompt evals.
  - id: replay-ux-research
    kind: skill
    path: skills/replay-ux-research
    description: Analyze Sentry session replays to surface UX patterns, pain points,
      and user journeys for a given product area. Use when asked to "show me how
      users use", "day in the life", "UX research", "replay research", "how do
      customers use", "what's the user experience like for", "watch replays of",
      "analyze replays for", "user behavior on", or "replay UX audit" for any
      Sentry product surface.
  - id: security-review
    kind: skill
    path: skills/security-review
    description: Security code review for vulnerabilities. Use when asked to
      "security review", "find vulnerabilities", "check for security issues",
      "audit security", "OWASP review", or review code for injection, XSS,
      authentication, authorization, cryptography issues. Provides systematic
      review with confidence-based reporting.
  - id: skill-scanner
    kind: skill
    path: skills/skill-scanner
    description: Scan agent skills for security issues. Use when asked to "scan a
      skill", "audit a skill", "review skill security", "check skill for
      injection", "validate SKILL.md", or assess whether an agent skill is safe
      to install. Checks for prompt injection, malicious scripts, excessive
      permissions, secret exposure, and supply chain risks.
  - id: skill-writer
    kind: skill
    path: skills/skill-writer
    description: Create, synthesize, and iteratively improve agent skills following
      the Agent Skills specification. Use when asked to "create a skill", "write
      a skill", "synthesize sources into a skill", "improve a skill from
      positive/negative examples", "update a skill", or "maintain skill docs and
      registration". Handles source capture, precision passes, authoring,
      registration, and validation.
  - id: sred-project-organizer
    kind: skill
    path: skills/sred-project-organizer
    description: Take a list of projects and their related documentation, and
      organize them into the SRED format for submission.
  - id: sred-work-summary
    kind: skill
    path: skills/sred-work-summary
    description: Go back through the previous year of work and create a Notion doc
      that groups relevant links into projects that can then be documented as
      SRED projects.
  - id: triage-frontend-issues
    kind: skill
    path: skills/triage-frontend-issues
    description: Triage new issues in the Sentry `javascript` project by archiving
      non-actionable noise. Use when asked to "triage issues", "triage the
      javascript project", "archive non-actionable issues", "triage new frontend
      issues", or "clean up the sentry/javascript queue". Operates only on the
      sentry/javascript project, only archives (never resolves), and always
      archives with `untilEscalating`.
  - id: typing-exclusion-worker
    kind: skill
    path: skills/typing-exclusion-worker
    description: "Python typing exclusion worker: remove assigned mypy exclusion
      modules in small scoped batches, fix typing issues, run validation, and
      produce a structured completion summary. Use when running parallel
      typing-debt workers or when asked to remove modules from pyproject mypy
      exclusion overrides."
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
