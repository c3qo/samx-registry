# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: getsentry/xcodebuildmcp
name: XcodeBuildMCP
description: MCP server + CLI for Xcode project, simulator, and app workflows.
source:
  type: git
  url: https://github.com/getsentry/xcodebuildmcp
  revision: 51271396e276d634ff4cb27a373b4d41743e8af7
capabilities:
  - id: warden-sweep
    kind: skill
    path: .agents/skills/warden-sweep
    description: Full-repository code sweep. Scans every file with warden, verifies
      findings via deep tracing, creates draft PRs for validated issues. Use
      when asked to "sweep the repo", "scan everything", "find all bugs", "full
      codebase review", "batch code analysis", or run warden across the entire
      repository.
  - id: warden
    kind: skill
    path: .agents/skills/warden
    description: Run Warden to analyze code changes before committing. Use when
      asked to "run warden", "check my changes", "review before commit", "warden
      config", "warden.toml", "create a warden skill", "add trigger", or any
      Warden-related local development task.
  - id: xcodebuildmcp-cli
    kind: skill
    path: skills/xcodebuildmcp-cli
    description: Official skill for the XcodeBuildMCP CLI. Use when doing
      iOS/macOS/watchOS/tvOS/visionOS work (build, test, run, debug, log, UI
      automation).
  - id: xcodebuildmcp
    kind: mcp
    path: example_projects/iOS_Calculator/.mcp.json
  - id: xcodebuildmcp-docs-command-review
    kind: skill
    path: .agents/skills/xcodebuildmcp-docs-command-review
    description: Use when reviewing XcodeBuildMCP changelog CLI command references
      for invalid current guidance while allowing historical migration examples.
  - id: xcodebuildmcp-docs-release-review
    kind: skill
    path: .agents/skills/xcodebuildmcp-docs-release-review
    description: Use when reviewing XcodeBuildMCP documentation, CLI command
      references, website manifest generation, changelog, release notes, and
      release script changes.
  - id: xcodebuildmcp-packaging-resource-review
    kind: skill
    path: .agents/skills/xcodebuildmcp-packaging-resource-review
    description: Use when reviewing XcodeBuildMCP packaging, resource-root, build
      artifact, bundled AXe, schema, manifest, and portable macOS distribution
      changes.
  - id: xcodebuildmcp-rendering-streaming-review
    kind: skill
    path: .agents/skills/xcodebuildmcp-rendering-streaming-review
    description: Use when reviewing XcodeBuildMCP rendering, streaming fragment,
      next-step, and CLI output mode changes for boundary violations.
  - id: xcodebuildmcp-runtime-boundary-review
    kind: skill
    path: .agents/skills/xcodebuildmcp-runtime-boundary-review
    description: Use when reviewing XcodeBuildMCP runtime boundary changes across
      MCP, direct CLI invocation, daemon-routed tools, and Xcode IDE bridge
      routing.
  - id: xcodebuildmcp-snapshot-fixture-review
    kind: skill
    path: .agents/skills/xcodebuildmcp-snapshot-fixture-review
    description: Use when reviewing XcodeBuildMCP snapshot fixture changes for MCP,
      CLI, and JSON output contract integrity.
  - id: xcodebuildmcp-structured-output-review
    kind: skill
    path: .agents/skills/xcodebuildmcp-structured-output-review
    description: Use when reviewing XcodeBuildMCP structured output schema changes,
      schema versioning, manifest outputSchema metadata, and JSON fixture
      compatibility.
  - id: xcodebuildmcp-test-boundary-review
    kind: skill
    path: .agents/skills/xcodebuildmcp-test-boundary-review
    description: Use when reviewing XcodeBuildMCP tests for correct unit, snapshot,
      schema, smoke, and external process boundaries.
  - id: xcodebuildmcp-tool-contract-review
    kind: skill
    path: .agents/skills/xcodebuildmcp-tool-contract-review
    description: Use when reviewing XcodeBuildMCP tool contract changes across
      implementation, manifests, workflow membership, output schema metadata,
      and next-step templates.
  - id: xcodebuildmcp-2
    kind: skill
    path: skills/xcodebuildmcp
    description: Official skill for XcodeBuildMCP. Use when doing
      iOS/macOS/watchOS/tvOS/visionOS work (build, test, run, debug, log, UI
      automation).
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
