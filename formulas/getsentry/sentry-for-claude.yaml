# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: getsentry/sentry-for-claude
name: Sentry for AI
description: Sentry plugin/skill library for AI coding assistants.
source:
  type: git
  url: https://github.com/getsentry/sentry-for-claude
  revision: 6c8608d24f95bb3c0834f6348c21283317b80de3
capabilities:
  - id: sentry
    kind: mcp
    path: .mcp.json
  - id: sentry-sdk-setup
    kind: skill
    path: skills/sentry-sdk-setup
    description: Set up Sentry in any language or framework. Detects the user's
      platform and loads the right SDK skill. Use when asked to add Sentry,
      install an SDK, or set up error monitoring in a project.
  - id: sentry-workflow
    kind: skill
    path: skills/sentry-workflow
    description: Fix production issues and review code with Sentry context. Use when
      asked to fix Sentry errors, debug issues, triage exceptions, review PR
      comments from Sentry, or resolve bugs.
  - id: sentry-2
    kind: mcp
    path: mcp.json
  - id: sentry-android-sdk
    kind: skill
    path: skills/sentry-android-sdk
    description: Full Sentry SDK setup for Android. Use when asked to "add Sentry to
      Android", "install sentry-android", "setup Sentry in Android", or
      configure error monitoring, tracing, profiling, session replay, or logging
      for Android applications. Supports Kotlin and Java codebases.
  - id: sentry-browser-sdk
    kind: skill
    path: skills/sentry-browser-sdk
    description: Full Sentry SDK setup for browser JavaScript. Use when asked to
      "add Sentry to a website", "install @sentry/browser", or configure error
      monitoring, tracing, session replay, or logging for vanilla JavaScript,
      jQuery, static sites, or WordPress.
  - id: sentry-cloudflare-sdk
    kind: skill
    path: skills/sentry-cloudflare-sdk
    description: Full Sentry SDK setup for Cloudflare Workers and Pages. Use when
      asked to "add Sentry to Cloudflare Workers", "install @sentry/cloudflare",
      or configure error monitoring, tracing, logging, crons, or AI monitoring
      for Cloudflare Workers, Pages, Durable Objects, Queues, Workflows, or Hono
      on Cloudflare.
  - id: sentry-cocoa-sdk
    kind: skill
    path: skills/sentry-cocoa-sdk
    description: Full Sentry SDK setup for Apple platforms (iOS, macOS, tvOS,
      watchOS, visionOS). Use when asked to "add Sentry to iOS", "add Sentry to
      Swift", "install sentry-cocoa", or configure error monitoring, tracing,
      profiling, session replay, logging, or metrics for Apple applications.
      Supports SwiftUI and UIKit.
  - id: sentry-code-review
    kind: skill
    path: skills/sentry-code-review
    description: Analyze and resolve Sentry comments on GitHub Pull Requests. Use
      this when asked to review or fix issues identified by Sentry in PR
      comments. Can review specific PRs by number or automatically find recent
      PRs with Sentry feedback.
  - id: sentry-create-alert
    kind: skill
    path: skills/sentry-create-alert
    description: Create Sentry alerts using the workflow engine API. Use when asked
      to create alerts, set up notifications, configure issue priority alerts,
      or build workflow automations. Supports email, Slack, PagerDuty, Discord,
      and other notification actions.
  - id: sentry-dotnet-sdk
    kind: skill
    path: skills/sentry-dotnet-sdk
    description: Full Sentry SDK setup for .NET. Use when asked to "add Sentry to
      .NET", "install Sentry for C#", or configure error monitoring, tracing,
      profiling, logging, or crons for ASP.NET Core, MAUI, WPF, WinForms,
      Blazor, Azure Functions, or any other .NET application.
  - id: sentry-elixir-sdk
    kind: skill
    path: skills/sentry-elixir-sdk
    description: Full Sentry SDK setup for Elixir. Use when asked to "add Sentry to
      Elixir", "install sentry for Elixir", or configure error monitoring,
      tracing, logging, or crons for Elixir, Phoenix, or Plug applications.
      Supports Phoenix, Plug, LiveView, Oban, and Quantum.
  - id: sentry-feature-setup
    kind: skill
    path: skills/sentry-feature-setup
    description: Configure specific Sentry features beyond basic SDK setup. Use when
      asked to monitor AI/LLM calls, set up OpenTelemetry pipelines, create
      alerts and notifications, or enable span streaming.
  - id: sentry-fix-issues
    kind: skill
    path: skills/sentry-fix-issues
    description: Find and fix issues from Sentry using MCP. Use when asked to fix
      Sentry errors, debug production issues, investigate exceptions, or resolve
      bugs reported in Sentry. Methodically analyzes stack traces, breadcrumbs,
      traces, and context to identify root causes.
  - id: sentry-flutter-sdk
    kind: skill
    path: skills/sentry-flutter-sdk
    description: Full Sentry SDK setup for Flutter and Dart. Use when asked to "add
      Sentry to Flutter", "install sentry_flutter", "setup Sentry in Dart", or
      configure error monitoring, tracing, profiling, session replay, or logging
      for Flutter applications. Supports Android, iOS, macOS, Linux, Windows,
      and Web.
  - id: sentry-go-sdk
    kind: skill
    path: skills/sentry-go-sdk
    description: Full Sentry SDK setup for Go. Use when asked to "add Sentry to Go",
      "install sentry-go", "setup Sentry in Go", or configure error monitoring,
      tracing, logging, metrics, or crons for Go applications. Supports
      net/http, Gin, Echo, Fiber, FastHTTP, Iris, Negroni, and gRPC.
  - id: sentry-instrumentation-guide
    kind: skill
    path: skills/sentry-instrumentation-guide
    description: Decide which Sentry signal to reach for when instrumenting code —
      error, span, span attribute, log, or metric. Use when adding
      instrumentation and unsure whether something should be a log vs a span vs
      a metric, when deciding "what to instrument where", when reviewing
      instrumentation for gaps, or when a coding agent needs a rule for choosing
      between errors, traces, logs, and metrics. This skill decides WHAT to
      emit; the sentry-*-sdk skills handle HOW to set each pillar up.
  - id: sentry-nestjs-sdk
    kind: skill
    path: skills/sentry-nestjs-sdk
    description: Full Sentry SDK setup for NestJS. Use when asked to "add Sentry to
      NestJS", "install @sentry/nestjs", "setup Sentry in NestJS", or configure
      error monitoring, tracing, profiling, logging, metrics, crons, or AI
      monitoring for NestJS applications. Supports Express and Fastify adapters,
      GraphQL, microservices, WebSockets, and background jobs.
  - id: sentry-nextjs-sdk
    kind: skill
    path: skills/sentry-nextjs-sdk
    description: Full Sentry SDK setup for Next.js. Use when asked to "add Sentry to
      Next.js", "install @sentry/nextjs", or configure error monitoring,
      tracing, session replay, logging, profiling, AI monitoring, or crons for
      Next.js applications. Supports Next.js 13+ with App Router and Pages
      Router.
  - id: sentry-node-sdk
    kind: skill
    path: skills/sentry-node-sdk
    description: Full Sentry SDK setup for Node.js, Bun, and Deno. Use when asked to
      "add Sentry to Node.js", "add Sentry to Bun", "add Sentry to Deno",
      "install @sentry/node", "@sentry/bun", or "@sentry/deno", or configure
      error monitoring, tracing, logging, profiling, metrics, crons, or AI
      monitoring for server-side JavaScript/TypeScript runtimes.
  - id: sentry-otel-exporter-setup
    kind: skill
    path: skills/sentry-otel-exporter-setup
    description: Configure the OpenTelemetry Collector with Sentry Exporter for
      multi-project routing and automatic project creation. Use when setting up
      OTel with Sentry, configuring collector pipelines for traces and logs, or
      routing telemetry from multiple services to Sentry projects.
  - id: sentry-php-sdk
    kind: skill
    path: skills/sentry-php-sdk
    description: Full Sentry SDK setup for PHP. Use when asked to "add Sentry to
      PHP", "install sentry/sentry", "setup Sentry in PHP", or configure error
      monitoring, tracing, profiling, logging, metrics, or crons for PHP
      applications. Supports plain PHP, Laravel, and Symfony.
  - id: sentry-pr-code-review
    kind: skill
    path: skills/sentry-pr-code-review
    description: Review a project's PRs to check for issues detected in code review
      by Seer Bug Prediction. Use when asked to review or fix issues identified
      by Sentry in PR comments, or to find recent PRs with Sentry feedback.
  - id: sentry-python-sdk
    kind: skill
    path: skills/sentry-python-sdk
    description: Full Sentry SDK setup for Python. Use when asked to "add Sentry to
      Python", "install sentry-sdk", "setup Sentry in Python", or configure
      error monitoring, tracing, profiling, logging, metrics, crons, or AI
      monitoring for Python applications. Supports Django, Flask, FastAPI,
      Celery, Starlette, AIOHTTP, Tornado, and more.
  - id: sentry-react-native-sdk
    kind: skill
    path: skills/sentry-react-native-sdk
    description: Full Sentry SDK setup for React Native and Expo. Use when asked to
      "add Sentry to React Native", "install @sentry/react-native", "setup
      Sentry in Expo", or configure error monitoring, tracing, profiling,
      session replay, or logging for React Native applications. Supports Expo
      managed, Expo bare, and vanilla React Native.
  - id: sentry-react-router-framework-sdk
    kind: skill
    path: skills/sentry-react-router-framework-sdk
    description: Full Sentry SDK setup for React Router Framework mode. Use when
      asked to "add Sentry to React Router Framework", "install
      @sentry/react-router", or configure error monitoring, tracing, profiling,
      session replay, logs, or user feedback for a React Router v7 framework
      app.
  - id: sentry-react-sdk
    kind: skill
    path: skills/sentry-react-sdk
    description: Full Sentry SDK setup for React. Use when asked to "add Sentry to
      React", "install @sentry/react", or configure error monitoring, tracing,
      session replay, profiling, or logging for React applications. Supports
      React 16+, React Router v5-v7 non-framework mode, TanStack Router, Redux,
      Vite, and webpack.
  - id: sentry-ruby-sdk
    kind: skill
    path: skills/sentry-ruby-sdk
    description: Full Sentry SDK setup for Ruby. Use when asked to add Sentry to
      Ruby, install sentry-ruby, setup Sentry in Rails/Sinatra/Rack, or
      configure error monitoring, tracing, logging, metrics, profiling, or crons
      for Ruby applications. Also handles migration from AppSignal, Honeybadger,
      Bugsnag, Rollbar, or Airbrake. Supports Rails, Sinatra, Rack, Sidekiq, and
      Resque.
  - id: sentry-sdk-skill-creator
    kind: skill
    path: skills/sentry-sdk-skill-creator
    description: Create a complete Sentry SDK skill bundle for any platform. Use
      when asked to "create an SDK skill", "add a new platform skill", "write a
      Sentry skill for X", or build a new sentry-<platform>-sdk skill bundle
      with wizard flow and feature reference files.
  - id: sentry-sdk-upgrade
    kind: skill
    path: skills/sentry-sdk-upgrade
    description: Upgrade the Sentry JavaScript SDK across major versions. Use when
      asked to upgrade Sentry, migrate to a newer version, fix deprecated Sentry
      APIs, or resolve breaking changes after a Sentry version bump.
  - id: sentry-setup-ai-monitoring
    kind: skill
    path: skills/sentry-setup-ai-monitoring
    description: Setup Sentry AI Agent Monitoring in any project. Use when asked to
      monitor LLM calls, track AI agents, track conversations, or instrument
      OpenAI/Anthropic/Vercel AI/LangChain/Google GenAI/Pydantic AI. Detects
      installed AI SDKs and configures appropriate integrations.
  - id: sentry-span-streaming-js
    kind: skill
    path: skills/sentry-span-streaming-js
    description: Migrate JavaScript SDK to Sentry span streaming (span-first trace
      lifecycle). Use when asked to "enable span streaming", "migrate to span
      streaming", "use traceLifecycle stream", "add spanStreamingIntegration",
      or switch from transaction-based to streamed span delivery in a JavaScript
      project.
  - id: sentry-span-streaming-python
    kind: skill
    path: skills/sentry-span-streaming-python
    description: Migrate Python SDK to Sentry span streaming (span-first trace
      lifecycle). Use when asked to "enable span streaming", "migrate to span
      streaming", "use trace_lifecycle stream", or switch from transaction-based
      to streamed span delivery in a Python project.
  - id: sentry-svelte-sdk
    kind: skill
    path: skills/sentry-svelte-sdk
    description: Full Sentry SDK setup for Svelte and SvelteKit. Use when asked to
      "add Sentry to Svelte", "add Sentry to SvelteKit", "install
      @sentry/sveltekit", or configure error monitoring, tracing, session
      replay, or logging for Svelte or SvelteKit applications.
  - id: sentry-tanstack-start-sdk
    kind: skill
    path: skills/sentry-tanstack-start-sdk
    description: Full Sentry SDK setup for TanStack Start React. Use when asked to
      "add Sentry to TanStack Start", "install @sentry/tanstackstart-react", or
      configure error monitoring, tracing, session replay, logs, or user
      feedback in a TanStack Start React app.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
