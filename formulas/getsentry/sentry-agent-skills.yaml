# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: getsentry/sentry-agent-skills
name: Sentry Agent Skills
description: Sentry agent skill pack; SDK setup, fix, review, alerts, OTel.
source:
  type: git
  url: https://github.com/getsentry/sentry-agent-skills
  revision: 9f54eb021916a7cff2c04a9f4e4c1f9439f3202c
capabilities:
  - id: sentry-cocoa-sdk
    kind: skill
    path: skills/sentry-cocoa-sdk
    description: Full Sentry SDK setup for Apple platforms (iOS, macOS, tvOS,
      watchOS, visionOS). Use when asked to "add Sentry to iOS", "add Sentry to
      Swift", "install sentry-cocoa", or configure error monitoring, tracing,
      profiling, session replay, or logging for Apple applications. Supports
      SwiftUI and UIKit.
  - id: sentry-create-alert
    kind: skill
    path: skills/sentry-create-alert
    description: Create Sentry alerts using the workflow engine API. Use when asked
      to create alerts, set up notifications, configure issue priority alerts,
      or build workflow automations. Supports email, Slack, PagerDuty, Discord,
      and other notification actions.
  - id: sentry-dotnet-sdk
    kind: skill
    path: skills/sentry-dotnet-sdk
    description: Full Sentry SDK setup for .NET. Use when asked to "add Sentry to
      .NET", "install Sentry for C#", or configure error monitoring, tracing,
      profiling, logging, or crons for ASP.NET Core, MAUI, WPF, WinForms,
      Blazor, Azure Functions, or any other .NET application.
  - id: sentry-fix-issues
    kind: skill
    path: skills/sentry-fix-issues
    description: Find and fix issues from Sentry using MCP. Use when asked to fix
      Sentry errors, debug production issues, investigate exceptions, or resolve
      bugs reported in Sentry. Methodically analyzes stack traces, breadcrumbs,
      traces, and context to identify root causes.
  - id: sentry-go-sdk
    kind: skill
    path: skills/sentry-go-sdk
    description: Full Sentry SDK setup for Go. Use when asked to "add Sentry to Go",
      "install sentry-go", "setup Sentry in Go", or configure error monitoring,
      tracing, logging, metrics, or crons for Go applications. Supports
      net/http, Gin, Echo, Fiber, FastHTTP, Iris, and Negroni.
  - id: sentry-nextjs-sdk
    kind: skill
    path: skills/sentry-nextjs-sdk
    description: Full Sentry SDK setup for Next.js. Use when asked to "add Sentry to
      Next.js", "install @sentry/nextjs", or configure error monitoring,
      tracing, session replay, logging, profiling, AI monitoring, or crons for
      Next.js applications. Supports Next.js 13+ with App Router and Pages
      Router.
  - id: sentry-otel-exporter-setup
    kind: skill
    path: skills/sentry-otel-exporter-setup
    description: Configure the OpenTelemetry Collector with Sentry Exporter for
      multi-project routing and automatic project creation. Use when setting up
      OTel with Sentry, configuring collector pipelines for traces and logs, or
      routing telemetry from multiple services to Sentry projects.
  - id: sentry-pr-code-review
    kind: skill
    path: skills/sentry-pr-code-review
    description: Review a project's PRs to check for issues detected in code review
      by Seer Bug Prediction. Use when asked to review or fix issues identified
      by Sentry in PR comments, or to find recent PRs with Sentry feedback.
  - id: sentry-python-sdk
    kind: skill
    path: skills/sentry-python-sdk
    description: Full Sentry SDK setup for Python. Use when asked to "add Sentry to
      Python", "install sentry-sdk", "setup Sentry in Python", or configure
      error monitoring, tracing, profiling, logging, metrics, crons, or AI
      monitoring for Python applications. Supports Django, Flask, FastAPI,
      Celery, Starlette, AIOHTTP, Tornado, and more.
  - id: sentry-react-native-sdk
    kind: skill
    path: skills/sentry-react-native-sdk
    description: Full Sentry SDK setup for React Native and Expo. Use when asked to
      "add Sentry to React Native", "install @sentry/react-native", "setup
      Sentry in Expo", or configure error monitoring, tracing, profiling,
      session replay, or logging for React Native applications. Supports Expo
      managed, Expo bare, and vanilla React Native.
  - id: sentry-react-sdk
    kind: skill
    path: skills/sentry-react-sdk
    description: Full Sentry SDK setup for React. Use when asked to "add Sentry to
      React", "install @sentry/react", or configure error monitoring, tracing,
      session replay, profiling, or logging for React applications. Supports
      React 16+, React Router v5-v7, TanStack Router, Redux, Vite, and webpack.
  - id: sentry-ruby-sdk
    kind: skill
    path: skills/sentry-ruby-sdk
    description: Full Sentry SDK setup for Ruby. Use when asked to add Sentry to
      Ruby, install sentry-ruby, setup Sentry in Rails/Sinatra/Rack, or
      configure error monitoring, tracing, logging, metrics, profiling, or crons
      for Ruby applications. Also handles migration from AppSignal, Honeybadger,
      Bugsnag, Rollbar, or Airbrake. Supports Rails, Sinatra, Rack, Sidekiq, and
      Resque.
  - id: sentry-sdk-skill-creator
    kind: skill
    path: skills/sentry-sdk-skill-creator
    description: Create a complete Sentry SDK skill bundle for any platform. Use
      when asked to "create an SDK skill", "add a new platform skill", "write a
      Sentry skill for X", or build a new sentry-<platform>-sdk skill bundle
      with wizard flow and feature reference files.
  - id: sentry-setup-ai-monitoring
    kind: skill
    path: skills/sentry-setup-ai-monitoring
    description: Setup Sentry AI Agent Monitoring in any project. Use when asked to
      monitor LLM calls, track AI agents, or instrument OpenAI/Anthropic/Vercel
      AI/LangChain/Google GenAI/Pydantic AI. Detects installed AI SDKs and
      configures appropriate integrations.
  - id: sentry-svelte-sdk
    kind: skill
    path: skills/sentry-svelte-sdk
    description: Full Sentry SDK setup for Svelte and SvelteKit. Use when asked to
      "add Sentry to Svelte", "add Sentry to SvelteKit", "install
      @sentry/sveltekit", or configure error monitoring, tracing, session
      replay, or logging for Svelte or SvelteKit applications.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
