schemaVersion: 1
id: coderabbitai/codex-plugin
name: Codex Plugin
description: Codex plugin pack; multi-app skills + MCP configs.
source:
  type: git
  url: https://github.com/coderabbitai/codex-plugin
  revision: 0f66928fa1ae3548cc6c670762f4d338cd06a4f1
capabilities:
  - id: plugin-creator
    kind: skill
    path: .agents/skills/plugin-creator
    description: Create and scaffold plugin directories for Codex with a required
      `.codex-plugin/plugin.json`, optional plugin folders/files, and baseline
      placeholders you can edit before publishing or testing. Use when Codex
      needs to create a new local plugin, add optional plugin structure, or
      generate or update repo-root `.agents/plugins/marketplace.json` entries
      for plugin ordering and availability metadata.
  - id: xcodebuildmcp
    kind: mcp
    path: plugins/build-ios-apps/.mcp.json
  - id: build-run-debug
    kind: skill
    path: plugins/build-macos-apps/skills/build-run-debug
    description: Build, run, and debug local macOS apps and desktop executables
      using shell-first Xcode and Swift workflows. Use when asked to build a Mac
      app, launch it, diagnose compiler or linker failures, inspect startup
      problems, or debug desktop-only runtime issues.
  - id: deploy-to-vercel
    kind: skill
    path: plugins/build-web-apps/skills/deploy-to-vercel
    description: Deploy applications and websites to Vercel. Use when the user
      requests deployment actions like "deploy my app", "deploy and give me the
      link", "push this live", or "create a preview deployment".
  - id: coderabbit-review
    kind: skill
    path: plugins/coderabbit/skills/coderabbit-review
    description: Reviews code changes using CodeRabbit AI. Use when user asks for
      code review, PR feedback, code quality checks, security issues, or
      requests fix-review cycles.
  - id: capture-tasks-from-meeting-notes
    kind: skill
    path: plugins/atlassian-rovo/skills/capture-tasks-from-meeting-notes
    description: "Analyze meeting notes to find action items and create Jira tasks
      for assigned work. When an agent needs to: (1) Create Jira tasks or
      tickets from meeting notes, (2) Extract or find action items from notes or
      Confluence pages, (3) Parse meeting notes for assigned tasks, or (4)
      Analyze notes and generate tasks for team members. Identifies assignees,
      looks up account IDs, and creates tasks with proper context."
  - id: generate-status-report
    kind: skill
    path: plugins/atlassian-rovo/skills/generate-status-report
    description: "Generate project status reports from Jira issues and publish to
      Confluence. When an agent needs to: (1) Create a status report for a
      project, (2) Summarize project progress or updates, (3) Generate
      weekly/daily reports from Jira, (4) Publish status summaries to
      Confluence, or (5) Analyze project blockers and completion. Queries Jira
      issues, categorizes by status/priority, and creates formatted reports for
      delivery managers and executives."
  - id: search-company-knowledge
    kind: skill
    path: plugins/atlassian-rovo/skills/search-company-knowledge
    description: "Search across company knowledge bases (Confluence, Jira, internal
      docs) to find and explain internal concepts, processes, and technical
      details. When an agent needs to: (1) Find or search for information about
      systems, terminology, processes, deployment, authentication,
      infrastructure, architecture, or technical concepts, (2) Search internal
      documentation, knowledge base, company docs, or our docs, (3) Explain what
      something is, how it works, or look up information, or (4) Synthesize
      information from multiple sources. Searches in parallel and provides cited
      answers."
  - id: spec-to-backlog
    kind: skill
    path: plugins/atlassian-rovo/skills/spec-to-backlog
    description: "Automatically convert Confluence specification documents into
      structured Jira backlogs with Epics and implementation tickets. When an
      agent needs to: (1) Create Jira tickets from a Confluence page, (2)
      Generate a backlog from a specification, (3) Break down a spec into
      implementation tasks, or (4) Convert requirements into Jira issues.
      Handles reading Confluence pages, analyzing specifications, creating Epics
      with proper structure, and generating detailed implementation tickets
      linked to the Epic."
  - id: triage-issue
    kind: skill
    path: plugins/atlassian-rovo/skills/triage-issue
    description: "Intelligently triage bug reports and error messages by searching
      for duplicates in Jira and offering to create new issues or add comments
      to existing ones. When an agent needs to: (1) Triage a bug report or error
      message, (2) Check if an issue is a duplicate, (3) Find similar past
      issues, (4) Create a new bug ticket with proper context, or (5) Add
      information to an existing ticket. Searches Jira for similar issues,
      identifies duplicates, checks fix history, and helps create
      well-structured bug reports."
  - id: box
    kind: skill
    path: plugins/box/skills/box
    description: Build and troubleshoot Box integrations for uploads, folders,
      folder listings, downloads and previews, shared links, collaborations,
      search, metadata, event-driven automations, and Box AI retrieval flows.
      Use when Codex needs to add Box APIs or SDKs to an app, wire Box-backed
      document workflows, organize or share content, react to new files, or
      fetch Box content for search, summarization, extraction, or
      question-answering.
  - id: ios-app-intents
    kind: skill
    path: plugins/build-ios-apps/skills/ios-app-intents
    description: Design and implement App Intents, app entities, and App Shortcuts
      for iOS apps so useful actions and content are available to Shortcuts,
      Siri, Spotlight, widgets, controls, and other intent-driven system
      surfaces. Use when exposing app actions outside the UI, adding `AppEntity`
      and `EntityQuery` types, shaping shortcut phrases and display
      representations, or routing intent execution back into the main app.
  - id: ios-debugger-agent
    kind: skill
    path: plugins/build-ios-apps/skills/ios-debugger-agent
    description: Use XcodeBuildMCP to build, run, launch, and debug the current iOS
      project on a booted simulator. Trigger when asked to run an iOS app,
      interact with the simulator UI, inspect on-screen state, capture
      logs/console output, or diagnose runtime behavior using XcodeBuildMCP
      tools.
  - id: swiftui-liquid-glass
    kind: skill
    path: plugins/build-ios-apps/skills/swiftui-liquid-glass
    description: Implement, review, or improve SwiftUI features using the iOS 26+
      Liquid Glass API. Use when asked to adopt Liquid Glass in new SwiftUI UI,
      refactor an existing feature to Liquid Glass, or review Liquid Glass usage
      for correctness, performance, and design alignment.
  - id: swiftui-performance-audit
    kind: skill
    path: plugins/build-ios-apps/skills/swiftui-performance-audit
    description: Audit and improve SwiftUI runtime performance from code review and
      architecture. Use for requests to diagnose slow rendering, janky
      scrolling, high CPU/memory usage, excessive view updates, or layout thrash
      in SwiftUI apps, and to provide guidance for user-run Instruments
      profiling when code review alone is insufficient.
  - id: swiftui-ui-patterns
    kind: skill
    path: plugins/build-ios-apps/skills/swiftui-ui-patterns
    description: Best practices and example-driven guidance for building SwiftUI
      views and components, including navigation hierarchies, custom view
      modifiers, and responsive layouts with stacks and grids. Use when creating
      or refactoring SwiftUI UI, designing tab architecture with TabView,
      composing screens with VStack/HStack, managing @State or @Binding,
      building declarative iOS interfaces, or needing component-specific
      patterns and examples.
  - id: swiftui-view-refactor
    kind: skill
    path: plugins/build-ios-apps/skills/swiftui-view-refactor
    description: Refactor and review SwiftUI view files with strong defaults for
      small dedicated subviews, MV-over-MVVM data flow, stable view trees,
      explicit dependency injection, and correct Observation usage. Use when
      cleaning up a SwiftUI view, splitting long bodies, removing inline actions
      or side effects, reducing computed `some View` helpers, or standardizing
      `@Observable` and view model initialization patterns.
  - id: appkit-interop
    kind: skill
    path: plugins/build-macos-apps/skills/appkit-interop
    description: Decide when and how to bridge a macOS app from SwiftUI into AppKit.
      Use when implementing NSViewRepresentable or
      NSViewControllerRepresentable, accessing NSWindow or the responder chain,
      presenting panels, customizing menus, or handling desktop behaviors that
      SwiftUI does not model cleanly.
  - id: liquid-glass
    kind: skill
    path: plugins/build-macos-apps/skills/liquid-glass
    description: Implement, refactor, or review modern macOS SwiftUI UI for the new
      design system and Liquid Glass. Use when adopting Liquid Glass, updating
      NavigationSplitView, toolbars, search, sheets, and controls, removing
      custom backgrounds that fight system materials, or building custom glass
      surfaces with glassEffect, GlassEffectContainer, and glassEffectID.
  - id: packaging-notarization
    kind: skill
    path: plugins/build-macos-apps/skills/packaging-notarization
    description: Prepare and troubleshoot packaging, signing, and notarization
      workflows for macOS distribution. Use when asked to archive a Mac app,
      validate bundle structure, reason about notarization readiness, or explain
      distribution-only failures.
  - id: signing-entitlements
    kind: skill
    path: plugins/build-macos-apps/skills/signing-entitlements
    description: Inspect signing, entitlements, hardened runtime, and Gatekeeper
      issues for macOS apps. Use when asked to diagnose code signing failures,
      missing entitlements, sandbox problems, notarization prerequisites, or
      trust-policy launch errors.
  - id: swiftpm-macos
    kind: skill
    path: plugins/build-macos-apps/skills/swiftpm-macos
    description: Build, run, and test pure SwiftPM-based macOS packages and
      executables. Use when the repo is package-first, when there is no Xcode
      project, or when Swift package workflows are the fastest path to
      diagnosis.
  - id: swiftui-patterns
    kind: skill
    path: plugins/build-macos-apps/skills/swiftui-patterns
    description: Best practices and example-driven guidance for building native
      macOS SwiftUI scenes and components, including windows, commands,
      toolbars, settings, split views, inspectors, menu bar extras, and
      keyboard-driven workflows. Use when creating or refactoring macOS SwiftUI
      UI, choosing scene types, wiring menus or settings, or needing
      desktop-specific component patterns and examples.
  - id: telemetry
    kind: skill
    path: plugins/build-macos-apps/skills/telemetry
    description: Add lightweight runtime telemetry and debug instrumentation to
      macOS apps, then verify those events after building and running. Use when
      wiring `Logger` / `os.Logger`, adding log points for
      window/sidebar/menu-bar actions, reading runtime logs from Console or `log
      stream`, or confirming that expected events fire after a local run.
  - id: test-triage
    kind: skill
    path: plugins/build-macos-apps/skills/test-triage
    description: Triage failing macOS tests across Xcode and SwiftPM workflows. Use
      when asked to run macOS tests, narrow failing scopes, explain assertion or
      crash failures, or separate real test regressions from setup and
      environment problems.
  - id: view-refactor
    kind: skill
    path: plugins/build-macos-apps/skills/view-refactor
    description: Refactor macOS SwiftUI views and scenes with strong defaults for
      small dedicated subviews, stable sidebar and selection structure, explicit
      command and toolbar ownership, scene-aware state, and narrow AppKit escape
      hatches. Use when cleaning up a macOS view file, splitting oversized scene
      roots, removing iOS-centric patterns, or tightening mixed SwiftUI/AppKit
      architecture.
  - id: window-management
    kind: skill
    path: plugins/build-macos-apps/skills/window-management
    description: Customize macOS 15+ SwiftUI windows and scene behavior using
      Window, WindowGroup, and macOS window modifiers. Use when styling or
      hiding window toolbars and titles, extending drag regions with
      WindowDragGesture, replacing window backgrounds with materials, disabling
      minimize or restoration for utility windows, setting default or ideal
      window placement from content/display size, creating borderless windows,
      or tuning default launch behavior.
  - id: frontend-skill
    kind: skill
    path: plugins/build-web-apps/skills/frontend-skill
    description: Use when the task asks for a visually strong landing page, website,
      app, prototype, demo, or game UI. This skill enforces restrained
      composition, image-led hierarchy, cohesive content structure, and tasteful
      motion while avoiding generic cards, weak branding, and UI clutter.
  - id: react-best-practices
    kind: skill
    path: plugins/build-web-apps/skills/react-best-practices
    description: React and Next.js performance optimization guidelines from Vercel
      Engineering. This skill should be used when writing, reviewing, or
      refactoring React/Next.js code to ensure optimal performance patterns.
      Triggers on tasks involving React components, Next.js pages, data
      fetching, bundle optimization, or performance improvements.
  - id: shadcn-best-practices
    kind: skill
    path: plugins/build-web-apps/skills/shadcn-best-practices
    description: Manages shadcn components and projects — adding, searching, fixing,
      debugging, styling, and composing UI. Provides project context, component
      docs, and usage examples. Applies when working with shadcn/ui, component
      registries, presets, --preset codes, or any project with a components.json
      file. Also triggers for "shadcn init", "create an app with --preset", or
      "switch to --preset".
  - id: stripe-best-practices
    kind: skill
    path: plugins/build-web-apps/skills/stripe-best-practices
    description: Guides Stripe integration decisions — API selection (Checkout
      Sessions vs PaymentIntents), Connect platform setup (Accounts v2,
      controller properties), billing/subscriptions, Treasury financial
      accounts, integration surfaces (Checkout, Payment Element), and migrating
      from deprecated Stripe APIs. Use when building, modifying, or reviewing
      any Stripe integration — including accepting payments, building
      marketplaces, integrating Stripe, processing payments, setting up
      subscriptions, or creating connected accounts.
  - id: supabase-best-practices
    kind: skill
    path: plugins/build-web-apps/skills/supabase-best-practices
    description: Postgres performance optimization and best practices from Supabase.
      Use this skill when writing, reviewing, or optimizing Postgres queries,
      schema designs, or database configurations.
  - id: web-design-guidelines
    kind: skill
    path: plugins/build-web-apps/skills/web-design-guidelines
    description: Review UI code for Web Interface Guidelines compliance. Use when
      asked to "review my UI", "check accessibility", "audit design", "review
      UX", or "check my site against best practices".
  - id: canva-branded-presentation
    kind: skill
    path: plugins/canva/skills/canva-branded-presentation
    description: Create on-brand Canva presentations from a brief, outline, existing
      Canva doc, or design link. Use when the user wants a branded slide deck,
      wants to turn notes into a presentation, or needs a presentation generated
      in Canva with the right brand kit and a clear slide plan.
  - id: canva-resize-for-all-social-media
    kind: skill
    path: plugins/canva/skills/canva-resize-for-all-social-media
    description: Resize a Canva design into standard social media formats and
      prepare export-ready results. Use when the user wants one Canva design
      adapted across multiple social platforms such as Facebook, Instagram, and
      LinkedIn, especially when they want all variants produced in one pass.
  - id: canva-translate-design
    kind: skill
    path: plugins/canva/skills/canva-translate-design
    description: Translate the text in a Canva design into another language while
      preserving the original layout as much as possible. Use when the user
      wants a localized or translated version of an existing Canva design and
      expects the original file to remain unchanged.
  - id: builds
    kind: skill
    path: plugins/circleci/skills/builds
    description: Diagnose and fix failing CircleCI builds quickly and safely. Use
      when users ask to investigate failed CircleCI jobs, triage flaky
      pipelines, identify root causes from logs, and implement minimal fixes in
      configuration, test setup, or build-related code paths.
  - id: chunk
    kind: skill
    path: plugins/circleci/skills/chunk
    description: Use CircleCI Chunk for AI-assisted CI/CD work through either the
      Chunk web UI or the chunk-cli. Trigger this skill when users ask to set up
      Chunk, troubleshoot or fix failing builds with Chunk, configure Chunk
      environments, schedule/proactively run Chunk tasks, or use chunk-cli
      commands such as init, validate, build-prompt, auth, sandbox, task, and
      skill install.
  - id: cli
    kind: skill
    path: plugins/circleci/skills/cli
    description: Operate and troubleshoot CircleCI using the CircleCI CLI. Use when
      users ask to authenticate CLI access, inspect pipeline/workflow/job
      status, validate configuration locally, rerun pipelines/jobs, trigger
      pipelines, or gather actionable diagnostics from CLI outputs.
  - id: config
    kind: skill
    path: plugins/circleci/skills/config
    description: Optimize CircleCI configuration for speed, reliability, and
      maintainability. Use when users ask to improve `.circleci/config.yml`,
      reduce CI runtime, tune caching/workspaces/parallelism, remove pipeline
      waste, or fix flaky pipeline behavior caused by configuration choices.
  - id: cloudflare-api
    kind: mcp
    path: plugins/cloudflare/.mcp.json
  - id: agents-sdk
    kind: skill
    path: plugins/cloudflare/skills/agents-sdk
    description: Build AI agents on Cloudflare Workers using the Agents SDK. Load
      when creating stateful agents, durable workflows, real-time WebSocket
      apps, scheduled tasks, MCP servers, or chat applications. Covers Agent
      class, state management, callable RPC, Workflows integration, and React
      hooks. Biases towards retrieval from Cloudflare docs over pre-trained
      knowledge.
  - id: building-ai-agent-on-cloudflare
    kind: skill
    path: plugins/cloudflare/skills/building-ai-agent-on-cloudflare
    description: >
      Builds AI agents on Cloudflare using the Agents SDK with state management,

      real-time WebSockets, scheduled tasks, tool integration, and chat
      capabilities.

      Generates production-ready agent code deployed to Workers.


      Use when: user wants to "build an agent", "AI agent", "chat agent",
      "stateful

      agent", mentions "Agents SDK", needs "real-time AI", "WebSocket AI", or
      asks

      about agent "state management", "scheduled tasks", or "tool calling".

      Biases towards retrieval from Cloudflare docs over pre-trained knowledge.
  - id: building-mcp-server-on-cloudflare
    kind: skill
    path: plugins/cloudflare/skills/building-mcp-server-on-cloudflare
    description: |
      Builds remote MCP (Model Context Protocol) servers on Cloudflare Workers
      with tools, OAuth authentication, and production deployment. Generates
      server code, configures auth providers, and deploys to Workers.

      Use when: user wants to "build MCP server", "create MCP tools", "remote
      MCP", "deploy MCP", add "OAuth to MCP", or mentions Model Context Protocol
      on Cloudflare. Also triggers on "MCP authentication" or "MCP deployment".
      Biases towards retrieval from Cloudflare docs over pre-trained knowledge.
  - id: cloudflare
    kind: skill
    path: plugins/cloudflare/skills/cloudflare
    description: Comprehensive Cloudflare platform skill covering Workers, Pages,
      storage (KV, D1, R2), AI (Workers AI, Vectorize, Agents SDK), networking
      (Tunnel, Spectrum), security (WAF, DDoS), and infrastructure-as-code
      (Terraform, Pulumi). Use for any Cloudflare development task. Biases
      towards retrieval from Cloudflare docs over pre-trained knowledge.
  - id: durable-objects
    kind: skill
    path: plugins/cloudflare/skills/durable-objects
    description: Create and review Cloudflare Durable Objects. Use when building
      stateful coordination (chat rooms, multiplayer games, booking systems),
      implementing RPC methods, SQLite storage, alarms, WebSockets, or reviewing
      DO code for best practices. Covers Workers integration, wrangler config,
      and testing with Vitest. Biases towards retrieval from Cloudflare docs
      over pre-trained knowledge.
  - id: sandbox-sdk
    kind: skill
    path: plugins/cloudflare/skills/sandbox-sdk
    description: Build sandboxed applications for secure code execution. Load when
      building AI code execution, code interpreters, CI/CD systems, interactive
      dev environments, or executing untrusted code. Covers Sandbox SDK
      lifecycle, commands, files, code interpreter, and preview URLs. Biases
      towards retrieval from Cloudflare docs over pre-trained knowledge.
  - id: web-perf
    kind: skill
    path: plugins/cloudflare/skills/web-perf
    description: Analyzes web performance using Chrome DevTools MCP. Measures Core
      Web Vitals (FCP, LCP, TBT, CLS, Speed Index), identifies render-blocking
      resources, network dependency chains, layout shifts, caching issues, and
      accessibility gaps. Use when asked to audit, profile, debug, or optimize
      page load performance, Lighthouse scores, or site speed. Biases towards
      retrieval from current documentation over pre-trained knowledge.
  - id: workers-best-practices
    kind: skill
    path: plugins/cloudflare/skills/workers-best-practices
    description: Reviews and authors Cloudflare Workers code against production best
      practices. Load when writing new Workers, reviewing Worker code,
      configuring wrangler.jsonc, or checking for common Workers anti-patterns
      (streaming, floating promises, global state, secrets, bindings,
      observability). Biases towards retrieval from Cloudflare docs over
      pre-trained knowledge.
  - id: wrangler
    kind: skill
    path: plugins/cloudflare/skills/wrangler
    description: Cloudflare Workers CLI for deploying, developing, and managing
      Workers, KV, R2, D1, Vectorize, Hyperdrive, Workers AI, Containers,
      Queues, Workflows, Pipelines, and Secrets Store. Load before running
      wrangler commands to ensure correct syntax and best practices. Biases
      towards retrieval from Cloudflare docs over pre-trained knowledge.
  - id: building-native-ui
    kind: skill
    path: plugins/expo/skills/building-native-ui
    description: Complete guide for building beautiful apps with Expo Router. Covers
      fundamentals, styling, components, navigation, animations, patterns, and
      native tabs.
  - id: codex-expo-run-actions
    kind: skill
    path: plugins/expo/skills/codex-expo-run-actions
    description: Wire Expo projects into the Codex app with project-local run
      scripts and .codex/environments/environment.toml actions. Use when the
      user wants the Codex app Run button, build/run actions, action buttons, or
      a stable Expo start/run workflow from Codex.
  - id: expo-api-routes
    kind: skill
    path: plugins/expo/skills/expo-api-routes
    description: Guidelines for creating API routes in Expo Router with EAS Hosting
  - id: expo-cicd-workflows
    kind: skill
    path: plugins/expo/skills/expo-cicd-workflows
    description: Helps understand and write EAS workflow YAML files for Expo
      projects. Use this skill when the user asks about CI/CD or workflows in an
      Expo or EAS context, mentions .eas/workflows/, or wants help with EAS
      build pipelines or deployment automation.
  - id: expo-deployment
    kind: skill
    path: plugins/expo/skills/expo-deployment
    description: Deploying Expo apps to iOS App Store, Android Play Store, web
      hosting, and API routes
  - id: expo-dev-client
    kind: skill
    path: plugins/expo/skills/expo-dev-client
    description: Build and distribute Expo development clients locally or via TestFlight
  - id: expo-module
    kind: skill
    path: plugins/expo/skills/expo-module
    description: Guide for writing Expo native modules and views using the Expo
      Modules API (Swift, Kotlin, TypeScript). Covers module definition DSL,
      native views, shared objects, config plugins, lifecycle hooks,
      autolinking, and type system. Use when building or modifying native
      modules for Expo.
  - id: expo-tailwind-setup
    kind: skill
    path: plugins/expo/skills/expo-tailwind-setup
    description: Set up Tailwind CSS v4 in Expo with react-native-css and NativeWind
      v5 for universal styling
  - id: expo-ui-jetpack-compose
    kind: skill
    path: plugins/expo/skills/expo-ui-jetpack-compose
    description: "`@expo/ui/jetpack-compose` package lets you use Jetpack Compose
      Views and modifiers in your app."
  - id: expo-ui-swift-ui
    kind: skill
    path: plugins/expo/skills/expo-ui-swift-ui
    description: "`@expo/ui/swift-ui` package lets you use SwiftUI Views and
      modifiers in your app."
  - id: native-data-fetching
    kind: skill
    path: plugins/expo/skills/native-data-fetching
    description: Use when implementing or debugging ANY network request, API call,
      or data fetching. Covers fetch API, React Query, SWR, error handling,
      caching, offline support, and Expo Router data loaders (`useLoaderData`).
  - id: upgrading-expo
    kind: skill
    path: plugins/expo/skills/upgrading-expo
    description: Guidelines for upgrading Expo SDK versions and fixing dependency issues
  - id: use-dom
    kind: skill
    path: plugins/expo/skills/use-dom
    description: Use Expo DOM components to run web code in a webview on native and
      as-is on web. Migrate web code to native incrementally.
  - id: figma-code-connect-components
    kind: skill
    path: plugins/figma/skills/figma-code-connect-components
    description: Creates and maintains Figma Code Connect template files that map
      Figma components to code snippets. Use when the user mentions Code
      Connect, Figma component mapping, design-to-code translation, or asks to
      create/update .figma.js files.
  - id: figma-create-design-system-rules
    kind: skill
    path: plugins/figma/skills/figma-create-design-system-rules
    description: Generates custom design system rules for the user's codebase. Use
      when user says "create design system rules", "generate rules for my
      project", "set up design rules", "customize design system guidelines", or
      wants to establish project-specific conventions for Figma-to-code
      workflows. Requires Figma MCP server connection.
  - id: figma-create-new-file
    kind: skill
    path: plugins/figma/skills/figma-create-new-file
    description: Create a new blank Figma file. Use when the user wants to create a
      new Figma design or FigJam file, or when you need a new file before
      calling use_figma. Handles plan resolution via whoami if needed. Usage —
      /figma-create-new-file [editorType] [fileName] (e.g.
      /figma-create-new-file figjam My Whiteboard)
  - id: figma-generate-design
    kind: skill
    path: plugins/figma/skills/figma-generate-design
    description: "Use this skill alongside figma-use when the task involves
      translating an application page, view, or multi-section layout into Figma.
      Triggers: 'write to Figma', 'create in Figma from code', 'push page to
      Figma', 'take this app/page and build it in Figma', 'create a screen',
      'build a landing page in Figma', 'update the Figma screen to match code'.
      This is the preferred workflow skill whenever the user wants to build or
      update a full page, screen, or view in Figma from code or a description.
      Discovers design system components, variables, and styles via
      search_design_system, imports them, and assembles screens incrementally
      section-by-section using design system tokens instead of hardcoded
      values."
  - id: figma-generate-library
    kind: skill
    path: plugins/figma/skills/figma-generate-library
    description: Build or update a professional-grade design system in Figma from a
      codebase. Use when the user wants to create variables/tokens, build
      component libraries, set up theming (light/dark modes), document
      foundations, or reconcile gaps between code and Figma. This skill teaches
