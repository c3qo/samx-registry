# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: vercel/next.js
name: Next.js
description: React framework monorepo; docs, build, test, CI, plugins, skills.
source:
  type: git
  url: https://github.com/vercel/next.js
  revision: ff98855aa23ab20eff484bbe945e05285369ecc6
capabilities:
  - id: authoring-skills
    kind: skill
    path: .agents/skills/authoring-skills
    description: >
      How to create and maintain agent skills in .agents/skills/. Use when
      creating a new SKILL.md, writing skill descriptions, choosing frontmatter
      fields, or deciding what content belongs in a skill vs AGENTS.md. Covers
      the supported spec fields, description writing, naming conventions, and
      the relationship between always-loaded AGENTS.md and on-demand skills.
  - id: backport-pr
    kind: skill
    path: .agents/skills/backport-pr
    description: >
      Backport a merged Next.js pull request from canary to a previous release
      branch such as next-16-2. Use when the user asks to backport, cherry-pick,
      or open a backport PR from a PR number to an older Next.js version. Covers
      finding the merged PR commit, creating a backport branch from the target
      release branch, cherry-picking from canary, validating, and opening the PR
      with the release branch as the base.
  - id: create-pr
    kind: skill
    path: .agents/skills/create-pr
    description: >
      Create Git branches, commits, pushes, and GitHub pull requests for
      Next.js. Use when the user asks to create a branch, commit current
      changes, open a PR or draft PR, publish a pull request, or recover from gh
      pr create / PR template issues. Covers .github/pull_request_template.md,
      --body formatting, NEXT_JS_LLM_PR, codex/ branch names, and Codex app git
      directives.
  - id: cache-components
    kind: skill
    path: .claude-plugin/plugins/cache-components/skills/cache-components
    description: >
      Expert guidance for Next.js Cache Components and Partial Prerendering
      (PPR).


      **PROACTIVE ACTIVATION**: Use this skill automatically when working in
      Next.js projects that have `cacheComponents: true` in their
      next.config.ts/next.config.js. When this config is detected, proactively
      apply Cache Components patterns and best practices to all React Server
      Component implementations.


      **DETECTION**: At the start of a session in a Next.js project, check for
      `cacheComponents: true` in next.config. If enabled, this skill's patterns
      should guide all component authoring, data fetching, and caching
      decisions.


      **USE CASES**: Implementing 'use cache' directive, configuring cache
      lifetimes with cacheLife(), tagging cached data with cacheTag(),
      invalidating caches with updateTag()/revalidateTag(), optimizing static vs
      dynamic content boundaries, debugging cache issues, and reviewing Cache
      Component implementations.
  - id: dce-edge
    kind: skill
    path: .agents/skills/dce-edge
    description: >
      DCE-safe require() patterns and edge runtime constraints. Use when writing
      conditional require() calls, guarding Node-only imports (node:stream
      etc.), or editing define-env-plugin.ts / app-render / stream-utils for
      edge builds. Covers if/else branching for webpack DCE, TypeScript definite
      assignment, the NEXT_RUNTIME vs real feature flag distinction, and forcing
      flags false for edge in define-env.ts.
  - id: flags
    kind: skill
    path: .agents/skills/flags
    description: >
      How to add or modify Next.js experimental feature flags end-to-end. Use
      when editing config-shared.ts, config-schema.ts, define-env-plugin.ts,
      next-server.ts, export/worker.ts, or module.compiled.js. Covers type
      declaration, zod schema, build-time injection, runtime env plumbing, and
      the decision between runtime env-var branching vs separate bundle
      variants.
  - id: gh-stack
    kind: skill
    path: .agents/skills/gh-stack
    description: >
      Manage stacked branches and pull requests with the gh-stack GitHub CLI
      extension. Use when the user wants to create, push, rebase, sync,
      navigate, or view stacks of dependent PRs. Triggers on tasks involving
      stacked diffs, dependent pull requests, branch chains, or incremental code
      review workflows.
  - id: insight-error-page
    kind: skill
    path: .agents/skills/insight-error-page
    description: Write or audit an insight-kind error page for the Next.js dev
      overlay. Use when creating a new `errors/<slug>.mdx` page, auditing an
      existing one, or checking that a page matches the framework fix cards.
      Covers page structure, title alignment, FixOption cards with Copy AI
      prompt button, code snippets, terminology verification against canonical
      docs, and Vercel technical writing style.
  - id: next-rspack
    kind: skill
    path: .agents/skills/next-rspack
    description: >
      Maintain @next/rspack-core and @next/rspack-binding packages. Use when
      editing rspack/package.json, rspack/crates/binding/Cargo.toml,
      rspack/rust-toolchain.toml, or packages/next-rspack/package.json. Covers
      upgrading @rspack/core npm version, rspack_* crate versions, Rust
      toolchain version, building and linking for local testing, and NEXT_RSPACK
      environment variable usage. Does NOT apply to root rust-toolchain.toml
      (that's for Turbopack).
  - id: pr-status-triage
    kind: skill
    path: .agents/skills/pr-status-triage
    description: >
      Triage CI failures and PR review comments using scripts/pr-status.js. Use
      when investigating failing CI jobs, flaky tests, or PR review feedback.
      Covers blocker-first prioritization (build > lint > types > tests), CI env
      var matching for local reproduction, and the Known Flaky Tests
      distinction.
  - id: react-vendoring
    kind: skill
    path: .agents/skills/react-vendoring
    description: >
      React vendoring and react-server layer boundaries. Use when editing
      entry-base.ts, $$compiled.internal.d.ts, compiled/react* packages, or
      taskfile.js copy_vendor_react. Covers the entry-base.ts boundary (all
      react-server-dom-webpack/* imports must go through it), vendored React
      channels, type declarations, Turbopack remap to
      react-server-dom-turbopack, ComponentMod access patterns, and ESLint
      suppression for guarded requires.
  - id: router-act
    kind: skill
    path: .agents/skills/router-act
    description: >
      How to write end-to-end tests using createRouterAct and LinkAccordion. Use
      when writing or modifying tests that need to control the timing of
      internal Next.js requests (like prefetches) or assert on their responses.
      Covers the act API, fixture patterns, prefetch control via LinkAccordion,
      fake clocks, and avoiding flaky testing patterns.
  - id: runtime-debug
    kind: skill
    path: .agents/skills/runtime-debug
    description: >
      Debug and verification workflow for runtime-bundle and module-resolution
      regressions. Use when diagnosing unexpected module inclusions, bundle size
      regressions, or CI failures related to NEXT_SKIP_ISOLATE, nft.json traces,
      or runtime bundle selection (module.compiled.js). Covers CI env mirroring,
      full stack traces via __NEXT_SHOW_IGNORE_LISTED, route trace inspection,
      and webpack stats diffing.
  - id: update-docs
    kind: skill
    path: .agents/skills/update-docs
    description: This skill should be used when the user asks to "update
      documentation for my changes", "check docs for this PR", "what docs need
      updating", "sync docs with code", "scaffold docs for this feature",
      "document this feature", "review docs completeness", "add docs for this
      change", "what documentation is affected", "docs impact", or mentions
      "docs/", "docs/01-app", "docs/02-pages", "MDX", "documentation update",
      "API reference", ".mdx files". Provides guided workflow for updating
      Next.js documentation based on code changes.
  - id: v8-jit
    kind: skill
    path: .agents/skills/v8-jit
    description: >
      V8 JIT optimization patterns for writing high-performance JavaScript in
      Next.js server internals. Use when writing or reviewing hot-path code in
      app-render, stream-utils, routing, caching, or any per-request code path.
      Covers hidden classes / shapes, monomorphic call sites, inline caches,
      megamorphic deopt, closure allocation, array packing, and profiling with
      --trace-opt / --trace-deopt.
  - id: write-api-reference
    kind: skill
    path: .agents/skills/write-api-reference
    description: >
      Produces API reference documentation for Next.js APIs: functions,
      components, file conventions, directives, and config options.


      **Auto-activation:** User asks to write, create, or draft an API reference
      page. Also triggers on paths like `docs/01-app/03-api-reference/`, or
      keywords like "API reference", "props", "parameters", "returns",
      "signature".


      **Input sources:** Next.js source code, existing API reference pages, or
      user-provided specifications.


      **Output type:** A markdown (.mdx) API reference page with YAML
      frontmatter, usage example, reference section, behavior notes, and
      examples.
  - id: write-guide
    kind: skill
    path: .agents/skills/write-guide
    description: >
      Generates technical guides that teach real-world use cases through
      progressive examples.


      **Auto-activation:** User asks to write, create, or draft a guide or
      tutorial. Also use when converting feature documentation, API references,
      or skill knowledge into step-by-step learning content.


      **Input sources:** Feature skills, API documentation, existing code
      examples, or user-provided specifications.


      **Output type:** A markdown guide with YAML frontmatter, introduction, 2-4
      progressive steps, and next steps section.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
