# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: openshift/release-tests
name: Release Tests
description: "OpenShift QE release automation: OAR CLI, Prow jobs, MCP tools."
source:
  type: git
  url: https://github.com/openshift/release-tests
  revision: 67d4f1b919fb0680fbfbf28a27ad7774c3f43fb9
capabilities:
  - id: openshift-expert
    kind: skill
    path: .claude/skills/openshift-expert
    description: OpenShift platform and Kubernetes expert with deep knowledge of
      cluster architecture, operators, networking, storage, troubleshooting, and
      CI/CD pipelines. Use for analyzing test failures, debugging cluster
      issues, understanding operator behavior, investigating build problems, or
      any OpenShift/Kubernetes-related questions.
  - id: release-workflow
    kind: skill
    path: .claude/skills/release-workflow
    description: OpenShift z-stream release workflow and orchestration expert. Use
      when discussing release tasks, build promotion, test analysis, advisory
      workflows, or any aspect of the Konflux/Errata release pipeline. Provides
      context on task sequencing, checkpoints, and MCP execution for releases
      4.12-4.20.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
