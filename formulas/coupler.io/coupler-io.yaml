# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: coupler.io/coupler-io
name: Coupler Io
description: Coupler.io remote MCP server at https://mcp.coupler.io/mcp. Access
  business data from hundreds of sources. Setup guides for Claude Code, Codex,
  Cursor, and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/coupler-io
capabilities:
  - id: coupler-io
    kind: mcp
    spec:
      serverName: coupler-io
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://mcp.coupler.io/mcp
