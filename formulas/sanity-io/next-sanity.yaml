# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: sanity-io/next-sanity
name: next-sanity
description: Sanity.io toolkit for Next.js; monorepo w/ Next app(s), package
  libs, build/test tooling.
source:
  type: git
  url: https://github.com/sanity-io/next-sanity
  revision: b34e7e0b8d8b27b7cea2e3df33871507293161b3
capabilities:
  - id: next-best-practices
    kind: skill
    path: .agents/skills/next-best-practices
    description: Next.js best practices - file conventions, RSC boundaries, data
      patterns, async APIs, metadata, error handling, route handlers, image/font
      optimization, bundling
  - id: next-cache-components
    kind: skill
    path: .agents/skills/next-cache-components
    description: Next.js 16 Cache Components - PPR, use cache directive, cacheLife,
      cacheTag, updateTag
  - id: pnpm
    kind: skill
    path: .agents/skills/pnpm
    description: Node.js package manager with strict dependency resolution. Use when
      running pnpm specific commands, configuring workspaces, or managing
      dependencies with catalogs, patches, or overrides.
  - id: turborepo
    kind: skill
    path: .agents/skills/turborepo
    description: >
      Turborepo monorepo build system guidance. Triggers on: turbo.json, task
      pipelines,

      dependsOn, caching, remote cache, the "turbo" CLI, --filter, --affected,
      CI optimization, environment

      variables, internal packages, monorepo structure/best practices, and
      boundaries.


      Use when user: configures tasks/workflows/pipelines, creates packages,
      sets up

      monorepo, shares code between apps, runs changed/affected packages, debugs
      cache,

      or has apps/packages directories.
  - id: vitest
    kind: skill
    path: .agents/skills/vitest
    description: Vitest fast unit testing framework powered by Vite with
      Jest-compatible API. Use when writing tests, mocking, configuring
      coverage, or working with test filtering and fixtures.
  - id: tsdown
    kind: skill
    path: .agents/skills/tsdown
    description: Bundle TypeScript and JavaScript libraries with blazing-fast speed
      powered by Rolldown. Use when building libraries, generating type
      declarations, bundling for multiple formats, or migrating from tsup.
  - id: sanity-live-cache-components
    kind: skill
    path: skills/sanity-live-cache-components
    description: Integrates Sanity Live with Next.js Cache Components in next-sanity
      v13+ apps. Sets up sanityFetch, <SanityLive>, Visual Editing, Presentation
      Tool, draft mode handling, and the three-layer (Page/Dynamic/Cached)
      component pattern with explicit perspective/stega prop-drilling. Use when
      configuring or migrating a Next.js app to cacheComponents with Sanity,
      when adding sanityFetch, when wiring <SanityLive>/<VisualEditing>, or when
      refactoring components that hardcode perspective/stega.
  - id: find-skills
    kind: skill
    path: .agents/skills/find-skills
    description: Helps users discover and install agent skills when they ask
      questions like "how do I do X", "find a skill for X", "is there a skill
      that can...", or express interest in extending capabilities. This skill
      should be used when the user is looking for functionality that might exist
      as an installable skill.
  - id: grill-with-docs
    kind: skill
    path: .agents/skills/grill-with-docs
    description: Grilling session that challenges your plan against the existing
      domain model, sharpens terminology, and updates documentation (CONTEXT.md,
      ADRs) inline as decisions crystallise. Use when user wants to stress-test
      a plan against their project's language and documented decisions.
  - id: vercel-react-best-practices
    kind: skill
    path: .agents/skills/vercel-react-best-practices
    description: React and Next.js performance optimization guidelines from Vercel
      Engineering. This skill should be used when writing, reviewing, or
      refactoring React/Next.js code to ensure optimal performance patterns.
      Triggers on tasks involving React components, Next.js pages, data
      fetching, bundle optimization, or performance improvements.
requirements:
  env:
    - NEXT_PUBLIC_SANITY_PROJECT_ID
    - NEXT_PUBLIC_SANITY_DATASET
    - SANITY_API_READ_TOKEN
hooks:
  mode: explicit
  entries: []
advisories: []
