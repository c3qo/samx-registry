schemaVersion: 1
id: sanity-io/sanity
name: Sanity
description: Sanity monorepo for Studio, examples, and tooling.
source:
  type: git
  url: https://github.com/sanity-io/sanity
  revision: 85607ac63304021076126f9cf6a6c4d3ff2e4aa7
capabilities:
  - id: sanity-config-reducers
    kind: skill
    path: .agents/skills/sanity-config-reducers
    description: Add and review Sanity config properties that are reduced across
      root config and plugins. Use when adding beta flags, feature config,
      workspace/source options, default plugin gates, or resolved Source fields
      in packages/sanity/src/core/config.
  - id: code-review-and-quality
    kind: skill
    path: .agents/skills/code-review-and-quality
    description: Conducts multi-axis code review. Use before merging any change. Use
      when reviewing code written by yourself, another agent, or a human. Use
      when you need to assess code quality across multiple dimensions before it
      enters the main branch.
  - id: code-simplification
    kind: skill
    path: .agents/skills/code-simplification
    description: Simplifies code for clarity. Use when refactoring code for clarity
      without changing behavior. Use when code works but is harder to read,
      maintain, or extend than it should be. Use when reviewing code that has
      accumulated unnecessary complexity.
  - id: find-skills
    kind: skill
    path: .agents/skills/find-skills
    description: Helps users discover and install agent skills when they ask
      questions like "how do I do X", "find a skill for X", "is there a skill
      that can...", or express interest in extending capabilities. This skill
      should be used when the user is looking for functionality that might exist
      as an installable skill.
  - id: grill-me
    kind: skill
    path: .agents/skills/grill-me
    description: Interview the user relentlessly about a plan or design until
      reaching shared understanding, resolving each branch of the decision tree.
      Use when user wants to stress-test a plan, get grilled on their design, or
      mentions "grill me".
  - id: improve-codebase-architecture
    kind: skill
    path: .agents/skills/improve-codebase-architecture
    description: Explore a codebase to find opportunities for architectural
      improvement, focusing on making the codebase more testable by deepening
      shallow modules. Use when user wants to improve architecture, find
      refactoring opportunities, consolidate tightly-coupled modules, or make a
      codebase more AI-navigable.
  - id: performance-optimization
    kind: skill
    path: .agents/skills/performance-optimization
    description: Optimizes application performance. Use when performance
      requirements exist, when you suspect performance regressions, or when Core
      Web Vitals or load times need improvement. Use when profiling reveals
      bottlenecks that need fixing.
  - id: playwright-best-practices
    kind: skill
    path: .agents/skills/playwright-best-practices
    description: Use when writing Playwright tests, fixing flaky tests, debugging
      failures, implementing Page Object Model, configuring CI/CD, optimizing
      performance, mocking APIs, handling authentication or OAuth, testing
      accessibility (axe-core), file uploads/downloads, date/time mocking,
      WebSockets, geolocation, permissions, multi-tab/popup flows,
      mobile/responsive layouts, touch gestures, GraphQL, error handling,
      offline mode, multi-user collaboration, third-party services (payments,
      email verification), console error monitoring, global setup/teardown, test
      annotations (skip, fixme, slow), test tags (@smoke, @fast, @critical,
      filtering with --grep), project dependencies, security testing (XSS, CSRF,
      auth), performance budgets (Web Vitals, Lighthouse), iframes, component
      testing, canvas/WebGL, service workers/PWA, test coverage,
      i18n/localization, Electron apps, or browser extension testing. Covers
      E2E, component, API, visual, accessibility, security, Electron, and
      extension testing.
  - id: playwright-cli
    kind: skill
    path: .agents/skills/playwright-cli
    description: Automates browser interactions for web testing, form filling,
      screenshots, and data extraction. Use when the user needs to navigate
      websites, interact with web pages, fill forms, take screenshots, test web
      applications, or extract information from web pages.
  - id: pr-description
    kind: skill
    path: .agents/skills/pr-description
    description: Write PR descriptions and release notes for the Sanity monorepo.
      Follows the repo's PR template with Description, What to review, Testing,
      and Notes for release sections. Auto-triggers when creating PRs via `gh pr
      create`. Use when creating pull requests, writing PR descriptions,
      drafting release notes, or when user mentions PR, pull request, or release
      notes.
  - id: rxjs-like-a-pro
    kind: skill
    path: .agents/skills/rxjs-like-a-pro
    description: >
      How to write idiomatic, efficient RxJS code. Use this skill whenever the
      user is writing, refactoring, reviewing, or debugging code that uses RxJS
      — including any file that imports from 'rxjs' or 'rxjs/operators'. Trigger
      on mentions of observables, subscriptions, RxJS operators, or reactive
      streams. Even if the user doesn't say "RxJS" explicitly, activate when you
      see patterns like `.pipe()`, `.subscribe()`, `Observable`, `Subject`,
      `BehaviorSubject`, `switchMap`, `mergeMap`, or similar.
  - id: sanity-default-plugins
    kind: skill
    path: .agents/skills/sanity-default-plugins
    description: Create and wire Sanity core plugins using the monorepo's default
      plugin conventions. Use when adding, modifying, or reviewing plugins under
      packages/sanity/src/core, especially plugins added through
      resolveDefaultPlugins or studio.components middleware.
  - id: sanity-plugin-authoring
    kind: skill
    path: .agents/skills/sanity-plugin-authoring
    description: Explain and create Sanity Studio plugins using the public plugin
      and tool APIs. Use when creating user-facing plugins, adding tools through
      plugins, or when an agent needs to understand what a Sanity plugin can
      configure before applying monorepo-specific default plugin wiring.
  - id: tdd
    kind: skill
    path: .agents/skills/tdd
    description: Test-driven development with red-green-refactor loop. Use when user
      wants to build features or fix bugs using TDD, mentions
      "red-green-refactor", wants integration tests, or asks for test-first
      development.
  - id: vercel-react-best-practices
    kind: skill
    path: .agents/skills/vercel-react-best-practices
    description: React and Next.js performance optimization guidelines from Vercel
      Engineering. This skill should be used when writing, reviewing, or
      refactoring React/Next.js code to ensure optimal performance patterns.
      Triggers on tasks involving React components, Next.js pages, data
      fetching, bundle optimization, or performance improvements.
  - id: write-a-skill
    kind: skill
    path: .agents/skills/write-a-skill
    description: Create new agent skills with proper structure, progressive
      disclosure, and bundled resources. Use when user wants to create, write,
      or build a new skill.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
