# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: sanity-io/context
name: Sanity Context
description: MCP for structured Sanity content access + agent insights.
source:
  type: git
  url: https://github.com/sanity-io/context
  revision: f577ccee488b9cbfb6aed66380d76c0b81d52137
capabilities:
  - id: create-agent-with-sanity-context
    kind: skill
    path: skills/create-agent-with-sanity-context
    description: Build AI agents with structured access to Sanity content via Sanity
      Context. Use when setting up a Sanity-powered chatbot, connecting an AI
      assistant to Sanity content, or adding client-side tools to an agent.
      Covers Studio setup, agent implementation, and advanced patterns. Always
      use this skill when users mention building a chatbot with Sanity, creating
      an AI assistant for their content, setting up the Sanity Context MCP
      server, integrating Sanity with Claude/GPT/any LLM, making content
      searchable by AI, implementing semantic search over Sanity data, or
      connecting their CMS to an AI agent.
  - id: dial-your-context
    kind: skill
    path: skills/dial-your-context
    description: Interactive session to create Instructions field content for the
      Sanity Context MCP server. Use this skill whenever users mention tuning
      agent context, improving agent responses to Sanity data, configuring MCP
      instructions, setting up content filters, or when their agent gives wrong
      results from Sanity queries. Also trigger when users say their agent is
      confused about schema relationships, needs data-specific guidance, or
      wants to optimize which content the agent can access.
  - id: shape-your-agent
    kind: skill
    path: skills/shape-your-agent
    description: Interactive session to craft a system prompt for an AI agent
      powered by the Sanity Context MCP server. Use this skill when users want
      to define agent personality, set tone/voice, establish boundaries and
      guardrails, configure refusal behaviors, or control how their agent
      communicates. Trigger when users mention their agent sounds wrong, needs
      to refuse certain requests, has the wrong tone, or they want to set
      communication rules and policies.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
