# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: figma/mcp-server-guide
name: Figma MCP Server Guide
description: Figma MCP server docs + client setup + agent skills.
source:
  type: git
  url: https://github.com/figma/mcp-server-guide
  revision: 2efd0e37d10c35c4a7cf6d2b7381c9dc1a569bd4
capabilities:
  - id: figma
    kind: mcp
    path: .mcp.json
  - id: figma-2
    kind: mcp
    path: figma-power/mcp.json
  - id: figma-code-connect
    kind: skill
    path: skills/figma-code-connect
    description: Creates and maintains Figma Code Connect template files that map
      Figma components to code snippets. Use when the user mentions Code
      Connect, Figma component mapping, design-to-code translation, or asks to
      create/update .figma.ts or .figma.js files.
  - id: figma-create-new-file
    kind: skill
    path: skills/figma-create-new-file
    description: "**MANDATORY prerequisite** — you MUST invoke this skill BEFORE
      every `create_new_file` tool call. NEVER call `create_new_file` directly
      without loading this skill first. Trigger whenever the user wants a new
      blank Figma file — a new design, FigJam, or Slides file — or when you need
      a fresh file before calling `use_figma`. Usage — /figma-create-new-file
      [editorType] [fileName] (e.g. /figma-create-new-file figjam My Whiteboard,
      /figma-create-new-file slides Q3 Review)"
  - id: figma-generate-design
    kind: skill
    path: skills/figma-generate-design
    description: "Use this skill alongside figma-use when the task involves
      translating an application page, view, or multi-section layout into Figma.
      Triggers: 'write to Figma', 'create in Figma from code', 'push page to
      Figma', 'take this app/page and build it in Figma', 'create a screen',
      'build a landing page in Figma', 'update the Figma screen to match code',
      'convert this modal/dialog/drawer/panel to Figma'. This is the preferred
      workflow skill whenever the user wants to build or update a full page,
      modal, dialog, drawer, sidebar, panel, or any composed multi-section view
      in Figma from code or a description. Discovers design system components,
      variables, and styles from Code Connect files, existing screens, and
      library search, then imports them and assembles views incrementally
      section-by-section using design system tokens instead of hardcoded
      values."
  - id: figma-generate-diagram
    kind: skill
    path: skills/figma-generate-diagram
    description: MANDATORY prerequisite — load this skill BEFORE every
      `generate_diagram` tool call. NEVER call `generate_diagram` directly
      without loading this skill first. Trigger whenever the user asks to
      create, generate, draw, render, sketch, or build a diagram — flowchart,
      architecture diagram, sequence diagram, ERD or entity-relationship
      diagram, state diagram or state machine, gantt chart, or timeline. Also
      trigger when the user mentions Mermaid syntax or wants a system
      architecture, decision tree, dependency graph, API call flow, auth
      handshake, schema, or pipeline visualized in FigJam. Routes to
      type-specific guidance, sets universal Mermaid constraints, and tells you
      when to use a different diagram type or skip the tool entirely (mindmaps,
      pie charts, class diagrams, etc.).
  - id: figma-generate-library
    kind: skill
    path: skills/figma-generate-library
    description: Build or update a professional-grade design system in Figma from a
      codebase. Use when the user wants to create variables/tokens, build
      component libraries, create individual components with proper variant sets
      and variable bindings, set up theming (light/dark modes), document
      foundations, or reconcile gaps between code and Figma. Also use when the
      user asks to create or generate any component in Figma — even a single one
      — since components require proper variable foundations, variant states,
      and design token bindings to be production-quality. This skill teaches
      WHAT to build and in WHAT ORDER — it complements the `figma-use` skill
      which teaches HOW to call the Plugin API. Both skills should be loaded
      together.
  - id: figma-swiftui
    kind: skill
    path: skills/figma-swiftui
    description: SwiftUI ↔ Figma translation. Use whenever the user mentions Swift,
      SwiftUI, iOS, iPhone, or iPad — in EITHER direction — translating a Figma
      design into SwiftUI (design → code), or pushing SwiftUI views / screens /
      tokens back into a Figma file (code → design). Triggers on phrases like
      'implement this Figma design in SwiftUI', 'build this screen in Swift',
      'push this SwiftUI view to Figma', 'mirror my Swift code in a Figma file',
      or whenever a Figma URL appears alongside `.swift` files / an
      `.xcodeproj`. Routes to a direction-specific reference doc; loads
      alongside `figma-use` for the code → design path.
  - id: figma-use-figjam
    kind: skill
    path: skills/figma-use-figjam
    description: This skill helps agents use Figma's use_figma MCP tool in the
      FigJam context. Can be used alongside figma-use which has foundational
      context for using the use_figma tool.
  - id: figma-use-slides
    kind: skill
    path: skills/figma-use-slides
    description: This skill helps agents use Figma's use_figma MCP tool in the
      Slides context. Can be used alongside figma-use which has foundational
      context for using the use_figma tool.
  - id: figma-use
    kind: skill
    path: skills/figma-use
    description: "**MANDATORY prerequisite** — you MUST invoke this skill BEFORE
      every `use_figma` tool call. NEVER call `use_figma` directly without
      loading this skill first. Skipping it causes common, hard-to-debug
      failures. Trigger whenever the user wants to perform a write action or a
      unique read action that requires JavaScript execution in the Figma file
      context — e.g. create/edit/delete nodes, set up variables or tokens, build
      components and variants, modify auto-layout or fills, bind variables to
      properties, or inspect file structure programmatically."
  - id: generate-project-plan
    kind: skill
    path: workflow-skills/generate-project-plan
    description: "Generate a FigJam project plan board from a PRD plus codebase
      context. Interactive flow: research → propose sections → per-section deep
      research → per-section content + block-shape proposal → create FigJam →
      skeleton → fill → diagrams → wrap. Each content block (section, nested
      section, intro callout, table, multi-column text, sticky column, diagram
      section, metadata strip) has its own subskill reference file. Use when the
      user asks for 'project plan in FigJam', 'interactive project plan',
      '/generate-project-plan', or provides a PRD and wants per-section
      confirmation on content + rendering."
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
