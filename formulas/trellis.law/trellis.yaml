# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: trellis.law/trellis
name: Trellis
description: Trellis remote MCP server at https://mcp.trellis.law/anthropic.
  Claude for Trial Court Litigators. Setup guides for Claude Code, Codex,
  Cursor, and VS Code.
