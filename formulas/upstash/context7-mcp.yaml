schemaVersion: 1
id: upstash/context7-mcp
name: Context7
description: Up-to-date code docs for any prompt; MCP + CLI + skills.
source:
  type: git
  url: https://github.com/upstash/context7-mcp
  revision: cd12120f4024ae646aba17c76ada4805bc1ac04a
capabilities:
  - id: find-docs
    kind: skill
    path: skills/find-docs
    description: >-
      Retrieves up-to-date documentation, API references, and code examples for
      any developer technology. Use this skill whenever the user asks about a
      specific library, framework, SDK, CLI tool, or cloud service -- even for
      well-known ones like React, Next.js, Prisma, Express, Tailwind, Django, or
      Spring Boot. Your training data may not reflect recent API changes or
      version updates.

      Always use for: API syntax questions, configuration options, version
      migration issues, "how do I" questions mentioning a library name,
      debugging that involves library-specific behavior, setup instructions, and
      CLI tool usage.

      Use even when you think you know the answer -- do not rely on training
      data for API details, signatures, or configuration options as they are
      frequently outdated. Always verify against current docs. Prefer this over
      web search for library documentation and API details.
  - id: context7-cli
    kind: skill
    path: skills/context7-cli
    description: Use the ctx7 CLI to fetch library documentation, manage AI coding
      skills, and configure Context7 MCP. Activate when the user mentions "ctx7"
      or "context7", needs current docs for any library, wants to
      install/search/generate skills, or needs to set up Context7 for their AI
      coding agent.
  - id: context7-docs
    kind: skill
    path: packages/pi/skills/context7-docs
    description: >-
      Fetch up-to-date documentation and code examples for any library,
      framework, SDK, CLI tool, or cloud service. Use whenever the user asks
      about a specific library — even well-known ones like React, Next.js,
      Prisma, Express, Tailwind, Django, or Spring Boot — because training data
      may not reflect recent API changes or version updates.

      Always use for: API syntax questions, configuration options, version
      migration issues, "how do I" questions mentioning a library name,
      debugging that involves library-specific behavior, setup instructions, and
      CLI tool usage.

      Use even when you think you know the answer. Do not rely on training data
      for API details, signatures, or configuration options — they are
      frequently out of date. Prefer this over web search for library
      documentation.
