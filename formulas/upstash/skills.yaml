schemaVersion: 1
id: upstash/skills
name: Upstash Agent Skills
description: Upstash SDK skill pack; Box, CLI, QStash, Redis, Search, Vector,
  Workflow, Ratelimit.
source:
  type: git
  url: https://github.com/upstash/skills
  revision: d13aeeb0bdc810c16bb66b94ab248e67042bde83
capabilities:
  - id: upstash-box-js
    kind: skill
    path: skills/upstash-box-js
    description: Work with the @upstash/box TypeScript/JavaScript SDK for sandboxed
      cloud containers with AI agents, shell, filesystem, and git. Use when
      building with Upstash Box, creating sandboxed environments, running AI
      agents in containers, or orchestrating parallel boxes.
  - id: upstash-cli
    kind: skill
    path: skills/upstash-cli
    description: Run the Upstash CLI (`upstash`) against the Upstash Developer API
      for Redis, Vector, Search, QStash, and teams. Use when listing or managing
      databases, backups, vector/search indexes, QStash instances, team members,
      stats, or any non-interactive Upstash automation with JSON output and
      terminal commands.
  - id: upstash-qstash-js
    kind: skill
    path: skills/upstash-qstash-js
    description: Work with the QStash TypeScript/JavaScript SDK for serverless
      messaging, scheduling. Use when publishing messages to HTTP endpoints,
      creating schedules, managing queues, verifying incoming messages and other
      QStash features in serverless environments.
  - id: upstash-ratelimit-js
    kind: skill
    path: skills/upstash-ratelimit-js
    description: Lightweight guidance for using the Upstash Redis RateLimit
      TypeScript/JavaScript SDK, including setup steps, basic usage, and
      pointers to advanced algorithm, features, pricing, and traffic‑protection
      docs.
  - id: upstash-redis-js
    kind: skill
    path: skills/upstash-redis-js
    description: Work with the Upstash Redis TypeScript/JavaScript SDK for
      serverless Redis operations. Use for caching, session storage, rate
      limiting, leaderboards, full-text search (querying, filtering,
      aggregating) with Upstash Redis Search (different from regular FT.SEARCH),
      and all Redis data structures. Supports automatic
      serialization/deserialization of JavaScript types. Upstash Redis Search
      also available via @upstash/search-redis and @upstash/search-ioredis
      adapters for TCP clients.
  - id: upstash-redis-start
    kind: skill
    path: skills/upstash-redis-start
    description: Provision a zero-config, no-signup Upstash Redis database for an AI
      agent via a single POST to `https://upstash.com/start-redis`. Use when an
      agent needs scratch Redis for short-term memory, conversation history,
      sub-agent work queues, or ranked recall and the user has not provided
      credentials. The database lives 3 days unless the user claims it.
  - id: upstash-search-js
    kind: skill
    path: skills/upstash-search-js
    description: Skills covering Upstash Search quick starts, core concepts, and
      TypeScript/JavaScript SDK usage. Use when a user asks how to get started,
      how indexing works, or how to use the TS client.
  - id: upstash-vector-js
    kind: skill
    path: skills/upstash-vector-js
    description: Skills for Upstash Vector features, TypeScript/JavaScript SDK
      usage, and integrations. Use when users ask how to work with Vector, its
      TS SDK, features, or supported frameworks.
  - id: upstash-workflow-js
    kind: skill
    path: skills/upstash-workflow-js
    description: Skills for the Upstash Workflow TypeScript/JavaScript SDK to
      define, trigger, and manage workflows. Use this Skill whenever a user
      wants to create workflow endpoints, run steps, or interact with the
      Upstash Workflow client.
  - id: upstash
    kind: skill
    path: skills/upstash
    description: Work with any Upstash TypeScript/JavaScript SDK including Redis,
      Box, QStash, Workflow, Vector, Search and Ratelimit. Use when the user is
      working with any Upstash product or SDK.
requirements:
  env:
    - UPSTASH_BOX_API_KEY
    - UPSTASH_EMAIL
    - UPSTASH_API_KEY
    - UPSTASH_REDIS_REST_URL
    - UPSTASH_REDIS_REST_TOKEN
    - QSTASH_TOKEN
hooks:
  mode: explicit
  entries: []
advisories: []
