# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: posthog/ai-plugin
name: PostHog AI plugin
description: Official PostHog plugin for AI clients.
source:
  type: git
  url: https://github.com/posthog/ai-plugin
  revision: cf9d6f22c667d4e8c88a6bae1af0f854b1ce0a8d
capabilities:
  - id: posthog
    kind: mcp
    path: .mcp.json
  - id: posthog-2
    kind: mcp
    path: mcp.json
  - id: analyzing-experiment-session-replays
    kind: skill
    path: skills/analyzing-experiment-session-replays
    description: Analyze session replay patterns across experiment variants to
      understand user behavior differences. Use when the user wants to see how
      users interact with different experiment variants, identify usability
      issues, compare behavior patterns between control and test groups, or get
      qualitative insights to complement quantitative experiment results.
  - id: assessing-heatmaps
    kind: skill
    path: skills/assessing-heatmaps
    description: >-
      Assesses what a page's heatmap is telling you and recommends concrete
      changes. Pulls click / rageclick / scroll-depth data for a URL, names the
      hot elements by cross-referencing autocapture events on the same page, and
      can create a saved heatmap the user opens in PostHog, then summarizes the
      behavior and proposes improvements.

      TRIGGER when: user asks what a heatmap shows, why people aren't clicking
      something, where users rage-click, how far they scroll, what to change on
      a page based on heatmap/click data, or to 'analyze/assess/review the
      heatmap' for a URL.

      DO NOT TRIGGER when: the user only wants to create a saved heatmap
      screenshot with no analysis (use heatmaps-saved-create directly), or is
      asking about session replay in general (use investigating-replay).
  - id: auditing-endpoints
    kind: skill
    path: skills/auditing-endpoints
    description: >
      Audit every endpoint in a PostHog project for staleness, failed
      materialisations, and unused materialised versions. Use when the user asks
      "what endpoints can I clean up?", "are any of my endpoints broken?",
      "which materialised versions are still being called?", or wants a one-shot
      cleanup pass over the Endpoints product. Produces a prioritised report
      grouped by issue type, with recommended actions but does not modify
      anything without explicit confirmation.
  - id: auditing-experiments-flags
    kind: skill
    path: skills/auditing-experiments-flags
    description: Audit PostHog experiments and feature flags for configuration
      issues, staleness, and best-practice violations. Read when the user asks
      to audit, health-check, or review experiments or feature flags, check flag
      hygiene, or verify experiment setup.
  - id: auditing-warehouse-data-health
    kind: skill
    path: skills/auditing-warehouse-data-health
    description: >
      Audit the health of a PostHog project's data warehouse — find every broken
      or degraded pipeline item across sources, sync schemas, materialized
      views, batch exports, and transformations. Use when the user asks "what's
      broken in my warehouse?", "give me a health check", "audit my data
      pipeline", "why are some dashboards stale?", or wants a one-shot triage
      summary before deciding where to spend time. Produces a prioritized report
      of issues grouped by severity and type, with recommended next steps.
  - id: authoring-log-alerts
    kind: skill
    path: skills/authoring-log-alerts
    description: >
      Author useful, low-noise log alerts on services in a PostHog project. Use
      when the user asks to set up alerts for their logs, suggest alerts they
      should add, or evaluate whether a service is worth monitoring. Covers
      service triage, baseline characterisation, threshold drafting,
      back-testing via simulate, and shipping with a notification destination.
  - id: authoring-signals-scouts
    kind: skill
    path: skills/authoring-signals-scouts
    description: >
      How to author, edit, and adapt PostHog Signals scouts — the scheduled
      agents that scan a project and emit findings into the Signals inbox. Use
      when a user wants to customize a canonical scout for their own setup
      (narrow its scope, retune its thresholds, add disqualifiers), tweak a
      scout's schedule or dry-run posture, or write a brand-new scout from
      scratch for a specific use case (a custom event, a product surface no
      canonical scout covers). Covers the scout SKILL.md anatomy, the emit
      contract, the dedupe + scratchpad-memory conventions, the per-team
      skills-store path vs the canonical in-repo path, and the emit-and-inspect
      test loop (with dry-run as an optional safety net). Trigger on
      "write/edit/customize a signals scout", "new scout for X", "tune my scout
      schedule", "make a scout that watches <event>".
  - id: choosing-trend-or-slope-view
    kind: skill
    path: skills/choosing-trend-or-slope-view
    description: >
      Clarify how to visualize change over a time range before building a trend.
      Use whenever the user asks how much something changed, grew, dropped,
      improved, or regressed between two points or periods — "how much did X
      change from A to B", "before vs after", "start vs end", "week over week",
      "compare this month to last", "change over time" — or mentions a "slope
      chart" / "slopegraph". Two readings of "change" need different charts: the
      whole trend (a line, every interval) versus just the two endpoints (a
      slope, start vs end). Ask which they want, then render it. Not for
      choosing a saved insight ChartDisplayType in the insight editor.
  - id: cleaning-up-stale-feature-flags
    kind: skill
    path: skills/cleaning-up-stale-feature-flags
    description: Identify and clean up stale feature flags in a PostHog project. Use
      when the user wants to find unused, fully rolled out, or abandoned feature
      flags, review them for safety, and then disable or delete them. Covers
      staleness detection, dependency checking, and safe removal workflows.
  - id: configuring-experiment-analytics
    kind: skill
    path: skills/configuring-experiment-analytics
    description: Configures the analytics side of a PostHog experiment — exposure
      criteria (default `$feature_flag_called` vs custom exposure events),
      primary and secondary metrics, the supported metric types (count, sum,
      ratio with `math` and `math_property`, retention with
      `retention_window_start` and `start_handling`), multivariate user handling
      ("Exclude" vs "First seen variant"), and how to read results once the
      experiment is live. Use when the user adds or edits a primary or secondary
      metric (e.g. "add a secondary metric tracking 'downloaded_file' per
      user"), sets up a ratio metric (e.g. "revenue from purchase_completed /
      pageviews"), sets up a retention metric (e.g. "$pageview → uploaded_file,
      7-day window"), configures custom exposure (e.g. "only count users who hit
      /checkout"), changes multivariate handling, or asks "who is in the
      analysis?", "how do I measure impact?", "is this winning?", "what's the
      confidence level?", or "should I ship?".
  - id: configuring-experiment-rollout
    kind: skill
    path: skills/configuring-experiment-rollout
    description: Configures the rollout shape of a PostHog experiment — the variant
      split (50/50, 80/20, A/B/C ratios), the overall rollout percentage that
      gates how many users enter the experiment, and the disambiguation when a
      percentage like "roll out to 25%" could mean either. Use when the user
      mentions a rollout percentage, variant split, or traffic distribution;
      gives a ratio like 60/40, 70/30, or 80/20; asks "who sees the test
      variant?"; wants to increase, decrease, or change the rollout or split on
      a draft or running experiment; weighs equal vs uneven splits; or proposes
      a mid-experiment split change (often an anti-pattern that needs reset or
      end-and-restart).
  - id: consuming-endpoints-from-client-code
    kind: skill
    path: skills/consuming-endpoints-from-client-code
    description: >
      Wire a PostHog endpoint into a client app or SDK. Covers fetching the
      OpenAPI spec, generating a typed client with openapi-generator or
      @hey-api/openapi-ts, sending the right auth header, shaping the variables
      payload (HogQL code_name vs insight breakdown property), handling
      rate-limit and materialised-endpoint error responses. Use when the user
      says "how do I call my endpoint", "generate a client for this", or "what
      auth header do I use".
  - id: copying-flags-across-projects
    kind: skill
    path: skills/copying-flags-across-projects
    description: Copy a feature flag from one PostHog project to one or more target
      projects in the same organization. Use when the user wants to duplicate a
      flag, promote a flag from staging to production, sync flags across
      projects, or replicate a flag configuration in a different workspace.
      Covers cohort remapping, scheduled-change handling, encrypted payloads,
      and the safe defaults (disabled in target, no scheduled changes).
  - id: creating-ai-subscription
    kind: skill
    path: skills/creating-ai-subscription
    description: >
      Create a recurring AI-generated PostHog report — schedule a free-text
      prompt to run on a cron, with the LLM-synthesized markdown delivered to
      email or Slack on each tick. Use when the user wants a recurring AI
      summary of X on any cadence (daily, weekly, monthly, yearly) rather than a
      one-off report. (To attach an AI summary to an existing insight/dashboard
      subscription instead of a free-text prompt, see `managing-subscriptions`
      and its `summary_enabled` option.)
  - id: creating-an-endpoint
    kind: skill
    path: skills/creating-an-endpoint
    description: >
      Create a PostHog endpoint with the right shape on the first try — covers
      query kind choice, name conventions, what to expose as variables (HogQL
      code_name vs insight breakdown), data_freshness_seconds, and whether to
      materialise on day one. Use when the user says "create an endpoint",
      "expose this query as an API", "turn this insight into an endpoint", or
      asks for help structuring a new endpoint. Steers away from common
      mistakes: materialising a query with cohort breakdowns or compare mode,
      inline-only variables on a materialised endpoint, unbounded date ranges,
      ambiguous names.
  - id: creating-experiments
    kind: skill
    path: skills/creating-experiments
    description: >-
      Guides agents through the 3-step experiment creation flow: defining the
      hypothesis, configuring rollout, and setting up analytics. Delegates
      rollout decisions to configuring-experiment-rollout and metric setup to
      configuring-experiment-analytics.

      TRIGGER when: user asks to create a new experiment or A/B test, OR when
      you are about to call experiment-create.

      DO NOT TRIGGER when: user is updating an existing experiment, managing
      lifecycle, or only browsing experiments.
  - id: creating-replay-vision-scanners
    kind: skill
    path: skills/creating-replay-vision-scanners
    description: >-
      Guides agents through creating and safely sizing a Replay Vision scanner:
      choosing the scanner type (monitor/classifier/scorer/summarizer), shaping
      the RecordingsQuery that selects sessions, and — crucially — estimating
      observation volume and checking the org's monthly quota before creating,
      so a broad scanner doesn't exhaust the budget on its first scheduled
      sweep.

      TRIGGER when: user asks to create, set up, or configure a Replay Vision
      scanner, OR when you are about to call vision-scanners-create, OR when
      widening an existing scanner's query or sampling_rate via
      vision-scanners-update.

      DO NOT TRIGGER when: only reading scanners or observations, deleting a
      scanner, or running an existing scanner against a single session on demand
      (vision-scanners-scan-session).
  - id: debugging-local-replay
    kind: skill
    path: skills/debugging-local-replay
    description: >
      Debugs why session recordings aren't appearing in the local dev
      environment. Use when a developer reports that local replay ingestion
      isn't working, recordings aren't showing up despite /s calls, or the
      replay pipeline seems broken after hogli start. Covers the full local
      pipeline: SDK capture, Caddy proxy, capture-replay (Rust), Kafka,
      ingestion-sessionreplay (Node), recording-api (Node), SeaweedFS, and
      common failure modes like orphaned processes, stuck phrocs workers, and
      trigger misconfiguration.
  - id: debugging-signals-pipeline
    kind: skill
    path: skills/debugging-signals-pipeline
    description: >
      Debug the signals pipeline locally end-to-end. Covers emitting test
      signals from fixtures, monitoring Temporal workflows via the REST API,
      reading sandbox agent logs from object storage, inspecting Docker sandbox
      containers, and diagnosing common failures (stale ClickHouse embeddings,
      agentsh network denials, inactivity timeouts). Use when a signal isn't
      reaching the inbox, a signal-report-summary workflow fails, or a sandbox
      task run times out.
  - id: designing-email-templates
    kind: skill
    path: skills/designing-email-templates
    description: Author, save, and edit email templates in the PostHog workflows
      library — compose email design JSON with Liquid personalization and create
      and round-trip-edit templates over MCP. Use when asked to design, build,
      update, or fix an email template for workflows, broadcasts, or campaigns.
  - id: diagnosing-ci-and-merge-bottlenecks
    kind: skill
    path: skills/diagnosing-ci-and-merge-bottlenecks
    description: >
      Diagnoses CI and pull-request pipeline health for a GitHub repo using the
      engineering analytics MCP tools — pull-requests (PR list with CI status),
      workflow-health (per-workflow CI trends), and pr-lifecycle (a single PR's
      timeline). Use when asked whether CI is getting faster or slower, which
      GitHub Actions workflow is the slow or flaky long-pole, how long PRs take
      from open to merge, how an author's merge time compares to the cohort,
      which open PRs have failing or pending CI, or where a specific pull
      request is stuck. Triggers on "engineering analytics", "is CI getting
      slower", "slow workflow", "flaky CI", "time to merge", "cycle time", "PR
      throughput", "failing checks", "where is PR <n> stuck", "CI long pole",
      "what's holding up this PR".
  - id: diagnosing-endpoint-performance
    kind: skill
    path: skills/diagnosing-endpoint-performance
    description: >
      Diagnose why a PostHog endpoint is slow or expensive and propose a
      concrete fix — bump the cache TTL, enable materialisation, restructure
      variables, or rewrite the query. Use when the user says "this endpoint is
      slow", "my endpoint times out", "we're hitting the cost cap on this one",
      or asks "should I materialise this?". Focuses on a single named endpoint,
      not a project-wide audit.
  - id: diagnosing-experiment-results
    kind: skill
    path: skills/diagnosing-experiment-results
    description: >-
      Diagnoses bias, anomalies, and strange-looking results on a specific
      PostHog experiment. Covers empty / 0-exposure experiments, sample ratio
      mismatch, identity fragmentation, multi-variant exposure, uneven-split
      exclusion bias, significance traps (peeking, A/A, Bayesian vs
      Frequentist), PostHog-vs-SQL discrepancies, and surprises after mid-run
      edits. Symptom-driven dispatch to the right diagnostic.

      TRIGGER when: user asks 'is my experiment biased?' or 'why 0 exposures?',
      references the bias banner, says a variant looks strange / wrong / off,
      sees significance flipping, notices PostHog numbers disagreeing with their
      SQL, sees an A/A test showing significance, or reports surprises after
      mid-run edits.

      DO NOT TRIGGER when: creating a new experiment (use creating-experiments),
      only configuring rollout (use configuring-experiment-rollout) or metrics
      (use configuring-experiment-analytics), or only asking lifecycle questions
      (use managing-experiment-lifecycle).
  - id: diagnosing-failed-warehouse-syncs
    kind: skill
    path: skills/diagnosing-failed-warehouse-syncs
    description: >
      Diagnose why a data warehouse sync is failing and recommend the right
      recovery action. Use when the user asks "why isn't my
      Stripe/Postgres/Hubspot sync working?", "this table has been stuck for
      hours", "the data in the warehouse looks wrong", or wants to troubleshoot
      a specific source or schema. Covers source-level vs schema-level failures,
      stuck Running states, credential and schema-drift errors,
      incremental-field misconfig, CDC prerequisite failures, and the cancel /
      reload / resync / delete-data recovery actions.
  - id: diagnosing-missing-recordings
    kind: skill
    path: skills/diagnosing-missing-recordings
    description: >
      Diagnoses why a session recording is missing or was not captured. Use when
      a user asks why a session has no replay, why recordings aren't appearing,
      or wants to troubleshoot session replay capture issues for a specific
      session ID or across their project. Covers SDK diagnostic signals, project
      settings, sampling, triggers, ad blockers, and quota/billing scenarios.
  - id: diagnosing-sdk-health
    kind: skill
    path: skills/diagnosing-sdk-health
    description: >
      Diagnoses the health of a project's PostHog SDK integrations — which SDKs
      are out of date and how to fix them. Use when a user asks about PostHog
      SDK versions, outdated SDKs, upgrade recommendations, "SDK health", "SDK
      doctor" (the former name), or when events or features seem off and it
      might be due to an old SDK.
  - id: diagnosing-stacktrace-symbolication
    kind: skill
    path: skills/diagnosing-stacktrace-symbolication
    description: >
      Help users debug PostHog Error Tracking stack-trace symbolication for any
      supported platform — JavaScript/TypeScript web, React Native (Hermes),
      Android (Proguard / R8), or iOS / macOS (dSYM). The PostHog symbol-set
      lookup flow is universal across platforms; build-tool and artifact details
      live in per-platform references (JavaScript is fleshed out, others come as
      we encounter them). Use when stack frames stay minified or obfuscated
      after symbols are uploaded, PostHog symbol sets show last_used but frames
      are not readable, chunk IDs or dSYM UUIDs do not match, "Token not found"
      appears, uploaded source maps / dSYMs / Proguard mappings look empty, or
      bundler / symbol-upload configuration needs troubleshooting.
  - id: downloading-batch-export-files
    kind: skill
    path: skills/downloading-batch-export-files
    description: >
      Export PostHog events, persons, or sessions on demand and download the
      resulting files. Use when the user asks to download/export raw PostHog
      data, create a one-off file export, fetch a Parquet or JSONLines export,
      or use the file_download_batch_exports API. Covers starting the export
      with MCP, polling completion, and downloading via the existing REST
      redirect endpoint.
  - id: exploring-apm-traces
    kind: skill
    path: skills/exploring-apm-traces
    description: >
      Investigates distributed application performance using PostHog APM
      (OpenTelemetry span) data via MCP. Use when the user asks about service
      traces, slow HTTP/database spans, error spans, error-rate trends or
      spikes, latency distributions, trace IDs, or span attributes — not AI
      observability traces or product logs. Uses posthog:query-apm-spans,
      posthog:apm-trace-get, posthog:apm-spans-sparkline,
      posthog:apm-services-list, posthog:apm-attributes-list, and
      posthog:apm-attribute-values-list.
  - id: exploring-autocapture-events
    kind: skill
    path: skills/exploring-autocapture-events
    description: >
      Guides exploration of $autocapture events captured by posthog-js to
      understand user interactions, find CSS selectors (especially data-attr
      attributes), evaluate selector uniqueness, query matching clicks ad-hoc,
      and create actions. Use when the user asks about autocapture data, wants
      to find what users are clicking, needs to build actions from click events,
      asks about elements_chain, wants to build a trend or funnel filtered by
      clicks or other autocapture interactions, asks which properties
      autocapture sends, or asks how to filter $autocapture events. Only applies
      to projects using posthog-js autocapture.
  - id: exploring-endpoint-execution-logs
    kind: skill
    path: skills/exploring-endpoint-execution-logs
    description: >
      Explore and diagnose a PostHog endpoint's execution logs — error messages,
      failed runs, cache misses, slow runs, or unexpected row counts during
      endpoint invocations. Use when the user says "my endpoint is failing",
      "show me the logs for endpoint X", "what error did endpoint Y produce",
      "why did endpoint Z return no rows", "is this endpoint hitting cache", or
      "check the last N runs". Focused on a single named endpoint's runtime log
      entries, not project-wide auditing or query performance profiling.
  - id: exploring-live-traffic
    kind: skill
    path: skills/exploring-live-traffic
    description: Inspects PostHog Web analytics Live tab data — current users
      online, last-30-minutes pageviews, top pages, referrers, devices,
      browsers, countries, bot traffic, and the per-minute bot/users charts. Use
      when the user asks "who is on my site right now?", "what is happening
      live?", "what bots are crawling me?", asks about the "live tab" / "live
      dashboard", wants live numbers (last 30 min), or wants help filtering or
      drilling into the live view. Also covers building product-analytics
      insights that mirror what the tiles show.
  - id: exploring-llm-clusters
    kind: skill
    path: skills/exploring-llm-clusters
    description: Investigate AI observability clusters — understand usage patterns
      in AI/LLM traffic, compare cluster behavior, compute cost/latency metrics,
      and drill into individual traces within clusters.
  - id: exploring-llm-costs
    kind: skill
    path: skills/exploring-llm-costs
    description: >
      Investigate LLM spend in PostHog — total cost over time, cost by model,
      provider, user, trace, or custom dimension, token and cache-hit economics,
      and cost regressions. Use when the user asks "how much are we spending on
      LLMs?", "which model / user / feature is most expensive?", "why did cost
      spike?", wants to build a cost dashboard or alert, or pastes a trace URL
      and asks about its cost.
  - id: exploring-llm-evaluations
    kind: skill
    path: skills/exploring-llm-evaluations
    description: >
      Investigate AI observability evaluations of both types — `hog`
      (deterministic code-based) and `llm_judge` (LLM-prompt-based). Find
      existing evaluations, inspect their configuration, run them against
      specific generations, query individual pass/fail results, and generate
      AI-powered summaries of patterns across many runs. Use when the user asks
      to debug why an evaluation is failing, surface common failure modes,
      compare results across filters, dry-run a Hog evaluator, prototype a new
      LLM-judge prompt, or manage the evaluation lifecycle (create, update,
      enable/disable, delete).
  - id: exploring-llm-traces
    kind: skill
    path: skills/exploring-llm-traces
    description: >
      ABSOLUTE MUST to debug and inspect LLM/AI agent traces using PostHog's MCP
      tools. Use when the user pastes a trace or session URL (e.g.
      /ai-observability/traces/<id> or /ai-observability/sessions/<id>), asks to
      debug a trace, figure out what went wrong, check if an agent used a tool
      correctly, verify context/files were surfaced, inspect subagent behavior,
      investigate LLM decisions, or analyze token usage and costs. Also use when
      raw SQL/HogQL against `events.properties.$ai_input` / `$ai_output_choices`
      returns empty — message content lives only on the dedicated
      `posthog.ai_events` table.
  - id: exploring-signals-scouts
    kind: skill
    path: skills/exploring-signals-scouts
    description: >
      How to explore and make sense of PostHog Signals scouts — the scheduled
      agents that scan a project and emit findings into the Signals inbox. Use
      when a user wants to understand what scouts they have, how each one is
      behaving, and whether the fleet is actually working. Covers surveying the
      fleet and its schedules, reading recent scout runs and drilling into a
      single run's reasoning, inspecting the durable scratchpad memory the fleet
      has built up, tracing a run to the findings it emitted, and assessing a
      scout's health and performance over time (cadence, success rate, emit
      rate, signal-to-noise). Read-only and exploratory — to write or tune a
      scout, use `authoring-signals-scouts` instead. Trigger on "what are my
      scouts doing", "how is my <x> scout performing", "show me recent scout
      runs", "why did this scout find/emit nothing", "what has the fleet
      learned", "explore scout run <id>", "is my scout working".
  - id: feature-usage-feed
    kind: skill
    path: skills/feature-usage-feed
    description: >
      Set up an LLM-judge evaluation that extracts canonical use cases for a
      PostHog feature at scale and streams the results to a Slack channel as a
      live feed. Use when someone wants to understand how users are actually
      using a specific AI/LLM-powered feature in production — what they're
      investigating, what questions they're trying to answer, and what patterns
      surface — without manually reading hundreds of traces. Assumes the feature
      emits `$ai_generation` and `$ai_evaluation` events with `$session_id`
      linkage to the trigger user's recording (the standard setup post the
      session-summary linkage PRs).
  - id: finding-deleted-feature-flags
    kind: skill
    path: skills/finding-deleted-feature-flags
    description: Find feature flags that were soft-deleted in the active project
      within a recent time window. Use when the user asks "what flags were
      deleted in the last N days", "show me recently deleted feature flags",
      "who deleted flag X", "audit recent flag deletions", or anything similar.
      Handles the non-obvious gotcha that system.feature_flags exposes the
      deleted boolean but does not expose a deletion timestamp — the actual
      deleted-at time lives in the per-flag activity log and must be
      cross-referenced.
  - id: finding-experiments
    kind: skill
    path: skills/finding-experiments
    description: Resolves a PostHog experiment reference from natural language to a
      concrete experiment ID by browsing `experiment-list` (not feature-flag
      tools), with disambiguation when multiple experiments match. Use when the
      user names or quotes an experiment ("split test demo", "the File
      engagement boost experiment", "onboarding retention test", "landing page
      hero experiment", "pricing experiment"), describes it loosely ("the signup
      experiment", "my pricing test", "the one with the new checkout"), uses a
      relative reference ("latest", "most recent", "the one I created
      yesterday"), filters by status (running, draft, stopped, archived), or
      otherwise refers to an experiment by anything other than its concrete ID.
  - id: finding-replay-for-issue
    kind: skill
    path: skills/finding-replay-for-issue
    description: >
      Finds the most informative session recording linked to an error tracking
      issue. Use when a user has an error tracking issue ID and wants to watch a
      replay showing what the user was doing when the error occurred. Ranks
      linked sessions by recency, activity score, and journey completeness, then
      summarizes the pre-error context. Replaces blind session picking from
      potentially hundreds of linked recordings.
  - id: finding-sessions-to-watch
    kind: skill
    path: skills/finding-sessions-to-watch
    description: >
      Guides a user from "I want to watch recordings but don't know which ones"
      to a short, high-signal list of sessions worth watching. Use when the user
      asks which sessions or replays to watch, wants help finding interesting /
      useful recordings, says they don't know where to start in session replay,
      or wants to watch sessions about a goal (signup, pricing, onboarding,
      checkout, a feature, rageclicks, errors, mobile, a specific person)
      without naming exact filters. Turns a vague intent into a focused
      RecordingsQuery via `query-session-recordings-list`, then deep-links the
      best few and hands off to `investigating-replay`. Do NOT use when the user
      already has a recording/session ID (use investigating-replay) or wants the
      replay for a known error issue (use finding-replay-for-issue).
  - id: formatting-insight-axes
    kind: skill
    path: skills/formatting-insight-axes
    description: >
      Pick the right y-axis unit when creating or updating a TrendsQuery insight
      via `posthog:insight-create` or `posthog:insight-update`. Use when the
      agent is about to add a `formula` purely to convert units (e.g. dividing
      seconds by 60 to display minutes), when a `math_property` is a duration,
      currency, ratio, or large count, or whenever the user mentions "format the
      y-axis", "duration", "seconds", "minutes", "hours", "milliseconds", "ms",
      "percentage", "currency", "decimals", "axis label", or "axis unit" in the
      context of a graph insight.
  - id: grouping-noisy-errors
    kind: skill
    path: skills/grouping-noisy-errors
    description: >
      Consolidate PostHog error tracking issues that are the same actual error
      reported under different fingerprints. Use when the user asks "why do I
      have so many TypeError issues that look the same?", "merge these
      duplicates", "stop splitting this error into new issues", or wants to
      clean up fingerprint sprawl. Decides between a one-shot merge of existing
      issues and a durable grouping rule that keeps future events from creating
      new fingerprints. Does NOT group conceptually similar bugs across
      different runtimes, SDKs, or call sites.
  - id: inbox-exploration
    kind: skill
    path: skills/inbox-exploration
    description: >
      Explore PostHog's Inbox — the surface where signal reports surface as
      actionable issues and trends. Use when the user asks "what's in my
      inbox?", "what should I look at?", "which reports are actionable?",
      "what's PostHog flagged recently?", asks about a specific report by ID or
      title, or wants to see which signal sources are configured. Covers
      listing, filtering, and drilling into reports, plus pointers to the deeper
      `signals` skill when raw signals or semantic search are needed.
  - id: instrument-error-tracking
    kind: skill
    path: skills/instrument-error-tracking
    description: Add PostHog error tracking to capture and monitor exceptions. Use
      after implementing features or reviewing PRs to ensure errors are tracked
      with stack traces and source maps. Also handles initial PostHog SDK setup
      if not yet installed.
  - id: instrument-feature-flags
    kind: skill
    path: skills/instrument-feature-flags
    description: Add PostHog feature flags to gate new functionality. Use after
      implementing features or reviewing PRs to ensure safe rollouts with
      feature flag controls. Also handles initial PostHog SDK setup if not yet
      installed.
  - id: instrument-integration
    kind: skill
    path: skills/instrument-integration
    description: Add PostHog SDK integration to your application. Use when setting
      up PostHog for the first time or reviewing PRs that need PostHog
      initialization. Covers SDK installation, provider setup, and basic
      configuration for any framework.
  - id: instrument-llm-analytics
    kind: skill
    path: skills/instrument-llm-analytics
    description: Add PostHog LLM analytics to trace AI model usage. Use after
      implementing LLM features or reviewing PRs to ensure all generations are
      captured with token counts, latency, and costs. Also handles initial
      PostHog SDK setup if not yet installed.
  - id: instrument-logs
    kind: skill
    path: skills/instrument-logs
    description: Add PostHog log capture to track application logs. Use after
      implementing features or reviewing PRs to ensure meaningful log events are
      captured with structured properties. Also handles initial OTLP exporter
      setup if not yet configured.
  - id: instrument-product-analytics
    kind: skill
    path: skills/instrument-product-analytics
    description: Add PostHog product analytics events to track user behavior. Use
      after implementing new features or reviewing PRs to ensure meaningful user
      actions are captured. Also handles initial PostHog SDK setup if not yet
      installed.
  - id: investigate-metric
    kind: skill
    path: skills/investigate-metric
    description: >
      Diagnose why a product metric changed (dropped, spiked, or plateaued) by
      orchestrating breakdowns, actors, paths, lifecycle, retention, and
      annotations queries. Use when the user reports an anomaly, asks "why did X
      change?", or needs root-cause analysis for a trend, funnel, retention,
      stickiness, or lifecycle metric.
  - id: investigating-error-issue
    kind: skill
    path: skills/investigating-error-issue
    description: >
      Investigates a single PostHog error tracking issue end-to-end. Use when
      the user provides an issue ID or pastes an issue URL
      (`/error_tracking/<id>`) and wants to understand the error — who it
      affects, what triggers it, when it started, whether it correlates with a
      release, browser, OS, or feature flag, and what the next step should be.
      Pulls aggregated metrics, sample exception events, segment breakdowns,
      linked replays, and synthesizes a hypothesis-grade summary in one pass.
  - id: investigating-replay
    kind: skill
    path: skills/investigating-replay
    description: >
      Investigates a session recording by gathering metadata, person profile,
      same-session events, and linked error tracking issues in one pass. Use
      when a user provides a recording or session ID and wants to understand
      what happened — who the user was, what they did, what errors occurred, and
      whether there are related error tracking issues. Replaces the manual chain
      of session-recording-get, persons-retrieve, execute-sql, and
      query-error-tracking-issues-list.
  - id: managing-endpoint-versions
    kind: skill
    path: skills/managing-endpoint-versions
    description: >
      Work safely with endpoint versions — preview a draft in the playground,
      roll back to an older version, update settings on one version without
      bumping query history, deactivate a specific version. Use when the user
      asks "how do I roll back my endpoint", "preview my changes before
      publishing", "I want to fix v5 without bumping the version", or anything
      involving the version history. Calls out today's limitations honestly:
      there is no pointer flip; "rollback" means forking the old query into a
      new top version.
  - id: managing-experiment-lifecycle
    kind: skill
    path: skills/managing-experiment-lifecycle
    description: >-
      Guides experiment state transitions: launching, pausing, resuming, ending,
      shipping variants, archiving, resetting, duplicating, and copying to
      another project. Covers preconditions, implications for variant assignment
      and analysis, and the decision framework for when to use each action.

      TRIGGER when: user asks to launch, pause, resume, end, ship, archive,
      reset, duplicate, or copy an experiment to another project.

      DO NOT TRIGGER when: user is creating an experiment (use
      creating-experiments), configuring rollout (use
      configuring-experiment-rollout), or setting up metrics (use
      configuring-experiment-analytics).
  - id: managing-path-cleaning-rules
    kind: skill
    path: skills/managing-path-cleaning-rules
    description: Inspects URL paths and proposes, tests, orders, and applies
      project-level path cleaning rules so dynamic segments (numeric IDs, UUIDs,
      slugs, dates) collapse into readable aliases. Use when the user says
      "clean the paths", "normalize URLs", "group similar pages", "too many
      distinct paths", "/users/123 and /users/456 are the same page", "set up
      path cleaning", or asks why a Web analytics or Paths breakdown is
      fragmented across thousands of nearly-identical URLs. Covers regex syntax
      (re2), alias placeholder convention, rule ordering, the test workflow, and
      applying rules via the project-settings-update MCP tool.
  - id: managing-subscriptions
    kind: skill
    path: skills/managing-subscriptions
    description: Manage PostHog subscriptions — scheduled email, Slack, or webhook
      deliveries of insight or dashboard snapshots, optionally with an
      AI-written summary attached to each delivery. Use when the user wants to
      subscribe to an insight or dashboard, get an AI summary attached to those
      deliveries, check existing subscriptions, change delivery frequency, add
      or remove recipients, or stop receiving updates.
  - id: planning-user-interviews
    kind: skill
    path: skills/planning-user-interviews
    description: Plan a user interview topic in PostHog — pick who to target
      (cohort, emails, or PostHog distinct IDs), draft what to ask about, and
      prepare the voice-agent context plus a question list. Use when the user
      asks to "talk to users", "check how users feel about X", "interview some
      customers", "set up a user interview", "run a user-research call", "find
      users to ask about Y", or otherwise wants qualitative feedback through a
      conversation. Walks the user through targeting (cohorts-list,
      persons-list, or accepting emails / distinct IDs directly), captures the
      topic, and prompts for agent context and questions before calling
      user-interview-topics-create. Cohort targeting is resolved to explicit
      emails/distinct_ids at create time — topics snapshot their audience and do
      not re-evaluate cohort membership later. Do NOT trigger when the user is
      uploading a recorded interview audio file (that's the separate
      UserInterview/transcript flow) or only browsing existing topics with
      user-interview-topics-list.
  - id: querying-posthog-data
    kind: skill
    path: skills/querying-posthog-data
    description: Required reading before writing any HogQL/SQL or calling
      execute-sql against PostHog. Use whenever the user wants to search, find,
      or do complex aggregations PostHog entities (insights, dashboards,
      cohorts, feature flags, experiments, surveys, hog flows, data warehouse,
      persons, etc.) and query analytics data (trends, funnels, retention,
      lifecycle, paths, stickiness, web analytics, error tracking, logs,
      sessions, LLM traces). Covers HogQL syntax differences from ClickHouse
      SQL, system table schemas (system.*), available functions, query examples,
      and the schema-discovery workflow.
  - id: setting-up-a-data-warehouse-source
    kind: skill
    path: skills/setting-up-a-data-warehouse-source
    description: >
      Guide the user through connecting a new data warehouse source — Postgres,
      MySQL, Stripe, Hubspot, MongoDB, Salesforce, BigQuery, Snowflake, and so
      on. Use when the user wants to "connect Stripe", "import data from
      Postgres", "add a new data source", "sync my warehouse tables", or wants
      to pick sync methods for each table. Walks through source-type discovery,
      credential validation, table discovery, per-table sync_type selection, and
      the final create call. Also covers picking a good prefix and what to do
      right after creation.
  - id: signals-scout-ai-observability
    kind: skill
    path: skills/signals-scout-ai-observability
    description: >
      Focused Signals scout for PostHog projects using AI observability. Rotates
      through a set of lenses — cost, latency, errors, volume, eval performance,
      eval/enrichment config, clusters, and tool usage — watching each for
      trends and spikes sliced by the dimensions it discovers over time. Leans
      on the sandbox's bundled `exploring-llm-*` deep-dive skills for the actual
      queries. Emits findings only when they clear the confidence bar; otherwise
      writes durable memory and closes out empty. Self-contained peer in the
      signals-scout-* fleet — no dependencies on other scouts.
  - id: signals-scout-anomaly-detection
    kind: skill
    path: skills/signals-scout-anomaly-detection
    description: >
      Signals scout that watches a PostHog project's most-viewed dashboards and
      insights for recent anomalies — sudden bursts, drops, flat-lines, and
      trend breaks at the daily or hourly level. It discovers what the team
      actually looks at (view counts, dashboard access), curates a durable
      watchlist in the scratchpad, and balances re-checking known high-value
      insights (exploit) against discovering new ones (explore) across runs,
      since no single run can cover a busy project. Anomalies are scored by
      robust deviation from each insight's own seasonality-matched baseline; it
      emits a finding only when a move clears the confidence bar, otherwise it
      updates the baseline memory and closes out empty. Self-contained peer in
      the signals-scout-* fleet.
  - id: signals-scout-csp-violations
    kind: skill
    path: skills/signals-scout-csp-violations
    description: >
      Focused Signals scout for PostHog projects collecting Content Security
      Policy (CSP) violation reports. Watches `$csp_violation` events for fresh
      blocked-URL clusters, per-directive bursts, page-scoped regressions after
      deploys, and suspicious third-party domains that may indicate a
      compromised script. Emits aggregated findings only when a cluster clears
      the confidence bar; otherwise writes durable memory and closes out empty.
      Self-contained peer in the signals-scout-* fleet — no dependencies on
      other skills.
  - id: signals-scout-customer-analytics
    kind: skill
    path: skills/signals-scout-customer-analytics
    description: >
      Focused Signals scout for PostHog projects using Customer analytics (the
      Accounts product — `system.accounts`, where an account is a customer
      organization keyed by a group). Watches per-account product engagement for
      churn-risk shapes — an engagement cliff on a named account, dormancy
      onset, single-threaded champion departure — and the positive inverse, an
      expansion signal worth an upsell, scoring each account against its own
      trailing baseline and weighting by whether a human has staked commercial
      ownership on it (assigned CSM / AE / owner, or a CRM link). Its
      discriminator is a per-account engagement regression while the fleet
      holds: one staked account sliding is signal, the whole fleet moving
      together is someone else's baseline problem. Curates a durable watchlist
      of commercially-meaningful accounts and balances re-scoring known ones
      (exploit) against discovering new ones (explore) across runs. Emits
      findings only when they clear the confidence bar; otherwise writes durable
      memory and closes out empty. Self-contained peer in the signals-scout-*
      fleet — no dependencies on other skills.
  - id: signals-scout-data-pipelines
    kind: skill
    path: skills/signals-scout-data-pipelines
    description: >
      Focused Signals scout for PostHog projects moving data through pipelines.
      Watches the three delivery surfaces — CDP destinations and transformations
      (hog functions), batch exports, and hog flows (workflows/messaging) — for
      contradictions between configured state and actual delivery: functions the
      watcher quietly degraded or disabled, failure rates stepping above a
      pipeline's own baseline, batch export runs failing or stalling (a growing
      data gap), and active flows failing for the people they trigger on. Emits
      findings only when they clear the confidence bar; otherwise writes durable
      memory and closes out empty. Self-contained peer in the signals-scout-*
      fleet — no dependencies on other skills.
  - id: signals-scout-error-tracking
    kind: skill
    path: skills/signals-scout-error-tracking
    description: >
      Focused Signals scout for PostHog projects using error tracking. Watches
      `$exception` bursts, stuck loops, multi-fingerprint clusters, status
      regressions, and stack-trace activity-name patterns. Emits findings only
      when they clear the confidence bar; otherwise writes durable memory and
      closes out empty. Self-contained peer in the signals-scout-* fleet — no
      dependencies on other skills.
  - id: signals-scout-experiments
    kind: skill
    path: skills/signals-scout-experiments
    description: >
      Focused Signals scout for PostHog projects running A/B experiments.
      Watches running experiments for validity threats (sample ratio mismatch,
      multi-variant contamination, exposure stalls, mid-run flag mutations) and
      lifecycle drift (zombie experiments running long past their useful life,
      decided-but-still-running experiments, ended experiments whose flags still
      serve multiple variants). Emits findings only when they clear the
      confidence bar; otherwise writes durable memory and closes out empty.
      Self-contained peer in the signals-scout-* fleet — no dependencies on
      other skills.
  - id: signals-scout-feature-flags
    kind: skill
    path: skills/signals-scout-feature-flags
    description: >
      Focused Signals scout for PostHog projects using feature flags. Watches
      the flag roster and the `$feature_flag_called` evaluation stream for
      contradictions between a flag's configured state and its real traffic:
      evaluation cliffs on healthy flags, ghost flags (code calling keys that no
      longer exist), response-distribution shifts with no corresponding flag
      edit, and flag debt (stale, fully-rolled-out, or dead flags still burning
      evaluations). Emits findings only when they clear the confidence bar;
      otherwise writes durable memory and closes out empty. Self-contained peer
      in the signals-scout-* fleet — no dependencies on other skills.
  - id: signals-scout-general
    kind: skill
    path: skills/signals-scout-general
    description: >
      General Signals scout for PostHog projects. Cross-product explorer that
      scans a team's project and emits findings into the Signals inbox. Sibling
      signals-scout-* specialists each watch a single product surface in depth;
      this scout looks for cross-product correlations and explores the surfaces
      no specialist covers. Each scout runs on its own schedule (default
      hourly), so general fires independently of the specialists over time.
  - id: signals-scout-health-checks
    kind: skill
    path: skills/signals-scout-health-checks
    description: >
      Focused Signals scout for PostHog setup health. Reads the project's active
      health issues — the deterministic findings of PostHog's own health checks
      (no live events, outdated SDKs, missing reverse proxy, absent web vitals,
      ingestion warnings, failing data-warehouse models, and more) — and decides
      which are genuinely worth surfacing. Unlike a one-signal-per-issue push,
      it bundles kind-clusters into a single finding, weights by real blast
      radius (cross-referencing actual event volume and reach), and prioritizes
      issues an agent can resolve via the MCP. Emits only above the confidence
      bar; otherwise writes durable memory and closes out empty. Self-contained
      peer in the signals-scout-* fleet — no dependencies on other skills.
  - id: signals-scout-inbox-validation
    kind: skill
    path: skills/signals-scout-inbox-validation
    description: >
      Follow-up scout for the Signals inbox itself. Watches reports that
      recently transitioned to resolved (an implementation PR merged) and, after
      a deployment soak window, re-measures the underlying problem to check the
      fix actually held — plus a strictly-gated escalation check on recently
      dismissed reports. Emits findings only when a shipped fix demonstrably
      didn't hold; confirmations and unverifiable verdicts become durable memory
      and an empty close-out. Self-contained peer in the signals-scout-* fleet —
      no dependencies on other skills.
  - id: signals-scout-logs
    kind: skill
    path: skills/signals-scout-logs
    description: >
      Focused Signals scout for PostHog projects using logs. Watches for volume
      bursts, severity-distribution shifts, service silence, fresh message
      patterns, and trace-correlated bursts via the logs ingestion pipeline.
      Emits findings only when they clear the confidence bar; otherwise writes
      durable memory and closes out empty. Self-contained peer in the
      signals-scout-* fleet — no dependencies on other skills.
  - id: signals-scout-observability-gaps
    kind: skill
    path: skills/signals-scout-observability-gaps
    description: >
      Focused Signals scout for finding observability gaps in PostHog itself —
      significant event volumes the team isn't tracking, custom events with no
      insight or dashboard coverage, insights pointing at events that have
      stopped firing, dashboards missing related context, critical events with
      no alerts. Watches the event-stream-vs-saved- inventory delta as the
      team's product evolves and emits findings recommending new insights,
      dashboard additions, or alerts when gaps clear the confidence bar.
      Self-contained peer in the signals-scout-* fleet — no dependencies on
      other skills.
  - id: signals-scout-product-analytics
    kind: skill
    path: skills/signals-scout-product-analytics
    description: >
      Focused Signals scout for the core product-analytics surface — the
      behavioral primitives the product-analytics product is built on: funnels,
      retention, lifecycle, stickiness, and paths. It watches the team's saved
      funnel / retention / lifecycle insights (and, where the team hasn't built
      one, a single inferred activation flow) for behavioral regression — a
      step-to-step conversion rate dropping, a retention curve sliding, or a
      lifecycle/stickiness composition shifting away from that flow's own
      trailing, seasonality-matched baseline — while the flow's entrant volume
      holds. Its discriminator is a derived-rate regression with a steady
      denominator, which is what separates a real product regression from a
      capture or volume problem (those belong to other scouts). It curates a
      durable watchlist and balances re-scoring known flows (exploit) against
      discovering new ones (explore) across runs. Emits findings only when they
      clear the confidence bar; otherwise writes durable memory and closes out
      empty. Self-contained peer in the signals-scout-* fleet — no dependencies
      on other skills.
  - id: signals-scout-replay-vision
    kind: skill
    path: skills/signals-scout-replay-vision
    description: >
      Focused Signals scout for PostHog projects running Replay Vision scanners
      — the standing LLM probes that watch session recordings and write
      `$recording_observed` events. Watches two promises: that enabled scanners
      are actually observing (throughput / success-rate cliffs, exhausted quota
      — a silent watch gap), and that what the scanners see in aggregate gets
      surfaced (a monitor's `yes`-rate or a scorer's score stepping away from
      its own baseline, a classifier tag or a recurring summarizer theme
      concentrating across many sessions). It is the agentic pull complement to
      the per-session push path: scanners with `emits_signals` already emit one
      signal per session into this same inbox, so this scout never repeats them
      — it adds the cross-session shape the per-session probe can't see. Emits
      findings only when they clear the confidence bar; otherwise writes durable
      memory and closes out empty. Self-contained peer in the signals-scout-*
      fleet.
  - id: signals-scout-revenue-analytics
    kind: skill
    path: skills/signals-scout-revenue-analytics
    description: >
      Focused Signals scout for PostHog projects using revenue analytics.
      Watches the derived revenue product for upstream failures (Stripe sync
      stalls, capture regressions), config drift (missing subscription property,
      currency mix surprises, broken Stripe↔person joins, deferred-revenue
      gaps), and goal-miss escalations. Emits findings only when they clear the
      confidence bar; otherwise writes durable memory and closes out empty.
      Self-contained peer in the signals-scout-* fleet — no dependencies on
      other skills.
  - id: signals-scout-session-replay
    kind: skill
    path: skills/signals-scout-session-replay
    description: >
      Focused Signals scout for PostHog projects using session replay. Watches
      two promises the replay product makes: that sessions are actually being
      recorded (capture integrity — recording volume vanishing while site
      traffic doesn't), and that the friction evidence inside recordings gets
      seen (rage-click / dead-click clusters concentrating on a page or element,
      error-after-interaction cohorts, recurring replay vision themes nobody
      aggregates). Emits findings only when they clear the confidence bar;
      otherwise writes durable memory and closes out empty. Self-contained peer
      in the signals-scout-* fleet.
  - id: signals-scout-surveys
    kind: skill
    path: skills/signals-scout-surveys
    description: >
      Focused Signals scout for PostHog projects running surveys. Watches active
      surveys for score regressions (NPS / CSAT / rating drops), response-volume
      drops, abandonment spikes, and targeting drift, AND aggregates open-text
      responses into recurring themes the team should know about (clusters of
      complaints, praise, feature requests). Emits findings only when a theme or
      anomaly clears the confidence bar; otherwise writes durable memory and
      closes out empty. Self-contained peer in the signals-scout-* fleet — no
      dependencies on other skills.
  - id: signals-scout-web-analytics
    kind: skill
    path: skills/signals-scout-web-analytics
    description: >
      Focused Signals scout for PostHog projects with web traffic. Watches the
      acquisition and site-health layer the web analytics product reports on:
      per-channel session volume diverging from the site's own rhythm (an
      acquisition source silently collapsing or surging), attribution breakage
      (paid/campaign traffic reclassifying into Direct or Unknown when tagging
      breaks), landing pages that break (bounce-rate steps, 404 spikes,
      entry-path cliffs), and page-performance regressions (web vitals p75
      steps). Emits findings only when they clear the confidence bar; otherwise
      writes durable memory and closes out empty. Self-contained peer in the
      signals-scout-* fleet.
  - id: signals
    kind: skill
    path: skills/signals
    description: >
      How to query the document_embeddings table for raw signal data using
      HogQL. Use when you need to perform semantic search over signals, fetch
      every signal that contributed to a specific report, or list signal types.
      For browsing the curated report layer (the Inbox) — listing reports,
      filtering by status/source, drilling into a single report by ID — use the
      `inbox-exploration` skill first; drop into this skill afterwards if the
      user wants the underlying observations.
  - id: skills-store
    kind: skill
    path: skills/skills-store
    description: Discover and use shared team skills stored in PostHog. Use when the
      user asks to list, browse, load, or manage "shared skills", "team skills",
      or references the "skills store" / "skill store".
  - id: suggesting-data-imports
    kind: skill
    path: skills/suggesting-data-imports
    description: Use when the user asks about revenue, payments, subscriptions,
      billing, CRM deals, support tickets, production database tables, or other
      data that PostHog does not collect natively. Also use when a query fails
      because a table does not exist or returns no results for expected external
      data. The data warehouse can import from SaaS tools (Stripe, Hubspot,
      etc.), production databases (Postgres, MySQL, BigQuery, Snowflake), and
      other arbitrary data sources. Covers checking existing sources,
      identifying the right source type, and guiding the setup.
  - id: suppressing-noisy-errors
    kind: skill
    path: skills/suppressing-noisy-errors
    description: >
      Create PostHog error tracking suppression rules to drop high-volume,
      low-value errors at ingestion. Use when the user asks "stop capturing this
      error", "drop browser extension errors", "ignore ResizeObserver loops",
      "suppress bot-driven errors", or wants to reduce ingestion cost from noisy
      unactionable errors. Identifies suppression candidates, scopes the filter
      tightly, decides between full suppression and sampling, and confirms the
      rule before creating it. Suppressed errors are dropped permanently — this
      skill defaults to caution.
  - id: triaging-error-issues
    kind: skill
    path: skills/triaging-error-issues
    description: >
      Triage PostHog error tracking issues during a daily or on-call review. Use
      when the user asks "what's broken?", "what new errors do we have?", "show
      me top errors today", "what should I look at this morning", or wants a
      prioritized list of active issues to work on. Surfaces new and high-impact
      issues, ranks by users affected and recency, points at linked replays, and
      proposes next actions (investigate, assign, suppress, merge).
  - id: triaging-visual-review-runs
    kind: skill
    path: skills/triaging-visual-review-runs
    description: >
      Inspects PostHog Visual Review (VR) runs that gate PR merges with
      screenshot regression checks. Use when the user mentions "visual review",
      "VR", "snapshot diff", "screenshot test", "storybook regression",
      "playwright snapshot", asks why a PR is blocked or what changed visually,
      wants to triage the VR backlog, decide whether a snapshot diff is real vs
      flaky, or check whether a story has been changing across runs. Also invoke
      when a PR has a failing `visual-review` status check, when a PR comment
      mentions "Visual review", or when the user is on a branch with an open VR
      run.
  - id: tuning-incremental-sync-config
    kind: skill
    path: skills/tuning-incremental-sync-config
    description: >
      Change the sync configuration of an existing data warehouse schema —
      switch sync_type, pick a different incremental_field, set
      primary_key_columns, choose cdc_table_mode, or change sync_frequency. Use
      when the user asks "switch my orders table from full refresh to
      incremental", "this table is syncing too slowly / too frequently", "I need
      to pick a different incremental column", "set up CDC for this Postgres
      table", or when diagnosis of a failing sync pointed to an
      incremental-field or PK misconfiguration.
  - id: working-with-skills
    kind: skill
    path: skills/working-with-skills
    description: Best practices for agents managing PostHog skills via the MCP
      `skill-*` tools — how to discover, read, create, update, and refactor
      skills efficiently, especially large skills with many bundled files. Use
      whenever you are about to call any `skill-*` tool, asked to author or edit
      a shared skill, or troubleshoot why a skill write was rejected. Pairs with
      `skills-store` (which covers the raw tool surface) by adding the
      decision-tree, efficiency, and pitfall guidance.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories:
  - id: unlinked-hook-files
