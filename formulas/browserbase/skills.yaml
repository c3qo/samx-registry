# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: browserbase/skills
name: Browserbase Skills
description: Claude Code browser automation + Browserbase CLI skill pack.
source:
  type: git
  url: https://github.com/browserbase/skills
  revision: 86f5d513dcdc555655f29f6caf418025ff60ea9b
capabilities:
  - id: agent-experience
    kind: skill
    path: skills/agent-experience
    description: "Audit the developer experience of a product, SDK, docs site, or
      SKILL.md by dropping multiple Claude subagents at it with only a tiny task
      prompt and real tools (WebFetch, Bash, Write). Agents must discover the
      docs themselves, install deps, ask for credentials if needed, and attempt
      real execution. The skill captures each agent's trace — tool calls,
      retries, wall time, errors — and scores on Setup Friction, Speed,
      Efficiency, Error Recovery, and Doc Quality, then emits an HTML report
      with an A–F grade and concrete fixes. Use when the user asks to audit
      agent experience, test a skill, audit docs for agents, check if a SDK is
      agent-friendly, validate a SKILL.md, measure agent DX, or benchmark how
      painful onboarding is for an AI agent. Triggers: 'audit agent experience',
      'test this skill', 'audit docs for agents', 'is my SDK agent-friendly',
      'run a DX audit', 'agent experience test', 'test my docs', 'how do agents
      do with my product'."
  - id: autobrowse
    kind: skill
    path: skills/autobrowse
    description: Self-improving browser automation via the auto-research loop.
      Iteratively runs a browsing task, reads the trace, and improves the
      navigation skill (strategy.md) until it reliably passes. Supports parallel
      runs across multiple tasks using sub-agents. Use when you want to build or
      improve browser automation skills for specific website tasks.
  - id: browser-to-api
    kind: skill
    path: skills/browser-to-api
    description: Turn a website's observable HTTP traffic into a best-effort OpenAPI
      3.1 spec by analyzing a `browser-trace` capture. Use when the user wants
      to discover/extract API endpoints from a browser session, build an OpenAPI
      doc from network traffic, or document a third-party site's XHR/fetch
      surface for client integration.
  - id: browser-trace
    kind: skill
    path: skills/browser-trace
    description: Capture a full DevTools-protocol trace of any browser automation —
      CDP firehose, screenshots, and DOM dumps — then bisect the stream into
      per-page searchable buckets. Use when the user wants to debug a failed
      run, audit network/console/DOM activity, attach a trace to an in-progress
      session, or feed structured per-page summaries back into an agent loop so
      its next iteration learns from the last one.
  - id: browser
    kind: skill
    path: skills/browser
    description: Automate web browser interactions using natural language via CLI
      commands. Use when the user asks to browse websites, navigate web pages,
      extract data from websites, take screenshots, fill forms, click buttons,
      or interact with web applications. Supports remote Browserbase sessions
      with Browserbase Identity, Verified browsers, automatic CAPTCHA solving,
      and residential proxies — ideal for protected websites and
      JavaScript-heavy pages.
  - id: browserbase-cli
    kind: skill
    path: skills/browserbase-cli
    description: Use the Browserbase CLI (`browse`) for Browserbase Functions and
      platform API workflows. Use when the user asks to run `browse`, deploy or
      invoke functions, manage sessions, projects, contexts, or extensions,
      fetch a page through the Browserbase Fetch API, search the web through the
      Browserbase Search API, or scaffold starter templates. Prefer the Browser
      skill for interactive browsing; use the top-level `browse` driver commands
      (`browse open`, `browse get`, etc.) only when the user explicitly wants
      the CLI path.
  - id: company-research
    kind: skill
    path: skills/company-research
    description: >
      Company discovery and deep research skill. Researches a company's product
      and ICP,

      discovers target companies to sell to using Browserbase Search API, deeply
      researches

      each using a Plan→Research→Synthesize pattern, and scores ICP fit —
      compiled into

      a scored research report and CSV. Supports depth modes (quick/deep/deeper)
      for

      balancing scale vs intelligence.

      Use when the user wants to: (1) find companies to sell to, (2) research
      potential

      customers, (3) discover companies matching an ICP, (4) build a target
      company list,

      (5) do market research on prospects. Triggers: "find companies to sell
      to",

      "company research", "find prospects", "ICP research", "target companies",

      "who should we sell to", "market research", "lead research", "prospect
      list".
  - id: cookie-sync
    kind: skill
    path: skills/cookie-sync
    description: Sync cookies from local Chrome to a Browserbase persistent context
      so the browse CLI can access authenticated sites. Use when the user wants
      to browse as themselves, sync cookies, or log into sites via Browserbase.
  - id: event-prospecting
    kind: skill
    path: skills/event-prospecting
    description: |
      Event prospecting skill. Takes a conference / event speakers URL,
      extracts the people, filters their companies against the user's
      ICP, then deep-researches only the speakers at ICP-fit companies.
      Outputs a person-first HTML report where each card answers "why
      should the AE talk to this person?" with all public links and a
      one-click DM opener.
      Use when the user wants to: (1) find leads at a specific
      conference, (2) prep for an event, (3) research event speakers,
      (4) build a target list from a sponsor/exhibitor page,
      (5) scrape conference speakers and rank by ICP fit.
      Triggers: "find leads at {event}", "research speakers at",
      "prospect this conference", "stripe sessions leads",
      "ai engineer summit prospects", "event prospecting",
      "scrape conference speakers", "who should I meet at".
  - id: fetch
    kind: skill
    path: skills/fetch
    description: "Use this skill when the user wants to retrieve a URL without a
      full browser session: fetch HTML or JSON from static pages, inspect status
      codes or headers, follow redirects, or get page source for simple
      scraping. Prefer it over a browser when JavaScript rendering and page
      interaction are not needed. Supports proxies and redirect control."
  - id: functions
    kind: skill
    path: skills/functions
    description: Deploy serverless browser automation as cloud functions using
      Browserbase. Use when the user wants to deploy browser automation to run
      on a schedule or cron, create a webhook endpoint for browser tasks, run
      automation in the cloud instead of locally, or asks about Browserbase
      Functions.
  - id: safe-browser
    kind: skill
    path: skills/safe-browser
    description: Build local constrained-browser agents with a safe_browser tool
      that owns CDP, enforces a domain allowlist with Fetch interception, and
      lets a runtime Claude Agent SDK agent complete browsing tasks without raw
      browser, shell, or CDP access. Use when the user wants an agent to browse
      or scrape while staying on approved domains, demo blocked off-domain
      navigation, or generate a safe browser client.
  - id: search
    kind: skill
    path: skills/search
    description: "Use this skill when the user wants to search the web without a
      full browser session: find URLs, titles, and metadata for a query. Prefer
      it over a browser when you just need search results, not page content.
      Returns structured results with titles, URLs, authors, and dates."
  - id: ui-test
    kind: skill
    path: skills/ui-test
    description: AI-powered adversarial UI testing via the browse CLI. Analyzes git
      diffs to test only what changed, or explores the full app to find bugs.
      Tests functional correctness, accessibility, responsive layout, and UX
      heuristics. Use when the user asks to test UI changes, QA a pull request,
      audit accessibility, or run exploratory testing. Supports local browser
      (localhost) and remote Browserbase (deployed sites).
requirements:
  env:
    - ANTHROPIC_API_KEY
    - BROWSERBASE_API_KEY
hooks:
  mode: explicit
  entries: []
advisories: []
