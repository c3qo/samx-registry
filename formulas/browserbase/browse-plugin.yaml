schemaVersion: 1
id: browserbase/browse-plugin
name: Browserbase for Cursor
description: Cursor browser-automation plugins; local MCP + cloud functions.
source:
  type: git
  url: https://github.com/browserbase/browse-plugin
  revision: 58bc420e3963288aa93de4657ffbf4d7fcd9d42d
capabilities:
  - id: browser
    kind: mcp
    path: plugins/browse/mcp.json
  - id: browser-automation
    kind: skill
    path: plugins/browse/skills/browser-automation
    description: Automate web browser interactions using MCP tools. Use when the
      user asks to browse websites, navigate web pages, extract data from
      websites, take screenshots, fill forms, click buttons, or interact with
      web applications.
  - id: functions
    kind: skill
    path: plugins/functions/skills/functions
    description: Guide deployment of serverless browser automation using the
      official Browserbase Functions CLI. Use when the user wants to deploy
      automation to run on a schedule, needs a webhook endpoint for browser
      automation, wants to run automation in the cloud, or asks about
      Browserbase Functions.
requirements:
  env:
    - BROWSERBASE_API_KEY
    - BROWSERBASE_PROJECT_ID
hooks:
  mode: explicit
  entries: []
advisories: []
