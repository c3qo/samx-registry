schemaVersion: 1
id: browserbase/stagehand
name: Stagehand
description: Browser automation framework + browse CLI/evals/docs monorepo.
source:
  type: git
  url: https://github.com/browserbase/stagehand
  revision: 7875b4c2e454af4108ce335500bef90feb403134
capabilities:
  - id: browse
    kind: skill
    path: packages/cli/skills/browse
    description: Use the browse CLI for Browserbase browser automation, Browserbase
      cloud APIs, Browserbase Functions, templates, web fetch/search,
      diagnostics, and Browse.sh skill discovery/installation. Use when the user
      asks to navigate pages, inspect browser state, run local or remote browser
      sessions, manage Browserbase resources, call Browserbase Functions, browse
      or scaffold Browserbase templates, fetch or search web content, diagnose
      browse setup, find or install a skill for a website task, discover
      site-specific Browse.sh skills, or install/refresh this browse skill.
  - id: browser
    kind: skill
    path: packages/evals/skills/browser
    description: Automate browser interactions using the Browserbase browse CLI. Use
      when a task requires navigating websites, reading page state, clicking
      elements, filling forms, or validating browser results with the browse
      command.
requirements:
  env:
    - BROWSERBASE_API_KEY
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY
    - GOOGLE_GENERATIVE_AI_API_KEY
    - BROWSERBASE_PROJECT_ID
hooks:
  mode: explicit
  entries: []
advisories: []
