      ready for disaggregated serving over RDMA/NVLink. Use after recipe-runner
      brings a deployment up (especially disagg/multi-node) to confirm the KV
      transport is correct; use troubleshoot for diagnosing already-failed pods.
  - id: dynamo-router-starter
    kind: skill
    path: plugins/nvidia-skills/skills/dynamo-router-starter
    description: Start or patch Dynamo router modes and run router endpoint smoke
      checks. Use for round-robin, KV-aware, least-loaded, or device-aware
      routing setup; use recipe-runner for recipe deployment and troubleshoot
      for failure diagnosis.
  - id: nemoclaw-user-get-started
    kind: skill
    path: plugins/nvidia-skills/skills/nemoclaw-user-get-started
    description: Installs NemoClaw, launches a sandbox, and runs the first agent
      prompt. Use when onboarding, installing, or launching a NemoClaw sandbox
      for the first time. Trigger keywords - nemoclaw quickstart, install
      nemoclaw openclaw sandbox, nemohermes quickstart, hermes agent nemoclaw,
      run hermes openshell sandbox, nemoclaw prerequisites, nemoclaw supported
      platforms, nemoclaw hardware software, nemoclaw windows wsl2 setup,
      nemoclaw install windows docker desktop.
  - id: omniverse-realtime-viewer
    kind: skill
    path: plugins/nvidia-skills/skills/omniverse-realtime-viewer
    description: Use as the top-level router for Omniverse Realtime Viewer USD app
      requests and focused viewer reference documents.
  - id: omniverse-usd-performance-tuning
    kind: skill
    path: plugins/nvidia-skills/skills/omniverse-usd-performance-tuning
    description: Top-level workflow skill for USD performance diagnosis and
      optimization. Use for slow loading, high memory, low FPS, or 'optimize my
      scene' requests; delegates auth/runtime setup to Phase 0 owners.
  - id: physical-ai-infrastructure-setup-and-resilient-scaling
    kind: skill
    path: plugins/nvidia-skills/skills/physical-ai-infrastructure-setup-and-resilient-scaling
    description: "Use when the user wants to set up, scale, validate, or harden
      NVIDIA physical AI infrastructure for synthetic data generation workflows
      across local MicroK8s or Azure AKS, including Kubernetes clusters,
      inference endpoint deployment, OSMO deployment, workload submission
      readiness, and infrastructure failure recovery. Trigger keywords: physical
      ai infrastructure, resilient scaling, SDG infrastructure, microk8s, azure
      aks, NVCF deployment, NIM Operator, OSMO deploy, workflow scaling. Don't
      trigger for: OSMO log summarization or workload-only operations unless
      infrastructure setup, scaling, validation, or recovery is requested."
  - id: physical-ai-neural-reconstruction
    kind: skill
    path: plugins/nvidia-skills/skills/physical-ai-neural-reconstruction
    description: "Router for NVIDIA NuRec/NRE: USDZ rendering, NCore conversion,
      3DGS, gRPC sensor sim, PhysicalAI HF datasets. Do NOT use for SimReady or
      infra setup."
  - id: accelerated-computing-cudf
    kind: skill
    path: skills/accelerated-computing-cudf
    description: Official NVIDIA-authored guidance for NVIDIA cuDF GPU DataFrames,
      pandas acceleration, dask-cuDF, ETL, joins, groupby, CSV/Parquet I/O,
      nullable semantics, and multi-GPU DataFrame workloads.
  - id: aiq-deploy-2
    kind: skill
    path: skills/aiq-deploy
    description: >
      Use when asked to install, deploy, run, validate, troubleshoot, or stop
