      no API.
  - id: cuopt-routing-api-python
    kind: skill
    path: skills/cuopt-routing-api-python
    description: Vehicle routing (VRP, TSP, PDP) with cuOpt — Python API only. Use
      when the user is building or solving routing in Python.
  - id: cuopt-routing-formulation
    kind: skill
    path: skills/cuopt-routing-formulation
    description: Vehicle routing (VRP, TSP, PDP) — problem types and data
      requirements. Domain concepts; no API or interface.
  - id: cuopt-server-api-python
    kind: skill
    path: skills/cuopt-server-api-python
    description: cuOpt REST server — start server, endpoints, Python/curl client
      examples. Use when the user is deploying or calling the REST API.
  - id: cuopt-server-common
    kind: skill
    path: skills/cuopt-server-common
    description: cuOpt REST server — what it does and how requests flow. Domain
      concepts; no deploy or client code.
  - id: cuopt-skill-evolution
    kind: skill
    path: skills/cuopt-skill-evolution
    description: After solving a non-trivial problem, detect generalizable learnings
      and propose skill updates. Always active — applies to every interaction.
  - id: cuopt-user-rules-2
    kind: skill
    path: skills/cuopt-user-rules
    description: Base rules for end users calling NVIDIA cuOpt
      (routing/LP/MILP/QP/install/server). Not for cuOpt internals — use
      cuopt-developer for those.
  - id: cupynumeric-hdf5
    kind: skill
    path: skills/cupynumeric-hdf5
    description: "Read and write large cuPyNumeric arrays to HDF5 with Legate's
      parallel, distributed HDF5 I/O (legate.io.hdf5: to_file, from_file,
      from_file_batched). Use when a developer needs to save a cuPyNumeric array
      to an .h5/.hdf5 file, load an HDF5 dataset into a distributed cuPyNumeric
      array, read a large HDF5 dataset in chunks, hand arrays to an HPC pipeline
      as a single file, or accelerate HDF5 disk I/O with GPUDirect Storage
      (GDS). Do not use it for Parquet/cuDF/raw-binary or other sharded/custom
      layouts (see the cupynumeric-parallel-data-load skill), Zarr or
      object-store/S3 output, .npz or pickled archives, plain h5py without
      cuPyNumeric, or pure array compute such as FFT, matmul, or reductions."
  - id: cupynumeric-install
    kind: skill
    path: skills/cupynumeric-install
    description: Install and verify cuPyNumeric for Python — requirements, commands,
      verification. Source builds are out of scope.
  - id: cupynumeric-migration-readiness
    kind: skill
    path: skills/cupynumeric-migration-readiness
    description: Pre-migration readiness assessor for porting NumPy to cuPyNumeric.
      Use BEFORE substantial porting work begins when the user asks whether code
      will scale on GPU, whether they should migrate to cuPyNumeric, which NumPy
      patterns transfer cleanly, what must be refactored before porting, or
      mentions pre-port assessment, scaling analysis, or refactor planning.
      Inspect the user's source code, look up NumPy usage, cross-reference the
      cuPyNumeric API support manifest, and distinguish
      distributed-scaling-friendly patterns from blockers such as unsupported
      APIs, scalar synchronization, host round-trips, Python/object-heavy
      control flow, shape/data-dependent branching, and in-place mutation
      hazards. Produce a verdict of READY, LIGHT REFACTOR, SIGNIFICANT REFACTOR,
      or NOT RECOMMENDED, with concrete refactor pointers.
  - id: cupynumeric-parallel-data-load
    kind: skill
    path: skills/cupynumeric-parallel-data-load
    description: Load a sharded, on-disk dataset (sharded .npy, Parquet/Arrow, raw
      binary, sharded HDF5, custom layouts) into a distributed cuPyNumeric
      ndarray via a manual partition + leaf @task launch with CPU/OMP/GPU
      variants. Use when no single-call loader fits, including when per-shard
      row counts differ across files. Prefer cupynumeric.load or
      legate.io.hdf5.from_file when they apply.
  - id: dali-dynamic-mode
    kind: skill
    path: skills/dali-dynamic-mode
