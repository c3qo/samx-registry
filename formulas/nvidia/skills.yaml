      wgrad scheduling.
  - id: nemo-mbridge-perf-moe-dispatcher-selection
    kind: skill
    path: skills/nemo-mbridge-perf-moe-dispatcher-selection
    description: Choose the right MoE token dispatcher (`alltoall`, DeepEP, or
