capabilities:
  - id: omniverse-cad-to-simready
    kind: skill
    path: plugins/nvidia-skills/skills/omniverse-cad-to-simready
    description: Coordinate the end-to-end CAD/source-asset to SimReady workflow.
      Use for broad requests such as CAD to SimReady, source asset to
      simulation-ready USD, or prop packaging that require conversion,
      material/physics assignment, SimReady conformance, validation, and
      optional package creation; deploy or verify Content Agents services first
      when property assignment is enabled; route single-stage work through
      nested references.
  - id: aiq-deploy
    kind: skill
    path: plugins/nvidia-skills/skills/aiq-deploy
    description: >
      Use when asked to install, deploy, run, validate, troubleshoot, or stop
      NVIDIA AI-Q Blueprint infrastructure.
  - id: aiq-research
    kind: skill
    path: plugins/nvidia-skills/skills/aiq-research
    description: >
      Use when asked to run deep research or AI-Q research through a reachable
      NVIDIA AI-Q Blueprint backend.
  - id: cuopt-user-rules
    kind: skill
    path: plugins/nvidia-skills/skills/cuopt-user-rules
