      failure analysis, code-edit suggestions, and iterative re-runs.
  - id: hsb-flash
    kind: skill
    path: skills/hsb-flash
    description: Flash the FPGA on an HSB board connected to an NVIDIA devkit.
      Supports HSB Lattice boards (FPGA versions 2407, 2412, 2507, 2510) and
      Leopard Imaging VB1940 "all-in-one" cameras (FPGA versions 2507, 2510).
      Uses release-specific YAML manifests and board-type-specific program
      commands. Lattice and VB1940 commands must never be mixed.
  - id: hsb-setup
    kind: skill
    path: skills/hsb-setup
    description: Clone the latest NVIDIA Holoscan Sensor Bridge repo, ask which
      supported devkit is being used, configure the host per platform, build the
