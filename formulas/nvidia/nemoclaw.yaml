# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: nvidia/nemoclaw
name: NemoClaw
description: NVIDIA sandboxed agent CLI + docs/skills.
source:
  type: git
  url: https://github.com/nvidia/nemoclaw
  revision: c4bd014d2a6873b6e68fc681568cc7aa1c2feddd
capabilities:
  - id: nemoclaw-skills-guide
    kind: skill
    path: .agents/skills/nemoclaw-skills-guide
    description: Start here. Introduces what NemoClaw is, what agent skills are
      available, and which skill to use for a given task. Use when discovering
      NemoClaw capabilities, choosing the right skill, or orienting in the
      project. Trigger keywords - skills, capabilities, what can I do, help,
      guide, index, overview, start here.
  - id: nemoclaw-user-reference
    kind: skill
    path: .agents/skills/nemoclaw-user-reference
    description: Describes the NemoClaw integration layer and blueprint architecture
      and how they orchestrate compatible agent sandboxes. Use when looking up
      architecture, agent integration, plugin structure, or blueprint design.
      Trigger keywords - nemoclaw architecture, nemoclaw agent architecture,
      nemoclaw plugin blueprint structure, nemoclaw vs openshell, which cli,
      nemoclaw cli, openshell cli, sandbox commands, nemoclaw cli commands,
      nemoclaw command reference, nemoclaw network policy, sandbox egress
      control operator approval, nemoclaw troubleshooting, nemoclaw debug
      sandbox issues.
  - id: nemoclaw-maintainer-morning
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-morning
    description: Runs the morning maintainer standup for NemoClaw. Triages the
      backlog, determines the day's target version, labels selected items,
      surfaces stragglers from previous versions, and outputs the daily plan.
      Use at the start of the workday. Trigger keywords - morning, standup,
      start of day, daily plan, what are we shipping today.
  - id: nemoclaw-contributor-create-pr
    kind: skill
    path: .agents/skills/nemoclaw-contributor-create-pr
    description: Create GitHub pull requests that follow the NemoClaw PR template.
      Use when the user wants to create a new PR, submit code for review, open a
      pull request, or push changes for review. Trigger keywords - create PR,
      pull request, new PR, submit for review, open PR, push for review.
  - id: nemoclaw-contributor-update-docs
    kind: skill
    path: .agents/skills/nemoclaw-contributor-update-docs
    description: Scan recent git commits for changes that affect user-facing
      behavior, then draft or update the corresponding documentation pages and
      refresh generated user skills for release prep. Use when docs have fallen
      behind code changes, after a batch of features lands, during daily release
      prep, or when preparing a release. Trigger keywords - update docs, draft
      docs, docs from commits, sync docs, catch up docs, doc debt, docs behind,
      docs drift, release prep docs, refresh user skills.
  - id: nemoclaw-maintainer-cross-issue-sweep
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-cross-issue-sweep
    description: Scans other open issues to find ones a given PR may also fix or
      accidentally break. Outputs adjacent-fix opportunities and contradiction
      risks with file:line evidence. Use when reviewing a PR to discover
      bundling opportunities or downstream impact across the issue queue.
  - id: nemoclaw-maintainer-cut-release-tag
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-cut-release-tag
    description: Creates deterministic NemoClaw semver release tags on origin/main
      and drafts release notes. Use when cutting a release, tagging a version,
      shipping a build, creating vX.Y.Z tags, or preparing release
      announcements.
  - id: nemoclaw-maintainer-day
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-day
    description: Runs the daytime maintainer loop for NemoClaw, prioritizing items
      labeled with the current version target. Picks the highest-value item,
      executes the right workflow (merge gate, salvage, security sweep, test
      gaps, hotspot cooling, or sequencing), and reports progress. Use during
      the workday to land PRs and close issues. Designed for /loop (e.g. /loop
      10m /nemoclaw-maintainer-day). Trigger keywords - maintainer day, work on
      PRs, land PRs, make progress, what's next, keep going, maintainer loop.
  - id: nemoclaw-maintainer-evening
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-evening
    description: Runs the end-of-day maintainer handoff for NemoClaw. Checks version
      target progress, bumps stragglers to the next patch version, generates a
      QA handoff summary, and cuts the release tag. Use at the end of the
      workday. Trigger keywords - evening, end of day, EOD, wrap up, ship it,
      cut tag, handoff, done for the day.
  - id: nemoclaw-maintainer-find-review-pr
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-find-review-pr
    description: Finds open GitHub PRs with security and priority-high labels, links
      each to its issue, detects duplicates (multiple PRs fixing the same
      issue), and presents a table of review candidates. Use when looking for
      the next PR to review. Trigger keywords - find pr, find review, next pr,
      pr to review, duplicate pr, security pr.
  - id: nemoclaw-maintainer-normalize-title-tags
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-normalize-title-tags
    description: Normalizes GitHub issue and PR titles by removing any bracketed
      [NemoClaw] tag case-insensitively, even when the tag appears later in the
      title. Use when cleaning issue tags, bulk-renaming titles, or normalizing
      repo title hygiene.
  - id: nemoclaw-maintainer-policies
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-policies
    description: Read-only maintainer policy reference for NemoClaw agents,
      engineers, and maintainers. Use when answering NemoClaw project-management
      workflow questions, including GitHub Issue Type, labels, Project fields,
      daily release labels, triage, duplicates, blocked items, and maintainer
      workflow decisions. Trigger keywords - maintainer policy, workflow policy,
      project workflow, issue type, labels, label taxonomy, needs labels,
      project status, blocked issue, duplicate issue, daily release label,
      release train, triage policy.
  - id: nemoclaw-maintainer-pr-comparator
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-pr-comparator
    description: Compares competing PRs that target the same issue and recommends
      which one to merge. Runs gate, correctness, and quality checks; outputs a
      deterministic scorecard with reasoning trace. Use when an issue has two or
      more open PRs and a maintainer needs to decide which to merge.
  - id: nemoclaw-maintainer-release-notes
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-release-notes
    description: Drafts NemoClaw release notes from live GitHub tag and compare
      data. Produces the repo's narrative release-note style with three lead
      paragraphs, categorized shipped changes, why-it-matters bullets, and
      external-only contributor thanks. Use after cutting a release tag or when
      asked to draft release notes, prepare an announcement, write a changelog,
      or summarize v0.0.x.
  - id: nemoclaw-maintainer-security-code-review
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-security-code-review
    description: Performs a comprehensive security review of code changes in a
      GitHub PR or issue. Checks out the branch, analyzes changed files against
      a 9-category security checklist, and produces PASS/WARNING/FAIL verdicts.
      Use when reviewing pull requests for security vulnerabilities, hardcoded
      secrets, injection flaws, auth bypasses, or insecure configurations.
      Trigger keywords - security review, code review, appsec, vulnerability
      assessment, security audit, review PR security.
  - id: nemoclaw-maintainer-triage
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-triage
    description: AI-assisted label triage for NVIDIA/NemoClaw issues and PRs. Reads
      triage-instructions.md at runtime for consistent label guidance. Supports
      single-item mode (give it a number) and batch mode (fetches up to 50
      unlabeled open items). On approval, applies labels and an optional triage
      comment via gh CLI, then logs the session to the daily-rhythm activity
      folder. Trigger keywords - triage, label issues, suggest labels, batch
      triage, triage issue, triage PR, label this, what labels.
  - id: nemoclaw-maintainer-verify-stale
    kind: skill
    path: .agents/skills/nemoclaw-maintainer-verify-stale
    description: "Verifies whether stale NVIDIA/NemoClaw bug reports still reproduce
      on the latest tag. Use when maintainers ask to verify stale issues,
      reproduce old bugs on latest, drain the bug backlog, or apply
      fixed-on-latest, verify-inconclusive, or status: wont-fix. Runs candidate
      filtering, local/Brev reproduction, by-design detection, confidence
      scoring, redacted comments, and tag-only labeling; never auto-closes."
  - id: nemoclaw-user-agent-skills
    kind: skill
    path: .agents/skills/nemoclaw-user-agent-skills
    description: Describes the agent skills shipped with NemoClaw and how to access
      them by cloning the repository. Use when users ask about AI agent support,
      coding assistant integration, or the .agents/skills/ directory. Trigger
      keywords - nemoclaw agent skills, ai coding assistant, cursor, claude
      code, copilot.
  - id: nemoclaw-user-configure-inference
    kind: skill
    path: .agents/skills/nemoclaw-user-configure-inference
    description: Connects NemoClaw to a local inference server. Use when setting up
      Ollama, vLLM, TensorRT-LLM, NIM, or any OpenAI-compatible local model
      server with NemoClaw. Trigger keywords - nemoclaw local inference, ollama
      nemoclaw, vllm nemoclaw, local model server, openai compatible endpoint,
      switch nemoclaw inference model, change inference runtime, nemoclaw
      additional model, nemoclaw sub-agent model, openclaw sub-agent,
      agents.list, sessions_spawn, vlm-demo, nemoclaw inference options,
      nemoclaw onboarding providers, nemoclaw inference routing, nemoclaw tool
      calling, ollama tool calls, vllm tool-call-parser, raw json in tui.
  - id: nemoclaw-user-configure-security
    kind: skill
    path: .agents/skills/nemoclaw-user-configure-security
    description: Presents a risk framework for every configurable security control
      in NemoClaw. Use when evaluating security posture, reviewing sandbox
      security defaults, or assessing control trade-offs. Trigger keywords -
      nemoclaw security best practices, sandbox security controls risk
      framework, nemoclaw credential storage, openshell provider, api key
      security, openclaw security controls, nemoclaw security boundary, prompt
      injection, tool access control.
  - id: nemoclaw-user-deploy-remote
    kind: skill
    path: .agents/skills/nemoclaw-user-deploy-remote
    description: Explains how to run NemoClaw on a remote GPU instance, including
      the deprecated Brev compatibility path and the preferred installer plus
      onboard flow. Use when deploying NemoClaw to a remote VM, onboarding a
      Brev instance, or migrating away from the legacy `nemoclaw deploy`
      wrapper. Trigger keywords - deploy nemoclaw remote gpu, nemoclaw brev
      cloud deployment, nemoclaw plugins, openclaw plugins, install openclaw
      plugin, nemoclaw onboard from dockerfile, nemoclaw dockerignore, nemoclaw
      brev web ui, nemoclaw getting started, brev quickstart, nvidia nemotron
      agent, nemoclaw sandbox hardening, container security, docker
      capabilities, process limits.
  - id: nemoclaw-user-get-started
    kind: skill
    path: .agents/skills/nemoclaw-user-get-started
    description: Installs NemoClaw, launches a sandbox, and runs the first agent
      prompt. Use when onboarding, installing, or launching a NemoClaw sandbox
      for the first time. Trigger keywords - nemoclaw quickstart, install
      nemoclaw openclaw sandbox, nemohermes quickstart, hermes agent nemoclaw,
      run hermes openshell sandbox, nemoclaw prerequisites, nemoclaw supported
      platforms, nemoclaw hardware software, nemoclaw windows wsl2 setup,
      nemoclaw install windows docker desktop.
  - id: nemoclaw-user-manage-policy
    kind: skill
    path: .agents/skills/nemoclaw-user-manage-policy
    description: Adds, removes, or modifies allowed endpoints in the sandbox policy.
      Use when customizing network policy, changing egress rules, or configuring
      sandbox endpoint access. Trigger keywords - customize nemoclaw network
      policy, sandbox egress policy configuration, nemoclaw integration policy
      examples, post-install policy setup, openshell approval workflow, policy
      preset, nemoclaw approve network requests, sandbox egress approval tui.
  - id: nemoclaw-user-manage-sandboxes
    kind: skill
    path: .agents/skills/nemoclaw-user-manage-sandboxes
    description: "Explains operational tasks after the quickstart: listing
      sandboxes, status and health checks, logs, diagnostics, port forwards,
      multiple sandboxes, credential reset, rebuilds, network presets, upgrades,
      and uninstall. Trigger keywords - manage nemoclaw sandboxes, nemoclaw
      status, nemoclaw list, nemoclaw dashboard port, nemoclaw rebuild, nemoclaw
      upgrade sandboxes, nemoclaw uninstall, sandbox mutability, sandbox runtime
      configuration, sandbox rebuild, nemoclaw backup, nemoclaw restore,
      workspace backup, openshell sandbox download upload, nemoclaw messaging
      channels, nemoclaw telegram, nemoclaw discord, nemoclaw slack, nemoclaw
      wechat, nemoclaw whatsapp, openshell channel messaging, install hermes
      plugins, hermes plugins nemoclaw, nemoclaw hermes plugins, nemohermes
      dockerignore, nemoclaw workspace files, soul.md, user.md, identity.md,
      agents.md, sandbox persistence."
  - id: nemoclaw-user-monitor-sandbox
    kind: skill
    path: .agents/skills/nemoclaw-user-monitor-sandbox
    description: Inspects sandbox health, traces agent behavior, and diagnoses
      problems. Use when monitoring a running sandbox, debugging agent issues,
      or checking sandbox logs. Trigger keywords - monitor nemoclaw sandbox,
      debug nemoclaw agent issues.
  - id: nemoclaw-user-overview
    kind: skill
    path: .agents/skills/nemoclaw-user-overview
    description: "Explains what NemoClaw covers: onboarding, lifecycle management,
      and agent operations within OpenShell containers, plus capabilities and
      why it exists. Use when users ask what NemoClaw is or what the project
      provides. For ecosystem placement or OpenShell-only paths, use the
      Ecosystem page; for internal mechanics, use How It Works. Trigger keywords
      - nemoclaw overview, openclaw always-on assistants, hermes agent, nvidia
      openshell, nvidia nemotron, nemoclaw ecosystem, nemohermes, nemoclaw vs
      openshell, run hermes openshell sandbox, openclaw openshell, sandboxed
      openclaw, how nemoclaw works, nemoclaw sandbox lifecycle blueprint,
      nemoclaw release notes, nemoclaw changelog."
