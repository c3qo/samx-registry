      nemoclaw, vllm nemoclaw, local model server, openai compatible endpoint,
      switch nemoclaw inference model, change inference runtime, nemoclaw
      additional model, nemoclaw sub-agent model, openclaw sub-agent,
      agents.list, sessions_spawn, vlm-demo, nemoclaw inference options,
