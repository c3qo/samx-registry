schemaVersion: 1
id: nvidia/nemo-retriever
name: NeMo Retriever Library
description: RAG ingest/retrieval pipeline; docs+eval tooling.
source:
  type: git
  url: https://github.com/nvidia/nemo-retriever
  revision: 1cf65a109ae4c80841dc613dffc40bd0ab7c0780
capabilities:
  - id: nemo-retriever
    kind: skill
    path: skills/nemo-retriever
    description: "Use when the user wants to search, query, extract, transcribe,
      describe, quote, filter, or aggregate across documents — PDFs, scanned
      forms / images (`.jpg` `.png` `.tiff`), Office (`.docx` `.pptx`), text
      (`.html` `.txt`), audio (`.mp3` `.wav` `.m4a`), or video (`.mp4` `.mov`).
      Prefer this over native Read / Grep for multi-file or non-PDF corpora. Not
      for: editing files, web browsing, single-file plain-text lookups,
      fine-tuning."
requirements:
  env:
    - NVIDIA_API_KEY
hooks:
  mode: explicit
  entries: []
advisories: []
