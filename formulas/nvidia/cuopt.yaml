schemaVersion: 1
id: nvidia/cuopt
name: cuOpt
description: "GPU-accel optimization eng: LP/QP/VRP/MILP; C++/Python/REST/server/CLI."
source:
  type: git
  url: https://github.com/nvidia/cuopt
  revision: 8c79892b508fbeb16f230255c5019bb419106cf3
capabilities:
  - id: cuopt-developer
    kind: skill
    path: skills/cuopt-developer
    description: Modify, build, test, debug, and contribute to NVIDIA cuOpt
      (C++/CUDA, Python, server, CI). Use for solver internals, PRs, DCO, and
      code conventions.
  - id: cuopt-install
    kind: skill
    path: skills/cuopt-install
    description: Install cuOpt for Python, C, or server via pip, conda, or Docker;
      verify the install. For building cuOpt from source, see cuopt-developer.
  - id: cuopt-routing-api-python
    kind: skill
    path: skills/cuopt-routing-api-python
    description: Vehicle routing (VRP, TSP, PDP) with cuOpt — Python API only. Use
      when the user is building or solving routing in Python.
  - id: cuopt-numerical-optimization-api-python
    kind: skill
    path: skills/cuopt-numerical-optimization-api-python
    description: Solve LP, MILP, QP (beta) with cuOpt Python API — linear/quadratic
      objectives, integer variables, scheduling, portfolio, least squares.
  - id: cuopt-server-api-python
    kind: skill
    path: skills/cuopt-server-api-python
    description: cuOpt REST server — start server, endpoints, Python/curl client
      examples. Use when the user is deploying or calling the REST API.
  - id: cuopt-multi-objective-exploration
    kind: skill
    path: skills/cuopt-multi-objective-exploration
    description: Trace and interpret the Pareto frontier across competing objectives
      using repeated single-objective cuOpt solves (weighted-sum and
      ε-constraint).
  - id: cuopt-numerical-optimization-api-c
    kind: skill
    path: skills/cuopt-numerical-optimization-api-c
    description: LP, MILP, and QP (beta) with cuOpt — C API only. Use when the user
      is embedding LP, MILP, or QP in C/C++.
  - id: cuopt-numerical-optimization-api-cli
    kind: skill
    path: skills/cuopt-numerical-optimization-api-cli
    description: LP, MILP, and QP (beta) with cuOpt — CLI only (MPS files,
      cuopt_cli). Use when the user is solving LP, MILP, or QP from MPS via
      command line.
  - id: cuopt-numerical-optimization-formulation
    kind: skill
    path: skills/cuopt-numerical-optimization-formulation
    description: LP, MILP, QP — concepts, problem-text parsing, and formulation
      patterns (parameters, constraints, decisions, objective). Concepts only;
      no API.
  - id: cuopt-routing-formulation
    kind: skill
    path: skills/cuopt-routing-formulation
    description: Vehicle routing (VRP, TSP, PDP) — problem types and data
      requirements. Domain concepts; no API or interface.
  - id: cuopt-server-common
    kind: skill
    path: skills/cuopt-server-common
    description: cuOpt REST server — what it does and how requests flow. Domain
      concepts; no deploy or client code.
  - id: cuopt-skill-evolution
    kind: skill
    path: skills/cuopt-skill-evolution
    description: After solving a non-trivial problem, detect generalizable learnings
      and propose skill updates. Always active — applies to every interaction.
  - id: cuopt-user-rules
    kind: skill
    path: skills/cuopt-user-rules
    description: Base rules for end users calling NVIDIA cuOpt
      (routing/LP/MILP/QP/install/server). Not for cuOpt internals — use
      cuopt-developer for those.
requirements:
  env:
    - CUOPT_DATA_DIR
    - CUOPT_RESULT_DIR
    - CUOPT_MAX_RESULT
    - CUOPT_RESULT_MODE
    - SONAR_TOKEN
hooks:
  mode: explicit
  entries: []
advisories: []
