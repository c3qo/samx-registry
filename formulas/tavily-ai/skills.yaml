schemaVersion: 1
id: tavily-ai/skills
name: Tavily Agent Skills
description: Web search, extract, crawl, map, research via Tavily CLI.
source:
  type: git
  url: https://github.com/tavily-ai/skills
  revision: ea5e8201b0d3ed9c10b70b71187589bd761fe2d2
capabilities:
  - id: tavily-best-practices
    kind: skill
    path: skills/tavily-best-practices
    description: Build production-ready Tavily integrations with best practices
      baked in. Reference documentation for developers using coding assistants
      (Claude Code, Cursor, etc.) to implement web search, content extraction,
      crawling, and research in agentic workflows, RAG systems, or autonomous
      agents.
  - id: tavily-cli
    kind: skill
    path: skills/tavily-cli
    description: >
      Web search, content extraction, crawling, and deep research via the Tavily
      CLI. Use this skill whenever the user wants to search the web, find
      articles, research a topic, look something up online, extract content from
      a URL, grab text from a webpage, crawl documentation, download a site's
      pages, discover URLs on a domain, or conduct in-depth research with
      citations. Also use when they say "fetch this page", "pull the content
      from", "get the page at https://", "find me articles about", or reference
      extracting data from external websites. This provides LLM-optimized web
      search, content extraction, site crawling, URL discovery, and AI-powered
      deep research — capabilities beyond what agents can do natively. Do NOT
      trigger for local file operations, git commands, deployments, or code
      editing tasks.
  - id: tavily-crawl
    kind: skill
    path: skills/tavily-crawl
    description: >
      Crawl websites and extract content from multiple pages via the Tavily CLI.
      Use this skill when the user wants to crawl a site, download
      documentation, extract an entire docs section, bulk-extract pages, save a
      site as local markdown files, or says "crawl", "get all the pages",
      "download the docs", "extract everything under /docs", "bulk extract", or
      needs content from many pages on the same domain. Supports depth/breadth
      control, path filtering, semantic instructions, and saving each page as a
      local markdown file.
  - id: tavily-dynamic-search
    kind: skill
    path: skills/tavily-dynamic-search
    description: >
      Programmatic web search with context isolation. Use this skill for any
      research task where you need to search the web, filter results, and
      extract specific information — without polluting your context window with
      raw HTML and boilerplate. This is the default skill for web research.
      Triggered by "search for", "look up", "find", "research", "what's the
      latest on", or any query that requires current web information. Also use
      when asked to "search and filter", "find the important parts", or "extract
      the key details" — any case where the user wants curated, noise-free
      content.
  - id: tavily-extract
    kind: skill
    path: skills/tavily-extract
    description: >
      Extract clean markdown or text content from specific URLs via the Tavily
      CLI. Use this skill when the user has one or more URLs and wants their
      content, says "extract", "grab the content from", "pull the text from",
      "get the page at", "read this webpage", or needs clean text from web
      pages. Handles JavaScript-rendered pages, returns LLM-optimized markdown,
      and supports query-focused chunking for targeted extraction. Can process
      up to 20 URLs in a single call.
  - id: tavily-map
    kind: skill
    path: skills/tavily-map
    description: >
      Discover and list all URLs on a website without extracting content, via
      the Tavily CLI. Use this skill when the user wants to find a specific page
      on a large site, list all URLs, see the site structure, find where
      something is on a domain, or says "map the site", "find the URL for",
      "what pages are on", "list all pages", or "site structure". Faster than
      crawling — returns URLs only. Essential when you know the site but not the
      exact page. Combine with extract for targeted content retrieval.
  - id: tavily-research
    kind: skill
    path: skills/tavily-research
    description: >
      Conduct comprehensive AI-powered research with citations via the Tavily
      CLI. Use this skill when the user wants deep research, a detailed report,
      a comparison, market analysis, literature review, or says "research",
      "investigate", "analyze in depth", "compare X vs Y", "what does the market
      look like for", or needs multi-source synthesis with explicit citations.
      Returns a structured report grounded in web sources. Takes 30-120 seconds.
      For quick fact-finding, use tavily-search instead.
  - id: tavily-search
    kind: skill
    path: skills/tavily-search
    description: >
      Search the web with LLM-optimized results via the Tavily CLI. Use this
      skill when the user wants to search the web, find articles, look up
      information, get recent news, discover sources, or says "search for",
      "find me", "look up", "what's the latest on", "find articles about", or
      needs current information from the internet. Returns relevant results with
      content snippets, relevance scores, and metadata — optimized for LLM
      consumption. Supports domain filtering, time ranges, and multiple search
      depths.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
