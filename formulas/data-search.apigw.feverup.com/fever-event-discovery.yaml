# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: data-search.apigw.feverup.com/fever-event-discovery
name: Fever Event Discovery
description: Fever Event Discovery remote MCP server at
  https://data-search.apigw.feverup.com/mcp. Discover live entertainment events
  worldwide. Setup guides for Claude Code, Codex, Cursor, and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/fever-event-discovery
capabilities:
