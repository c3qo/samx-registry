# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: solveintelligence.com/solve-intelligence
name: Solve Intelligence
description: Solve Intelligence remote MCP server at
  https://api.solveintelligence.com/mcp/. Search, draft, and chart patents.
  Setup guides for Claude Code, Codex, Cursor, and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/solve-intelligence
capabilities:
  - id: solve-intelligence
    kind: mcp
    spec:
      serverName: solve-intelligence
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://api.solveintelligence.com/mcp/
