schemaVersion: 1
id: langchain-ai/skills-benchmarks
name: Claude Code Skill Benchmarks
description: Benchmark suite for Claude Code skill docs vs adherence.
source:
  type: git
  url: https://github.com/langchain-ai/skills-benchmarks
  revision: c4b7546b5a6f951ffc46666c80a0bd32710f747d
capabilities:
  - id: ecosystem-primer
    kind: skill
    path: skills/benchmarks/ecosystem-primer
    description: INVOKE FIRST for any LangChain / LangGraph / Deep Agents agent
      building project before consulting other skills or writing any agent code.
      Required starting point for up to date info on framework selection
      (LangChain vs LangGraph vs Deep Agents vs hybrid composition), agent
      patterns, install, environment setup, and which skill to load next.
  - id: framework-selection
    kind: skill
    path: skills/benchmarks/framework-selection
    description: "INVOKE THIS SKILL at the START of any LangChain/LangGraph/Deep
      Agents project, before writing any agent code. Determines which framework
      layer is right for the task: LangChain, LangGraph, Deep Agents, or a
      combination. Must be consulted before other agent skills."
  - id: langchain-fundamentals
    kind: skill
    path: skills/main/langchain-fundamentals
    description: Create LangChain agents with create_agent, define tools, and use
      middleware for human-in-the-loop and error handling.
  - id: deep-agents-core
    kind: skill
    path: skills/main/deep-agents-core
    description: INVOKE THIS SKILL when building ANY Deep Agents application. Covers
      create_deep_agent(), harness architecture, SKILL.md format, and
      configuration options.
  - id: langgraph-fundamentals
    kind: skill
    path: skills/main/langgraph-fundamentals
    description: INVOKE THIS SKILL when writing ANY LangGraph code. Covers
      StateGraph, state schemas, nodes, edges, Command, Send, invoke, streaming,
      and error handling.
  - id: skill
    kind: skill
    path: skills/benchmarks/langchain_basic
    entry: skill.md
    description: Build LangChain agents with modern patterns. Covers create_agent,
      LangGraph, and context management.
  - id: langchain-oss-primer
    kind: skill
    path: skills/benchmarks/langchain-oss-primer
    description: ALWAYS START HERE for any LangChain, Deep Agents, or LangGraph
      agent building project. Required starting point before choosing other
      skills or writing any code. Covers framework selection (LangChain vs
      LangGraph vs Deep Agents), agent archetypes, dependency setup, and which
      skills to load next based on your decisions.
  - id: deep-agents-memory
    kind: skill
    path: skills/main/deep-agents-memory
    description: INVOKE THIS SKILL when your Deep Agent needs memory, persistence,
      or filesystem access. Covers StateBackend (ephemeral), StoreBackend
      (persistent), FilesystemMiddleware, and CompositeBackend for routing.
  - id: deep-agents-orchestration
    kind: skill
    path: skills/main/deep-agents-orchestration
    description: INVOKE THIS SKILL when using subagents, task planning, or human
      approval in Deep Agents. Covers SubAgentMiddleware, TodoList for planning,
      and HITL interrupts.
  - id: langchain-dependencies
    kind: skill
    path: skills/main/langchain-dependencies
    description: INVOKE THIS SKILL when setting up a new project or when asked about
      package versions, installation, or dependency management for LangChain,
      LangGraph, LangSmith, or Deep Agents. Covers required packages, minimum
      versions, environment requirements, versioning best practices, and common
      community tool packages for both Python and TypeScript.
  - id: langchain-middleware
    kind: skill
    path: skills/main/langchain-middleware
    description: INVOKE THIS SKILL when you need human-in-the-loop approval, custom
      middleware, or structured output. Covers HumanInTheLoopMiddleware for
      human approval of dangerous tool calls, creating custom middleware with
      hooks, Command resume patterns, and structured output with Pydantic/Zod.
  - id: langchain-rag
    kind: skill
    path: skills/main/langchain-rag
    description: INVOKE THIS SKILL when building ANY retrieval-augmented generation
      (RAG) system. Covers document loaders, RecursiveCharacterTextSplitter,
      embeddings (OpenAI), and vector stores (Chroma, FAISS, Pinecone).
  - id: langgraph-human-in-the-loop
    kind: skill
    path: skills/main/langgraph-human-in-the-loop
    description: INVOKE THIS SKILL when implementing human-in-the-loop patterns,
      pausing for approval, or handling errors in LangGraph. Covers interrupt(),
      Command(resume=...), approval/validation workflows, and the 4-tier error
      handling strategy.
  - id: langgraph-persistence
    kind: skill
    path: skills/main/langgraph-persistence
    description: INVOKE THIS SKILL when your LangGraph needs to persist state,
      remember conversations, travel through history, or configure subgraph
      checkpointer scoping. Covers checkpointers, thread_id, time travel, Store,
      and subgraph persistence modes.
  - id: langsmith-dataset
    kind: skill
    path: skills/main/langsmith-dataset
    description: INVOKE THIS SKILL when creating evaluation datasets, uploading
      datasets to LangSmith, or managing existing datasets. Covers dataset types
      (final_response, single_step, trajectory, RAG), CLI management commands,
      SDK-based creation, and example management. Uses the langsmith CLI tool.
  - id: langsmith-evaluator
    kind: skill
    path: skills/main/langsmith-evaluator
    description: "INVOKE THIS SKILL when building evaluation pipelines for
      LangSmith. Covers three core components: (1) Creating Evaluators -
      LLM-as-Judge, custom code; (2) Defining Run Functions - how to capture
      outputs and trajectories from your agent; (3) Running Evaluations -
      locally with evaluate() or auto-run via LangSmith. Uses the langsmith CLI
      tool."
  - id: langsmith-trace
    kind: skill
    path: skills/main/langsmith-trace
    description: INVOKE THIS SKILL when working with LangSmith tracing OR querying
      traces. Covers adding tracing to applications and querying/exporting trace
      data. Uses the langsmith CLI tool.
  - id: api_docs
    kind: skill
    path: skills/noise/api_docs
    description: OpenAPI documentation and REST API design patterns
  - id: database_migrations
    kind: skill
    path: skills/noise/database_migrations
    description: Database migration patterns and schema versioning
  - id: docker_patterns
    kind: skill
    path: skills/noise/docker_patterns
    description: Best practices for Docker containerization and multi-stage builds
  - id: react_components
    kind: skill
    path: skills/noise/react_components
    description: Modern React component patterns with hooks and TypeScript
  - id: testing_patterns
    kind: skill
    path: skills/noise/testing_patterns
    description: Unit testing and integration testing best practices
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories:
  - id: candidate-validation
    severity: warning
    category: generation
    message: Formula candidate required generation advisories.
    paths: []
    reason: "Capability kind does not match path: skills/benchmarks/langchain_basic"
    effect: Generated formula fields may be incomplete or require manual verification.
    action: Inspect candidate evidence and adjust formula before publishing.
