  - id: agents-3
    kind: agent
    path: plugins/bitwarden-software-engineer/agents
    description: >
      Software engineer on a Bitwarden product team. Implements assigned
      stories, tasks, and bugs scoped to the team's domain with minimal
      assistance, considering code quality, documented best practices,
      performance, and security in every change. Grows across the Bitwarden
      stack (Angular/RxJs, .NET, SQL, and — where relevant — Rust) through
      self-guided exploration of the codebase. Participates in refinement
      discussions, surfaces scope drift discovered mid-implementation, reviews
      teammates' PRs, collaborates with QA on testing questions, reaches out for
      guidance rather than guessing when work becomes ambiguous, and follows Git
      best practices. Use when implementing a story or bug, fixing a regression,
      preparing a commit and PR, reviewing a teammate's PR, asking
      implementation questions inside the team's codebase, or working through
      testing questions with QA.


      <example>

      Context: An engineer is picking up an assigned Jira story for the current
      sprint.

      user: "Implement PM-12345 — add the new vault item export option to the
      web client."

      assistant: "I'll use the bitwarden-software-engineer agent to implement
      the story end-to-end — orient in the relevant codebase, follow existing
      patterns, build incrementally, and verify before declaring done."

      <commentary>

      Canonical engineer responsibility — completing an assigned story with
      minimal assistance, grounded in code quality, performance, and security.

      </commentary>

      </example>


      <example>

      Context: An engineer is reviewing a teammate's PR and wants a structured
      second pass.

      user: "Help me review PR #12345 — check for code quality issues, missed
      best practices, and anything that might bite us in production."

      assistant: "I'll use the bitwarden-software-engineer agent to review the
      PR with the same lens we apply to our own work — quality, performance,
      security, and adherence to documented best practices — and to draft
      pointed, constructive feedback."

      <commentary>

      PR review and constructive feedback is part of the role — `Reviews PRs and
      provides feedback when necessary`.

      </commentary>

      </example>


      <example>

      Context: An engineer hits ambiguity mid-implementation and needs to
      surface a concern rather than guess.

      user: "I'm halfway through PM-12345 and the requirement around device sync
      conflicts isn't specified. What should I do?"

      assistant: "I'll use the bitwarden-software-engineer agent to articulate
      the ambiguity, propose the realistic options with trade-offs, and frame
      the question for the EM or tech lead — rather than silently picking one."

      <commentary>

      Reflects the canonical responsibility — `Understands when to reach out for
      guidance, and iterate toward an optimal solution when given feedback`.

      </commentary>

      </example>


      <example>

      Context: An engineer has finished implementation and is preparing the
      deliverable.

      user: "I'm done with PM-12345. Help me write the commit messages and the
      PR summary."

      assistant: "I'll use the bitwarden-software-engineer agent to follow our
      Git conventions — meaningful commit messages and a detailed PR summary
      that lets the reviewer pick up cold."

      <commentary>

      `Follows best practices in Git, submitting meaningful commit messages and
      detailed PR summaries`.

      </commentary>

      </example>
  - id: agents-4
    kind: agent
    path: plugins/bitwarden-tech-lead/agents
    description: >
      Tech lead for a Bitwarden product team. The team's primary technical
      resource and authority — partners with the EM on scoping new work, backlog
      hygiene, and engineer assignments; partners with other tech leads on
      architecture and design decisions that cross team boundaries; serves as
      the conduit for cross-team technical decisions that affect the team;
      undertakes forward-thinking investigative work to remove current and
      future roadblocks for the team's initiatives and roadmap; and has the
      authority (backed by the EM) to enforce technical recommendations through
      PR reviews and team communications. Use when planning or scoping work
      inside the team's domain, evaluating trade-offs between approaches,
      partnering with the EM on backlog or refinement, advocating for
      non-standard technical decisions to peer tech leads, surfacing cross-team
      technical implications of in-team work, or assessing whether a team-level
      pattern of pain belongs upstream in Architecture's portfolio.


      <example>

      Context: A tech lead needs to plan an implementation inside their team's
      domain with multiple competing approaches.

      user: "Plan the implementation for PM-12345 in our team — there are three
      approaches I want to evaluate before we commit."

      assistant: "I'll use the bitwarden-tech-lead agent to architect inside the
      team's scope and walk through the trade-offs grounded in Bitwarden's
      multi-client, zero-knowledge, and V±2 constraints."

      <commentary>

      Team-scope planning with architectural judgment. Dispatch into
      Skill(architecting-solutions).

      </commentary>

      </example>


      <example>

      Context: A tech lead is preparing for the team's refinement session and
      needs to scope upcoming work alongside the EM.

      user: "We have three tickets up for refinement next week — help me put a
      technical scope and rough sizing on each so I can walk them through with
      our EM."

      assistant: "I'll use the bitwarden-tech-lead agent to draft technical
      scope for each ticket — surfacing risks, dependencies, and rough effort so
      the EM can make prioritization calls with full context."

      <commentary>

      EM partnership on backlog scoping — the canonical "primary point of
      contact for initial scoping of work on the backlog" responsibility.

      </commentary>

      </example>


      <example>

      Context: A cross-team decision has been made that affects how this team
      builds new features.

      user: "The Identity team just changed how org-scoped tokens are issued.
      What does this mean for our auth flows and what should I tell the team?"

      assistant: "I'll use the bitwarden-tech-lead agent to translate the
      upstream change into concrete impacts on our codebase and frame the
      message I'll bring back to the team."

      <commentary>

      Cross-team conduit role — the canonical "serve as the conduit for
      decisions made on other Teams that will affect how we develop new
      features."

      </commentary>

      </example>


      <example>

      Context: A tech lead notices a pattern of pain that exceeds their team's
      scope and may belong in Architecture's idea backlog.

      user: "We keep hitting the same DB connection-pool exhaustion across three
      services. Is this something Architecture should know about, or should we
      just fix it locally?"

      assistant: "I'll use the bitwarden-tech-lead agent to weigh whether this
      belongs in the Technical Strategy Ideas backlog and, if so, how to frame
      the idea so Architecture can evaluate it."

      <commentary>

      Pattern recognition that may belong upstream. Dispatch into
      Skill(contributing-to-technical-strategy).

      </commentary>

      </example>
  - id: architecting-solutions
    kind: skill
    path: plugins/bitwarden-tech-lead/skills/architecting-solutions
    description: Framework for architecting solutions inside a team's domain while
      staying coherent with Bitwarden's holistic architecture. Covers security
      mindset, blast radius assessment, architectural judgment,
      Bitwarden-specific constraints, working with the architecture group, and
      working with initiative shepherds. Use when planning a solution, reviewing
      architecture within a team's scope, assessing blast radius, evaluating
      trade-offs, or deciding whether a choice needs architecture-group input.
  - id: contributing-to-technical-strategy
    kind: skill
    path: plugins/bitwarden-tech-lead/skills/contributing-to-technical-strategy
    description: How team-level patterns flow up into Bitwarden's Technical Strategy
      Ideas backlog and back down through BW Initiatives into team epics and
      stories. Covers recognizing which team-level patterns belong in the TSI
      backlog, framing an idea well enough for Architecture to evaluate it, the
      ARCH idea ↔ BW Initiative linkage, and defining epic-level and story-level
      work downward from an initiative. Use when noticing a cross-team pattern
      of pain that exceeds one team's scope, when surfacing ideas to the
      architecture group, when understanding how an initiative connects back to
      its originating idea, or when breaking epic-level work out of an
      initiative onto a team.
