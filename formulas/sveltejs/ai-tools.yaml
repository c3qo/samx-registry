schemaVersion: 1
id: sveltejs/ai-tools
name: Svelte MCP
description: Official Svelte MCP server + plugin tooling.
source:
  type: git
  url: https://github.com/sveltejs/ai-tools
  revision: d051d7ce6c6d193452bf9fc66c1f9bd84d4eff5c
capabilities:
  - id: svelte
    kind: mcp
    path: .mcp.json
  - id: svelte-code-writer
    kind: skill
    path: packages/opencode/skills/svelte-code-writer
    description: CLI tools for Svelte 5 documentation lookup and code analysis. MUST
      be used whenever creating, editing or analyzing any Svelte component
      (.svelte) or Svelte module (.svelte.ts/.svelte.js). If possible, this
      skill should be executed within the svelte-file-editor agent for optimal
      results.
  - id: svelte-core-bestpractices
    kind: skill
    path: packages/opencode/skills/svelte-core-bestpractices
    description: Guidance on writing fast, robust, modern Svelte code. Load this
      skill whenever in a Svelte project and asked to write/edit or analyze a
      Svelte component or module. Covers reactivity, event handling, styling,
      integration with libraries and more.
