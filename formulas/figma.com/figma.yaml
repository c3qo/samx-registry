# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: figma.com/figma
name: Figma
description: Figma remote MCP server at https://mcp.figma.com/mcp. Files,
  designs, Dev Mode context. Setup guides for Claude Code, Codex, Cursor, and VS
  Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/figma
capabilities:
  - id: figma
    kind: mcp
    spec:
      serverName: figma
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://mcp.figma.com/mcp
