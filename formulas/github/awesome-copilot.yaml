      StrongReferenceMessenger, IRecipient<TMessage>, RequestMessage<T> /
      AsyncRequestMessage<T> / CollectionRequestMessage<T>,
      ValueChangedMessage<T>, channels (tokens), and the ObservableRecipient
      activation lifecycle. Use across WPF, WinUI 3, .NET MAUI, Uno, and
      Avalonia.
  - id: mvvm-toolkit
    kind: skill
    path: skills/mvvm-toolkit
    description: "CommunityToolkit.Mvvm (the MVVM Toolkit) core: source generators
      ([ObservableProperty], [RelayCommand], [NotifyPropertyChangedFor],
      [NotifyCanExecuteChangedFor], [NotifyDataErrorInfo]), base classes
      (ObservableObject / ObservableValidator / ObservableRecipient), commands
      (RelayCommand / AsyncRelayCommand), and validation. Companion skills:
      mvvm-toolkit-messenger for pub/sub, mvvm-toolkit-di for
      Microsoft.Extensions.DependencyInjection wiring. Works across WPF, WinUI
      3, MAUI, Uno, and Avalonia."
  - id: namecheap
    kind: skill
    path: skills/namecheap
    description: Manage DNS records for domains registered with Namecheap via their
      API. List domains, view/add/update/remove DNS host entries (A, AAAA,
      CNAME, MX, TXT, etc.), and guide users through API setup including public
      IP detection and credential configuration. Use when the user mentions
      Namecheap, DNS records, domain management, or wants to add/change/remove A
      records, CNAME records, MX records, or TXT records for their domains.
  - id: nano-banana-pro-openrouter
    kind: skill
    path: skills/nano-banana-pro-openrouter
    description: Generate or edit images via OpenRouter with the Gemini 3 Pro Image
      model. Use for prompt-only image generation, image edits, and multi-image
      compositing; supports 1K/2K/4K output.
  - id: napkin-2
    kind: skill
    path: skills/napkin
    description: Visual whiteboard collaboration for Copilot CLI. Creates an
      interactive whiteboard that opens in your browser — draw, sketch, add
      sticky notes, then share everything back with Copilot. Copilot sees your
      drawings and text, and responds with analysis, suggestions, and ideas.
  - id: next-intl-add-language
    kind: skill
    path: skills/next-intl-add-language
    description: Add new language to a Next.js + next-intl application
  - id: noob-mode-2
    kind: skill
    path: skills/noob-mode
    description: Plain-English translation layer for non-technical Copilot CLI
      users. Translates every approval prompt, error message, and technical
      output into clear, jargon-free English with color-coded risk indicators.
