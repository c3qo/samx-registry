      a class component has multiple setState calls in an async method, inside
      setTimeout, inside a Promise .then() or .catch(), or in a native event
      handler. Use it before writing any flushSync call - the decision tree here
      prevents unnecessary flushSync overuse. Also use this skill when fixing
      test failures caused by intermediate state assertions that break after
      React 18 upgrade.
