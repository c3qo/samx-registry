      18.3.1. Use this skill whenever a class component needs its lifecycle
      methods migrated, when deciding between getDerivedStateFromProps vs
      componentDidUpdate, when adding getSnapshotBeforeUpdate, or when fixing
      React 18 UNSAFE_ lifecycle warnings. Always use this skill before writing
      any lifecycle migration code - do not guess the pattern from memory, the
      decision trees here prevent the most common migration mistakes.
  - id: react18-string-refs
