      whenever migrating string ref usage - including single element refs,
      multiple refs in a component, refs in lists, callback refs, and refs
      passed to child components. Always use this skill before writing any ref
      migration code - the multiple-refs-in-list pattern is particularly tricky
      and this skill prevents the most common mistakes. Use it for React 18.3.1
      migration (string refs warn) and React 19 migration (string refs removed).
