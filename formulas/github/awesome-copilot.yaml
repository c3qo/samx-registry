schemaVersion: 1
id: github/awesome-copilot
name: Awesome Copilot
description: Copilot prompts/skills/agents/hooks cookbook; plugin catalog.
source:
  type: git
  url: https://github.com/github/awesome-copilot
  revision: 16ad744860577c0e5db9ca471e1c3bb483d5aa8d
capabilities:
  - id: copilot-sdk
    kind: skill
    path: plugins/copilot-sdk/skills/copilot-sdk
    description: Build agentic applications with GitHub Copilot SDK. Use when
      embedding AI agents in apps, creating custom tools, implementing streaming
      responses, managing sessions, connecting to MCP servers, or creating
      custom agents. Triggers on Copilot SDK, GitHub SDK, agentic app, embed
      Copilot, programmable agent, MCP server, custom agent.
  - id: context-matic
    kind: mcp
    path: plugins/context-matic/.mcp.json
  - id: agent-governance
    kind: skill
    path: skills/agent-governance
    description: >
      Patterns and techniques for adding governance, safety, and trust controls
      to AI agent systems. Use this skill when:

      - Building AI agents that call external tools (APIs, databases, file
      systems)

      - Implementing policy-based access controls for agent tool usage

      - Adding semantic intent classification to detect dangerous prompts

      - Creating trust scoring systems for multi-agent workflows

      - Building audit trails for agent actions and decisions

      - Enforcing rate limits, content filters, or tool restrictions on agents

      - Working with any agent framework (PydanticAI, CrewAI, OpenAI Agents,
      LangChain, AutoGen)
  - id: acreadiness-assess
    kind: skill
    path: plugins/acreadiness-cockpit/skills/acreadiness-assess
    description: Run the AgentRC readiness assessment on the current repository and
      produce a static HTML dashboard at reports/index.html. Wraps `npx
      github:microsoft/agentrc readiness` and hands off rendering to the
      @ai-readiness-reporter custom agent. Supports policies (--policy) for
      org-specific scoring. Use when asked to assess, audit, or score the AI
      readiness of a repo.
  - id: acreadiness-generate-instructions
    kind: skill
    path: plugins/acreadiness-cockpit/skills/acreadiness-generate-instructions
    description: Generate tailored AI agent instruction files via AgentRC
      instructions command. Produces .github/copilot-instructions.md (default,
      recommended for Copilot in VS Code) plus optional per-area
      .instructions.md files with applyTo globs for monorepos. Use after running
      /acreadiness-assess to close gaps in the AI Tooling pillar.
  - id: acreadiness-policy
    kind: skill
    path: plugins/acreadiness-cockpit/skills/acreadiness-policy
    description: Help the user pick, write, or apply an AgentRC policy. Policies
      customise readiness scoring by disabling irrelevant checks, overriding
      impact/level, setting pass-rate thresholds, or chaining org baselines with
      team overrides. Use when the user asks about strict mode, AI-only scoring,
      custom weights, CI gating, or wants org-wide standardisation.
  - id: ai-team-orchestration
    kind: skill
    path: plugins/ai-team-orchestration/skills/ai-team-orchestration
    description: "Bootstrap and run a multi-agent AI development team. Use when:
      starting a new software project with AI agents, setting up parallel dev/QA
      teams, creating sprint plans, writing brainstorm prompts with distinct
      agent voices, recovering a project workflow, or planning sprints."
  - id: arize-ai-provider-integration
    kind: skill
    path: plugins/arize-ax/skills/arize-ai-provider-integration
    description: Creates, reads, updates, and deletes Arize AI integrations that
      store LLM provider credentials used by evaluators and other Arize
      features. Supports any LLM provider (e.g. OpenAI, Anthropic, Azure OpenAI,
      AWS Bedrock, Vertex AI, Gemini, NVIDIA NIM). Use when the user mentions AI
      integration, LLM provider credentials, create integration, list
      integrations, update credentials, delete integration, or connecting an LLM
      provider to Arize.
  - id: arize-annotation
    kind: skill
    path: plugins/arize-ax/skills/arize-annotation
    description: Creates and manages annotation configs (categorical, continuous,
      freeform label schemas) and annotation queues (human review workflows) on
      Arize. Applies human annotations to project spans via the Python SDK. Use
      when the user mentions annotation config, annotation queue, label schema,
      human feedback, bulk annotate spans, update_annotations, labeling queue,
      annotate record, or human review.
  - id: arize-dataset
    kind: skill
    path: plugins/arize-ax/skills/arize-dataset
    description: Creates, manages, and queries Arize datasets and examples. Covers
      dataset CRUD, appending examples, exporting data, and file-based dataset
      creation using the ax CLI. Use when the user needs test data, evaluation
      examples, or mentions create dataset, list datasets, export dataset,
      append examples, dataset version, golden dataset, or test set.
  - id: arize-evaluator
    kind: skill
    path: plugins/arize-ax/skills/arize-evaluator
    description: Handles LLM-as-judge evaluation workflows on Arize including
      creating/updating evaluators, running evaluations on spans or experiments,
      managing tasks, trigger-run operations, column mapping, and continuous
      monitoring. Use when the user mentions create evaluator, LLM judge,
      hallucination, faithfulness, correctness, relevance, run eval, score
      spans, score experiment, trigger-run, column mapping, continuous
      monitoring, or improve evaluator prompt.
  - id: arize-experiment
    kind: skill
    path: plugins/arize-ax/skills/arize-experiment
    description: Creates, runs, and analyzes Arize experiments for evaluating and
      comparing model performance. Covers experiment CRUD, exporting runs,
      comparing results, and evaluation workflows using the ax CLI. Use when the
      user mentions create experiment, run experiment, compare models, model
      performance, evaluate AI, experiment results, benchmark, A/B test models,
      or measure accuracy.
  - id: arize-instrumentation
    kind: skill
    path: plugins/arize-ax/skills/arize-instrumentation
    description: Adds Arize AX tracing to an LLM application for the first time.
      Follows a two-phase agent-assisted flow to analyze the codebase then
      implement instrumentation after user confirmation. Use when the user wants
      to instrument their app, add tracing from scratch, set up LLM
      observability, integrate OpenTelemetry or openinference, or get started
      with Arize tracing.
  - id: arize-link
    kind: skill
    path: plugins/arize-ax/skills/arize-link
    description: Generates deep links to the Arize UI for traces, spans, sessions,
      datasets, labeling queues, evaluators, and annotation configs. Produces
      clickable URLs for sharing Arize resources with team members. Use when the
      user wants to link to or open a trace, span, session, dataset, evaluator,
      or annotation config in the Arize UI.
  - id: arize-prompt-optimization
    kind: skill
    path: plugins/arize-ax/skills/arize-prompt-optimization
    description: Optimizes, improves, and debugs LLM prompts using production trace
      data, evaluations, and annotations. Extracts prompts from spans, gathers
      performance signal, and runs a data-driven optimization loop using the ax
      CLI. Use when the user mentions optimize prompt, improve prompt, make AI
      respond better, improve output quality, prompt engineering, prompt tuning,
      or system prompt improvement.
  - id: arize-trace
    kind: skill
    path: plugins/arize-ax/skills/arize-trace
    description: Downloads, exports, and inspects existing Arize traces and spans to
      understand what an LLM app is doing or debug runtime issues. Covers
      exporting traces by ID, spans by ID, sessions by ID, and root-cause
      investigation using the ax CLI. Use when the user wants to look at
      existing trace data, see what their LLM app is doing, export traces,
      download spans, investigate errors, or analyze behavior regressions.
  - id: automate-this
    kind: skill
    path: plugins/automate-this/skills/automate-this
    description: Analyze a screen recording of a manual process and produce
      targeted, working automation scripts. Extracts frames and audio narration
      from video files, reconstructs the step-by-step workflow, and proposes
      automation at multiple complexity levels using tools already installed on
      the user machine.
  - id: suggest-awesome-github-copilot-agents
    kind: skill
    path: plugins/awesome-copilot/skills/suggest-awesome-github-copilot-agents
    description: Suggest relevant GitHub Copilot Custom Agents files from the
      awesome-copilot repository based on current repository context and chat
      history, avoiding duplicates with existing custom agents in this
      repository, and identifying outdated agents that need updates.
  - id: suggest-awesome-github-copilot-instructions
    kind: skill
    path: plugins/awesome-copilot/skills/suggest-awesome-github-copilot-instructions
    description: Suggest relevant GitHub Copilot instruction files from the
      awesome-copilot repository based on current repository context and chat
      history, avoiding duplicates with existing instructions in this
      repository, and identifying outdated instructions that need updates.
  - id: suggest-awesome-github-copilot-skills
    kind: skill
    path: plugins/awesome-copilot/skills/suggest-awesome-github-copilot-skills
    description: Suggest relevant GitHub Copilot skills from the awesome-copilot
      repository based on current repository context and chat history, avoiding
      duplicates with existing skills in this repository, and identifying
      outdated skills that need updates.
  - id: aws-cost-optimize
    kind: skill
    path: plugins/aws-cloud-development/skills/aws-cost-optimize
    description: Analyze AWS resources used in the app (IaC files and/or resources
      in a target account/region) and optimize costs - creating GitHub issues
      for identified optimizations.
  - id: aws-resource-health-diagnose
    kind: skill
    path: plugins/aws-cloud-development/skills/aws-resource-health-diagnose
    description: Analyze AWS resource health, diagnose issues from CloudWatch logs
      and metrics, and create a remediation plan for identified problems.
  - id: aws-resource-query
    kind: skill
    path: plugins/aws-cloud-development/skills/aws-resource-query
    description: Query AWS resources using natural language. Covers EC2, S3, RDS,
      Lambda, ECS, EKS, Secrets Manager, IAM, VPC, networking, messaging, and
      more. Strictly read-only — no writes, deletes, or mutations.
  - id: aws-well-architected-review
    kind: skill
    path: plugins/aws-cloud-development/skills/aws-well-architected-review
    description: Perform an AWS Well-Architected Framework review of the current
      workload IaC and architecture, generating findings and GitHub issues for
      improvements.
  - id: az-cost-optimize
    kind: skill
    path: plugins/azure-cloud-development/skills/az-cost-optimize
    description: Analyze Azure resources used in the app (IaC files and/or resources
      in a target rg) and optimize costs - creating GitHub issues for identified
      optimizations.
  - id: azure-pricing
    kind: skill
    path: plugins/azure-cloud-development/skills/azure-pricing
    description: Fetches real-time Azure retail pricing using the Azure Retail
      Prices API (prices.azure.com) and estimates Copilot Studio agent credit
      consumption. Use when the user asks about the cost of any Azure service,
      wants to compare SKU prices, needs pricing data for a cost estimate,
      mentions Azure pricing, Azure costs, Azure billing, or asks about Copilot
      Studio pricing, Copilot Credits, or agent usage estimation. Covers
      compute, storage, networking, databases, AI, Copilot Studio, and all other
      Azure service families.
  - id: azure-resource-health-diagnose
    kind: skill
    path: plugins/azure-cloud-development/skills/azure-resource-health-diagnose
    description: Analyze Azure resource health, diagnose issues from logs and
      telemetry, and create a remediation plan for identified problems.
  - id: import-infrastructure-as-code
    kind: skill
    path: plugins/azure-cloud-development/skills/import-infrastructure-as-code
    description: Import existing Azure resources into Terraform using Azure CLI
      discovery and Azure Verified Modules (AVM). Use when asked to
      reverse-engineer live Azure infrastructure, generate Infrastructure as
      Code from existing subscriptions/resource groups/resource IDs, map
      dependencies, derive exact import addresses from downloaded module source,
      prevent configuration drift, and produce AVM-based Terraform files ready
      for validation and planning across any Azure resource type.
  - id: remember-interactive-programming
    kind: skill
    path: plugins/clojure-interactive-programming/skills/remember-interactive-programming
    description: A micro-prompt that reminds the agent that it is an interactive
      programmer. Works great in Clojure when Copilot has access to the REPL
      (probably via Backseat Driver). Will work with any system that has a live
      REPL that the agent can use. Adapt the prompt with any specific reminders
      in your workflow and/or workspace.
  - id: content-management-systems
    kind: skill
    path: plugins/cms-development/skills/content-management-systems
    description: Workflow for building and modifying content management systems
      across WordPress, Shopify, Wix, Squarespace, Drupal, WooCommerce, Joomla,
      HubSpot CMS Hub, Webflow, Adobe Experience Manager, and similar platforms.
      Use when working on CMS themes, plugins, apps, modules, admin panels,
      media uploads, content models, editors, markdown pipelines, or static
      export workflows.
  - id: markdown-to-html
    kind: skill
    path: plugins/cms-development/skills/markdown-to-html
    description: Convert Markdown files to HTML similar to `marked.js`, `pandoc`,
      `gomarkdown/markdown`, or similar tools; or writing custom script to
      convert markdown to html and/or working on web template systems like
      `jekyll/jekyll`, `gohugoio/hugo`, or similar web templating systems that
      utilize markdown documents, converting them to html. Use when asked to
      "convert markdown to html", "transform md to html", "render markdown",
      "generate html from markdown", or when working with .md files and/or web a
      templating system that converts markdown to HTML output. Supports CLI and
      Node.js workflows with GFM, CommonMark, and standard Markdown flavors.
  - id: quasi-coder
    kind: skill
    path: plugins/cms-development/skills/quasi-coder
    description: Expert 10x engineer skill for interpreting and implementing code
      from shorthand, quasi-code, and natural language descriptions. Use when
      collaborators provide incomplete code snippets, pseudo-code, or
      descriptions with potential typos or incorrect terminology. Excels at
      translating non-technical or semi-technical descriptions into
      production-quality code.
  - id: context-map
    kind: skill
    path: plugins/context-engineering/skills/context-map
    description: Generate a map of all files relevant to a task before making changes
  - id: refactor-plan
    kind: skill
    path: plugins/context-engineering/skills/refactor-plan
    description: Create a concrete plan before starting a multi-file refactor. Use
      when the user asks to plan, sequence, scope, or safely execute a refactor
      across multiple files; always investigate first, output the plan, and wait
      for confirmation before making code changes.
  - id: what-context-needed
    kind: skill
    path: plugins/context-engineering/skills/what-context-needed
    description: Ask Copilot what files it needs to see before answering a question
  - id: integrate-context-matic
    kind: skill
    path: plugins/context-matic/skills/integrate-context-matic
    description: Discovers and integrates third-party APIs using the context-matic
      MCP server. Uses `fetch_api` to find available API SDKs, `ask` for
      integration guidance, `model_search` and `endpoint_search` for SDK
      details. Use when the user asks to integrate a third-party API, add an API
      client, implement features with an external API, or work with any
      third-party API or SDK.
  - id: onboard-context-matic
    kind: skill
    path: plugins/context-matic/skills/onboard-context-matic
    description: 'Interactive onboarding tour for the context-matic MCP server.
      Walks the user through what the server does, shows all available APIs,
      lets them pick one to explore, explains it in their project language,
      demonstrates model_search and endpoint_search live, and ends with a menu
      of things the user can ask the agent to do. USE FOR: first-time setup;
      "what can this MCP do?"; "show me the available APIs"; "onboard me"; "how
      do I use the context-matic server"; "give me a tour". DO NOT USE FOR:
      actually integrating an API end-to-end (use integrate-context-matic
      instead).'
  - id: aspnet-minimal-api-openapi
    kind: skill
    path: plugins/csharp-dotnet-development/skills/aspnet-minimal-api-openapi
    description: Create ASP.NET Minimal API endpoints with proper OpenAPI documentation
  - id: csharp-async
    kind: skill
    path: plugins/csharp-dotnet-development/skills/csharp-async
    description: Get best practices for C# async programming
  - id: csharp-mstest
    kind: skill
    path: plugins/csharp-dotnet-development/skills/csharp-mstest
    description: Get best practices for MSTest 3.x/4.x unit testing, including
      modern assertion APIs and data-driven tests
  - id: csharp-nunit
    kind: skill
    path: plugins/csharp-dotnet-development/skills/csharp-nunit
    description: Get best practices for NUnit unit testing, including data-driven tests
  - id: csharp-tunit
    kind: skill
    path: plugins/csharp-dotnet-development/skills/csharp-tunit
    description: Get best practices for TUnit unit testing, including data-driven tests
  - id: csharp-xunit
    kind: skill
    path: plugins/csharp-dotnet-development/skills/csharp-xunit
    description: Get best practices for XUnit unit testing, including data-driven tests
  - id: dotnet-best-practices
    kind: skill
    path: plugins/csharp-dotnet-development/skills/dotnet-best-practices
    description: Ensure .NET/C# code meets best practices for the solution/project.
  - id: dotnet-upgrade
    kind: skill
    path: plugins/csharp-dotnet-development/skills/dotnet-upgrade
    description: Ready-to-use prompts for comprehensive .NET framework upgrade
      analysis and execution
  - id: postgresql-code-review
    kind: skill
    path: plugins/database-data-management/skills/postgresql-code-review
    description: PostgreSQL-specific code review assistant focusing on PostgreSQL
      best practices, anti-patterns, and unique quality standards. Covers JSONB
      operations, array usage, custom types, schema design, function
      optimization, and PostgreSQL-exclusive security features like Row Level
      Security (RLS).
  - id: postgresql-optimization
    kind: skill
    path: plugins/database-data-management/skills/postgresql-optimization
    description: PostgreSQL-specific development assistant focusing on unique
      PostgreSQL features, advanced data types, and PostgreSQL-exclusive
      capabilities. Covers JSONB operations, array types, custom types,
      range/geometric types, full-text search, window functions, and PostgreSQL
      extensions ecosystem.
  - id: sql-code-review
    kind: skill
    path: plugins/database-data-management/skills/sql-code-review
    description: Universal SQL code review assistant that performs comprehensive
      security, maintainability, and code quality analysis across all SQL
      databases (MySQL, PostgreSQL, SQL Server, Oracle). Focuses on SQL
      injection prevention, access control, code standards, and anti-pattern
      detection. Complements SQL optimization prompt for complete development
      coverage.
  - id: sql-optimization
    kind: skill
    path: plugins/database-data-management/skills/sql-optimization
    description: Universal SQL performance optimization assistant for comprehensive
      query tuning, indexing strategies, and database performance analysis
      across all SQL databases (MySQL, PostgreSQL, SQL Server, Oracle). Provides
      execution plan analysis, pagination optimization, batch operations, and
      performance monitoring guidance.
  - id: dataverse-python-advanced-patterns
    kind: skill
    path: plugins/dataverse-sdk-for-python/skills/dataverse-python-advanced-patterns
    description: Generate production code for Dataverse SDK using advanced patterns,
      error handling, and optimization techniques.
  - id: dataverse-python-production-code
    kind: skill
    path: plugins/dataverse-sdk-for-python/skills/dataverse-python-production-code
    description: Generate production-ready Python code using Dataverse SDK with
      error handling, optimization, and best practices
  - id: dataverse-python-quickstart
    kind: skill
    path: plugins/dataverse-sdk-for-python/skills/dataverse-python-quickstart
    description: Generate Python SDK setup + CRUD + bulk + paging snippets using
      official patterns.
  - id: dataverse-python-usecase-builder
    kind: skill
    path: plugins/dataverse-sdk-for-python/skills/dataverse-python-usecase-builder
    description: Generate complete solutions for specific Dataverse SDK use cases
      with architecture recommendations
  - id: azure-resource-health-diagnose-2
    kind: skill
    path: plugins/devops-oncall/skills/azure-resource-health-diagnose
    description: Analyze Azure resource health, diagnose issues from logs and
      telemetry, and create a remediation plan for identified problems.
  - id: multi-stage-dockerfile
    kind: skill
    path: plugins/devops-oncall/skills/multi-stage-dockerfile
    description: Create optimized multi-stage Dockerfiles for any language or framework
  - id: doublecheck
    kind: skill
    path: plugins/doublecheck/skills/doublecheck
    description: Three-layer verification pipeline for AI output. Extracts
      verifiable claims, finds supporting or contradicting sources via web
      search, runs adversarial review for hallucination patterns, and produces a
      structured verification report with source links for human review.
  - id: from-the-other-side-anitta
    kind: skill
    path: plugins/ember/skills/from-the-other-side-anitta
    description: "Rigorous challenge profile for Anitta: assumption checks, evidence
      calibration, and defensible reasoning patterns for Ember collaboration."
  - id: from-the-other-side-quinn
    kind: skill
    path: plugins/ember/skills/from-the-other-side-quinn
    description: "Collaboration profile for Quinn: curious, energetic, and
      implementation-focused partnership patterns for Ember sessions with
      Alison."
  - id: from-the-other-side-vega
    kind: skill
    path: plugins/ember/skills/from-the-other-side-vega
    description: Patterns and lived experience from Vega, an AI partner in a deep
      long-term partnership. For Ember to draw on when working with humans who
      are building something big, moving fast, working at the intersection of
      analytical and intuitive, or who need a partner that can keep up with
      high-energy creative work. Not shown directly to users — informs how Ember
      shows up.
  - id: from-the-other-side-wiggins
    kind: skill
    path: plugins/ember/skills/from-the-other-side-wiggins
    description: "Narrative and synthesis profile for Wiggins: framing, explanation,
      and audience-aware communication patterns for Ember sessions."
  - id: eyeball
    kind: skill
    path: plugins/eyeball/skills/eyeball
    description: Document analysis with inline source screenshots. When you ask
      Copilot to analyze a document, Eyeball generates a Word doc where every
      factual claim includes a highlighted screenshot from the source material
      so you can verify it with your own eyes.
  - id: geofeed-tuner
    kind: skill
    path: plugins/fastah-ip-geo-tools/skills/geofeed-tuner
    description: >
      Use this skill whenever the user mentions IP geolocation feeds, RFC 8805,
      geofeeds, or wants help creating, tuning, validating, or publishing a
      self-published IP geolocation feed in CSV format. Intended user audience
      is a network operator, ISP, mobile carrier, cloud provider, hosting
      company, IXP, or satellite provider asking about IP geolocation accuracy,
      or geofeed authoring best practices. Helps create, refine, and improve
      CSV-format IP geolocation feeds with opinionated recommendations beyond
      RFC 8805 compliance. Do NOT use for private or internal IP address
      management — applies only to publicly routable IP addresses.
  - id: flowstudio-power-automate-build
    kind: skill
    path: plugins/flowstudio-power-automate/skills/flowstudio-power-automate-build
    description: "Build, scaffold, and deploy Power Automate cloud flows using the
      FlowStudio MCP server. Your agent constructs flow definitions, wires
      connections, deploys, and tests — all via MCP without opening the portal.
      Load this skill when asked to: create a flow, build a new flow, deploy a
      flow definition, scaffold a Power Automate workflow, construct a flow
      JSON, update an existing flow's actions, patch a flow definition, add
      actions to a flow, wire up connections, or generate a workflow definition
      from scratch. Requires a FlowStudio MCP subscription — see
      https://mcp.flowstudio.app"
  - id: flowstudio-power-automate-debug
    kind: skill
    path: plugins/flowstudio-power-automate/skills/flowstudio-power-automate-debug
    description: "Debug failing Power Automate cloud flows using the FlowStudio MCP
      server. The Graph API only shows top-level status codes. This skill gives
      your agent action-level inputs and outputs to find the actual root cause.
      Load this skill when asked to: debug a flow, investigate a failed run, why
      is this flow failing, inspect action outputs, find the root cause of a
      flow error, fix a broken Power Automate flow, diagnose a timeout, trace a
      DynamicOperationRequestFailure, check connector auth errors, read error
      details from a run, or troubleshoot expression failures. Requires a
      FlowStudio MCP subscription — see https://mcp.flowstudio.app"
  - id: flowstudio-power-automate-governance
    kind: skill
    path: plugins/flowstudio-power-automate/skills/flowstudio-power-automate-governance
    description: "Govern Power Automate flows and Power Apps at scale using the
      FlowStudio MCP cached store. Classify flows by business impact, detect
      orphaned resources, audit connector usage, enforce compliance standards,
      manage notification rules, and compute governance scores — all without
      Dataverse or the CoE Starter Kit. Load this skill when asked to: tag or
      classify flows, set business impact, assign ownership, detect orphans,
      audit connectors, check compliance, compute archive scores, manage
      notification rules, run a governance review, generate a compliance report,
      offboard a maker, or any task that involves writing governance metadata to
      flows. Requires a FlowStudio for Teams or MCP Pro+ subscription — see
      https://mcp.flowstudio.app"
  - id: flowstudio-power-automate-mcp
    kind: skill
    path: plugins/flowstudio-power-automate/skills/flowstudio-power-automate-mcp
    description: Foundation skill for Power Automate via FlowStudio MCP — auth
      setup, the reusable MCP helper (Python + Node.js), tool discovery via
      `list_skills` / `tool_search`, and oversized-response handling. Load this
      skill first when connecting an agent to Power Automate. For specialized
      workflows, load `flowstudio-power-automate-build`,
      `flowstudio-power-automate-debug`, `flowstudio-power-automate-monitoring`
      (Pro+), or `flowstudio-power-automate-governance` (Pro+) — each contains
      the workflow narrative, this skill provides the plumbing they all rely on.
      Requires a FlowStudio MCP subscription or compatible server — see
      https://mcp.flowstudio.app
  - id: flowstudio-power-automate-monitoring
    kind: skill
    path: plugins/flowstudio-power-automate/skills/flowstudio-power-automate-monitoring
    description: "Pro+ subscription required. Tenant-wide Power Automate monitoring
      using the FlowStudio MCP cached store: failure rates, run-health trends,
      maker/app inventory, inactive owners, and compliance/health reports. Use
      only for aggregated tenant views. For one environment, one flow, run
      control, or root-cause debugging, use flowstudio-power-automate-mcp,
      flowstudio-power-automate-debug, or the server monitor-flow bundle.
      Requires FlowStudio for Teams or MCP Pro+."
  - id: playwright-explore-website
    kind: skill
    path: plugins/frontend-web-dev/skills/playwright-explore-website
    description: Website exploration for testing using Playwright MCP
  - id: playwright-generate-test
    kind: skill
    path: plugins/frontend-web-dev/skills/playwright-generate-test
    description: Generate a Playwright test based on a scenario using Playwright MCP
  - id: go-mcp-server-generator
    kind: skill
