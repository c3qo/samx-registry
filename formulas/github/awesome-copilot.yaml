      implementation testing to behavior testing. Always read this skill before
      rewriting Enzyme tests - do not translate Enzyme APIs 1:1, that produces
      brittle RTL tests.
  - id: react18-legacy-context
    kind: skill
    path: plugins/react18-upgrade/skills/react18-legacy-context
    description: Provides the complete migration pattern for React legacy context
      API (contextTypes, childContextTypes, getChildContext) to the modern
      createContext API. Use this skill whenever migrating legacy context in
      class components - this is always a cross-file migration requiring the
      provider AND all consumers to be updated together. Use it before touching
      any contextTypes or childContextTypes code, because migrating only the
      provider without the consumers (or vice versa) will cause a runtime
      failure. Always read this skill before writing any context migration - the
      cross-file coordination steps here prevent the most common context
      migration bugs.
  - id: react18-lifecycle-patterns
