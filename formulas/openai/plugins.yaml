schemaVersion: 1
id: openai/plugins
name: OpenAI Plugins
description: Codex plugin packs for many app, cloud, data, and dev workflows.
source:
  type: git
  url: https://github.com/openai/plugins
  revision: 015c0dff7475b7ee3cddc6cb06789ef302cfa4d6
capabilities:
  - id: plugin-creator
    kind: skill
    path: .agents/skills/plugin-creator
    description: Create and scaffold plugin directories for Codex with a required
      `.codex-plugin/plugin.json`, optional plugin folders/files, and baseline
      placeholders you can edit before publishing or testing. Use when Codex
      needs to create a new personal plugin, add optional plugin structure, or
      generate or update personal or repo-root
      `.agents/plugins/marketplace.json` entries for plugin ordering and
      availability metadata.
  - id: xcodebuildmcp
    kind: mcp
    path: plugins/build-ios-apps/.mcp.json
  - id: cloudflare-api
    kind: mcp
    path: plugins/cloudflare/.mcp.json
  - id: base44-cli
    kind: skill
    path: plugins/base44/skills/base44-cli
    description: "The base44 CLI is used for EVERYTHING related to base44 projects:
      resource configuration (entities, backend functions, ai agents),
      initialization and actions (resource creation, deployment). This skill is
      the place for learning about how to configure resources. When you plan or
      implement a feature, you must learn this skill"
  - id: frontend-app-builder
    kind: skill
    path: plugins/build-web-apps/skills/frontend-app-builder
    description: Use for new frontend applications, dashboards, games, creative
      websites, hero sections, and visually driven UI from scratch, or when the
      user explicitly asks for a redesign/restyle/modernization. Builds from
      clean, airy, high-taste, readable image-generated concept design with
      section-specific references, faithful implementation, and browser testing.
  - id: airtable-cli
    kind: skill
    path: plugins/airtable/skills/airtable-cli
    description: Lists bases, reads and writes records, manages tables and fields,
      filters and searches data in Airtable via the `airtable-mcp` CLI. Use when
      the task involves Airtable data or the user mentions airtable-mcp, bases,
      tables, records, or fields.
  - id: airtable-filters
    kind: skill
    path: plugins/airtable/skills/airtable-filters
    description: Use this skill when the user wants to find, filter, or narrow down
      Airtable records by field values, even when they don't explicitly say
      "filter."
  - id: airtable-overview
    kind: skill
    path: plugins/airtable/skills/airtable-overview
    description: Explains what Airtable is and how data is structured — bases,
      tables, fields, records, views, automations, and interfaces. Use when you
      need context about the Airtable data model.
  - id: capture-tasks-from-meeting-notes
    kind: skill
    path: plugins/atlassian-rovo/skills/capture-tasks-from-meeting-notes
    description: "Analyze meeting notes to find action items and create Jira tasks
      for assigned work. When an agent needs to: (1) Create Jira tasks or
      tickets from meeting notes, (2) Extract or find action items from notes or
      Confluence pages, (3) Parse meeting notes for assigned tasks, or (4)
      Analyze notes and generate tasks for team members. Identifies assignees,
      looks up account IDs, and creates tasks with proper context."
  - id: generate-status-report
    kind: skill
    path: plugins/atlassian-rovo/skills/generate-status-report
    description: "Generate project status reports from Jira issues and publish to
      Confluence. When an agent needs to: (1) Create a status report for a
      project, (2) Summarize project progress or updates, (3) Generate
      weekly/daily reports from Jira, (4) Publish status summaries to
      Confluence, or (5) Analyze project blockers and completion. Queries Jira
      issues, categorizes by status/priority, and creates formatted reports for
      delivery managers and executives."
  - id: search-company-knowledge
    kind: skill
    path: plugins/atlassian-rovo/skills/search-company-knowledge
    description: "Search across company knowledge bases (Confluence, Jira, internal
      docs) to find and explain internal concepts, processes, and technical
      details. When an agent needs to: (1) Find or search for information about
      systems, terminology, processes, deployment, authentication,
      infrastructure, architecture, or technical concepts, (2) Search internal
      documentation, knowledge base, company docs, or our docs, (3) Explain what
      something is, how it works, or look up information, or (4) Synthesize
      information from multiple sources. Searches in parallel and provides cited
      answers."
  - id: spec-to-backlog
    kind: skill
    path: plugins/atlassian-rovo/skills/spec-to-backlog
    description: "Automatically convert Confluence specification documents into
      structured Jira backlogs with Epics and implementation tickets. When an
      agent needs to: (1) Create Jira tickets from a Confluence page, (2)
      Generate a backlog from a specification, (3) Break down a spec into
      implementation tasks, or (4) Convert requirements into Jira issues.
      Handles reading Confluence pages, analyzing specifications, creating Epics
      with proper structure, and generating detailed implementation tickets
      linked to the Epic."
  - id: triage-issue
    kind: skill
    path: plugins/atlassian-rovo/skills/triage-issue
    description: "Intelligently triage bug reports and error messages by searching
      for duplicates in Jira and offering to create new issues or add comments
      to existing ones. When an agent needs to: (1) Triage a bug report or error
      message, (2) Check if an issue is a duplicate, (3) Find similar past
      issues, (4) Create a new bug ticket with proper context, or (5) Add
      information to an existing ticket. Searches Jira for similar issues,
      identifies duplicates, checks fix history, and helps create
      well-structured bug reports."
  - id: base44-sdk
    kind: skill
    path: plugins/base44/skills/base44-sdk
    description: The base44 SDK is the library to communicate with base44 services.
      In projects, you use it to communicate with remote resources (entities,
      backend functions, ai agents) and to write backend functions. This skill
      is the place for learning about available modules and types. When you plan
      or implement a feature, you must learn this skill
  - id: base44-troubleshooter
    kind: skill
    path: plugins/base44/skills/base44-troubleshooter
    description: Troubleshoot production issues using backend function logs. Use
      when investigating app errors, debugging function calls, or diagnosing
      production problems in Base44 apps.
  - id: box
    kind: skill
    path: plugins/box/skills/box
    description: Build and troubleshoot Box integrations for uploads, folders,
      folder listings, downloads and previews, shared links, collaborations,
      search, metadata, event-driven automations, and Box AI retrieval flows.
      Use when Codex needs to add Box APIs or SDKs to an app, wire Box-backed
      document workflows, organize or share content, react to new files, or
      fetch Box content for search, summarization, extraction, or
      question-answering.
  - id: brighthire
    kind: skill
    path: plugins/brighthire/skills/brighthire
    description: Use BrightHire tools when a user asks about BrightHire interview
      intelligence, calls, candidates, roles, scorecards, transcripts, hiring
      decisions, or organization-level interview data.
  - id: ios-app-intents
    kind: skill
    path: plugins/build-ios-apps/skills/ios-app-intents
    description: Design App Intents, app entities, and App Shortcuts for iOS system
      surfaces. Use when exposing app actions or content to Shortcuts, Siri,
      Spotlight, widgets, or controls.
  - id: ios-debugger-agent
    kind: skill
    path: plugins/build-ios-apps/skills/ios-debugger-agent
    description: Build, run, and debug iOS apps on Simulator with XcodeBuildMCP. Use
      when launching an app, inspecting simulator UI or logs, or diagnosing
      runtime behavior.
  - id: ios-ettrace-performance
    kind: skill
    path: plugins/build-ios-apps/skills/ios-ettrace-performance
    description: Capture and interpret iOS Simulator ETTrace profiles. Use when
      profiling launch or runtime latency, comparing traces, or finding
      CPU-heavy stacks.
  - id: ios-memgraph-leaks
    kind: skill
    path: plugins/build-ios-apps/skills/ios-memgraph-leaks
    description: Capture and inspect iOS leaks and memgraphs. Use when debugging
      leaked objects, retain cycles, memory growth, or before/after leak
      evidence.
  - id: ios-simulator-browser
    kind: skill
    path: plugins/build-ios-apps/skills/ios-simulator-browser
    description: Mirror an iOS Simulator into the Codex in-app browser and render
      SwiftUI previews from importable Swift packages in that simulator with hot
      reload. Use when a user wants to watch or interact with an iOS app in the
      browser, see a SwiftUI preview outside Xcode Canvas, iterate live on a
      preview, or capture browser-visible simulator proof.
  - id: swiftui-liquid-glass
    kind: skill
    path: plugins/build-ios-apps/skills/swiftui-liquid-glass
    description: Implement and review iOS 26+ SwiftUI Liquid Glass UI. Use when
      adopting Liquid Glass or checking its correctness, performance, and design
      fit.
  - id: swiftui-performance-audit
    kind: skill
    path: plugins/build-ios-apps/skills/swiftui-performance-audit
    description: Audit SwiftUI runtime performance from code first. Use when
      diagnosing slow rendering, janky scrolling, expensive updates, or
      profiling needs.
  - id: swiftui-ui-patterns
    kind: skill
    path: plugins/build-ios-apps/skills/swiftui-ui-patterns
    description: Build and refactor SwiftUI UI with component patterns and examples.
      Use when shaping navigation, state, layouts, controls, or screen
      composition.
  - id: swiftui-view-refactor
    kind: skill
    path: plugins/build-ios-apps/skills/swiftui-view-refactor
    description: Refactor SwiftUI view files into stable, testable structure. Use
      when splitting large views, tightening data flow, or cleaning Observation
      ownership.
  - id: appkit-interop
    kind: skill
    path: plugins/build-macos-apps/skills/appkit-interop
    description: Bridge macOS SwiftUI into AppKit narrowly. Use when implementing
      representables, reaching NSWindow or panels, handling menus, or using the
      responder chain.
  - id: build-run-debug
    kind: skill
    path: plugins/build-macos-apps/skills/build-run-debug
    description: Build, run, and debug macOS apps with shell-first Xcode and Swift
      workflows. Use when launching apps or diagnosing build, startup, or
      runtime failures.
  - id: liquid-glass
    kind: skill
    path: plugins/build-macos-apps/skills/liquid-glass
    description: Implement and review macOS SwiftUI Liquid Glass UI. Use when
      adopting system glass, removing conflicting custom chrome, or building
      glass surfaces.
  - id: packaging-notarization
    kind: skill
    path: plugins/build-macos-apps/skills/packaging-notarization
    description: Prepare macOS packaging and notarization workflows. Use when
      archiving apps, validating bundles, or explaining distribution-only
      failures.
  - id: signing-entitlements
    kind: skill
    path: plugins/build-macos-apps/skills/signing-entitlements
    description: Inspect macOS signing, entitlements, and Gatekeeper issues. Use
      when diagnosing code signing, sandbox, hardened runtime, or trust
      failures.
  - id: swiftpm-macos
    kind: skill
    path: plugins/build-macos-apps/skills/swiftpm-macos
    description: Build, run, and test SwiftPM macOS packages and executables. Use
      when the repo is package-first or has no Xcode project.
  - id: swiftui-patterns
    kind: skill
    path: plugins/build-macos-apps/skills/swiftui-patterns
    description: Build macOS SwiftUI scenes and components with desktop patterns.
      Use when shaping windows, commands, toolbars, settings, split views, or
      inspectors.
  - id: telemetry
    kind: skill
    path: plugins/build-macos-apps/skills/telemetry
    description: Add and verify lightweight macOS runtime telemetry. Use when wiring
      Logger events or inspecting logs for windows, sidebars, menus, and
      actions.
  - id: test-triage
    kind: skill
    path: plugins/build-macos-apps/skills/test-triage
    description: Triage macOS tests across Xcode and SwiftPM. Use when narrowing
      failures, explaining assertions or crashes, or separating setup from
      regressions.
  - id: view-refactor
    kind: skill
    path: plugins/build-macos-apps/skills/view-refactor
    description: Refactor macOS SwiftUI views and scenes into stable structure. Use
      when splitting large views, tightening scene state, or narrowing AppKit
      escapes.
  - id: window-management
    kind: skill
    path: plugins/build-macos-apps/skills/window-management
    description: Customize macOS SwiftUI windows and scene behavior. Use when tuning
      window chrome, drag regions, placement, restoration, launch behavior, or
      borderless windows.
  - id: frontend-testing-debugging
    kind: skill
    path: plugins/build-web-apps/skills/frontend-testing-debugging
    description: "Use when testing, debugging, or making targeted improvements to
      rendered frontend apps through the Build Web Apps or web dev plugin: local
      dev servers, UI regressions, interaction bugs, console errors, responsive
      layout, and visual QA. Check whether the Browser plugin is available and
      use it first when it is; otherwise use regular Playwright with the
      recorded reason."
  - id: react-best-practices
    kind: skill
    path: plugins/build-web-apps/skills/react-best-practices
    description: React and Next.js performance optimization guidelines from Vercel
      Engineering. This skill should be used when writing, reviewing, or
      refactoring React/Next.js code to ensure optimal performance patterns.
      Triggers on tasks involving React components, Next.js pages, data
      fetching, bundle optimization, or performance improvements.
  - id: shadcn-best-practices
    kind: skill
    path: plugins/build-web-apps/skills/shadcn-best-practices
    description: Manages shadcn components and projects — adding, searching, fixing,
      debugging, styling, and composing UI. Provides project context, component
      docs, and usage examples. Applies when working with shadcn/ui, component
      registries, presets, --preset codes, or any project with a components.json
      file. Also triggers for "shadcn init", "create an app with --preset", or
      "switch to --preset".
  - id: stripe-best-practices
    kind: skill
    path: plugins/build-web-apps/skills/stripe-best-practices
    description: Guides Stripe integration decisions — API selection (Checkout
      Sessions vs PaymentIntents), Connect platform setup (Accounts v2,
      controller properties), billing/subscriptions, Treasury financial
      accounts, integration surfaces (Checkout, Payment Element), and migrating
      from deprecated Stripe APIs. Use when building, modifying, or reviewing
      any Stripe integration — including accepting payments, building
      marketplaces, integrating Stripe, processing payments, setting up
      subscriptions, or creating connected accounts.
  - id: supabase-best-practices
    kind: skill
    path: plugins/build-web-apps/skills/supabase-best-practices
    description: Postgres performance optimization and best practices from Supabase.
      Use this skill when writing, reviewing, or optimizing Postgres queries,
      schema designs, or database configurations.
  - id: accessibility-and-inclusive-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/accessibility-and-inclusive-visualization
    description: Make data visualizations accessible and inclusive. Use when the
      user needs chart or diagram accessibility guidance, text alternatives for
      complex visuals, color and contrast review, keyboard support,
      reduced-motion behavior for animation or parallax, or an accessibility QA
      workflow for exported figures, UML-like diagrams, and dashboards.
  - id: canvas2d-data-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/canvas2d-data-visualization
    description: Render data visualizations with Canvas2D. Use when the
      visualization needs high mark counts, fast redraws, immediate-mode
      rendering, custom hit testing, or a hybrid Canvas plus SVG or HTML
      architecture.
  - id: d3-data-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/d3-data-visualization
    description: Build custom data visualizations with D3. Use when the user needs
      SVG or DOM-based charts, rich annotation, domain-native contextual
      backgrounds, data joins, custom scales or interactions, scroll-driven SVG
      scene states, or precise control over browser visualization behavior.
  - id: dashboards-and-real-time-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/dashboards-and-real-time-visualization
    description: Design dashboards and live visualization systems. Use when the user
      needs monitoring views, streaming charts, coordinated interactions,
      downsampling, or performance-aware operational visualization.
  - id: data-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/data-visualization
    description: Route web data visualization work. Use when the user needs chart
      choice, visual critique, dashboards, maps or geospatial views, Gantt
      timelines, UML/software diagrams, scrollytelling, reports or exports,
      testing, accessibility, browser implementation, or concept-first visual
      design.
  - id: gantt-chart-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/gantt-chart-visualization
    description: Design, critique, route, and implement Gantt charts and schedule
      visualizations. Use when the user mentions Gantt charts, project
      schedules, roadmaps with task spans, milestones, dependencies,
      predecessors, critical path, baselines, WBS, resource plans, capacity
      timelines, MS Project, Primavera P6, Jira Advanced Roadmaps, GitHub
      Projects, Smartsheet, monday.com, Asana, ClickUp, Azure DevOps iterations,
      or importing/exporting project-management data for a timeline chart.
  - id: geospatial-and-cartographic-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/geospatial-and-cartographic-visualization
    description: Design geospatial and cartographic visualizations. Use when the
      user needs help deciding whether to use a map, choosing projections or
      basemaps, building choropleths or symbol maps, or implementing thematic
      maps, slippy maps, or geospatial interactions with D3 geo, Leaflet,
      MapLibre, Mapbox GL JS, Google Maps, OpenLayers, deck.gl, ArcGIS Maps SDK,
      Azure Maps, HERE Maps, CesiumJS, or related tools.
  - id: grammar-of-graphics-and-declarative-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/grammar-of-graphics-and-declarative-visualization
    description: Build data visualizations with declarative grammars. Use when the
      user needs Vega-Lite, Vega, Observable Plot, or grammar-of-graphics
      reasoning, especially for tabular charts that do not require bespoke
      rendering.
  - id: node-link-and-diagram-layout
    kind: skill
    path: plugins/build-web-data-visualization/skills/node-link-and-diagram-layout
    description: Choose and apply automatic layout strategies for node-link diagrams
      and connected-node visuals. Use when the user asks how to auto-arrange
      nodes, reduce line crossings, route edges, avoid overlaps, stabilize
      layout, or choose graph-layout algorithms for network diagrams, dependency
      graphs, database schema diagrams, ERDs, state machines, decision trees,
      flow diagrams, box-and-line editors, or other line-connected nodes.
  - id: react-and-nextjs-data-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/react-and-nextjs-data-visualization
    description: Integrate data visualizations into React and Next.js applications.
      Use when the user needs chart components, UML-like or architecture diagram
      components, React integration patterns, Next.js client or server
      boundaries, hydration-safe rendering, lazy loading, framework-aware
      performance, scroll-driven visual stories, or export guidance.
  - id: reports-pdfs-and-slide-automation
    kind: skill
    path: plugins/build-web-data-visualization/skills/reports-pdfs-and-slide-automation
    description: Lay out and export data-rich reports and documents. Use when the
      user needs report structure, figure packaging, PDFs, PowerPoint or Google
      Slides automation, or programmatic insertion of visualizations, UML-like
      diagrams, or architecture diagrams into documents.
  - id: scrollytelling-and-parallax-data-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/scrollytelling-and-parallax-data-visualization
    description: Design and implement parallax scrolling and scrollytelling data
      visualizations. Use when the user asks for parallax scrolling,
      scrollytelling, scroll-driven timelines, sticky graphics, Scrollama,
      ScrollTrigger, ScrollTimeline, view timelines, rich-media timelines,
      moviescrollers, scroll-scrubbed charts, staged narrative reveals, or
      interactive visual stories where scrolling changes a data visualization or
      media scene.
  - id: statistical-and-uncertainty-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/statistical-and-uncertainty-visualization
    description: Design statistically honest and uncertainty-aware visualizations.
      Use when the user needs help showing distributions, intervals, confidence,
      missingness, sampling effects, or analytical rigor in charts and
      dashboards.
  - id: testing-data-visualizations
    kind: skill
    path: plugins/build-web-data-visualization/skills/testing-data-visualizations
    description: Test data visualizations and dashboards. Use when the user needs
      chart or diagram test strategy, screenshot or image diff testing, visual
      regression, mocked or synthetic chart data, component or unit tests, E2E
      dashboard QA, interactive UML-like diagram verification, scroll-driven
      story verification, export verification, or guidance on avoiding brittle
      over-testing.
  - id: threejs-data-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/threejs-data-visualization
    description: Render WebGL-accelerated data visualizations with Three.js, raw
      WebGL, deck.gl, luma.gl, PixiJS, Sigma.js, Plotly WebGL traces, ECharts
      GL, CesiumJS, Babylon.js, or related GPU libraries. Use when the
      visualization needs true spatial structure, dense 2D or 3D GPU rendering,
      particle or flow animation, volumetric views, or interactive exploration
      that adds real analytical value.
  - id: typescript-data-visualization-engineering
    kind: skill
    path: plugins/build-web-data-visualization/skills/typescript-data-visualization-engineering
    description: Build typed data visualizations in TypeScript. Use when the user
      wants TypeScript visualization code, typed data models, browser
      visualization components, UML-like diagram models, interactive graph or
      architecture diagram contracts, scroll-driven scene contracts, library
      selection guidance, or a maintainable visualization architecture beyond
      React- or Next-specific concerns.
  - id: uml-and-software-architecture-visualization
    kind: skill
    path: plugins/build-web-data-visualization/skills/uml-and-software-architecture-visualization
    description: Design, critique, read, write, render, and implement UML and
      UML-like software diagrams. Use when the user mentions UML, sequence
      diagrams, class diagrams, activity diagrams, state machines, use case
      diagrams, component diagrams, deployment diagrams, object diagrams,
      package diagrams, profile diagrams, timing diagrams, communication
      diagrams, interaction overview diagrams, composite structure diagrams,
      ERDs, database schema diagrams, C4, BPMN, swimlanes, flowcharts, network
      diagrams, application architecture diagrams, software architecture
      diagrams, diagram-as-code, model-as-code, XMI, UMLDI, PlantUML, Mermaid,
      Graphviz DOT, D2, Structurizr, DBML, diagrams.net/draw.io, Kroki, or
      interactive diagram editors and explorers.
  - id: visualization-strategy-and-critique
    kind: skill
    path: plugins/build-web-data-visualization/skills/visualization-strategy-and-critique
    description: Choose, lay out, critique, and explain data visualizations. Use
      when the user asks what visualization fits a dataset or goal, how a chart,
      dashboard, operational workspace, UML-like diagram, or software
      architecture diagram should be composed or interacted with, asks for
      visual page design, a layout mockup, generated large-screen and mobile
      concept images, or to be shown what a visualization could look like, when
      domain-native contextual surfaces or graphical backgrounds may help, when
      scrollytelling or parallax might be appropriate, wants a critique of an
      existing visualization, or needs guidance grounded in trusted
      visualization theory and practice. For advanced visual design or
      page-layout prompts where composition affects understanding, Codex must
      generate and show both large-screen and mobile portrait image concepts
      before implementation or text-only design handoff, plus mobile landscape
      when needed.
  - id: canva-branded-presentation
    kind: skill
    path: plugins/canva/skills/canva-branded-presentation
    description: Create on-brand Canva presentations from a brief, outline, existing
      Canva doc, or design link. Use when the user wants a branded slide deck,
      wants to turn notes into a presentation, or needs a presentation generated
      in Canva with the right brand kit and a clear slide plan.
  - id: canva-resize-for-all-social-media
    kind: skill
    path: plugins/canva/skills/canva-resize-for-all-social-media
    description: Resize a Canva design into standard social media formats and
      prepare export-ready results. Use when the user wants one Canva design
      adapted across multiple social platforms such as Facebook, Instagram, and
      LinkedIn, especially when they want all variants produced in one pass.
  - id: canva-translate-design
    kind: skill
    path: plugins/canva/skills/canva-translate-design
    description: Translate the text in a Canva design into another language while
      preserving the original layout as much as possible. Use when the user
      wants a localized or translated version of an existing Canva design and
      expects the original file to remain unchanged.
  - id: catalyst-by-zoho
    kind: skill
    path: plugins/catalyst-by-zoho/skills/catalyst-by-zoho
    description: >
      Expert coding assistant for Catalyst by Zoho — full-stack serverless cloud
      platform. Trigger on any mention of Catalyst, zcatalyst, AppSail, Data
      Store, ZCQL, Cache, Stratus, Circuits, SmartBrowz, ConvoKraft, Slate,
      Signals, Pipelines, QuickML, NoSQL, Job Scheduling, Zia Services, CodeLib,
      API Gateway, Connections, Zoho MCP, CatalystbyZoho, catalyst
      init/deploy/serve, zcatalyst-sdk-node, or catalyst-config.json. Covers all
      7 function types, full service catalog, architectural guidance, and Zoho
      MCP tool-based resource management. Also trigger on migration/comparison
      with AWS Lambda, S3, DynamoDB, Vercel, Netlify, Supabase, Firebase,
      Heroku, Cloud Run, Cloudflare R2, Railway. Trigger on Catalyst pricing,
      cost estimation, or "create tables for me", "set up the database", "deploy
      to Catalyst", "build on Zoho's platform", or "is Catalyst like Firebase".
      Do NOT use for generic Zoho CRM questions unless Catalyst is the target.
  - id: chronograph-portfolio-company-one-pager
    kind: skill
    path: plugins/chronograph-gp/skills/chronograph-portfolio-company-one-pager
    description: >
      GP platform one-pager and investor report generator for private equity
      portfolio companies. Use this skill whenever a user asks to generate a
      company tearsheet, one-pager, investor report, portfolio overview, or
      company deep-dive — especially when they name a company or ask to "build a
      report", "create a one-pager", or "show me a tearsheet". Also trigger when
      the user asks to include commentary, quarterly updates, investment
      narratives, or any Investment Overview in the report output. This skill
      handles live data fetching via a connected MCP data source OR from an
      uploaded Excel model, metric formatting, AI-generated or model-sourced
      commentary, and rendering a fully styled HTML one-pager. Also trigger for
      LP quarterly updates, valuation summaries, and portco performance pages —
      any output that combines financials, valuation, and return data for a
      single portfolio company.
