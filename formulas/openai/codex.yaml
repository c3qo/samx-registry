# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: openai/codex
name: Codex CLI
description: Local coding agent CLI from OpenAI.
source:
  type: git
  url: https://github.com/openai/codex
  revision: 683bd170dc36812f73867aa6f421a4a8cf4bd133
capabilities:
  - id: babysit-pr
    kind: skill
    path: .codex/skills/babysit-pr
    description: Babysit a GitHub pull request after creation by continuously
      polling review comments, CI checks/workflow runs, and mergeability state
      until the PR is merged/closed or user help is required. Diagnose failures,
      retry likely flaky failures up to 3 times, auto-fix/push branch-related
      issues when appropriate, and keep watching open PRs so fresh review
      feedback is surfaced promptly. Use when the user asks Codex to monitor a
      PR, watch CI, handle review comments, or keep an eye on failures and
      feedback on an open PR.
  - id: code-review
    kind: skill
    path: .codex/skills/code-review
    description: Run a final code review on a pull request
  - id: codex-issue-digest
    kind: skill
    path: .codex/skills/codex-issue-digest
    description: Run a GitHub issue digest for openai/codex by feature-area labels,
      all areas, and configurable time windows. Use when asked to summarize
      recent Codex bug reports or enhancement requests, especially for
      owner-specific labels such as tui, exec, app, or similar areas.
  - id: codex-pr-body
    kind: skill
    path: .codex/skills/codex-pr-body
    description: Update the title and body of one or more pull requests.
  - id: update-v8-version
    kind: skill
    path: .codex/skills/update-v8-version
    description: Update Codex's pinned `v8` / `rusty_v8` versions, validate the
      release-candidate path, and investigate failed V8 canary or artifact
      builds. Use when asked to bump V8, update `rusty_v8` artifacts, prepare or
      validate a V8 release candidate, check `v8-canary`, or diagnose why a V8
      version update no longer builds.
  - id: code-review-breaking-changes
    kind: skill
    path: .codex/skills/code-review-breaking-changes
    description: Breaking changes
  - id: code-review-change-size
    kind: skill
    path: .codex/skills/code-review-change-size
    description: Change size guidance (800 lines)
  - id: code-review-context
    kind: skill
    path: .codex/skills/code-review-context
    description: Model visible context
  - id: code-review-testing
    kind: skill
    path: .codex/skills/code-review-testing
    description: Test authoring guidance
  - id: codex-bug
    kind: skill
    path: .codex/skills/codex-bug
    description: Diagnose GitHub bug reports in openai/codex. Use when given a
      GitHub issue URL from openai/codex and asked to decide next steps such as
      verifying against the repo, requesting more info, or explaining why it is
      not a bug; follow any additional user-provided instructions.
  - id: path-types
    kind: skill
    path: .codex/skills/path-types
    description: Choose Rust types for operating system paths across the Codex
      repository. Use when defining new path-bearing types or explicitly
      migrating existing ones.
  - id: pushing-ci-changes
    kind: skill
    path: .codex/skills/pushing-ci-changes
    description: Pushing GitHub Actions changes, resolving push rejection,
      requesting upload exceptions.
  - id: remote-tests
    kind: skill
    path: .codex/skills/remote-tests
    description: How to run tests using remote executor.
  - id: test-tui
    kind: skill
    path: .codex/skills/test-tui
    description: Guide for testing Codex TUI interactively
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
