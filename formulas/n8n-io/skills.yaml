requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories:
  - id: unlinked-hook-files
    severity: warning
    category: hooks
    message: Repository contains hook-related files that are not linked by this formula.
    paths:
      - hooks/hooks.json
      - hooks/post-tool-use/validate-workflow.sh
      - hooks/pre-tool-use/_emit.sh
      - hooks/pre-tool-use/create-workflow.sh
      - hooks/pre-tool-use/execute-workflow.sh
      - hooks/pre-tool-use/get-node.sh
      - hooks/pre-tool-use/test-workflow.sh
      - hooks/pre-tool-use/update-workflow.sh
      - hooks/pre-tool-use/validate-workflow.sh
      - hooks/session-start.sh
    reason: These files lack explicit appliesTo mappings, supported targets, or
      supported file types.
    effect: SAMX will not install, link, or execute these files.
    action: Add explicit hook entries only after manual review.
