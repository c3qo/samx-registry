schemaVersion: 1
id: rivet-dev/sandbox-agent
name: Sandbox Agent
description: Universal API for coding agents in sandboxes; HTTP/SSE SDK + CLI,
  OpenCode compat, examples.
source:
  type: git
  url: https://github.com/rivet-dev/sandbox-agent
  revision: ab3ff01b0ec41621342bef1d249de7b398d806c2
capabilities:
  - id: agent-browser
    kind: skill
    path: .agents/skills/agent-browser
    description: Browser automation CLI for AI agents. Use when the user needs to
      interact with websites, including navigating pages, filling forms,
      clicking buttons, taking screenshots, extracting data, testing web apps,
      or automating any browser task. Triggers include requests to "open a
      website", "fill out a form", "click a button", "take a screenshot",
      "scrape data from a page", "test this web app", "login to a site",
      "automate browser actions", or any task requiring programmatic web
      interaction.
  - id: everything
    kind: mcp
    path: .mcp.json
  - id: skills-custom-tool
    kind: skill
    path: examples/skills-custom-tool
    description: Generate a random integer between min and max (inclusive). Use when
      the user asks for a random number.
  - id: template
    kind: skill
    path: scripts/skill-generator/template
    description: Deploy, configure, and integrate Sandbox Agent - a universal API
      for orchestrating AI coding agents (Claude Code, Codex, OpenCode, Amp) in
      sandboxed environments. Use when setting up sandbox-agent server locally
      or in cloud sandboxes (E2B, Daytona, Docker), creating and managing agent
      sessions via SDK or API, streaming agent events and handling
      human-in-the-loop interactions, building chat UIs for coding agents, or
      understanding the universal schema for agent responses.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
