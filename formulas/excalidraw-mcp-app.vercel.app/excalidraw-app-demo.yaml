# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: excalidraw-mcp-app.vercel.app/excalidraw-app-demo
name: Excalidraw
description: Excalidraw remote MCP server at
  https://excalidraw-mcp-app.vercel.app/mcp. MCP for creating interactive
  hand-drawn diagrams in Excalidraw. Setup guides for Claude Code, Codex,
  Cursor, and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/excalidraw-app-demo
capabilities:
  - id: excalidraw-app-demo
    kind: mcp
    spec:
      serverName: excalidraw-app-demo
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://excalidraw-mcp-app.vercel.app/mcp
