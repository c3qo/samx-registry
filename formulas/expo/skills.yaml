# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: expo/skills
name: Expo Skills
description: Expo AI agent skills plugin.
source:
  type: git
  url: https://github.com/expo/skills
  revision: b76270a44ce60fd2f1e664d92177e88211722c45
capabilities:
  - id: expo
    kind: mcp
    path: plugins/expo/.mcp.json
  - id: building-native-ui
    kind: skill
    path: plugins/expo/skills/building-native-ui
    description: Complete guide for building beautiful apps with Expo Router. Covers
      fundamentals, styling, components, navigation, animations, patterns, and
      native tabs.
  - id: expo-api-routes
    kind: skill
    path: plugins/expo/skills/expo-api-routes
    description: Guidelines for creating API routes in Expo Router with EAS Hosting
  - id: expo-cicd-workflows
    kind: skill
    path: plugins/expo/skills/expo-cicd-workflows
    description: Helps understand and write EAS workflow YAML files for Expo
      projects. Use this skill when the user asks about CI/CD or workflows in an
      Expo or EAS context, mentions .eas/workflows/, or wants help with EAS
      build pipelines or deployment automation.
  - id: expo-deployment
    kind: skill
    path: plugins/expo/skills/expo-deployment
    description: Deploying Expo apps to iOS App Store, Android Play Store, web
      hosting, and API routes
  - id: upgrading-expo
    kind: skill
    path: plugins/expo/skills/upgrading-expo
    description: Guidelines for upgrading Expo SDK versions and fixing dependency issues
  - id: expo-2
    kind: mcp
    path: plugins/expo/mcp.json
  - id: add-app-clip
    kind: skill
    path: plugins/expo/skills/add-app-clip
    description: Add an iOS App Clip target to an Expo app. Use when the user
      mentions App Clip, AASA, apple-app-site-association, appclips, smart app
      banner, or wants to ship a lightweight iOS Clip invoked from a URL
      alongside their parent app.
  - id: eas-update-insights
    kind: skill
    path: plugins/expo/skills/eas-update-insights
    description: "Check the health of published EAS Updates: crash rates,
      install/launch counts, unique users, payload size, and the split between
      embedded and OTA users per channel. Use when the user asks how an update
      is performing, whether a rollout is healthy, how many users are on the
      embedded build vs OTA, or wants to gate CI on update health."
  - id: expo-brownfield
    kind: skill
    path: plugins/expo/skills/expo-brownfield
    description: Integrate Expo and React Native into an existing native iOS or
      Android app. Use when the user mentions brownfield, embedding React Native
      in a native app, AAR/XCFramework, or adding Expo to an existing
      Kotlin/Swift project. Covers both the isolated approach and the integrated
      approach.
  - id: expo-dev-client
    kind: skill
    path: plugins/expo/skills/expo-dev-client
    description: Build and distribute Expo development clients locally or via TestFlight
  - id: expo-module
    kind: skill
    path: plugins/expo/skills/expo-module
    description: Guide for creating and writing Expo native modules and views using
      the Expo Modules API (Swift, Kotlin, TypeScript). Covers module definition
      DSL, native views, shared objects, config plugins, lifecycle hooks,
      autolinking, and type system. Use when building or modifying native
      modules for Expo.
  - id: expo-observe
    kind: skill
    path: plugins/expo/skills/expo-observe
    description: Use for anything related to EAS Observe — adding `expo-observe` to
      an Expo project (AppMetricsRoot/ObserveRoot HOC, markInteractive, the
      useObserve hook, and the Expo Router / React Navigation integrations for
      per-route metrics), querying via the EAS CLI (`eas
      observe:metrics-summary`, `observe:metrics`, `observe:routes`,
      `observe:events`, `observe:versions`), or interpreting the resulting
      metrics (cold/warm launch, TTR, TTI, navigation cold/warm TTR, update
      download, and the TTI frameRate params for triaging slow startups).
  - id: expo-tailwind-setup
    kind: skill
    path: plugins/expo/skills/expo-tailwind-setup
    description: Set up Tailwind CSS v4 in Expo with react-native-css and NativeWind
      v5 for universal styling
  - id: expo-ui
    kind: skill
    path: plugins/expo/skills/expo-ui
    description: "Build native UI with the @expo/ui package: real SwiftUI on iOS and
      Jetpack Compose on Android rendered from React in an Expo or React Native
      app. Covers universal cross-platform components (Host, Column, Row,
      Button, Text, List, and more imported from @expo/ui), drop-in replacements
      for popular React Native community libraries (BottomSheet, DateTimePicker,
      Slider, Menu, etc.), and platform-specific SwiftUI (@expo/ui/swift-ui) and
      Jetpack Compose (@expo/ui/jetpack-compose) trees and modifiers. Use when
      adding or reviewing @expo/ui Host/RNHostView trees, building
      native-feeling UI where standard React Native components fall short (lists
      with swipe actions and sections, settings forms with toggles, menus,
      sheets, pickers, sliders), choosing between universal and
      platform-specific components, or replacing an RN community UI library with
      a native @expo/ui equivalent. Not for custom native modules, Expo Router
      navigation, Reanimated, or data fetching."
  - id: native-data-fetching
    kind: skill
    path: plugins/expo/skills/native-data-fetching
    description: Use when implementing or debugging ANY network request, API call,
      or data fetching. Covers fetch API, React Query, SWR, error handling,
      caching, offline support, and Expo Router data loaders (`useLoaderData`).
  - id: use-dom
    kind: skill
    path: plugins/expo/skills/use-dom
    description: Use Expo DOM components to run web code in a webview on native and
      as-is on web. Migrate web code to native incrementally.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
