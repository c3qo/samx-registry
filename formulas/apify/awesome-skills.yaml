id: apify/awesome-skills
name: Awesome Apify Skills
description: Community-driven agent skills for AI coding assistants.
source:
  type: git
  url: https://github.com/apify/awesome-skills
  revision: 52a45d1ecfeef0163e2c9759e136bd9e3c1a7f64
capabilities:
  - id: apify-ads-intelligence
    kind: skill
    path: skills/apify-ads-intelligence
    description: Research, spy on, and analyze ads across Meta (Facebook &
      Instagram), Google (Ads Transparency Center + paid search results), TikTok
      (Ads Library + Creative Center), LinkedIn Ad Library, and X (Twitter —
      promoted tweets, best-effort) using Apify Actors. Use when user asks about
      competitor ads, ad library research, winning creatives, ad copy analysis,
      landing page audits from ads, cross-platform ad audits, brand transparency
      checks, or any task involving paid ad creatives, advertiser data, or ad
      targeting from public ad libraries.
  - id: apify-ai-search-visibility-tracker
    kind: skill
    path: skills/apify-ai-search-visibility-tracker
    description: Track whether a brand and its competitors get cited or mentioned
      across Google AI Overviews, Google AI Mode, ChatGPT Search, Perplexity,
      Microsoft Copilot, and Google Gemini for a defined set of prompts, on a
      recurring schedule. Use when user asks to track AI visibility, monitor
      brand mentions in AI search, track ChatGPT citations, do AI search SEO
      tracking, GEO tracking (Generative Engine Optimization), AEO tracking
      (Answer Engine Optimization), monitor Perplexity citations, track AI
      Overviews mentions, see if their brand shows up in AI search, discover
      which prompts competitors rank for in AI search, find citation
      opportunities, or audit a website for AI visibility readiness.
  - id: apify-booking-host-leads
    kind: skill
    path: skills/apify-booking-host-leads
    description: Find and enrich B2B leads from Booking.com - hotels, apartments,
      and vacation rentals - and pull each host's or property manager's real
      contact details (email, phone, company name, registration number). Use
      when the user says things like "get emails from Booking.com", "Booking.com
      lead generation", "find tour operator / property manager / host contacts",
      "scrape accommodation owner emails", or "build a list of Booking hosts".
      The host's email is usually already inside the Booking scraper's
      traderInfo field (EU/AU trader-transparency disclosure) - this skill leads
      with that and uses a Google Maps email scraper only as a fallback, instead
      of relying on Google Maps first (which mostly returns the wrong business).
  - id: apify-easy-competitive-intelligence
    kind: skill
    path: skills/apify-easy-competitive-intelligence
    description: >
      This skill should be used when the user asks to "analyze a competitor",
      "compare pricing", "competitive landscape", "market research", "what do
      customers think", "review intelligence", "hiring signals", "content
      strategy", "SEO battle", "build a battlecard", "competitive analysis",
      "who are the players", "who competes with", "market intelligence",
      "competitive positioning", "deep dive on a company", "board prep", "SWOT
      analysis", "how does [X] compare to [Y]", or mentions competitor analysis,
      pricing comparison, customer sentiment, or market landscape research.
      Requires Apify CLI or Apify MCP server.
  - id: apify-ecommerce
    kind: skill
    path: skills/apify-ecommerce
    description: Scrape e-commerce data for pricing, reviews, bestsellers, and
      seller discovery across 30+ platforms including Amazon, Walmart, eBay,
      Shopify, WooCommerce, and more. Use when user asks about product prices,
      competitor analysis, store scraping, tech stack detection, food delivery,
      real estate, or marketplace intelligence.
  - id: apify-financial-news
    kind: skill
    path: skills/apify-financial-services/skills/apify-financial-news
    description: Discover and extract financial news for tracked portfolio companies
      across 33 verified Tier 1 sources (Bloomberg, Reuters, FT, WSJ,
      IntelliNews, ČTK, PAP, BTA, TASR, ING Think, ECB, EC Press Corner, ...)
      plus broad Google News fallback. Use when the user asks to find news about
      a company, get press coverage, monitor financial press, run a news scan,
      or check headlines for a portfolio company. Reads tracked companies from
      data/companies.json. Do NOT use for marketing/social-listening (use
      apify/awesome-skills) or for morning-briefing formatting (out of scope).
  - id: apify-financial-osint
    kind: skill
    path: skills/apify-financial-services/skills/apify-financial-osint
    description: Social-listening signals for tracked portfolio companies via Apify
      Actors — Reddit sentiment (fatihtahta), Twitter/X real-time mentions
      (kaitoeasyapi pay-per-result), Trustpilot service quality (getwally.net).
      Use when the user asks for sentiment, social media mentions, customer
      reviews, brand perception, crisis signals, OSINT, social listening, "what
      are people saying about X". Reads tracked companies from
      data/companies.json. Do NOT use for news (use apify-financial-news) or
      registry lookups (use apify-public-registries).
  - id: apify-public-registries
    kind: skill
    path: skills/apify-financial-services/skills/apify-public-registries
    description: Look up official company data from European public registries
      across 11 countries/regions (CZ, SK, PL, DE, UK, NL, RO, HR, SE + EU-level
      + ESG). Covers company registration, ownership, financial filings, VAT
      status, ESG data. Use when the user asks to "look up a company", "check
      registry", "find company info", "look up IČO/KRS/LEI/CRN", "company due
      diligence", "check VAT status", "find ownership structure", or needs
      official data from European registries. Reads tracked companies from
      data/companies.json. Some lookups use Python scripts (stdlib), some fall
      back to Apify actors for scraping-based registries.
  - id: apify-influencer-brand-collabs
    kind: skill
    path: skills/apify-influencer-brand-collabs
    description: >
      Discover Instagram brand–creator partnerships by chaining Apify Actors.
      Use when the user asks

      who collabs with a brand, which brands a creator has done paid posts for,
      wants to audit an

      influencer's branded-content history, or wants to scope a brand's
      sponsorship roster.


      **Triggers:**

      - "who collabs with [brand] on Instagram?"

      - "what brands has [creator] done sponsored posts for?"

      - "find paid partnerships / branded content for [handle]"

      - "audit [influencer]'s brand deals"

      - "show me [brand]'s influencer roster"


      Works in either direction — brand → creators or creator → brands — and
      detects direction from the

      data, so don't ask the user to declare it. Requires Apify MCP tools.
  - id: apify-link-prospecting-outreach
    kind: skill
    path: skills/apify-link-prospecting-outreach
    description: Find sites ranking for target keywords, score every prospect with
      Ahrefs domain authority and page-level traffic, identify the strongest
      pitch angle per row ("links to competitor", "mentions brand without
      linking", "top-3 SERP", "resource page", "outdated content"), generate
      brand-voice-matched outreach emails using an outreach-type-aware template
      (unlinked-mention claim, competitor-link replacement, resource-page
      inclusion, outdated-content replacement, topical niche-edit), and propose
      a concrete in-article link placement as three artifacts — the verbatim
      source sentence, the same sentence rewritten with the link spliced in, or
      a fully-drafted new insertion if no natural fit exists. Use when user asks
      to find link building opportunities, prospect link partners, recover
      unlinked brand mentions, replace competitor links, build a tiered outreach
      list, or run cold email outreach for SEO link building.
  - id: apify-verified-email-finder
    kind: skill
    path: skills/apify-verified-email-finder
    description: Builds a list of verified business emails from Google Maps, Google
      SERPs, or a user-supplied URL list. Verification happens inside the same
      Apify run — no third-party verifier needed. Use when user asks to find
      verified emails, build a leads list, scrape emails from Maps or SERP,
      verify emails for a URL list, or find an Apollo / Hunter alternative.
  - id: _template
    kind: skill
    path: skills/_template
    description: "- Apify account ([sign up](https://apify.com))"
