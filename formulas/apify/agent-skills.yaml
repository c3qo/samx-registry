schemaVersion: 1
id: apify/agent-skills
name: Apify Agent Skills
description: Apify skill pack for scraping, Actor dev, actorization, schema gen,
  SDK integration.
source:
  type: git
  url: https://github.com/apify/agent-skills
  revision: 18297b635a8e50a6bfa080662c0a0e3cc3abbb1a
capabilities:
  - id: apify-actor-development
    kind: skill
    path: skills/apify-actor-development
    description: Develop, debug, and deploy Apify Actors - serverless cloud programs
      for web scraping, automation, and data processing. Use when creating new
      Actors, modifying existing ones, or troubleshooting Actor code.
  - id: apify-actorization
    kind: skill
    path: skills/apify-actorization
    description: Convert existing projects into Apify Actors - serverless cloud
      programs. Actorize JavaScript/TypeScript (SDK with Actor.init/exit),
      Python (async context manager), or any language (CLI wrapper). Use when
      migrating code to Apify, wrapping CLI tools as Actors, or adding Actor SDK
      to existing projects.
  - id: apify-generate-output-schema
    kind: skill
    path: skills/apify-generate-output-schema
    description: Generate output schemas (dataset_schema.json, output_schema.json,
      key_value_store_schema.json) for an Apify Actor by analyzing its source
      code. Use when creating or updating Actor output schemas.
  - id: apify-sdk-integration
    kind: skill
    path: skills/apify-sdk-integration
    description: Integrate Apify into an existing JavaScript/TypeScript or Python
      application using the apify-client package. Use when adding web scraping,
      automation, or data extraction capabilities to an existing app via the
      Apify API.
  - id: apify-ultimate-scraper
    kind: skill
    path: skills/apify-ultimate-scraper
    description: Universal AI-powered web scraper for any platform. Scrape data from
      Instagram, Facebook, TikTok, YouTube, LinkedIn, X/Twitter, Google Maps,
      Google Search, Google Trends, Reddit, Airbnb, Yelp, and 15+ more
      platforms. Use for lead generation, brand monitoring, competitor analysis,
      influencer discovery, trend research, content analytics, audience
      analysis, review analysis, SEO intelligence, recruitment, or any data
      extraction task.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
