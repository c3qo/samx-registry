# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: google-gemini/gemini-skills
name: Gemini API skills
description: Skill lib for Gemini API, SDK, model, interactions docs.
source:
  type: git
  url: https://github.com/google-gemini/gemini-skills
  revision: 07271879a2dc154cbc55d6d57d14942105ffb64c
capabilities:
  - id: gemini-api-dev
    kind: skill
    path: skills/gemini-api-dev
    description: Use this skill when building applications with Gemini API hosted
      models, including Gemini and Gemma 4, working with multimodal content
      (text, images, audio, video), implementing function calling, using
      structured outputs, or needing current model specifications. Covers SDK
      usage (google-genai for Python, @google/genai for JavaScript/TypeScript,
      com.google.genai:google-genai for Java, google.golang.org/genai for Go),
      model selection, and API capabilities.
  - id: gemini-interactions-api
    kind: skill
    path: skills/gemini-interactions-api
    description: Use this skill when writing code that calls the Gemini API for text
      generation, multi-turn chat, multimodal understanding, image generation,
      streaming responses, background research tasks, function calling,
      structured output, or migrating from the old generateContent API. This
      skill covers the Interactions API, the recommended way to use Gemini
      models and agents in Python and TypeScript.
  - id: gemini-live-api-dev
    kind: skill
    path: skills/gemini-live-api-dev
    description: Use this skill when building real-time, bidirectional streaming
      applications with the Gemini Live API. Covers WebSocket-based
      audio/video/text streaming, voice activity detection (VAD), native audio
      features, function calling, session management, ephemeral tokens for
      client-side auth, live translation, and all Live API configuration
      options. SDKs covered - google-genai (Python), @google/genai
      (JavaScript/TypeScript).
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
