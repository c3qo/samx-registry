schemaVersion: 1
id: microsoft/agent-skills
name: Agent Skills
description: Repo of agent roles + Azure SDK skill packs;
  backend/frontend/infra/planner/presenter/scaffolder agents + lang-specific
  Azure skills.
source:
  type: git
  url: https://github.com/microsoft/agent-skills
  revision: 69e4442a24174cf097ea310332ef549f78cfeef0
capabilities:
  - id: azure-ai-openai-dotnet
    kind: skill
    path: .github/plugins/azure-sdk-dotnet/skills/azure-ai-openai-dotnet
    description: >
      Azure OpenAI SDK for .NET. Client library for Azure OpenAI and OpenAI
      services. Use for chat completions, embeddings, image generation, audio
      transcription, and assistants. Triggers: "Azure OpenAI",
      "AzureOpenAIClient", "ChatClient", "chat completions .NET", "GPT-4",
      "embeddings", "DALL-E", "Whisper", "OpenAI .NET".
  - id: azure-ai-agents-persistent-dotnet
    kind: skill
    path: .github/plugins/azure-sdk-dotnet/skills/azure-ai-agents-persistent-dotnet
    description: >
      Azure AI Agents Persistent SDK for .NET. Low-level SDK for creating and
      managing AI agents with threads, messages, runs, and tools. Use for agent
      CRUD, conversation threads, streaming responses, function calling, file
      search, and code interpreter. Triggers: "PersistentAgentsClient",
      "persistent agents", "agent threads", "agent runs", "streaming agents",
      "function calling agents .NET".
  - id: azure-ai-document-intelligence-dotnet
    kind: skill
    path: .github/plugins/azure-sdk-dotnet/skills/azure-ai-document-intelligence-dotnet
    description: >
      Azure AI Document Intelligence SDK for .NET. Extract text, tables, and
      structured data from documents using prebuilt and custom models. Use for
      invoice processing, receipt extraction, ID document analysis, and custom
      document models. Triggers: "Document Intelligence",
      "DocumentIntelligenceClient", "form recognizer", "invoice extraction",
      "receipt OCR", "document analysis .NET".
  - id: azure-ai-projects-dotnet
    kind: skill
    path: .github/plugins/azure-sdk-dotnet/skills/azure-ai-projects-dotnet
    description: >
      Azure AI Projects SDK for .NET. High-level client for Azure AI Foundry
      projects including agents, connections, datasets, deployments,
      evaluations, and indexes. Use for AI Foundry project management, versioned
      agents, and orchestration. Triggers: "AI Projects", "AIProjectClient",
      "Foundry project", "versioned agents", "evaluations", "datasets",
      "connections", "deployments .NET".
