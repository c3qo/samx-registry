    description: "Use only as the composed drive-to-merge stage of an APM batch
      orchestrator (batch-bug-shepherd, apm-issue-autopilot) that has already
      selected ONE open pull request in microsoft/apm. Do NOT use for
      user-facing requests to triage issues, sweep a queue, or open PRs -- the
      parent orchestrator owns those. Spawn one shepherd-driver subagent per PR:
      it classifies copilot-pull-request-reviewer[bot] inline review, runs the
      apm-review-panel, folds (by default) every recommendation inside the PR's
      stated scope, pushes to the head branch or a superseding PR that preserves
      authorship via commit trailers, watches CI to green, and iterates under
      fixed caps until ready-to-merge, advisory-with-deferred, superseded, or
      blocked. Also provides the cross-PR conflict-resolution and
      mergeability-gate phase. This is NOT a standalone entrypoint."
