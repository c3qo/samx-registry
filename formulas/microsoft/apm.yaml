schemaVersion: 1
id: microsoft/apm
name: APM
description: Agent package mgr; issue/PR/docs/release orchestration w/ multi-persona skills.
source:
  type: git
  url: https://github.com/microsoft/apm
  revision: 788a09a96c8de5276e5654a27dcbf9d5ca8df1c8
capabilities:
  - id: apm-issue-autopilot
    kind: skill
    path: .agents/skills/apm-issue-autopilot
    description: 'Use this skill to drive any open microsoft/apm issue (bug,
      feature, docs, refactor, perf) from raw intake to a mergeable PR with
      triage as the central, paramount gate. Run the apm-triage-panel rubric per
      issue first, then present ONE consolidated triage review for the whole
      batch and escalate to the maintainer BY DEFAULT on any doubt
      (needs-design, decline, duplicate, defer, auto-handle, breaking- change,
      auth/security/governance surface, low arbiter confidence, unbounded scope,
      or a missing brief); only auto-implement clear, bounded, high-confidence
      accepts the maintainer approved. Then drive each accepted PR to
      mergeability batch-bug- shepherd style via the shepherd-driver loop: fold
      copilot + panel follow-ups by default, watch CI green, iterate under a
      bounded cap. Invoke MANUALLY, in-session, on an issue list or queue --
      never by label or event. Activate when the maintainer asks to auto-tackle
      the issue queue, clear the backlog to PRs, or run issues to merge -- even
      if "autopilot" is not named.'
  - id: apm-review-panel
    kind: skill
    path: .agents/skills/apm-review-panel
    description: "Use this skill to run a multi-persona expert advisory review on a
      labelled pull request in microsoft/apm. The panel fans out to five
      mandatory specialists plus a test-coverage specialist (active on every PR
      that touches src/) plus three conditional specialists (auth, doc-writer,
      performance-expert), all running in their own agent threads, and a CEO
      synthesizer. The orchestrator is the sole writer to the PR: ONE
      recommendation comment, no verdict labels, no merge gating. The panel is
      advisory -- it surfaces findings, prioritizes follow-ups, and renders a
      ship-recommendation that the maintainer and author weigh. Activate when a
      non-trivial PR needs a cross-cutting recommendation (architecture, CLI
      logging, DevX UX, supply-chain security, growth/positioning, optionally
      auth, docs, perf, and test coverage, with CEO arbitration)."
  - id: apm-triage-panel
    kind: skill
    path: .agents/skills/apm-triage-panel
    description: Use this skill to triage a single newly opened, reopened, or
      `status/needs-triage`-labelled issue in microsoft/apm. Emit one
      synthesized comment with a triage decision, label set, milestone, and
      suggested next action.
  - id: docs-sync
    kind: skill
    path: .agents/skills/docs-sync
    description: Use this skill whenever a pull request is opened, reopened, or
      synchronized in microsoft/apm to assess whether and how the documentation
      corpus must change to stay truthful with the proposed code change.
      Activate even when the PR title or body says nothing about docs -- the
      skill must run on every PR to detect silent drift between code and docs.
      Classifies impact as no-change, in-place edit (one to a few paragraphs),
      or structural change (new page or TOC reshape), then orchestrates a CDO +
      doc-writer + python-architect + editorial-owner + growth-hacker loop to
      produce a patch-ready advisory. Does NOT review code quality, security, or
      test coverage. Does NOT auto-merge or auto-push doc edits.
  - id: cut-release
    kind: skill
    path: .agents/skills/cut-release
    description: 'Use this skill to cut an APM release from the current worktree:
      assess whether the cycle since the last tag warrants a patch or minor bump
      (semver discipline against the merged-since-last-tag diff), sanitize the
      [Unreleased] CHANGELOG block into a dated version block with one concise
      "so what" entry per merged PR (drop internal-only churn, consolidate
      duplicates), bump pyproject.toml + uv.lock, run the CI-mirror lint chain,
      and open the release PR. Activate on "ship a release", "cut v0.x",
      "release prep", "bump and PR", "open release PR", "what kind of release do
      we need", or any phrasing that ends in opening a release PR -- even when
      the user does not say "skill". Stops BEFORE tagging; tagging stays a human
      gate that triggers the release workflow. Refuses to bump to a major (>=
      1.0.0) version without explicit operator confirmation.'
  - id: pr-description-skill
    kind: skill
    path: .agents/skills/pr-description-skill
    description: 'Use this skill to write the PR description (PR body) for any pull
      request opened against microsoft/apm. Produces one self-sufficient
      GitHub-Flavored Markdown artifact: TL;DR, Problem (WHY), Approach (WHAT),
      Implementation (HOW), 1-3 validated mermaid diagrams, explicit trade-offs,
      validation evidence, and a How-to-test section -- with every WHY-claim
      backed by a verbatim quote from PROSE or Agent Skills. Activate when the
      user asks to "write a PR description", "draft a PR body", "open a PR",
      "fill in the PR template", or any equivalent.'
  - id: auth
    kind: skill
    path: .agents/skills/auth
    description: >
      Activate when code touches token management, credential resolution, git
      auth flows, GITHUB_APM_PAT, ADO_APM_PAT, AuthResolver, HostInfo,
      AuthContext, or any remote host authentication -- even if 'auth' isn't
      mentioned explicitly.
  - id: cli-logging-ux
    kind: skill
    path: .agents/skills/cli-logging-ux
    description: >
      Use this skill when editing or creating CLI output, logging, warnings,
      error messages, progress indicators, or diagnostic summaries in the APM
      codebase. Activate whenever code touches console helpers (_rich_success,
      _rich_warning, _rich_error, _rich_info, _rich_echo), DiagnosticCollector,
      STATUS_SYMBOLS, CommandLogger, or any user-facing terminal output — even
      if the user doesn't mention "logging" or "UX" explicitly.
  - id: docs-corpus-audit
    kind: skill
    path: .agents/skills/docs-corpus-audit
    description: 'Use this skill to run a holistic regrounding pass on the entire
      microsoft/apm documentation corpus against current source code,
      page-by-page, and emit surgical fixes for stale claims. Activate when the
      maintainer wants a WHOLE-CORPUS audit (not per-PR review) -- typical
      triggers include "audit the docs", "reground the corpus", "check every
      page against code", "pre-release docs sweep", "the docs have drifted
      everywhere", or "we just reshaped the TOC, find dead links". Wave-batched
      and S7-verified; scales to the full ~112-page corpus in ~10 minutes
      wall-time. This is a SIBLING to docs-sync, not a replacement: docs-sync is
      per-PR (triggered by a diff); this skill is per-corpus (triggered by a
      maintainer ask). They share agent personas, schemas, and the docs index,
      but their triggers MUST NOT collide. Does NOT auto-merge, does NOT push
      without maintainer review, and does NOT replace per-PR drift detection.'
  - id: apm-spec-guardian
    kind: skill
    path: .agents/skills/apm-spec-guardian
    description: "Use this skill to run a four-panel adversarial advisory review on
      any pull request that touches the OpenAPM specification artifact
      (docs/src/content/docs/specs/openapm-*.md), its inline / sidecar JSON
      Schemas (docs/src/content/docs/specs/schemas/*.schema.json), or the
      conformance fixture seed (tests/fixtures/spec-conformance/**). The panel
      fans out to four spec-ecosystem reviewers (swagger-openapi-editor,
      oci-distribution-editor, pkgmgr-registry-contract-editor,
      w3c-tag-architect), each running in its own agent thread, and a
      spec-editor synthesizer that produces a fold-now / defer-v0.1.1 /
      defer-v0.2 / reject list plus a ship decision keyed off a 1..10
      shocked_meter scale. The orchestrator is the sole writer to the PR: ONE
      consolidated comment, no verdict labels, no merge gating. The panel is
      advisory -- it surfaces findings, prioritizes folds, and renders a ship
      recommendation that the maintainer weighs."
  - id: apm-strategy
    kind: skill
    path: .agents/skills/apm-strategy
    description: Activate for changes to project positioning, release communication,
      community-facing artifacts, or breaking-change decisions in microsoft/apm.
      Triggers on README, MANIFESTO, PRD, CHANGELOG, release workflows, and
      issue templates.
  - id: batch-bug-shepherd
    kind: skill
    path: .agents/skills/batch-bug-shepherd
    description: 'Use this skill to drive a batch of suspected bugs in microsoft/apm
      from raw issue list to mergeable PR queue. Fan out one triage subagent per
      issue (LEGIT / UNCLEAR / FIXED-AT-HEAD), gate every legit bug against
      PRINCIPLES.md via an apm-ceo strategic-alignment pass, cross-reference
      legit issues against open PRs, then open a fix PR (TDD + mutation-break
      gate) for greenfield bugs. Drive every PR -- community in-flight and own
      fix alike -- to mergeable by composing the shepherd-driver skill: one
      driver per PR runs the review panel, folds non-blocking recommendations,
      pushes (preserving author), and watches CI to green. Re-probe mergeability
      and resolve conflicts via shepherd-driver. Maintain a plan.md ground-truth
      table as canonical state. Activate when the maintainer asks to triage
      issues, sweep the bug queue, shepherd bug-flagged issues, run a weekly
      community sweep, or drive in-flight community PRs to merge -- even if
      "shepherd" or "batch" is not named.'
  - id: devx-ux
    kind: skill
    path: .agents/skills/devx-ux
    description: Activate when designing or modifying CLI command surfaces, command
      help text, install/init/run flows, error wording, or first-run experience
      in the APM CLI -- even when the user does not say "UX" explicitly.
  - id: docs-grounding-verifier
    kind: skill
    path: .agents/skills/docs-grounding-verifier
    description: 'Use this skill to verify CLAIM-LEVEL grounding of a documentation
      page (or set of pages) against the source code. Activate when you have
      specific pages to check for factual accuracy -- not when sweeping a whole
      corpus (use docs-corpus-audit for that) and not when triaging a PR diff
      (use docs-sync for that). Trigger nouns: "is this doc accurate", "verify
      the page against the code", "fact-check this section", "any claims that
      drifted from source", "fact-checking", "grounding audit", "drift hunt",
      "claim verification". Returns per-claim verdicts (GROUNDED | PARTIAL |
      CONTRADICTED | UNSUPPORTED) with file:line evidence citations. Catches
      paragraph-level inaccuracies that page-level audit averages over -- e.g. a
      paragraph with 5 claims where 4 are grounded and 1 is fabricated. Does NOT
      modify files (returns advisory only); does NOT re-architect the docs; does
      NOT triage PRs.'
  - id: docs-impact-architect
    kind: skill
    path: .agents/skills/docs-impact-architect
    description: Use this skill when the docs-impact-classifier returns a structural
      verdict, signalling that the documentation TOC must change to accommodate
      the PR. Proposes TOC deltas (new pages, moves, merges) and emits new-page
      outline stubs that the doc-sync panel later fleshes out. Holds the
      3-promise narrative (consume / produce / govern) and the persona ramps as
      hard constraints.
  - id: docs-impact-classifier
    kind: skill
    path: .agents/skills/docs-impact-classifier
    description: Use this skill to classify the documentation impact of a pull
      request diff, returning one of three verdicts -- no-change, in-place edit,
      or structural change -- with bounded LLM cost. Activate as a sibling skill
      of docs-sync; the orchestrator calls this first, before any panel spawn,
      to keep cost floor at 1 LLM call when no docs work is needed. Reads
      .apm/docs-index.yml as the corpus map; never reads the full corpus.
  - id: docs-impact-localizer
    kind: skill
    path: .agents/skills/docs-impact-localizer
    description: Use this skill to translate a classifier's in-place verdict into a
      precise, page-by-page work plan for the docs-sync panel. Activate after
      docs-impact-classifier returns verdict in_place; reads the candidate page
      list, fetches the actual page contents, narrows scope to specific sections
      within each page, and emits the per-page task brief the panel fans out
      against.
  - id: oss-growth
    kind: skill
    path: .agents/skills/oss-growth
    description: Activate for OSS adoption work -- README conversion surfaces,
      quickstart, templates, release announcements, contributor funnel, story
      angles -- and any update to the maintained growth strategy at
      WIP/growth-strategy.md.
  - id: python-architecture
    kind: skill
    path: .agents/skills/python-architecture
    description: >
      Activate when creating new modules, refactoring class hierarchies,
      introducing design patterns, or making changes spanning 3+ files in the
      APM CLI codebase.
  - id: shepherd-driver
    kind: skill
    path: .agents/skills/shepherd-driver
    description: "Use only as the composed drive-to-merge stage of an APM batch
      orchestrator (batch-bug-shepherd, apm-issue-autopilot) that has already
      selected ONE open pull request in microsoft/apm. Do NOT use for
      user-facing requests to triage issues, sweep a queue, or open PRs -- the
      parent orchestrator owns those. Spawn one shepherd-driver subagent per PR:
      it classifies copilot-pull-request-reviewer[bot] inline review, runs the
      apm-review-panel, folds (by default) every recommendation inside the PR's
      stated scope, pushes to the head branch or a superseding PR that preserves
      authorship via commit trailers, watches CI to green, and iterates under
      fixed caps until ready-to-merge, advisory-with-deferred, superseded, or
      blocked. Also provides the cross-PR conflict-resolution and
      mergeability-gate phase. This is NOT a standalone entrypoint."
  - id: supply-chain-security
    kind: skill
    path: .agents/skills/supply-chain-security
    description: Activate when reviewing or modifying dependency resolution,
      lockfile schema, package downloaders, signature/integrity checks, file
      integration cleanup, or anything that could expose APM to dependency
      confusion, typosquatting, malicious packages, or token leakage.
