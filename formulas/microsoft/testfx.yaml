# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: microsoft/testfx
name: TestFX
description: .NET test fw + tooling.
source:
  type: git
  url: https://github.com/microsoft/testfx
  revision: 1c75e4aba3e40568a97efccaea073654a83a0b18
capabilities:
  - id: assertion-quality
    kind: skill
    path: .agents/skills/assertion-quality
    description: "Analyzes the variety and depth of assertions across test suites in
      any language. Use when the user asks to evaluate assertion quality, find
      shallow testing, identify assertion-free tests (no assertions or only
      trivial ones like Assert.IsNotNull / expect(x).toBeTruthy() / assert x is
      not None), flag self-referential or tautological assertions (output equals
      input on identity/round-trip operations), measure assertion coverage
      diversity, or audit whether tests verify different facets of correctness.
      Produces metrics and actionable recommendations. Polyglot: .NET
      (MSTest/xUnit/NUnit/TUnit), Python (pytest/unittest), TS/JS
      (Jest/Vitest/Mocha/Jasmine/node:test), Java (JUnit/TestNG), Go, Ruby
      (RSpec/Minitest), Rust, Swift (XCTest/Swift Testing), Kotlin
      (JUnit/Kotest), PowerShell (Pester), C++ (GoogleTest/Catch2/doctest). DO
      NOT USE FOR: writing new tests (use code-testing-agent, or
      writing-mstest-tests for MSTest), anti-patterns like flakiness or
      duplication (use test-anti-patterns), fixing assertions."
  - id: code-testing-agent
    kind: skill
    path: .agents/skills/code-testing-agent
    description: "Generates and writes new unit tests for any programming language —
      scaffolds .NET test projects, pytest suites, Vitest/Jest suites, Go test
      files, and JUnit suites, and configures coverage tooling (coverlet,
      pytest-cov, @vitest/coverage-v8) as part of test generation. Use when
      asked to generate tests, generate pytest tests, generate Vitest tests,
      write unit tests, add tests, improve coverage, comprehensive tests, or
      scaffold a new test project or suite for an app, service, library, REST
      API, blueprint, or package — including project-wide, multi-file test
      generation across services, repositories, routes, and modules. Supports
      C#/.NET, Python (pytest, Flask/Django), TypeScript/JavaScript (Vitest,
      Jest, Mocha), Go, Rust, Java (JUnit). Runs a research, planning, and
      implementation pipeline so tests compile and pass. DO NOT USE FOR: running
      existing tests (use run-tests); analyzing existing coverage reports (use
      coverage-analysis or crap-score); MSTest modernization (use
      writing-mstest-tests)."
  - id: coverage-analysis
    kind: skill
    path: .agents/skills/coverage-analysis
    description: >
      Project-wide code coverage and CRAP (Change Risk Anti-Patterns) score
      analysis for .NET projects. Calculates CRAP scores per method and surfaces
      risk hotspots — complex code with low coverage that is dangerous to
      modify. Use to diagnose why coverage is stuck or plateaued, identify what
      methods block improvement, or get project-wide coverage analysis with risk
      ranking. USE FOR: coverage stuck, coverage plateau, can't increase
      coverage, what's blocking coverage, coverage gap, CRAP scores, risk
      hotspots, where to add tests, coverage analysis, coverage report. DO NOT
      USE FOR: targeted single-method CRAP analysis (use crap-score), writing
      tests, running tests without coverage, or troubleshooting test execution
      (use run-tests).
  - id: crap-score
    kind: skill
    path: .agents/skills/crap-score
    description: >
      Calculates targeted CRAP (Change Risk Anti-Patterns) scores for a named
      .NET method, class, or single source file. Use when the user explicitly
      asks to compute CRAP scores or assess risky untested code for a specific
      target, combining Cobertura coverage data with cyclomatic complexity
      analysis. DO NOT USE FOR: project-wide coverage analysis, coverage plateau
      or "stuck coverage" diagnosis, what's blocking coverage, or where to add
      tests across a project (use coverage-analysis); writing tests; running
      tests without CRAP context.
  - id: run-tests
    kind: skill
    path: .agents/skills/run-tests
    description: >
      For `dotnet test`: figures out which test platform (VSTest vs
      Microsoft.Testing.Platform) a project uses from `Directory.Build.props`,
      `global.json`, and `.csproj`, then picks the matching command syntax. USE
      FOR: running, filtering, or troubleshooting `dotnet test`; identifying the
      test runner/platform from project files; `--` separator rules on .NET SDK
      8/9 vs 10+; choosing the right filter syntax for MSTest / xUnit / NUnit /
      TUnit (--filter, --filter-class, --filter-trait, --filter-query,
      --treenode-filter); TRX/reporting (--report-trx vs --logger trx);
      blame/hang/crash diagnostics (--blame-hang-timeout, --blame-crash);
      running tests against a single target framework when a project targets
      multiple TFMs (e.g., `<TargetFrameworks>net8.0;net9.0</TargetFrameworks>`,
      `--framework <TFM>`); and avoiding MTP/VSTest argument mixups (--logger
      trx on MTP, --report-trx on VSTest, --blame on MTP). DO NOT USE FOR:
      writing/generating test code, CI/CD config, or debugging failing test
      logic.
  - id: migrate-vstest-to-mtp
    kind: skill
    path: .agents/skills/migrate-vstest-to-mtp
    description: >
      Migrates .NET test projects from VSTest to Microsoft.Testing.Platform
      (MTP). Use when user asks to "migrate to MTP", "switch from VSTest",
      "enable Microsoft.Testing.Platform", "use MTP runner", or mentions
      EnableMSTestRunner, EnableNUnitRunner, or
      UseMicrosoftTestingPlatformRunner. USE FOR: MTP behavioral differences vs
      VSTest (exit code 8, zero tests discovered, --ignore-exit-code,
      TESTINGPLATFORM_EXITCODE_IGNORE), conditioning OutputType=Exe to test
      projects when centralizing MTP properties in Directory.Build.props.
      Supports MSTest, NUnit, xUnit.net v2 (via YTest.MTP.XUnit2), and xUnit.net
      v3 (native MTP). Covers runner enablement, CLI argument translation,
      xUnit.net v3 filter migration (--filter-class, --filter-trait,
      --filter-query), Directory.Build.props and global.json config, CI/CD
      pipeline updates, and MTP extension packages. DO NOT USE FOR: migrating
      between test frameworks (MSTest/xUnit/NUnit), xUnit.net v2 to v3 API
      migration, MSTest version upgrades, TFM upgrades, or UWP/WinUI test
      projects.
  - id: writing-mstest-tests
    kind: skill
    path: .agents/skills/writing-mstest-tests
    description: >
      Write new MSTest unit tests and fix existing MSTest code using MSTest
      3.x/4.x modern APIs and best practices. USE FOR: write or create MSTest
      unit tests, fix or modernize MSTest assertions, better MSTest assertion
      than Assert.IsTrue, replace hard cast with MSTest type assertion, MSTest
      assertion APIs (IsInstanceOfType, Contains, ContainsSingle, HasCount,
      IsEmpty, IsNotEmpty, DoesNotContain, StartsWith, EndsWith, MatchesRegex,
      IsGreaterThan, IsInRange, IsNull), fix swapped Assert.AreEqual arguments,
      replace ExpectedException with Assert.Throws, data-driven tests (DataRow,
      DynamicData, ValueTuples), test lifecycle (sealed classes, TestInitialize,
      TestCleanup), async tests and cancellation tokens, test parallelization
      (Parallelize / DoNotParallelize), MSTest.Sdk project setup. DO NOT USE
      FOR: broad test quality audits (use test-anti-patterns), running tests
      (use run-tests), MSTest version migration (use migrate-mstest-v1v2-to-v3
      or migrate-mstest-v3-to-v4), xUnit/NUnit/TUnit, or non-.NET languages.
  - id: binlog-failure-analysis
    kind: skill
    path: .agents/skills/binlog-failure-analysis
    description: "Analyze MSBuild binary logs to diagnose build failures by
      replaying binlogs to searchable text logs. Only activate in MSBuild/.NET
      build context. USE FOR: build errors that are unclear from console output,
      diagnosing cascading failures across multi-project builds, tracing MSBuild
      target execution order, investigating common errors like CS0246 (type not
      found), MSB4019 (imported project not found), NU1605 (package downgrade),
      MSB3277 (version conflicts), and ResolveProjectReferences failures.
      Requires an existing .binlog file. DO NOT USE FOR: generating binlogs (use
      binlog-generation), build performance analysis (use
      build-perf-diagnostics), non-MSBuild build systems. INVOKES: dotnet
      msbuild binlog replay, grep, cat, head, tail for log analysis."
  - id: binlog-generation
    kind: skill
    path: .agents/skills/binlog-generation
    description: "Generate MSBuild binary logs (binlogs) for build diagnostics and
      analysis. Only activate in MSBuild/.NET build context. USE FOR: adding
      /bl:{} to any dotnet build, test, pack, publish, or restore command to
      capture a full build execution trace, prerequisite for
      binlog-failure-analysis and build-perf-diagnostics skills, enabling
      post-build investigation of errors or performance. Requires MSBuild 17.8+
      / .NET 8 SDK+ for {} placeholder; PowerShell needs -bl:{{}}. DO NOT USE
      FOR: non-MSBuild build systems (npm, Maven, CMake), analyzing an existing
      binlog (use binlog-failure-analysis instead). INVOKES: shell commands
      (dotnet build /bl:{})."
  - id: build-parallelism
    kind: skill
    path: .agents/skills/build-parallelism
    description: "Guide for optimizing MSBuild build parallelism and multi-project
      scheduling. Only activate in MSBuild/.NET build context. USE FOR: builds
      not utilizing all CPU cores, speeding up multi-project solutions,
      evaluating graph build mode (/graph), build time not improving with -m
      flag, understanding project dependency topology. Note: /maxcpucount
      default is 1 (sequential) — always use -m for parallel builds. Covers
      /maxcpucount, graph build for better scheduling and isolation,
      BuildInParallel on MSBuild task, reducing unnecessary ProjectReferences,
      solution filters (.slnf) for building subsets. DO NOT USE FOR:
      single-project builds, incremental build issues (use incremental-build),
      compilation slowness within a project (use build-perf-diagnostics),
      non-MSBuild build systems. INVOKES: dotnet build -m, dotnet build /graph,
      binlog analysis."
  - id: build-perf-baseline
    kind: skill
    path: .agents/skills/build-perf-baseline
    description: "Establish build performance baselines and apply systematic
      optimization techniques. Only activate in MSBuild/.NET build context. USE
      FOR: diagnosing slow builds, establishing before/after measurements (cold,
      warm, no-op scenarios), applying optimization strategies like MSBuild
      Server, static graph builds, artifacts output, and dependency graph
      trimming. Start here before diving into build-perf-diagnostics,
      incremental-build, or build-parallelism. DO NOT USE FOR: non-MSBuild build
      systems, detailed bottleneck analysis (use build-perf-diagnostics after
      baselining)."
  - id: build-perf-diagnostics
    kind: skill
    path: .agents/skills/build-perf-diagnostics
    description: "Diagnose MSBuild build performance bottlenecks using binary log
      analysis. Only activate in MSBuild/.NET build context. USE FOR:
      identifying why builds are slow by analyzing binlog performance summaries,
      detecting ResolveAssemblyReference (RAR) taking >5s, Roslyn analyzers
      consuming >30% of Csc time, single targets dominating >50% of build time,
      node utilization below 80%, excessive Copy tasks, NuGet restore running
      every build. Covers timeline analysis, Target/Task Performance Summary
      interpretation, and 7 common bottleneck categories. Use after
      build-perf-baseline has established measurements. DO NOT USE FOR:
      establishing initial baselines (use build-perf-baseline first), fixing
      incremental build issues (use incremental-build), parallelism tuning (use
      build-parallelism), non-MSBuild build systems. INVOKES: dotnet msbuild
      binlog replay with performancesummary, grep for analysis."
  - id: check-bin-obj-clash
    kind: skill
    path: .agents/skills/check-bin-obj-clash
    description: "Detects MSBuild projects with conflicting OutputPath or
      IntermediateOutputPath. Only activate in MSBuild/.NET build context. USE
      FOR: builds failing with 'Cannot create a file when that file already
      exists', 'The process cannot access the file because it is being used by
      another process', intermittent build failures that succeed on retry,
      missing outputs in multi-project builds, multi-targeting builds where
      project.assets.json conflicts. Diagnoses when multiple projects or TFMs
      write to the same bin/obj directories due to shared OutputPath, missing
      AppendTargetFrameworkToOutputPath, or extra global properties like
      PublishReadyToRun creating redundant evaluations. DO NOT USE FOR: file
      access errors unrelated to MSBuild (OS-level locking), single-project
      single-TFM builds, non-MSBuild build systems. INVOKES: dotnet msbuild
      binlog replay, grep for output path analysis."
  - id: code-testing-extensions
    kind: skill
    path: .agents/skills/code-testing-extensions
    description: Provides file paths to language-specific extension files for the
      code-testing pipeline. Call this skill to discover available extension
      guidance files (e.g., dotnet.md for .NET, cpp.md for C++). Do not use
      directly — invoked by code-testing agents and skills that need
      language-specific references.
  - id: detect-static-dependencies
    kind: skill
    path: .agents/skills/detect-static-dependencies
    description: >
      Scan C# source files for hard-to-test static dependencies —
      DateTime.Now/UtcNow, File.*, Directory.*, Environment.*, HttpClient,
      Console.*, Process.*, and other untestable statics. Produces a ranked
      report of static call sites by frequency. USE FOR: find untestable
      statics, scan for static dependencies, testability audit, identify
      hard-to-mock code, find DateTime.Now usage, detect static coupling,
      testability report, static analysis for testability. DO NOT USE FOR:
      generating wrappers (use generate-testability-wrappers), migrating code
      (use migrate-static-to-wrapper), general code review, or finding statics
      that are already behind abstractions.
  - id: directory-build-organization
    kind: skill
    path: .agents/skills/directory-build-organization
    description: "Guide for organizing MSBuild infrastructure with
      Directory.Build.props, Directory.Build.targets, Directory.Packages.props,
      and Directory.Build.rsp. Only activate in MSBuild/.NET build context. USE
      FOR: structuring multi-project repos, centralizing build settings,
      implementing NuGet Central Package Management (CPM) with
      ManagePackageVersionsCentrally, consolidating duplicated properties across
      .csproj files, setting up multi-level Directory.Build hierarchy with
      GetPathOfFileAbove, understanding evaluation order (Directory.Build.props
      → SDK .props → .csproj → SDK .targets → Directory.Build.targets). Critical
      pitfall: $(TargetFramework) conditions in .props silently fail for
      single-targeting projects — must use .targets. DO NOT USE FOR: non-MSBuild
      build systems, migrating legacy projects to SDK-style (use
      msbuild-modernization), single-project solutions with no shared settings.
      INVOKES: no tools — pure knowledge skill."
  - id: dotnet-test-frameworks
    kind: skill
    path: .agents/skills/dotnet-test-frameworks
    description: Reference data for .NET test framework detection patterns,
      assertion APIs, skip annotations, setup/teardown methods, and common test
      smell indicators across MSTest, xUnit, NUnit, and TUnit. Loaded by test
      analysis skills (test-anti-patterns) as framework-specific lookup tables.
  - id: eval-performance
    kind: skill
    path: .agents/skills/eval-performance
    description: "Guide for diagnosing and improving MSBuild project evaluation
      performance. Only activate in MSBuild/.NET build context. USE FOR: builds
      slow before any compilation starts, high evaluation time in binlog
      analysis, expensive glob patterns walking large directories (node_modules,
      .git, bin/obj), deep import chains (>20 levels), preprocessed output >10K
      lines indicating heavy evaluation, property functions with file I/O
      ($([System.IO.File]::ReadAllText(...))), multiple evaluations per project.
      Covers the 5 MSBuild evaluation phases, glob optimization via
      DefaultItemExcludes, import chain analysis with /pp preprocessing. DO NOT
      USE FOR: compilation-time slowness (use build-perf-diagnostics),
      incremental build issues (use incremental-build), non-MSBuild build
      systems. INVOKES: dotnet msbuild -pp:full.xml for preprocessing,
      /clp:PerformanceSummary."
  - id: filter-syntax
    kind: skill
    path: .agents/skills/filter-syntax
    description: "Reference data for test filter syntax across all platform and
      framework combinations: VSTest --filter expressions, MTP filters for
      MSTest/NUnit/xUnit v3/TUnit, and VSTest-to-MTP filter translation. DO NOT
      USE directly — loaded by run-tests, mtp-hot-reload, and
      migrate-vstest-to-mtp when they need filter syntax."
  - id: generate-testability-wrappers
    kind: skill
    path: .agents/skills/generate-testability-wrappers
    description: >
      Generate wrapper interfaces and DI registration for hard-to-test static
      dependencies in C#. Produces IFileSystem, IEnvironmentProvider, IConsole,
      IProcessRunner wrappers, or guides adoption of TimeProvider and
      IHttpClientFactory. USE FOR: generate wrapper for static, create
      IFileSystem wrapper, wrap DateTime.Now, make static testable, make class
      testable, create abstraction for File.*, generate DI registration,
      TimeProvider adoption, IHttpClientFactory setup, testability wrapper,
      mock-friendly interface, mock time in tests, create the right abstraction
      to mock, how to mock DateTime, test code using File.ReadAllText, what
      abstraction for Environment, how to make statics injectable, adopt
      System.IO.Abstractions, make file calls testable. DO NOT USE FOR:
      detecting statics (use detect-static-dependencies), migrating call sites
      (use migrate-static-to-wrapper), general interface design not about
      testability.
  - id: grade-tests
    kind: skill
    path: .agents/skills/grade-tests
    description: >
      Grades a specified set of test methods individually and produces a concise
      table mapping each test (fully-qualified name) to a letter grade (A–F), a
      score band, and a one-line note — designed to be posted as a PR comment.
      Use when the caller wants per-test feedback on a curated list of methods
      (for example, the new or modified tests in a pull request), not a
      suite-wide audit. Polyglot: .NET (MSTest/xUnit/NUnit/TUnit), Python
      (pytest/unittest), TS/JS (Jest/Vitest/Mocha/node:test), Java
      (JUnit/TestNG), Go, Ruby (RSpec/Minitest), Rust, Swift (XCTest/Swift
      Testing), Kotlin (JUnit/Kotest), PowerShell (Pester), C++
      (GoogleTest/Catch2/doctest). Input is a list of test methods (or method
      bodies / file+line spans); output is a compact markdown table plus a short
      summary. DO NOT USE FOR: full suite audits (use test-quality-auditor agent
      or test-anti-patterns), writing new tests (use code-testing-generator
      agent or writing-mstest-tests), fixing failures, or measuring code
      coverage.
  - id: including-generated-files
    kind: skill
    path: .agents/skills/including-generated-files
    description: "Fix MSBuild targets that generate files during the build but those
      files are missing from compilation or output. Only activate in
      MSBuild/.NET build context. USE FOR: generated source files not compiling
      (CS0246 for a type that should exist), custom build tasks that create
      files but they are invisible to subsequent targets, globs not capturing
      build-generated files because they expand at evaluation time before
      execution creates them, ensuring generated files are cleaned by the Clean
      target. Covers correct BeforeTargets timing (CoreCompile, BeforeBuild,
      AssignTargetPaths), adding to Compile/FileWrites item groups, using
      $(IntermediateOutputPath) instead of hardcoded obj/ paths. DO NOT USE FOR:
      C# source generators that already work via the Roslyn pipeline, T4
      design-time generation that runs in Visual Studio, non-MSBuild build
      systems. INVOKES: no tools — pure knowledge skill."
  - id: incremental-build
    kind: skill
    path: .agents/skills/incremental-build
    description: "Guide for optimizing MSBuild incremental builds. Only activate in
      MSBuild/.NET build context. USE FOR: builds slower than expected on
      subsequent runs, 'nothing changed but it rebuilds anyway', diagnosing why
      targets re-execute unnecessarily, fixing broken no-op builds. Covers 8
      common causes: missing Inputs/Outputs on custom targets, volatile
      properties in output paths (timestamps/GUIDs), file writes outside tracked
      Outputs, missing FileWrites registration, glob changes, Visual Studio Fast
      Up-to-Date Check (FUTDC) issues. Key diagnostic: look for 'Building target
      completely' vs 'Skipping target' in binlog. DO NOT USE FOR: first-time
      build slowness (use build-perf-baseline), parallelism issues (use
      build-parallelism), evaluation-phase slowness (use eval-performance),
      non-MSBuild build systems. INVOKES: dotnet build /bl, binlog replay with
      diagnostic verbosity."
  - id: migrate-mstest-v1v2-to-v3
    kind: skill
    path: .agents/skills/migrate-mstest-v1v2-to-v3
    description: >
      Migrate MSTest v1 or v2 test project to MSTest v3. Use when user says
      "upgrade MSTest", "upgrade to MSTest v3", "migrate to MSTest v3", "update
      test framework", "modernize tests", "MSTest v3 migration", "MSTest
      compatibility", "MSTest v2 to v3", or build errors after updating MSTest
      packages from 1.x/2.x to 3.x. USE FOR: upgrading from MSTest v1 assembly
      references (Microsoft.VisualStudio.QualityTools.UnitTestFramework) or
      MSTest v2 NuGet (MSTest.TestFramework 1.x-2.x) to MSTest v3, fixing
      assertion overload errors (AreEqual/AreNotEqual), updating DataRow
      constructors, replacing .testsettings with .runsettings, timeout behavior
      changes, target framework compatibility (.NET 5 dropped -- use .NET 6+;
      .NET Fx older than 4.6.2 dropped), adopting MSTest.Sdk. First step toward
      MSTest v4 -- after this, use migrate-mstest-v3-to-v4. DO NOT USE FOR:
      migrating to MSTest v4 (use migrate-mstest-v3-to-v4), migrating between
      frameworks (MSTest to xUnit/NUnit), or general .NET upgrades unrelated to
      MSTest.
  - id: migrate-mstest-v3-to-v4
    kind: skill
    path: .agents/skills/migrate-mstest-v3-to-v4
    description: >
      Fix build errors and breaking changes after upgrading MSTest from v3 to
      v4, or plan a complete MSTest v3-to-v4 migration. Use when user says
      "upgrade to MSTest v4", "MSTest 4 migration", "MSTest v4 breaking
      changes", "tests don't compile after upgrading MSTest", or has errors
      CS0507, CS0103, CS1061, CS1615 after updating MSTest packages from 3.x to
      4.x. USE FOR: Execute to ExecuteAsync, CallerInfo constructor on
      TestMethodAttribute, sealed custom attributes, ClassCleanupBehavior
      removal, TestContext.Properties Contains to ContainsKey,
      Assert.ThrowsException to ThrowsExactly, Assert.IsInstanceOfType out
      parameter removal, ExpectedExceptionAttribute removal, TestTimeout enum
      removal, [TestMethod("name")] to DisplayName syntax,
      TreatDiscoveryWarningsAsErrors, TestContext.TestName in ClassInitialize,
      MSTest.Sdk MTP changes, dropped TFMs (net6.0/net7.0 to net8.0+). DO NOT
      USE FOR: migrating from MSTest v1/v2 to v3 (use migrate-mstest-v1v2-to-v3
      first), migrating between test frameworks, or general .NET upgrades.
  - id: migrate-static-to-wrapper
    kind: skill
    path: .agents/skills/migrate-static-to-wrapper
    description: >
      Mechanically replace static dependency call sites with wrapper or built-in
      abstraction calls across a bounded scope (file, project, or namespace).
      Performs codemod-style bulk replacement of DateTime.UtcNow to
      TimeProvider.GetUtcNow(), File.ReadAllText to IFileSystem, and similar
      transformations. Adds constructor injection parameters and updates DI
      registration. USE FOR: replace DateTime.UtcNow with TimeProvider, replace
      DateTime.Now with TimeProvider, migrate static calls to wrapper, bulk
      replace File.* with IFileSystem, codemod static to injectable, add
      constructor injection for time provider, mechanical migration of statics,
      refactor DateTime to TimeProvider, swap static for injected dependency,
      convert static calls to use abstraction, replace statics in a class,
      migrate one file to TimeProvider, scoped migration, update call sites. DO
      NOT USE FOR: detecting statics (use detect-static-dependencies),
      generating wrappers (use generate-testability-wrappers), migrating between
      test frameworks.
  - id: migrate-xunit-to-mstest
    kind: skill
    path: .agents/skills/migrate-xunit-to-mstest
    description: |
      Migrate .NET test projects from xUnit.net (v2 or v3) to MSTest v4. USE FOR: convert/migrate xUnit tests to MSTest, replace xunit/xunit.v3 packages, port [Fact]/[Theory]/[InlineData]/[MemberData]/[ClassData] to [TestMethod]/[DataRow]/[DynamicData], port Assert.Equal/True/Throws/ThrowsAsync to Assert.AreEqual/IsTrue/ThrowsExactly/ThrowsExactlyAsync, port IClassFixture/ ICollectionFixture/IDisposable/IAsyncLifetime/ITestOutputHelper/[Trait]/[Fact(Skip)] to MSTest equivalents, preserve xUnit parallel-class default via [assembly: Parallelize(Scope = ClassLevel)], remove xunit.runner.json. DO NOT USE FOR: xUnit v2 -> v3 upgrade (use migrate-xunit-to-xunit-v3); MSTest -> xUnit, NUnit/TUnit -> MSTest (no skills exist); MSTest version upgrades (use migrate-mstest-v1v2-to-v3 or migrate-mstest-v3-to-v4); VSTest <-> MTP only (use migrate-vstest-to-mtp); general .NET upgrades.
  - id: migrate-xunit-to-xunit-v3
    kind: skill
    path: .agents/skills/migrate-xunit-to-xunit-v3
    description: >
      Migrates .NET test projects from xUnit.net v2 to xUnit.net v3. USE FOR:
      upgrading xunit to xunit.v3. DO NOT USE FOR: migrating between test
      frameworks (MSTest/NUnit to xUnit.net), migrating from VSTest to
      Microsoft.Testing.Platform (use migrate-vstest-to-mtp). For xUnit v3 MTP
      filter syntax (--filter-class, --filter-trait, --filter-query), also load
      migrate-vstest-to-mtp.
  - id: msbuild-antipatterns
    kind: skill
    path: .agents/skills/msbuild-antipatterns
    description: "Catalog of MSBuild anti-patterns with detection rules and fix
      recipes. Only activate in MSBuild/.NET build context. USE FOR: reviewing,
      auditing, or cleaning up .csproj, .vbproj, .fsproj, .props, .targets, or
      .proj files. Each anti-pattern has a symptom, explanation, and concrete
      BAD→GOOD transformation. Covers Exec-instead-of-built-in-task, unquoted
      conditions, hardcoded paths, restating SDK defaults, scattered package
      versions, and more. DO NOT USE FOR: non-MSBuild build systems (npm, Maven,
      CMake, etc.), project migration to SDK-style (use msbuild-modernization)."
  - id: msbuild-modernization
    kind: skill
    path: .agents/skills/msbuild-modernization
    description: 'Guide for modernizing and migrating MSBuild project files to
      SDK-style format. Only activate in MSBuild/.NET build context. USE FOR:
      converting legacy .csproj/.vbproj with verbose XML to SDK-style, migrating
      packages.config to PackageReference, removing Properties/AssemblyInfo.cs
      in favor of auto-generation, eliminating explicit <Compile Include> lists
      via implicit globbing, consolidating shared settings into
      Directory.Build.props. Indicators of legacy projects: ToolsVersion
      attribute, <Import Project="$(MSBuildToolsPath)">, .csproj files > 50
      lines for simple projects. DO NOT USE FOR: projects already in SDK-style
      format, non-.NET build systems (npm, Maven, CMake), .NET Framework
      projects that cannot move to SDK-style. INVOKES: dotnet try-convert,
      upgrade-assistant tools.'
  - id: msbuild-server
    kind: skill
    path: .agents/skills/msbuild-server
    description: Guide for using MSBuild Server to improve CLI build performance.
      Only activate in MSBuild/.NET build context. Activate when developers
      report slow incremental builds from the command line, or when CLI builds
      are noticeably slower than IDE builds. Covers MSBUILDUSESERVER=1
      environment variable for persistent server-based caching. Do not activate
      for IDE-based builds (Visual Studio already uses a long-lived process).
  - id: mtp-hot-reload
    kind: skill
    path: .agents/skills/mtp-hot-reload
    description: >
      Suggests using Microsoft Testing Platform (MTP) hot reload to iterate
      fixes on failing tests without rebuilding. Use when user says "hot reload
      tests", "iterate on test fix", "run tests without rebuilding", "speed up
      test loop", "fix test faster", or needs to set up MTP hot reload to
      rapidly iterate on test failures. Covers setup (NuGet package, environment
      variable, launchSettings.json) and the iterative workflow for fixing
      tests. DO NOT USE FOR: writing test code, diagnosing test failures,
      running tests normally with dotnet test (use run-tests), applying test
      filters, producing TRX reports, CI/CD pipeline configuration, or Visual
      Studio Test Explorer hot reload (which is a different feature).
  - id: platform-detection
    kind: skill
    path: .agents/skills/platform-detection
    description: Reference data for detecting the test platform (VSTest vs
      Microsoft.Testing.Platform) and test framework (MSTest, xUnit, NUnit,
      TUnit) from project files. DO NOT USE directly — loaded by run-tests,
      mtp-hot-reload, and migrate-vstest-to-mtp when they need detection logic.
  - id: resolve-project-references
    kind: skill
    path: .agents/skills/resolve-project-references
    description: Guide for interpreting ResolveProjectReferences time in MSBuild
      performance summaries. Only activate in MSBuild/.NET build context.
      Activate when ResolveProjectReferences appears as the most expensive
      target and developers are trying to optimize it directly. Explains that
      the reported time includes wait time for dependent project builds and is
      misleading. Guides users to focus on task self-time instead. Do not
      activate for general build performance -- use build-perf-diagnostics
      instead.
  - id: test-analysis-extensions
    kind: skill
    path: .agents/skills/test-analysis-extensions
    description: Provides file paths to language-specific reference files for the
      test ANALYSIS skills (assertion-quality, test-anti-patterns,
      test-gap-analysis, test-smell-detection, test-tagging). Call this skill to
      discover available extension files (e.g., dotnet.md for
      .NET/MSTest/xUnit/NUnit/TUnit, python.md for pytest/unittest,
      typescript.md for Jest/Vitest/Mocha, java.md for JUnit/TestNG, etc.). Do
      not use directly — invoked by the test-quality-auditor agent and polyglot
      analysis skills that need framework-specific lookup tables (test markers,
      assertion APIs, skip annotations, sleep patterns, mystery guest
      indicators, integration markers, setup/teardown, tag-support capability).
  - id: test-anti-patterns
    kind: skill
    path: .agents/skills/test-anti-patterns
    description: >
      Audits existing test code in any language for anti-patterns and quality
      issues — produces a severity-ranked report (Critical / Warning / Info)
      with concrete code-level fixes. Polyglot: .NET (MSTest/xUnit/NUnit/
      TUnit), Python (pytest/unittest), TS/JS (Jest/Vitest/Mocha/node:test),
      Java (JUnit/TestNG), Go, Ruby (RSpec/Minitest), Rust, Swift, Kotlin
      (JUnit/Kotest), PowerShell (Pester), C++ (GoogleTest/Catch2). INVOKE when
      asked to audit, review, rank, or find problems in existing tests — "audit
      my tests", "test smell audit", "rank by severity", tests that pass but
      verify nothing, no/missing assertions, swallowed exceptions, always-true /
      self-comparing / tautological assertions, broad exception types, flakiness
      (sleep/Date.now/time.sleep), ordering dependency, shared global state,
      duplicated tests, magic values, missing await on async assertions. DO NOT
      USE FOR: writing new tests (use code-testing-agent, or
      writing-mstest-tests for MSTest); running tests (use run-tests); framework
      migration.
  - id: test-gap-analysis
    kind: skill
    path: .agents/skills/test-gap-analysis
    description: "Performs pseudo-mutation analysis on production code in any
      language to find gaps in existing test suites. Use when the user asks to
      find weak tests, discover untested edge cases, check if tests would catch
      a bug, or evaluate test effectiveness through mutation-style reasoning.
      Analyzes production code for mutation points (boundaries, boolean flips,
      null/None/nil returns, exception/error removal, arithmetic changes) and
      checks whether tests would detect each mutation. Polyglot: .NET
      (MSTest/xUnit/NUnit/TUnit), Python (pytest/unittest), TS/JS
      (Jest/Vitest/Mocha/node:test), Java (JUnit/TestNG), Go, Ruby
      (RSpec/Minitest), Rust, Swift, Kotlin (JUnit/Kotest), PowerShell (Pester),
      C++ (GoogleTest/Catch2). DO NOT USE FOR: writing new tests (use
      code-testing-agent, or writing-mstest-tests for MSTest), detecting
      anti-patterns (use test-anti-patterns), measuring assertion diversity (use
      assertion-quality), or running actual mutation testing tools (Stryker,
      mutmut, PIT, cargo-mutants)."
  - id: test-smell-detection
    kind: skill
    path: .agents/skills/test-smell-detection
    description: >
      Deep-dive audit using the full testsmells.org 19-smell academic catalog
      for tests in any language. Every finding maps to a named, citable smell
      from the research literature (Assertion Roulette, Duplicate Assert,
      Mystery Guest, Eager Test, Sensitive Equality, Conditional Test Logic,
      Sleepy Test, Magic Number Test, etc.) with research-backed severity.
      Polyglot: .NET (MSTest/xUnit/NUnit/TUnit), Python (pytest/unittest), TS/JS
      (Jest/Vitest/Mocha/node:test), Java (JUnit/TestNG), Go, Ruby
      (RSpec/Minitest), Rust, Swift, Kotlin (JUnit/Kotest), PowerShell (Pester),
      C++ (GoogleTest/Catch2). INVOKE ONLY when explicitly asked for the
      testsmells.org 19-smell academic catalog or citable smell names from the
      literature. DO NOT USE FOR: general or pragmatic audits — use
      test-anti-patterns; writing new tests (use code-testing-agent, or
      writing-mstest-tests for MSTest); running tests (use run-tests); framework
      migration.
  - id: test-tagging
    kind: skill
    path: .agents/skills/test-tagging
    description: Analyzes test suites in any language and tags each test with a
      standardized set of traits (positive, negative, critical-path, boundary,
      smoke, regression, integration, performance, security). Use when the user
      wants to categorize, audit, or label tests with traits. Works with .NET
      (MSTest TestCategory / xUnit Trait / NUnit Category / TUnit Property),
      Python (pytest markers; unittest has no canonical tag syntax so
      report-only), TypeScript/JavaScript (Jest/Vitest test names,
      describe-block conventions), Java (JUnit 5 @Tag / TestNG groups), Go
      (subtest naming / build tags / file _test.go), Ruby (RSpec metadata), Rust
      (cargo test naming / cfg attributes), Swift (XCTest test plans / Swift
      Testing @Tag), Kotlin (JUnit @Tag / Kotest tags), PowerShell (Pester
      -Tag), C++ (GoogleTest filter prefixes / Catch2 [tags] / doctest
      decorators). Auto-edits when the framework has canonical syntax; falls
      back to report-only otherwise. Do not use for writing new tests, running
      tests, or migrating frameworks.
  - id: post-release-activities
    kind: skill
    path: .github/skills/post-release-activities
    description: Systematic activities that need to be performed after a release is done.
requirements:
