schemaVersion: 1
id: microsoft/dataverse-skills
name: Dataverse Skills
description: Dataverse/Dynamics skill pack → MCP, SDK, PAC CLI for
  connect/query/data/meta/solution/admin/security.
source:
  type: git
  url: https://github.com/microsoft/dataverse-skills
  revision: 1175021761a2f135ea7505208f074ed0fae45255
capabilities:
  - id: dv-admin
    kind: skill
    path: .github/plugins/dataverse/skills/dv-admin
    description: Environment-level Dataverse administration — bulk delete,
      retention/archival, organization settings, OrgDB settings, recycle bin,
      audit, and the 37 allowlisted PPAC toggles. Use when the user wants to
      clean up data at scale, configure audit, change environment settings, or
      manage retention policies.
  - id: dv-connect
    kind: skill
    path: .github/plugins/dataverse/skills/dv-connect
    description: One-step setup for a Dataverse environment — installs tools,
      authenticates, registers the MCP server, and writes `.env`. Use when
      starting a new project, switching environments, fixing authentication, or
      troubleshooting an MCP connection that won't come up.
  - id: dv-data
    kind: skill
    path: .github/plugins/dataverse/skills/dv-data
    description: Record-level CRUD and bulk operations via the Python SDK — create,
      update, delete, upsert, CSV import, multi-table foreign-key loads,
      AI-generated sample data. Use when the user wants to write, modify, seed,
      or import data records into Dataverse tables.
  - id: dv-metadata
    kind: skill
    path: .github/plugins/dataverse/skills/dv-metadata
    description: Dataverse schema authoring via the Python SDK and Web API — tables,
      columns, relationships, forms, and views. Use when the user wants to
      define or evolve the data model — add a column, create a table, set up a
      lookup, customize a form, or build a view.
  - id: dv-overview
    kind: skill
    path: .github/plugins/dataverse/skills/dv-overview
    description: Tool routing and cross-cutting rules for Dataverse work — which
      skill applies to which task, environment-confirmation, and pull-to-repo.
      Use when the user mentions Dataverse, Dynamics 365, Power Platform, or
      CRM; this skill picks the specialist (dv-connect / dv-data / dv-metadata /
      dv-query / dv-solution / dv-admin / dv-security) for the request.
  - id: dv-query
    kind: skill
    path: .github/plugins/dataverse/skills/dv-query
    description: Bulk reads, multi-page iteration, and analytics over Dataverse data
      via the Python SDK and Web API. Use when the user wants to read, list,
      filter, aggregate, group, join, or analyze records — including pandas
      DataFrame workflows and notebook exploration.
  - id: dv-security
    kind: skill
    path: .github/plugins/dataverse/skills/dv-security
    description: Security-role assignment, user access, application users, business
      units, and admin self-elevation in Dataverse environments. Use when the
      user wants to give someone access, grant a role, become an admin, or add a
      service principal.
  - id: dv-solution
    kind: skill
    path: .github/plugins/dataverse/skills/dv-solution
    description: Dataverse solution lifecycle — create, export, import, promote
      across environments, and validate deployments. Use when the user wants to
      package customizations, deploy to another environment, or move work
      between dev / test / prod.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
