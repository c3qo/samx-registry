# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: microsoft/fabric-skills
name: Microsoft Fabric Skills
description: AI skills pack for Fabric auth, authoring, consumption, ops.
source:
  type: git
  url: https://github.com/microsoft/fabric-skills
  revision: 4ef99a57e8673e7db640686c051c9b76068710e5
capabilities:
  - id: fabriciq
    kind: mcp
    path: .mcp.json
  - id: spark-authoring-cli
    kind: skill
    path: plugins/fabric-authoring/skills/spark-authoring-cli
    description: >
      Develop Microsoft Fabric Spark/data engineering workflows and write code
      in Fabric Notebook cells with intelligent routing to specialized
      resources. Provides workspace/lakehouse management, notebook code
      authoring (PySpark, Scala, SparkR, SQL), and routes to: data engineering
      patterns, development workflow, or infrastructure orchestration. Use when
      the user wants to: (1) manage Fabric workspaces and resources, (2) write
      or debug code in notebook cells, (3) use notebookutils, (4) develop
      notebooks and PySpark applications, (5) design data pipelines, (6)
      provision infrastructure as code. Triggers: "develop notebook", "data
      engineering", "workspace setup", "pipeline design", "infrastructure
      provisioning", "Delta Lake patterns", "Spark development", "lakehouse
      configuration", "write notebook code", "notebookutils", "notebook cell",
      "PySpark notebook", "%%sql cell", "%%configure", "fabric notebook", "run
      notebook", "notebook deployment".
  - id: semantic-model-authoring
    kind: skill
    path: plugins/fabric-authoring/skills/semantic-model-authoring
    description: >
      Develops and manages Power BI semantic models across Desktop, PBIP
      projects, and Fabric Service. Handles: (1) creating new models (Import,
      DirectQuery, Direct Lake), (2) editing existing models (e.g. measures,
      tables, columns, relationships), (3) deploying models to Fabric
      workspaces, (4) working with PBIP project files, (5) refreshing semantic
      models, (6) configuring data sources and permissions, (7) DAX performance
      optimization. Supports both Power BI Desktop and Fabric Service
      development workflows. For read-only DAX queries, use
      `semantic-model-consumption`. Does NOT handle report layout/visual
      authoring, workspace administration, or RLS/OLS role membership
      management. Triggers: "create semantic model", "edit semantic model", "add
      a DAX measure to semantic model", "refresh semantic model", "set semantic
      model permissions", "Prepare semantic model for AI/Copilot".
  - id: activator-authoring-cli
    kind: skill
    path: plugins/fabric-authoring/skills/activator-authoring-cli
    description: >
      Create alerts, notifications, and automated actions on Fabric data and
      events via Fabric REST API and `az rest` CLI. **Invoke this skill**
      whenever the user wants to: (1) create, update, or delete an alert or
      notification flow, (2) send a Teams message, email, or run a Fabric item
      when something happens, (3) connect alert logic to Eventhouse,
      Eventstream, Real-time Hub, or DTB / Ontology data, (4) adjust thresholds,
      filters, event triggers, or actions, (5) troubleshoot or change an
      existing Activator/Reflex definition. Invoke this skill **before** asking
      clarifying questions — clarification is part of this skill, not a preamble
      to it. Triggers: "create an alert", "create an activator", "create a
      reflex", "create an activator item", "create an alert item", "notify me
      when", "let me know when", "take action when", "send me an email when",
      "send a teams message when", "run a pipeline when", "update an alert",
      "delete an alert", "activator rule"
  - id: check-updates
    kind: skill
    path: plugins/fabric-authoring/skills/check-updates
    description: >
      Check for skills-for-fabric marketplace updates at session start. Compares
      local version  against GitHub releases and shows changelog if updates are
      available. Use when the  user wants to: (1) check for skill updates, (2)
      see what's new in skills-for-fabric,  (3) verify current version.
      Triggers: "check for updates", "am I up to date",  "what version", "update
      skills", "show changelog".
  - id: dataflows-authoring-cli
    kind: skill
    path: plugins/fabric-authoring/skills/dataflows-authoring-cli
    description: >
      Create, update, delete, and refresh Fabric Dataflows Gen2 via write-side
      CLI against Fabric Items and Connections APIs. Builds mashup.pq +
      queryMetadata definitions, triggers parameterized refreshes, manages
      connections, and configures output destinations (Lakehouse, Warehouse,
      ADX, Azure SQL). Includes preview-driven authoring loop (executeQuery +
      customMashupDocument). For executing saved queries or reading refresh
      status, use `dataflows-consumption-cli`. Triggers: "create dataflow",
      "update dataflow", "delete dataflow", "trigger dataflow refresh", "refresh
      dataflow", "preview Power Query M", "preview mashup", "preview before
      save", "iterate dataflow M", "create Fabric data source connection",
      "create dataflow connection", "bind connection", "list
      supportedConnectionTypes", "dataflow output destination", "dataflow write
      to lakehouse", "dataflow write to warehouse", "dataflow write to ADX",
      "DataDestinations annotation", "author dataflow".
  - id: dataflows-save-as-authoring-cli
    kind: skill
    path: plugins/fabric-authoring/skills/dataflows-save-as-authoring-cli
    description: >
      Assess, plan, and execute dataflow Gen1 → Gen2.1 CI/CD save-as operations
      via CLI (az rest / curl) against Power BI REST and Fabric REST APIs. Scan
      workspaces or entire tenants for Gen1 dataflows, evaluate save-as
      readiness with seven risk signals (incremental refresh, BYOSA storage,
      Power Automate triggers, pipeline dependencies, linked entities,
      DirectQuery, caller-not-owner), produce a Save-As Readiness Snapshot
      (markdown + JSON), and invoke the SaveAsNativeArtifact API to create
      upgraded Gen2.1 copies of Gen1 dataflows. **Invoke this skill** whenever
      the user wants to: (1) discover Gen1 dataflows in a workspace or tenant,
      (2) assess save-as readiness and risk signals, (3) upgrade or migrate Gen1
      into a Gen2.1 copy, (4) validate post-save-as data integrity, (5) detect
      residual Gen1 references. Triggers: "save Gen1 dataflow", "convert
      dataflow Gen1", "upgrade dataflow", "migrate dataflow", "dataflow
      readiness", "Gen1 to Gen2", "dataflow save-as assessment",
      "saveAsNativeArtifact", "dataflow save-as scan".
  - id: e2e-medallion-architecture
    kind: skill
    path: plugins/fabric-authoring/skills/e2e-medallion-architecture
    description: >
      Implement end-to-end Medallion Architecture (Bronze/Silver/Gold) lakehouse
      patterns in Microsoft Fabric using PySpark, Delta Lake, and Fabric
      Pipelines. Use when the user wants to: (1) design a Bronze/Silver/Gold
      data lakehouse, (2) set up multi-layer workspace with lakehouses for each
      tier, (3) build ingestion-to-analytics pipelines with data quality
      enforcement, (4) optimize Spark configurations per medallion layer, (5)
      orchestrate Bronze-to-Silver-to-Gold flows via notebooks. Triggers:
      "medallion architecture", "bronze silver gold", "lakehouse layers", "e2e
      data pipeline", "end-to-end lakehouse", "data lakehouse pattern",
      "multi-layer lakehouse", "build medallion", "setup medallion".
  - id: eventhouse-authoring-cli
    kind: skill
    path: plugins/fabric-authoring/skills/eventhouse-authoring-cli
    description: >
      Execute KQL management commands (table management, ingestion, policies,
      functions, materialized views) against Fabric Eventhouse and KQL Databases
      via CLI. Use when the user wants to:
        1. Create or alter KQL tables, columns, or functions
        2. Ingest data into an Eventhouse (inline, from storage, streaming)
        3. Configure retention, caching, or partitioning policies
        4. Create or manage materialized views and update policies
        5. Manage data mappings for ingestion pipelines
        6. Deploy KQL schema via scripts
      Triggers: "create kql table", "kql ingestion", "ingest into eventhouse",
      "kql function", "materialized view", "kql retention policy", "eventhouse
      schema", "kql authoring", "create eventhouse table", "kql mapping"
  - id: eventstream-authoring-cli
    kind: skill
    path: plugins/fabric-authoring/skills/eventstream-authoring-cli
    description: >
      Create, wire, and publish Microsoft Fabric Eventstream real-time event
      streaming topologies via the Fabric Items REST API. Build graph-based
      definitions with 25 source types (Event Hubs, IoT Hub, CDC connectors,
      Kafka, SampleData), 8 transformation operators (Filter, Aggregate,
      GroupBy, Join, ManageFields, Union, Expand, SQL), 4 destination types
      (Lakehouse Delta, Eventhouse, Activator, Custom Endpoint), and
      DefaultStream/DerivedStream routing. Use when the user wants to: (1)
      author or publish an Eventstream topology, (2) add CDC sources with
      SQL-based Debezium payload flattening, (3) assemble multi-table fan-out
      routing, (4) modify or delete Eventstream definitions. Triggers: "create
      eventstream", "deploy eventstream", "design eventstream topology", "CDC
      source", "eventstream operator", "real-time ingestion pipeline",
      "eventstream definition", "update eventstream".
  - id: sqldw-authoring-cli
    kind: skill
    path: plugins/fabric-authoring/skills/sqldw-authoring-cli
    description: >
      Execute authoring T-SQL (DDL, DML, data ingestion, transactions, schema
      changes) against Microsoft Fabric Data Warehouse and SQL endpoints from
      agentic CLI environments. Use when the user wants to: (1)
      create/alter/drop tables from terminal, (2) insert/update/delete/merge
      data via CLI, (3) run COPY INTO or OPENROWSET ingestion, (4) manage
      transactions or stored procedures, (5) perform schema evolution, (6) use
      time travel or snapshots, (7) generate ETL/ELT shell scripts, (8) create
      views/functions/procedures on Lakehouse SQLEP. Triggers: "create table in
      warehouse", "insert data via T-SQL", "load from ADLS", "COPY INTO", "run
      ETL with T-SQL", "alter warehouse table", "upsert with T-SQL", "merge into
      warehouse", "create T-SQL procedure", "warehouse time travel", "recover
      deleted warehouse data", "create warehouse schema", "deploy warehouse",
      "transaction conflict", "snapshot isolation error".
  - id: fabriciq-2
    kind: mcp
    path: plugins/fabric-consumption/.mcp.json
  - id: activator-consumption-cli
    kind: skill
    path: plugins/fabric-consumption/skills/activator-consumption-cli
    description: >
      Inspect existing alerts, notifications, and automated actions in Fabric
      via read-only REST API calls using `az rest` CLI. **Invoke this skill**
      whenever the user wants to: (1) list existing alerts in a workspace, (2)
      inspect how an alert or notification is configured, (3) read and decode an
      Activator/Reflex definition (ReflexEntities.json), (4) list rules,
      sources, and actions behind an alert, (5) understand why an alert fires or
      what action it takes. **Invoke this skill before answering questions**
      about an Activator/Reflex item in a Fabric workspace — the listing,
      lookup, and decoding workflows are part of this skill, not preamble to it.
      Triggers: "show my alerts", "what alerts do I have", "inspect this alert",
      "show me the rule", "show me the action", "show me the source", "get
      reflex definition", "list activators", "list alerts", "list reflex items",
      "show activator items", "activator details", "find activator named"
  - id: check-updates-2
    kind: skill
    path: plugins/fabric-consumption/skills/check-updates
    description: >
      Check for skills-for-fabric marketplace updates at session start. Compares
      local version  against GitHub releases and shows changelog if updates are
      available. Use when the  user wants to: (1) check for skill updates, (2)
      see what's new in skills-for-fabric,  (3) verify current version.
      Triggers: "check for updates", "am I up to date",  "what version", "update
      skills", "show changelog".
  - id: dataflows-consumption-cli
    kind: skill
    path: plugins/fabric-consumption/skills/dataflows-consumption-cli
    description: >
      Monitor, inspect, and query saved Fabric Dataflows Gen2 via read-only CLI.
      List dataflows, decode base64 definitions (mashup.pq, queryMetadata.json,
      .platform), discover parameters, retrieve refresh status and job history,
      classify queries by staging, and execute queries against saved dataflows
      via the read-side `executeQuery` mashup engine (Arrow IPC response). Three
      executeQuery read modes: (a) execute a persisted query by QueryName, (b)
      run an ad-hoc read-only customMashupDocument **with no intent to
      persist**, (c) parse and render Arrow results. For previewing candidate M
      before persisting via updateDefinition, use `dataflows-authoring-cli`.
      Triggers: "list dataflows", "inspect dataflow", "decode dataflow
      definition", "dataflow parameters", "dataflow refresh status", "refresh
      history", "last refresh status", "dataflow job history", "execute dataflow
      query", "executeQuery saved query", "executeQuery fetch rows", "ad-hoc
      dataflow query", "parse Arrow response", "Arrow IPC", "dataflow staging
      analysis".
  - id: eventhouse-consumption-cli
    kind: skill
    path: plugins/fabric-consumption/skills/eventhouse-consumption-cli
    description: >
      Run KQL queries against Fabric Eventhouse for real-time intelligence and
      time-series analytics using `az rest` against the Kusto REST API. Covers
      KQL operators (where, summarize, join, render), Eventhouse schema
      discovery (.show tables), time-series patterns with bin(), and ingestion
      monitoring. Use when the user wants to:
        1. Run read-only KQL queries against an Eventhouse or KQL Database
        2. Discover Eventhouse table schema and metadata
        3. Analyse real-time or time-series data with KQL operators
        4. Monitor ingestion health and active KQL queries
        5. Export KQL results to JSON
      Triggers: "kql query", "kusto query", "eventhouse query", "kql database",
      "real-time intelligence", "time-series kql", "query eventhouse", "explore
      eventhouse", "show tables kql"
  - id: eventstream-consumption-cli
    kind: skill
    path: plugins/fabric-consumption/skills/eventstream-consumption-cli
    description: >
      List, inspect, and monitor Microsoft Fabric Eventstream real-time event
      ingestion pipelines via the Fabric Items REST API. Discover Eventstreams
      across workspaces, decode base64-encoded graph topologies to trace event
      flow from source through operators to destination nodes. Validate source
      connection IDs, destination wiring, retention policies (1-90 days), and
      throughput levels. Use when the user wants to: (1) list or search
      Eventstreams in a workspace, (2) decode and trace graph topology from
      source to destination, (3) validate source and destination configurations,
      (4) check retention and throughput settings. Triggers: "list
      eventstreams", "show eventstream", "inspect eventstream", "explain
      eventstream", "eventstream health", "monitor eventstream", "describe
      eventstream", "check eventstream configuration", "eventstream retention".
  - id: fabriciq-3
    kind: skill
    path: plugins/fabric-consumption/skills/fabriciq
    description: >
      Answer business questions by querying Power BI reports and dashboards
      through the FabricIQ MCP endpoint. Orchestrates: discover Power BI
      artifacts, inspect report/model schemas, resolve entity values, generate
      DAX, execute queries. Returns plain-language answers from Power BI
      semantic models. Use when the user asks a natural-language question about
      Power BI report or dashboard content (not raw DAX). Triggers: "ask power
      bi", "PBI question", "discover report", "report data", "dashboard data",
      "what are the top", "show me the power bi data", "which products sold",
      "compare sales in report".
  - id: search-consumption-cli
    kind: skill
    path: plugins/fabric-consumption/skills/search-consumption-cli
    description: >
      Find and discover Microsoft Fabric items across workspaces when the
      workspace is unknown. Use when the user wants to: (1) find an item by name
      across workspaces, (2) list items of specific type across workspaces, (3)
      identify which workspace contains an item, (4) return item/workspace IDs
      for downstream API calls. Triggers: "which workspace has", "where is",
      "what items do I have", "do I have", "find item", "find all items",
      "search for item", "discover items", "find across workspaces".
  - id: semantic-model-consumption
    kind: skill
    path: plugins/fabric-consumption/skills/semantic-model-consumption
    description: >
      Execute raw DAX queries and inspect metadata of Microsoft Fabric Power BI
      semantic models via the MCP server ExecuteQuery tool. Use when the user
      already knows the DAX to write, wants to run EVALUATE statements, or needs
      to inspect model metadata (tables, columns, measures, relationships,
      hierarchies) using INFO functions. For natural-language business questions
      (where you generate the DAX), use `fabriciq`. For creating, deploying, or
      managing semantic model definitions, use `semantic-model-authoring`.
      Triggers: "run DAX query", "execute EVALUATE", "semantic model metadata",
      "list semantic model tables", "INFO.VIEW.TABLES", "get measure
      expression", "DAX against", "query the model".
  - id: spark-consumption-cli
    kind: skill
    path: plugins/fabric-consumption/skills/spark-consumption-cli
    description: >
      Analyze lakehouse data interactively using Fabric Lakehouse Livy API
      sessions and PySpark/Spark SQL for advanced analytics, DataFrames,
      cross-lakehouse joins, Delta time-travel, and unstructured/JSON data. Use
      when the user explicitly asks for PySpark, Spark DataFrames, Livy
      sessions, or Python-based analysis — NOT for simple SQL queries. Triggers:
      "PySpark", "Spark SQL", "analyze with PySpark", "Spark DataFrame", "Livy
      session", "lakehouse with Python", "PySpark analysis", "PySpark data
      quality", "Delta time-travel with Spark".
  - id: sqldw-consumption-cli
    kind: skill
    path: plugins/fabric-consumption/skills/sqldw-consumption-cli
    description: >
      Execute read-only T-SQL queries against Fabric Data Warehouse, Lakehouse
      SQL Endpoints, and Mirrored Databases via CLI. Default skill for any
      lakehouse data query (row counts, SELECT, filtering, aggregation) unless
      the user explicitly requests PySpark or Spark DataFrames. Use when the
      user wants to: (1) query warehouse/lakehouse data, (2) count rows or
      explore lakehouse tables, (3) discover schemas/columns, (4) generate T-SQL
      scripts, (5) monitor SQL performance, (6) export results to CSV/JSON.
      Triggers: "warehouse", "SQL query", "T-SQL", "query warehouse", "show
      warehouse tables", "show lakehouse tables", "query lakehouse", "lakehouse
      table", "how many rows", "count rows", "SQL endpoint", "describe warehouse
      schema", "generate T-SQL script", "warehouse performance", "export SQL
      data", "connect to warehouse", "lakehouse data", "explore lakehouse".
