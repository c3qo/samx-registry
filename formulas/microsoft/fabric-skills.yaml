  - id: spark-operations-cli
    kind: skill
    path: plugins/fabric-operations/skills/spark-operations-cli
    description: >
      Diagnose failed Spark jobs, unhealthy Livy sessions, and performance
      bottlenecks in Microsoft Fabric via read-only CLI triage. Use when the
