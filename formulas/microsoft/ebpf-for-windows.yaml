schemaVersion: 1
id: microsoft/ebpf-for-windows
name: eBPF for Windows
description: "Windows eBPF stack: drivers, libs, tools, tests."
source:
  type: git
  url: https://github.com/microsoft/ebpf-for-windows
  revision: b6133414cca3ba561e675505d3d288ad1d044b12
capabilities:
  - id: adversarial-branch-review
    kind: skill
    path: .github/skills/adversarial-branch-review
    description: >
      Perform a deep adversarial review of C/C++ changes between an active
      branch and a baseline branch in ebpf-for-windows. Produce both a detailed
      review report and a point-by-point fix list.
  - id: build-ebpf
    kind: skill
    path: .github/skills/build-ebpf
    description: >
      Build the eBPF for Windows repository — entire solution or specific
      components. Use this skill when asked to build, compile, rebuild, restore,
      or clean the project or any of its components (drivers, libraries, tools,
      tests, etc.).
  - id: build-prevail
    kind: skill
    path: .github/skills/build-prevail
    description: >
      Build and test the PREVAIL verifier (external/ebpf-verifier) standalone.
      Use this skill when asked to build, test, or iterate on the PREVAIL
      verifier, run YAML verification tests, or work with the verifier's cmake
      build system.
  - id: debug-crash-dump
    kind: skill
    path: .github/skills/debug-crash-dump
    description: >
      Download and analyze crash dumps from CI failures using CDB/WinDbg. Use
      this skill when asked to debug crashes, analyze dump files, set up
      WinDbg/CDB, investigate fault injection failures, or start mcp-windbg.
  - id: verify-bpf
    kind: skill
    path: .github/skills/verify-bpf
    description: >
      Build and verify eBPF programs for the ebpf-for-windows project. Use this
      skill when asked to compile a .c BPF source to .o, verify a .o ELF file
      with bpf2c, or diagnose verification failures. Covers the full clang→bpf2c
      pipeline.
  - id: verify-prevail
    kind: skill
    path: .github/skills/verify-prevail
    description: >
      Diagnose eBPF program verification failures from the PREVAIL verifier. Use
      this skill for linux-compatible eBPF programs verified in the standalone
      PREVAIL repo (external/ebpf-verifier). For programs using Windows-specific
      features (bpf2c pipeline, Windows helpers, ebpf-for-windows headers), use
      the 'verify-bpf' skill instead.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
