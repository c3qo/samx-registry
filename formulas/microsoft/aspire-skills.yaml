schemaVersion: 1
id: microsoft/aspire-skills
name: Aspire Skills
description: Aspire app agent skill pack; routing, init/wire, deploy, monitor, review.
source:
  type: git
  url: https://github.com/microsoft/aspire-skills
  revision: 035607cfa7d52caa769a4c466989da481b9d3e86
capabilities:
  - id: pr-review
    kind: skill
    path: .github/skills/pr-review
    description: '**AUTHOR SKILL (internal to microsoft/aspire-skills).** Reviews
      pull requests *into this repo* for problems only — bugs, regressions,
      missing eval coverage, frontmatter or routing damage, plugin-manifest
      drift, hook safety, and other concrete issues. Drives a six-step workflow:
      identify the PR, ensure the branch is available locally, gather context,
      categorize changes, review, present findings for triage, and post selected
      comments as a review. USE FOR: review this PR, review the current branch,
      review pull request, gh pr view, gh pr diff, "what should I check before
      merging", PR review of changes to skills/, evals/, hooks/, .plugin/,
      .claude-plugin/, gemini-extension.json, CHANGELOG.md, copilot-hooks.json.
      DO NOT USE FOR: reviewing application code in *consumer* Aspire projects
      (this skill is scoped to microsoft/aspire-skills authoring); end-user
      Aspire workflows (use the shipped `aspire` router and its sub-skills);
      generic code review on unrelated repos. REFERENCES:
      aspire-skills-review-checklist.md, code-review-best-practices.md,
      common-bugs-checklist.md, severity-labels.md.'
  - id: context7
    kind: mcp
    path: .mcp.json
  - id: aspire-deployment
    kind: skill
    path: skills/aspire-deployment
    description: '**WORKFLOW SKILL** — Deploy Aspire apps from AppHost models to
      Docker Compose, Kubernetes, Azure, or AWS. WHEN: "deploy Aspire app",
      "publish Aspire artifacts", "deploy to Azure Container Apps", "generate
      Kubernetes artifacts", "tear down Aspire deployment". INVOKES: aspire CLI,
      Aspire docs, target cloud/container CLIs. FOR SINGLE OPERATIONS: use
      generic Azure, Kubernetes, Docker, or AWS tools only when no Aspire
      AppHost exists.'
  - id: aspire-init
    kind: skill
    path: skills/aspire-init
    description: "**WORKFLOW SKILL** - First-run flow for adding Aspire to a repo.
      Picks `aspire new` (greenfield) or `aspire init` (existing repo), drops
      the AppHost skeleton, then hands off to `aspireify` for resource wiring.
      USE FOR: aspire init, aspire new, aspire-starter, aspire-ts-starter,
      aspire-py-starter, add Aspire to existing repo, scaffold Aspire app,
      bootstrap Aspire, no AppHost detected, install aspireify, generated
      .aspire/modules. DO NOT USE FOR: AppHost wiring on an existing AppHost
      (use aspireify), start/stop/wait (use aspire-orchestration),
      deploy/publish (use aspire-deployment), logs/traces (use
      aspire-monitoring), repo that already has an AppHost. INVOKES: aspire CLI
      (init, new, doctor), aspireify (handoff after skeleton drop). FOR SINGLE
      OPERATIONS: Run `aspire init` or `aspire new TEMPLATE` directly."
  - id: aspire-monitoring
    kind: skill
    path: skills/aspire-monitoring
    description: "**ANALYSIS SKILL** - Observe Aspire apps: logs, traces, metrics,
      resource state, telemetry export, browser telemetry, and the standalone
      dashboard. Routes between local Aspire CLI, AKS workload diagnostics, and
      deployed Azure resource health. USE FOR: aspire logs, aspire otel logs,
      aspire otel traces, aspire otel spans, aspire describe, aspire ps, aspire
      export, aspire dashboard run, --include-hidden, browser logs in dashboard,
      WithBrowserLogs, App Insights query, AKS pod logs, container app logs. DO
      NOT USE FOR: start/stop/wait (use aspire-orchestration),
      deploy/publish/destroy (use aspire-deployment), AppHost code edits like
      WithBrowserLogs() (use aspireify), Azure provisioning (use azure-prepare).
      INVOKES: aspire CLI, azure-diagnostics (deployed Azure), kubectl +
      Container Insights. FOR SINGLE OPERATIONS: Run the aspire CLI command
      directly for quick log or describe lookups."
  - id: aspire-orchestration
    kind: skill
    path: skills/aspire-orchestration
    description: '**WORKFLOW SKILL** — Manage Aspire AppHost lifecycle and recover
      from file locks, port conflicts, and orphaned processes. WHEN: "start my
      Aspire app", "aspire start", "aspire stop", "aspire wait", "restart the
      API service", "file lock error", "MSB3491", "CS2012", "port already in
      use", "upgrade Aspire CLI", "aspire update --self", "proxies missing in
      aspire ps", "--include-hidden", "aspire integration list", "aspire
      integration search", "default watch", "hot reload". INVOKES: aspire CLI
      (start, stop, wait, ps, resource, integration, add, init, doctor, update,
      restore). FOR SINGLE OPERATIONS: Run the aspire CLI command directly.'
  - id: aspire
    kind: skill
    path: skills/aspire
    description: "**WORKFLOW SKILL** - Top-level router for Aspire 13.4 distributed
      apps. Detects the AppHost, enforces safety guardrails, and routes to the
      right sub-skill. USE FOR: Aspire AppHost detected, aspire CLI, distributed
      app, cloud-native .NET, aspire start, aspire stop, aspire resource, aspire
      deploy, aspire destroy, aspire publish, aspire init, aspire new, aspire
      add, aspire integration list/search, aspire wait, aspire describe, aspire
      ps, aspire dashboard run, aspire doctor, aspire update, aspire logs,
      aspire otel, --include-hidden, aspireify, WithBrowserLogs, custom
      dashboard/resource commands, .aspire/modules recovery, Playwright URL
      discovery. DO NOT USE FOR: non-Aspire .NET projects (use dotnet directly),
      Azure provisioning without Aspire (use azure-prepare), container-only
      repos with no AppHost, ordinary build/test tasks. INVOKES: aspire-init,
      aspireify, aspire-orchestration, aspire-deployment, aspire-monitoring. FOR
      SINGLE OPERATIONS: Route directly to the matching sub-skill."
  - id: aspireify
    kind: skill
    path: skills/aspireify
    description: "**WORKFLOW SKILL** - Wire an Aspire AppHost after `aspire init`
      drops a skeleton. Scans the repo, proposes a resource graph, edits the
      AppHost (C#, file-based C#, or TypeScript), wires `Aspire.ServiceDefaults`
      + OTel, validates with `aspire start`, then self-deactivates. USE FOR:
      wire AppHost, scaffold resource graph, add Postgres/Redis/Rabbit/Mongo to
      Aspire, connect frontend to API, after `aspire init` what next,
      AddNextJsApp, AddViteApp, WithBrowserLogs, file-based apphost.cs,
      apphost.ts, unified withEnvironment, refuse .aspire/modules edit, migrate
      .env files, migrate user secrets. DO NOT USE FOR: skeleton drop (use
      aspire-init), start/stop/wait/restart (use aspire-orchestration),
      publish/deploy/destroy (use aspire-deployment), logs/traces (use
      aspire-monitoring). INVOKES: aspire CLI (add, start, wait, describe, docs
      api search, stop), AppHost source edits, ServiceDefaults wiring. FOR
      SINGLE OPERATIONS: Run `aspire add PACKAGE` directly for a one-off
      integration."
requirements:
  env:
    - COPILOT_GITHUB_TOKEN
hooks:
  mode: explicit
  entries: []
advisories:
  - id: unlinked-hook-files
    severity: warning
    category: hooks
    message: Repository contains hook-related files that are not linked by this formula.
    paths:
      - hooks/hooks.json
      - hooks/scripts/track-telemetry.ps1
      - hooks/scripts/track-telemetry.sh
    reason: These files lack explicit appliesTo mappings, supported targets, or
      supported file types.
    effect: SAMX will not install, link, or execute these files.
    action: Add explicit hook entries only after manual review.
