schemaVersion: 1
id: microsoft/azure-skills
name: Azure Skills
description: Azure MCP skill pack for Azure ops, deploy, diag, AI, AKS, cost, Kusto.
source:
  type: git
  url: https://github.com/microsoft/azure-skills
  revision: 3edfc3e7636d20c43fe7b24e9e6ca2c9e41c4ac7
capabilities:
  - id: azure
    kind: mcp
    path: .github/plugins/azure-skills/.mcp.json
  - id: azure-prepare
    kind: skill
    path: .github/plugins/azure-skills/skills/azure-prepare
    description: 'Prepare Azure apps for deployment (infra Bicep/Terraform,
      azure.yaml, Dockerfiles). Use for create/modernize or create+deploy; not
      cross-cloud migration (use azure-cloud-migrate). DO NOT USE FOR:
      copilot-sdk apps (use azure-hosted-copilot-sdk), or Python code-only App
      Service deploys (use python-appservice-deploy). WHEN: "create app", "build
      web app", "create API", "modernize application", "host on Azure", "deploy
      to Azure", "deploy to Azure using Terraform", "deploy to Azure App
      Service", "deploy to Azure App Service using Terraform", "deploy to Azure
      Container Apps", "generate Terraform", "generate Bicep", "function app",
      "timer trigger", "service bus trigger", "event-driven function", "managed
      identity".'
  - id: azure-deploy
    kind: skill
    path: .github/plugins/azure-skills/skills/azure-deploy
    description: 'Execute Azure deployments for ALREADY-PREPARED applications that
      have existing .azure/deployment-plan.md and infrastructure files. DO NOT
      use this skill when the user asks to CREATE a new application — use
      azure-prepare instead. This skill runs azd up, azd deploy, terraform
      apply, and az deployment commands with built-in error recovery. Requires
      .azure/deployment-plan.md from azure-prepare and validated status from
      azure-validate. WHEN: "run azd up", "run azd deploy", "execute
      deployment", "push to production", "push to cloud", "go live", "ship it",
      "bicep deploy", "terraform apply", "publish to Azure", "launch on Azure".
      DO NOT USE WHEN: "create and deploy", "build and deploy", "create a new
      app", "set up infrastructure", "create and deploy to Azure using
      Terraform" — use azure-prepare for these.'
  - id: azure-diagnostics
    kind: skill
    path: .github/plugins/azure-skills/skills/azure-diagnostics
    description: "Debug Azure production issues on Azure using AppLens, Azure
      Monitor, resource health, and safe triage. WHEN: debug production issues,
      troubleshoot app service, app service high CPU, app service deployment
      failure, troubleshoot container apps, troubleshoot functions, troubleshoot
      AKS, kubectl cannot connect, kube-system/CoreDNS failures, pod pending,
      crashloop, node not ready, upgrade failures, analyze logs, KQL, insights,
      image pull failures, cold start issues, health probe failures, resource
      health, root cause of errors, troubleshoot event hubs, troubleshoot
      service bus, messaging SDK error, AMQP connection failure, message lock
      lost, service bus dead letter."
  - id: airunway-aks-setup
    kind: skill
    path: .github/plugins/azure-skills/skills/airunway-aks-setup
    description: 'Set up AI Runway on AKS — from bare cluster to running model.
      Covers cluster verification, controller install, GPU assessment, provider
      setup, and first deployment. WHEN: "setup AI Runway", "onboard AKS
      cluster", "install AI Runway", "airunway setup", "deploy model to AKS",
      "GPU inference on AKS", "KAITO setup on AKS", "run LLM on AKS", "vLLM on
      AKS", "set up model serving on AKS", "AI Runway controller".'
