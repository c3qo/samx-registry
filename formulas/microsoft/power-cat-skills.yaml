# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: microsoft/power-cat-skills
name: Power CAT Skills
description: Power Platform skill plugins for admin, Canvas, Dataverse,
  governance, adoption, and pro-code.
source:
  type: git
  url: https://github.com/microsoft/power-cat-skills
  revision: be97c60ea9f87542ef6286b6f5a5886d3e8f9ef6
capabilities:
  - id: analyze-canvas-performance
    kind: skill
    path: plugins/powercat-canvas-apps/skills/analyze-canvas-performance
    description: "Analyze and audit a Power Apps canvas app. USE WHEN the user wants
      to analyze, profile, audit, review, diagnose, or improve a Canvas App or
      pa.yaml files. USE FOR: slow apps, long load times, delegation warnings,
      N+1 database calls, excessive collections, ForAll optimization, OnStart
      overload, Named Formulas, Concurrent execution, Explicit Column Selection,
      DelayOutput on text inputs, cross-screen control references, Power
      Automate overuse, unused variables, nested galleries, error handling,
      App.OnError, form validation, naming conventions, variable scope misuse,
      modern controls, responsive layout, accessibility. DO NOT USE WHEN the app
      has not been synced locally yet — sync it first."
  - id: infopath-to-canvas
    kind: skill
    path: plugins/powercat-canvas-apps/skills/infopath-to-canvas
    description: Migrate a Microsoft InfoPath form (.xsn) to a Power Apps Canvas
      app. USE WHEN the user wants to convert, port, or migrate an InfoPath
      form/template to Canvas Apps, or asks for help moving off of InfoPath.
  - id: migrate-to-dataverse
    kind: skill
    path: plugins/powercat-canvas-apps/skills/migrate-to-dataverse
    description: Read the YAML files of an existing Canvas App and replace Power FX
      data source calls with equivalent Dataverse table calls. USE WHEN the user
      wants to migrate, replace, or update data source references in pa.yaml
      files to point to Dataverse tables.
  - id: design-guide
    kind: skill
    path: plugins/powercat-code-apps/skills/design-guide
    description: "Generate a brand-aligned design guide for a new code app instead
      of using the default template styling. Use when: the user wants to start a
      new app with their own brand identity, mentions 'design guide', 'brand
      guidelines', 'style guide', or wants to customize the look and feel before
      building. This skill runs BEFORE the code-apps plugin to establish brand
      tokens, then delegates app creation to /create-code-app."
  - id: powercat-overflow
    kind: skill
    path: plugins/powercat-overflow/skills/powercat-overflow
    description: "Reviews every Power Automate cloud flow inside a Power Platform
      solution (.zip) against Microsoft's coding guidelines and produces a
      [SolutionName].findings.json next to the uploaded solution, then opens the
      hosted PowerCAT-Overflow viewer at
      https://microsoft.github.io/power-cat-skills/PowerCAT-Overflow.html and
      uploads both files so the user can explore the results. Triggers:
      'powercat overflow', 'overflow my solution', 'review my solution',
      'evaluate flows in this solution', 'audit Power Auto"
  - id: eval-generator-code-app
    kind: skill
    path: plugins/powercat-procode-eval/skills/eval-generator-code-app
    description: "Generate a two-layer eval suite (presence checks + static security
      analysis) for a Power Apps Code App. Code Apps use @microsoft/power-apps
      SDK with generated service classes in src/generated/services/ — NOT
      @microsoft/powerapps-component-framework or context.webAPI.*. BRD is
      optional — if absent, features are derived from a code review of the
      project. Always produces: evals/manifest.json,
      evals/presence/<id>.check.ts files, evals/runner/run-evals.ts,
      evals/runner/presence-runner.ts, evals/runner/security-runner.ts, and
      evals/dashboard/index.html. Triggers: 'generate code app evals', 'eval my
      code app', 'generate tests for code app', 'code app eval generator',
      'check feature completeness code app'."
  - id: eval-generator-gen-pages
    kind: skill
    path: plugins/powercat-procode-eval/skills/eval-generator-gen-pages
    description: "Generate a three-layer eval suite (presence checks + unit tests +
      security analysis) for Power Apps Generative Pages in Model-Driven Apps.
      Generative pages are single-file React/TypeScript components using Fluent
      UI V9 and the dataApi prop for Dataverse operations — NOT Code Apps, NOT
      PCF components. Code may be generated by the App Agent in
      make.powerapps.com or by AI code generation tools (Claude Code, GitHub
      Copilot CLI) using the /genpage skill. Always produces:
      evals/manifest.json, evals/presence/<id>.check.ts,
      evals/unit/<feature>.test.tsx, evals/runner/run-evals.ts,
      evals/runner/presence-runner.ts, evals/runner/security-runner.ts, and
      evals/dashboard/index.html. Triggers: 'eval my generative page', 'generate
      evals for gen page', 'review my genpage code', 'test my generative page',
      'check my model driven app page', 'eval generator gen pages'."
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
