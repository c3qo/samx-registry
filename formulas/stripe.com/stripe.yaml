# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: stripe.com/stripe
name: Stripe
description: Stripe remote MCP server at https://mcp.stripe.com. Payments,
  billing, customers, Stripe docs. Setup guides for Claude Code, Codex, Cursor,
  and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/stripe
capabilities:
  - id: stripe
    kind: mcp
    spec:
      serverName: stripe
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://mcp.stripe.com
