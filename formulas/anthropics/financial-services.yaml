    kind: skill
    path: plugins/agent-plugins/pitch-agent/skills/deck-refresh
    description: Updates a presentation with new numbers — quarterly refreshes,
      earnings updates, comp rolls, rebased market data. Use whenever the user
      asks to "update the deck with Q4 numbers", "refresh the comps", "roll this
      forward", "swap in the new earnings", "change all the $485M to $512M", or
      any request to swap figures across an existing deck without rebuilding it.
  - id: ib-check-deck
    kind: skill
    path: plugins/agent-plugins/pitch-agent/skills/ib-check-deck
    description: Investment banking presentation quality checker. Reviews a pitch
      deck or client-ready presentation for (1) number consistency across
      slides, (2) data-narrative alignment, (3) language polish against IB
      standards, (4) visual and formatting QC. Use whenever the user asks to
      review, check, QC, proof, or do a final pass on a deck, pitch, or client
      materials — including requests like "check my numbers", "reconcile figures
      across slides", "is this client-ready", or "what am I missing before I
      send this out".
