# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: anthropics/financial-services
name: Financial Services
description: FS agent templates, skills, MCPs.
source:
  type: git
  url: https://github.com/anthropics/financial-services
  revision: 4bbabc7cd1a474c1667fa05a2bfe58e411dcf9c1
capabilities:
  - id: earnings-analysis
    kind: skill
    path: plugins/agent-plugins/earnings-reviewer/skills/earnings-analysis
    description: Create professional equity research earnings update reports (8-12
      pages, 3,000-5,000 words) analyzing quarterly results for companies
      already under coverage. Fast-turnaround format focusing on beat/miss
      analysis, key metrics, updated estimates, and revised thesis. Includes 1-3
      summary tables and 8-12 charts. Use when user requests "earnings update",
      "quarterly update", "earnings analysis", "Q1/Q2/Q3/Q4 results", or
      post-earnings report.
  - id: gl-recon
    kind: skill
    path: plugins/agent-plugins/gl-reconciler/skills/gl-recon
    description: Reconcile general ledger to subledger for a trade date or period —
      match at the position or transaction level, surface breaks, and classify
      each break by likely cause. Use for daily or month-end recon runs across
      asset classes.
  - id: dcf-model
    kind: skill
    path: plugins/agent-plugins/model-builder/skills/dcf-model
    description: Real DCF (Discounted Cash Flow) model creation for equity
      valuation. Retrieves financial data from SEC filings and analyst reports,
      builds comprehensive cash flow projections with proper WACC calculations,
      performs sensitivity analysis, and outputs professional Excel models with
      executive summaries. Use when users need to value a company using DCF
      methodology, request intrinsic value analysis, or ask for detailed
      financial modeling with growth projections and terminal value
      calculations.
  - id: lseg
    kind: mcp
    path: plugins/partner-built/lseg/.mcp.json
  - id: audit-xls
    kind: skill
    path: plugins/agent-plugins/earnings-reviewer/skills/audit-xls
    description: Audit a spreadsheet for formula accuracy, errors, and common
      mistakes. Scopes to a selected range, a single sheet, or the entire model
      (including financial-model integrity checks like BS balance, cash tie-out,
      and logic sanity). Triggers on "audit this sheet", "check my formulas",
      "find formula errors", "QA this spreadsheet", "sanity check this", "debug
      model", "model check", "model won't balance", "something's off in my
      model", "model review".
  - id: earnings-preview
    kind: skill
    path: plugins/agent-plugins/earnings-reviewer/skills/earnings-preview
    description: Build pre-earnings analysis with estimate models, scenario
      frameworks, and key metrics to watch. Use before a company reports
      quarterly earnings to prepare positioning notes, set up bull/bear
      scenarios, and identify what will move the stock. Triggers on "earnings
      preview", "what to watch for [company] earnings", "pre-earnings",
      "earnings setup", or "preview Q[X] for [company]".
  - id: model-update
    kind: skill
    path: plugins/agent-plugins/earnings-reviewer/skills/model-update
    description: Update financial models with new data — quarterly earnings,
      management guidance, macro changes, or revised assumptions. Adjusts
      estimates, recalculates valuation, and flags material changes. Use after
      earnings, guidance updates, or when assumptions need refreshing. Triggers
      on "update model", "plug earnings", "refresh estimates", "update numbers
      for [company]", "new guidance", or "revise estimates".
  - id: morning-note
    kind: skill
    path: plugins/agent-plugins/earnings-reviewer/skills/morning-note
    description: Draft concise morning meeting notes summarizing overnight
      developments, trade ideas, and key events for coverage stocks. Designed
      for the 7am morning meeting format — tight, opinionated, actionable.
      Triggers on "morning note", "morning meeting", "what happened overnight",
      "trade idea", "morning call prep", or "daily note".
  - id: xlsx-author
    kind: skill
    path: plugins/agent-plugins/earnings-reviewer/skills/xlsx-author
    description: Produce a .xlsx file on disk (headless) instead of driving a live
      Excel workbook — for managed-agent sessions with no open Office app.
  - id: audit-xls-2
    kind: skill
    path: plugins/agent-plugins/gl-reconciler/skills/audit-xls
    description: Audit a spreadsheet for formula accuracy, errors, and common
      mistakes. Scopes to a selected range, a single sheet, or the entire model
      (including financial-model integrity checks like BS balance, cash tie-out,
      and logic sanity). Triggers on "audit this sheet", "check my formulas",
      "find formula errors", "QA this spreadsheet", "sanity check this", "debug
      model", "model check", "model won't balance", "something's off in my
      model", "model review".
  - id: break-trace
    kind: skill
    path: plugins/agent-plugins/gl-reconciler/skills/break-trace
    description: Root-cause a reconciliation break to its source transaction or
      posting — follow the audit trail from the break row back to the
      originating entry on each side and state what differs and why. Use after
      gl-recon has classified a break.
  - id: xlsx-author-2
    kind: skill
    path: plugins/agent-plugins/gl-reconciler/skills/xlsx-author
    description: Produce a .xlsx file on disk (headless) instead of driving a live
      Excel workbook — for managed-agent sessions with no open Office app.
  - id: kyc-doc-parse
    kind: skill
    path: plugins/agent-plugins/kyc-screener/skills/kyc-doc-parse
    description: Parse an investor or client onboarding packet into structured KYC
      fields — identity, ownership, control, source of funds, and document
      inventory. Use as the first step of KYC screening; output feeds the rules
      engine.
  - id: kyc-rules
    kind: skill
    path: plugins/agent-plugins/kyc-screener/skills/kyc-rules
    description: Apply the firm's KYC/AML rules grid to a parsed onboarding record —
      assign a risk rating, list every rule outcome with the rule cited, and
      flag what's missing or escalation-worthy. Use after kyc-doc-parse; this
      skill decides nothing, it scores and routes.
  - id: xlsx-author-3
    kind: skill
    path: plugins/agent-plugins/kyc-screener/skills/xlsx-author
    description: Produce a .xlsx file on disk (headless) instead of driving a live
      Excel workbook — for managed-agent sessions with no open Office app.
  - id: competitive-analysis
    kind: skill
    path: plugins/agent-plugins/market-researcher/skills/competitive-analysis
    description: Framework for building competitive landscape decks — market
      positioning, competitor deep-dives, comparative analysis, strategic
      synthesis. Use when the user asks for a competitive landscape, competitor
      analysis, peer comparison, market positioning assessment, strategic
      review, or investment memo deck. Also triggers on "who are the competitors
      to X", "benchmark X against peers", "build a market map", or any request
      to systematically evaluate competitive dynamics across an industry.
  - id: comps-analysis
    kind: skill
    path: plugins/agent-plugins/market-researcher/skills/comps-analysis
    description: >
      Build institutional-grade comparable company analyses with operating
      metrics, valuation multiples, and statistical benchmarking in
      Excel/spreadsheet format.


      **Perfect for:**

      - Public company valuation (M&A, investment analysis)

      - Benchmarking performance vs. industry peers

      - Pricing IPOs or funding rounds

      - Identifying valuation outliers (over/under-valued)

      - Supporting investment committee presentations

      - Creating sector overview reports


      **Not ideal for:**

      - Private companies without comparable public peers

      - Highly diversified conglomerates

      - Distressed/bankrupt companies

      - Pre-revenue startups

      - Companies with unique business models
  - id: idea-generation
    kind: skill
    path: plugins/agent-plugins/market-researcher/skills/idea-generation
    description: Systematic stock screening and investment idea sourcing. Combines
      quantitative screens, thematic research, and pattern recognition to
      surface new long and short ideas. Use when looking for new ideas, running
      screens, or conducting thematic sweeps. Triggers on "idea generation",
      "stock screen", "find ideas", "what looks interesting", "screen for", "new
      ideas", or "pitch me something".
  - id: pptx-author
    kind: skill
    path: plugins/agent-plugins/market-researcher/skills/pptx-author
    description: Produce a .pptx file on disk (headless) instead of driving a live
      PowerPoint document — for managed-agent sessions with no open Office app.
  - id: sector-overview
    kind: skill
    path: plugins/agent-plugins/market-researcher/skills/sector-overview
    description: Create comprehensive industry and sector landscape reports covering
      market dynamics, competitive positioning, key players, and thematic
      trends. Use for client requests, sector initiations, thematic research
      pieces, or internal knowledge building. Triggers on "sector overview",
      "industry report", "market landscape", "sector analysis", "industry deep
      dive", or "thematic research".
  - id: client-report
    kind: skill
    path: plugins/agent-plugins/meeting-prep-agent/skills/client-report
    description: Generate professional client-facing performance reports with
      portfolio returns, allocation breakdowns, and market commentary. Suitable
      for quarterly or annual distribution. Triggers on "client report",
      "performance report", "quarterly report for [client]", "generate reports",
      or "client statement".
  - id: client-review
    kind: skill
    path: plugins/agent-plugins/meeting-prep-agent/skills/client-review
    description: Prepare for client review meetings with portfolio performance
      summary, allocation analysis, talking points, and action items. Pulls
      together account data into a concise meeting-ready format. Use before
      quarterly reviews, annual checkups, or ad-hoc client meetings. Triggers on
      "client review", "meeting prep for [client]", "quarterly review", "prep
      for [client name]", or "client meeting".
  - id: investment-proposal
    kind: skill
    path: plugins/agent-plugins/meeting-prep-agent/skills/investment-proposal
    description: Create professional investment proposals for prospective clients.
      Covers the firm's approach, proposed allocation, expected outcomes, and
      fee structure. Use when pitching new clients or presenting a new
      investment strategy. Triggers on "investment proposal", "prospect
      presentation", "pitch new client", "proposal for [client]", or "new client
      presentation".
  - id: pptx-author-2
    kind: skill
    path: plugins/agent-plugins/meeting-prep-agent/skills/pptx-author
    description: Produce a .pptx file on disk (headless) instead of driving a live
      PowerPoint document — for managed-agent sessions with no open Office app.
  - id: 3-statement-model
    kind: skill
    path: plugins/agent-plugins/model-builder/skills/3-statement-model
    description: Complete, populate and fill out 3-statement financial model
      templates (Income Statement, Balance Sheet, Cash Flow Statement) . Use
      when asked to fill out model templates, complete existing model
      frameworks, populate financial models with data, complete a partially
      filled IS/BS/CF framework, or link integrated financial statements within
      an existing template structure. Triggers include requests to fill in,
      complete, or populate a 3-statement model template
