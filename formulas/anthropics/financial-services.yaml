      model", "model review".
  - id: nav-tieout
    kind: skill
    path: plugins/agent-plugins/statement-auditor/skills/nav-tieout
    description: Tie an LP statement to the fund's NAV pack — recompute the LP's
      capital account from the NAV components and flag any line that doesn't
      agree. Use before LP statements are distributed.
  - id: xlsx-author-7
    kind: skill
    path: plugins/agent-plugins/statement-auditor/skills/xlsx-author
    description: Produce a .xlsx file on disk (headless) instead of driving a live
