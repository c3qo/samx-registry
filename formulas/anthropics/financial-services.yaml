  - id: bond-futures-basis
    kind: skill
    path: plugins/partner-built/lseg/skills/bond-futures-basis
    description: Analyze the bond futures basis by pricing futures, identifying the
      cheapest-to-deliver, and comparing with yield curves to assess delivery
      option value and basis trading opportunities. Use when analyzing bond
      futures, computing the basis, identifying CTD bonds, calculating implied
      repo rates, or evaluating basis trades.
  - id: bond-relative-value
    kind: skill
    path: plugins/partner-built/lseg/skills/bond-relative-value
    description: Perform relative value analysis on bonds by combining pricing,
      yield curve context, credit spreads, and scenario stress testing. Use when
      analyzing bond richness/cheapness, computing spread decomposition,
      comparing bonds, assessing bond value vs curves, or running rate shock
      scenarios.
  - id: equity-research
    kind: skill
    path: plugins/partner-built/lseg/skills/equity-research
    description: Generate comprehensive equity research snapshots combining analyst
      consensus estimates, company fundamentals, historical prices, and
      macroeconomic context. Use when researching stocks, comparing estimates to
      actuals, analyzing company financials, assessing equity valuations, or
      building investment cases.
  - id: fixed-income-portfolio
    kind: skill
    path: plugins/partner-built/lseg/skills/fixed-income-portfolio
    description: Review fixed income portfolios by pricing multiple bonds,
      retrieving reference data, analyzing cashflows, and running scenario
      analysis. Use when reviewing bond portfolios, computing portfolio duration
      and DV01, analyzing cashflow waterfalls, stress testing rate scenarios, or
      assessing portfolio composition.
  - id: fx-carry-trade
    kind: skill
    path: plugins/partner-built/lseg/skills/fx-carry-trade
    description: Evaluate FX carry trade opportunities by combining spot rates,
      forward points, interest rate differentials, volatility surface analysis,
      and historical price trends. Use when analyzing carry trades, comparing FX
      forward curves, assessing carry-to-vol ratios, or evaluating currency pair
      opportunities.
  - id: macro-rates-monitor
    kind: skill
    path: plugins/partner-built/lseg/skills/macro-rates-monitor
    description: Build macroeconomic and rates dashboards combining macro
      indicators, yield curves, inflation breakevens, and swap rates. Use when
      monitoring macro conditions, analyzing yield curve shape, decomposing real
      vs nominal rates, assessing policy rate expectations, or evaluating
      financial conditions.
  - id: option-vol-analysis
    kind: skill
    path: plugins/partner-built/lseg/skills/option-vol-analysis
    description: Analyze option volatility by combining vol surface data, option
      pricing with Greeks, and historical price data to assess implied vs
      realized volatility. Use when pricing options, analyzing volatility
      surfaces, computing Greeks, assessing vol premiums, or evaluating vol
      trading strategies.
  - id: swap-curve-strategy
    kind: skill
    path: plugins/partner-built/lseg/skills/swap-curve-strategy
    description: Analyze the interest rate swap curve by pricing swaps at multiple
      tenors, overlaying government and inflation curves, and identifying curve
      trade opportunities. Use when analyzing swap curves, computing swap
      spreads, decomposing real rates, identifying steepener/flattener/butterfly
      trades, or comparing swap rates across currencies.
