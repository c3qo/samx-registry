      model", "model review".
  - id: roll-forward
    kind: skill
    path: plugins/agent-plugins/month-end-closer/skills/roll-forward
    description: Build a roll-forward schedule for a balance-sheet account —
      beginning balance plus activity less reversals equals ending balance, with
      each component tied to GL. Use for month-end close packages and audit
      support.
  - id: variance-commentary
    kind: skill
    path: plugins/agent-plugins/month-end-closer/skills/variance-commentary
    description: Write flux commentary for every P&L and balance-sheet line over
      threshold — current vs prior period and vs budget, with the driver
      explained from underlying activity. Use for the month-end close package
      and management reporting.
