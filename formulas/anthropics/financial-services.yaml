  - id: accrual-schedule
    kind: skill
    path: plugins/agent-plugins/month-end-closer/skills/accrual-schedule
    description: Build the period-end accrual schedule — for each accrual, compute
      the entry, cite the support, and draft the JE. Use during month-end close;
      the JE is a draft for controller approval, not a posting.
  - id: audit-xls-4
    kind: skill
    path: plugins/agent-plugins/month-end-closer/skills/audit-xls
