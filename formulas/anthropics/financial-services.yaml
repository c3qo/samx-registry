  - id: ic-memo
    kind: skill
    path: plugins/agent-plugins/valuation-reviewer/skills/ic-memo
    description: Draft a structured investment committee memo for PE deal approval.
      Synthesizes due diligence findings, financial analysis, and deal terms
      into a professional IC-ready document. Use when preparing for investment
      committee, writing up a deal, or creating a formal recommendation.
      Triggers on "write IC memo", "investment committee memo", "deal write-up",
      "prepare IC materials", or "recommendation memo".
  - id: portfolio-monitoring
    kind: skill
    path: plugins/agent-plugins/valuation-reviewer/skills/portfolio-monitoring
    description: Track and analyze portfolio company performance against plan.
      Ingests monthly/quarterly financial packages (Excel, PDF), extracts KPIs,
      flags variances to budget, and produces summary dashboards. Use when
      reviewing portfolio company financials, preparing board materials, or
      monitoring covenant compliance. Triggers on "review portfolio company",
      "monthly financials", "how is [company] performing", "covenant check", or
      "portfolio update".
  - id: returns-analysis
    kind: skill
    path: plugins/agent-plugins/valuation-reviewer/skills/returns-analysis
    description: Build quick IRR/MOIC sensitivity tables for PE deal evaluation.
      Models returns across entry multiple, leverage, exit multiple, growth, and
      hold period scenarios. Use when sizing up a deal, stress-testing
      assumptions, or preparing IC returns exhibits. Triggers on "returns
      analysis", "IRR sensitivity", "MOIC table", "what's the return at", "model
      the returns", or "back of the envelope".
  - id: xlsx-author-8
    kind: skill
    path: plugins/agent-plugins/valuation-reviewer/skills/xlsx-author
    description: Produce a .xlsx file on disk (headless) instead of driving a live
