  - id: pitch-deck
    kind: skill
    path: plugins/agent-plugins/pitch-agent/skills/pitch-deck
    description: "Populates investment banking pitch deck templates with data from
      source files. Use when: user provides a PowerPoint template to fill in,
      user has source data (Excel/CSV) to populate into slides, user mentions
      populating or filling a pitch deck template, or user needs to transfer
      data into existing slide layouts. Not for creating presentations from
      scratch."
