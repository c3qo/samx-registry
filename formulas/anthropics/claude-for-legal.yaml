      scope/burden/privilege, cross-check the portfolio, and produce an
      objections framework, compliance plan, and deadline calendar. Use when the
      user says "we got a subpoena", "served with a subpoena", or shares a
      subpoena, CID, or third-party document request to evaluate.
  - id: cold-start-interview-10
    kind: skill
    path: privacy-legal/skills/cold-start-interview
    description: >
      Run the cold-start interview — learns your privacy practice and writes
      CLAUDE.md from your policy, DPA template, and a reference PIA. Use on
      first run, when CLAUDE.md is missing or has placeholders, or when the user
      says "set up the privacy plugin", "onboard me", "configure privacy", or
      wants to re-run the interview or re-check integrations.
  - id: customize-10
    kind: skill
    path: privacy-legal/skills/customize
    description: >
      Guided customization of your privacy practice profile — change one thing
      without re-running the whole cold-start interview. Adjust risk posture,
      escalation contacts, DPA playbook, privacy policy commitments, PIA house
      style, DSAR process, or matter workspace paths. Use when the user says
      "change my [thing]", "update my profile", "edit my playbook", or
      "customize".
  - id: dpa-review
    kind: skill
    path: privacy-legal/skills/dpa-review
    description: >
      Review a Data Processing Agreement against your DPA playbook —
      auto-detects whether you're processor or controller and applies the right
      half of the playbook. Use when the user says "review this DPA", "check
      this data processing addendum", "customer sent their DPA", "is this DPA
      okay", or attaches a DPA.
  - id: dsar-response
    kind: skill
    path: privacy-legal/skills/dsar-response
    description: >
      Walk through a Data Subject Access Request (or deletion, portability,
      correction request) and draft the response — verify identity, locate data
      system-by-system, assess exemptions, draft the acknowledgment and
      substantive response letters. Use when a DSAR comes in, the user pastes an
      access/deletion/portability/correction request, or says "DSAR came in",
      "access request", "right to be forgotten", or "someone wants their data".
  - id: matter-workspace-7
    kind: skill
    path: privacy-legal/skills/matter-workspace
    description: >
      Manage matter workspaces — create, list, switch, close, or detach
      (practice-level). Keeps one client or engagement's context separate from
      every other for multi-client practitioners. Use when the user wants to
      open a new matter, switch matters, list matters, close/archive a matter,
      or work at practice-level only.
  - id: pia-generation
    kind: skill
    path: privacy-legal/skills/pia-generation
    description: >
      Generate a Privacy Impact Assessment in house format for a new feature,
      product, or processing activity, using the structure learned from your
      seed PIA. Use when the user says "write a PIA", "privacy impact assessment
      for", "do we need a PIA for this", "privacy review this feature", or
      describes a new data processing activity.
  - id: policy-monitor-2
    kind: skill
    path: privacy-legal/skills/policy-monitor
    description: >
      Keep the privacy policy current with practice. Two modes: weekly sweep of
      saved PIAs, DPA reviews, and triage results to find policy drift; or
      direct query for a proposed new practice. Use when the user asks "does our
      policy cover this", "we want to start doing X — does the policy need
      updating", "run the policy monitor", "policy sweep", or wants to find
      where the privacy policy no longer matches what the team actually does.
  - id: reg-gap-analysis-2
    kind: skill
    path: privacy-legal/skills/reg-gap-analysis
    description: >
      Diff a new or changed regulation against current privacy policy and
      practice — outputs a gap list and a remediation plan with owners and
      dates. Use when a new reg drops, the user asks "does [regulation] affect
      us", "gap analysis for [state privacy law]", "compliance check against
      [reg]", or pastes regulatory text.
  - id: use-case-triage-2
    kind: skill
    path: privacy-legal/skills/use-case-triage
    description: >
      Quickly determine whether a processing activity needs a PIA, a mandatory
      GDPR DPIA, or can proceed — surfaces privacy policy conflicts and routes
      to the right next step. Use when the user asks "does this need a PIA",
      "triage this feature", "privacy check on X", "is this okay from a privacy
      perspective", or describes a new data processing activity, product
      feature, or vendor relationship.
  - id: cold-start-interview-11
    kind: skill
    path: product-legal/skills/cold-start-interview
    description: >
      Cold-start interview — connects to your launch tracker, reads past
      reviews, learns your risk calibration. Use on fresh install, when
      onboarding product counsel, or when the plugin config has placeholders.
      Run with --redo to re-interview, or --check-integrations to re-probe
      connectors only.
  - id: customize-11
    kind: skill
    path: product-legal/skills/customize
    description: >
      Guided customization of your product counsel practice profile — change one
      thing without re-running the whole cold-start interview. Adjust risk
      calibration, escalation contacts, launch review framework, marketing
      claims posture, or matter workspace paths. Use when the user says "change
      my [thing]", "update my profile", "edit my framework", "retune my
      calibration", or "customize".
  - id: feature-risk-assessment
    kind: skill
    path: product-legal/skills/feature-risk-assessment
    description: >
      Deeper risk assessment for a single feature or product area when the
      launch review found something that needs more than a line item. Structured
      analysis: what could go wrong, how likely, how bad, what mitigates it. Use
      when user says "deep dive on this risk", "risk assessment for [feature]",
      "what could go wrong with", or when launch-review flags a novel issue.
  - id: is-this-a-problem
    kind: skill
    path: product-legal/skills/is-this-a-problem
    description: >
      Fast "is this a problem?" answer for the quick Slack question —
      pattern-matches against your calibration. Use when the user says "is this
      a problem", "quick question", "can we do X", "do I need legal review for",
      "sanity check", or pastes a PM's question that needs a same-minute fine /
      needs a look / hold call.
  - id: launch-review
    kind: skill
    path: product-legal/skills/launch-review
    description: >
      Full launch review against your framework and risk calibration. Use when
      the user says "review this launch", "legal review for [feature]", "can we
      ship this", "what are the legal issues with [product]", or references a
      launch tracker ticket or PRD that needs a category-by-category review
      memo.
  - id: marketing-claims-review
    kind: skill
    path: product-legal/skills/marketing-claims-review
    description: >
      Review marketing copy for claims that need substantiation, reframing, or
      cutting. Use when the user says "review this marketing copy", "check these
      claims", "can we say this", "is this puffery or a problem", or pastes
      marketing content (landing pages, emails, ads, taglines).
  - id: matter-workspace-8
    kind: skill
    path: product-legal/skills/matter-workspace
    description: >
      Manage matter workspaces — new, list, switch, close, or detach
      (practice-level). Use when working across multiple clients or matters in
      private practice and you need to create, list, switch, close, or detach
      the active matter so context from one engagement doesn't leak into
      another.
  - id: cold-start-interview-12
    kind: skill
    path: regulatory-legal/skills/cold-start-interview
    description: Cold-start interview — builds your watchlist, indexes the policy
      library, and learns your materiality threshold so the monitor surfaces
      signal instead of noise. Use on fresh install, when reconfiguring
      (--redo), or when re-checking what connectors are actually responding
      (--check-integrations).
  - id: comments
    kind: skill
    path: regulatory-legal/skills/comments
    description: Review open NPRM comment periods, log decisions, track deadlines.
      Use when an NPRM has a comment window open and you need to surface
      deadlines, decide whether to file, or record a filing / not-filing /
      waived decision (--decide CMT-ID).
  - id: customize-12
    kind: skill
    path: regulatory-legal/skills/customize
    description: >
      Guided customization of your regulatory practice profile — change one
      thing without re-running the whole cold-start interview. Adjust watched
      regulators, policy library index, materiality threshold, gap response
      process, feed configuration, or matter workspace paths. Use when the user
      says "change my [thing]", "add a regulator", "update my watchlist", "edit
      my threshold", or "customize".
  - id: gap-surfacer
    kind: skill
    path: regulatory-legal/skills/gap-surfacer
    description: >
      Reference: shared gap- and comment-tracker framework backing
      /regulatory-legal:gaps and /regulatory-legal:comments. Tracks open policy
      gaps with remediation status, ingests gaps from policy-diff, surfaces
      what's open and aging, routes to owners, and notifies gap owners via Slack
      with per-send confirmation. Loaded by the gaps and comments skills before
      doing substantive work.
  - id: gaps
    kind: skill
    path: regulatory-legal/skills/gaps
    description: Open gaps tracker — what's flagged and not yet closed. Use when the
      user asks "what gaps are open", "gap tracker", "remediation status", or
      wants to close (--close GAP-ID) or risk-accept (--accept GAP-ID) a tracked
      gap.
  - id: matter-workspace-9
    kind: skill
    path: regulatory-legal/skills/matter-workspace
    description: Manage matter workspaces — create, list, switch, close, or detach
      the active matter (practice-level). Use when working across multiple
      clients or matters and you need to keep one engagement's context separate
      from another, or when a substantive skill needs to know which matter it's
      working in.
  - id: policy-diff
    kind: skill
    path: regulatory-legal/skills/policy-diff
    description: Diff a specific regulatory change against the indexed policy
      library. Use when a reg has changed and you need to know which policies it
      touches and what the gap is, when the user says "diff this reg against our
      policies", "which policy does this affect", or "gap analysis", or when
      reg-feed-watcher hands off a material item.
  - id: policy-redraft
    kind: skill
    path: regulatory-legal/skills/policy-redraft
    description: Produce a proposed marked-up policy redraft that closes a gap found
      by /regulatory-legal:gaps or /regulatory-legal:policy-diff. A first draft
      for internal review — not for direct application to approved policy
      documents. Use when the user says "redraft the policy", "draft the policy
      fix", "mark up the policy", or when gap-surfacer hands off a gap for
      drafting.
  - id: reg-feed-watcher
    kind: skill
    path: regulatory-legal/skills/reg-feed-watcher
    description: Check regulatory feeds now and report what's new since the last
      check, filtered by your materiality threshold. Use when the user says
      "check the feeds", "what's new", "regulatory update", when running from
      the scheduled agent, or when manually pasting a regulatory development for
      classification and diff.
