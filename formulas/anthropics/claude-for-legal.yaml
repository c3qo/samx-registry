# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: anthropics/claude-for-legal
name: Claude for Legal
description: "Legal workflow plugin suite: AI governance, commercial, corporate,
  employment, IP, litigation, privacy, product, regulatory, clinic, student."
source:
  type: git
  url: https://github.com/anthropics/claude-for-legal
  revision: 5ceb305b30b4c82653c9b6642499c12e946ec319
capabilities:
  - id: ai-inventory
    kind: skill
    path: ai-governance-legal/skills/ai-inventory
    description: >
      EU AI Act per-system inventory — track each AI system's role (provider,
      deployer, importer, distributor, authorized representative, product
      manufacturer) and risk tier (prohibited, high-risk, limited, minimal,
      GPAI, GPAI+systemic). Role and tier are assessed per system, not per
      company. Use when the user says "ai inventory", "add an ai system", "what
      systems do we have", "classify this ai system", "eu ai act register", or
      "ai system registry".
  - id: aia-generation
    kind: skill
    path: ai-governance-legal/skills/aia-generation
    description: >
      Run an AI impact assessment — structured intake, risk analysis, regulatory
      classification per regime in scope, policy consistency diff, and
      recommendation with conditions. Uses the house-style structure learned
      from the seed impact assessment in
      `~/.claude/plugins/config/claude-for-legal/ai-governance-legal/CLAUDE.md`.
      Use when user says "impact assessment for", "assess this AI use case",
      "run an AIA", "generate an AIA", "we need to document this AI system", "AI
      risk assessment for X", or follows a conditional triage result.
  - id: cold-start-interview
    kind: skill
    path: ai-governance-legal/skills/cold-start-interview
    description: >
      Run the cold-start interview — learns your AI governance practice and
      writes
      `~/.claude/plugins/config/claude-for-legal/ai-governance-legal/CLAUDE.md`
      from your AI policy, a reference impact assessment, and key vendor AI
      agreements. Use when the practice profile is missing or contains
      `[PLACEHOLDER]` markers, or when user says "set up ai governance plugin",
      "onboard me", "configure ai governance".
  - id: customize
    kind: skill
    path: ai-governance-legal/skills/customize
    description: >
      Guided customization of your AI governance practice profile — change one
      thing without re-running the whole cold-start interview. Adjust risk
      posture, escalation contacts, use-case registry entries, vendor AI
      positions, AI policy commitments, impact-assessment house style, or matter
      workspace paths. Use when the user says "change my [thing]", "update my
      profile", "edit my config", "tune my playbook", or "customize".
  - id: matter-workspace
    kind: skill
    path: ai-governance-legal/skills/matter-workspace
    description: >
      Manage matter workspaces — new, list, switch, close, or detach
      (practice-level). File-management logic for keeping one client or
      engagement's context separate from every other. Use when working across
      multiple clients or matters, when the user says "new matter", "switch
      matter", "list matters", "close matter", or when any substantive skill
      needs to know which matter it's working in.
  - id: policy-monitor
    kind: skill
    path: ai-governance-legal/skills/policy-monitor
    description: >
      Keep the AI policy current with practice — weekly sweep of saved AIAs,
      triage results, and vendor reviews to find policy drift, or direct query
      for a proposed new AI practice. Use when user says "policy sweep", "does
      our AI policy cover this", "we want to start doing X — does the policy
      need updating", "run the policy monitor", or on a recurring schedule.
  - id: policy-starter
    kind: skill
    path: ai-governance-legal/skills/policy-starter
    description: >
      Draft a firm AI usage policy from published model policies, adapted to
      your practice profile — a research-and-synthesis tool whose output is a
      draft for attorney review and adoption, not a finished policy. Use when
      user says "draft an AI policy", "we need an AI policy", "build an AI usage
      policy", "our firm needs a GenAI policy", or similar requests to generate
      a first-cut internal AI policy.
  - id: reg-gap-analysis
    kind: skill
    path: ai-governance-legal/skills/reg-gap-analysis
    description: >
      Diff a new AI regulation or guidance against your current governance
      posture — surfaces gaps, priorities, and a remediation plan with owners
      and deadlines. Use when an AI regulation moves (or you learn about one you
      missed), or when user says "new reg just dropped", "does [regulation]
      affect us", "gap analysis for EU AI Act", "compliance check against [AI
      law or guidance]", or pastes regulatory text.
  - id: use-case-triage
    kind: skill
    path: ai-governance-legal/skills/use-case-triage
    description: >
      Classify a proposed AI use case against your registry — approved,
      conditional, or not approved — and produce required conditions and next
      steps. Flags cross-plugin handoffs to privacy or product counsel. Use when
      user says "triage this use case", "can we use AI for X", "is this
      approved", "what do we need to do to use AI for X".
  - id: vendor-ai-review
    kind: skill
    path: ai-governance-legal/skills/vendor-ai-review
    description: >
      Review vendor AI terms — agreement, addendum, or ToS AI provisions —
      against your governance positions; flag training-on-data, liability, model
      changes, and AI policy consistency. Use when user says "review this AI
      agreement", "check OpenAI terms", "what did we agree to with [vendor]",
      "vendor sent an AI addendum", "is this AI contract okay", or attaches
      vendor AI terms.
  - id: amendment-history
    kind: skill
    path: commercial-legal/skills/amendment-history
    description: >
      Trace how a contract has changed across its base agreement and all
      amendments — either a summary of all changes over time, or a provision
      trace for a specific clause. Use when the user says "what changed in this
      contract over time", "show me the amendment history", "where's the latest
      [clause]", "how has [provision] evolved", or uploads multiple versions of
      an agreement.
  - id: cold-start-interview-2
    kind: skill
    path: commercial-legal/skills/cold-start-interview
    description: >
      Run the cold-start interview to learn your commercial contracts practice
      and write your team practice profile. Use on first use of the plugin, when
      `~/.claude/plugins/config/claude-for-legal/commercial-legal/CLAUDE.md` is
      missing or still contains template placeholders, or when the user says
      "set up the plugin", "configure commercial contracts", "onboard me", or
      "let's get started". This is the only skill that should run on a fresh
      install.
  - id: customize-2
    kind: skill
    path: commercial-legal/skills/customize
    description: >
      Guided customization of your commercial contracts practice profile —
      change one thing without re-running the whole cold-start interview. Adjust
      risk posture, escalation contacts, playbook positions, NDA triage
      preferences, house style, review preferences, or matter workspace paths.
      Use when the user says "change my [thing]", "update my profile", "edit my
      playbook", "tune my config", or "customize".
  - id: escalation-flagger
    kind: skill
    path: commercial-legal/skills/escalation-flagger
    description: >
      Route a contract issue to the right approver per the escalation matrix in
      `~/.claude/plugins/config/claude-for-legal/commercial-legal/CLAUDE.md`,
      and draft the ask. Use when the user says "who needs to approve this",
      "escalate this", "does this need GC sign-off", "route this for approval",
      or when another skill finds an issue that exceeds the reviewer's
      authority.
  - id: matter-workspace-2
    kind: skill
    path: commercial-legal/skills/matter-workspace
    description: >
      Manage matter workspaces — new, list, switch, close, or detach
      (practice-level). Use when a multi-client practitioner needs to create a
      matter, switch the active matter, list matters, archive a matter, or
      detach to practice-level context, or when another skill needs to know
      which matter it's working in.
  - id: nda-review
    kind: skill
    path: commercial-legal/skills/nda-review
    description: >
      Reference: fast triage of inbound NDAs into GREEN / YELLOW / RED so the
      team only spends lawyer time on the ones that need it. Built for sales and
      BD to self-serve before pinging legal. Loaded by /commercial-legal:review
      when an NDA is detected.
  - id: renewal-tracker
    kind: skill
    path: commercial-legal/skills/renewal-tracker
    description: >
      Show contracts with cancel-by deadlines coming up and warn before notice
      windows close, working from a maintained renewal register. Use when the
      user asks "what's renewing soon", "what renewals are due", "did we miss a
      cancellation window", "add this to the renewal tracker", or on a scheduled
      basis. Receives handoffs from saas-msa-review.
  - id: review-proposals
    kind: skill
    path: commercial-legal/skills/review-proposals
    description: >
      Review and approve (or reject) pending playbook update proposals from the
      playbook-monitor agent and apply approved changes to the practice profile.
      Use when the playbook-monitor agent has surfaced proposals, when the user
      says "review playbook proposals", "what playbook updates are pending", or
      wants to step through deviation-driven playbook changes.
  - id: review
    kind: skill
    path: commercial-legal/skills/review
    description: >
      Review a vendor agreement, NDA, or SaaS subscription against your
      playbook. Identifies the agreement structure from titles, routes to the
      right review skill (vendor-agreement-review, nda-review, saas-msa-review),
      and integrates the output into a single memo. Use when the user says
      "review this contract", "check this MSA", "is this NDA okay", "look at
      this SaaS agreement", or attaches an inbound agreement for review.
  - id: saas-msa-review
    kind: skill
    path: commercial-legal/skills/saas-msa-review
    description: >
      Reference: review of SaaS subscription agreements with attention to the
      terms that matter most in subscription deals — auto-renewal mechanics,
      price escalation, data portability, uptime SLAs, and subprocessor rights.
      Loaded by /commercial-legal:review when a SaaS or subscription agreement
      is detected.
  - id: stakeholder-summary
    kind: skill
    path: commercial-legal/skills/stakeholder-summary
    description: >
      Translates a contract review into a summary the business stakeholder will
      actually read. Not a legal memo — a two-minute answer to "can I sign this
      and what do I need to know." Use when user says "summarize for the
      business", "write this up for [stakeholder]", "explain this to
      procurement", "non-legal summary", or when a review is done and needs to
      go to someone outside legal.
  - id: vendor-agreement-review
    kind: skill
    path: commercial-legal/skills/vendor-agreement-review
    description: >
      Reference: review of an inbound vendor agreement against the team playbook
      in `~/.claude/plugins/config/claude-for-legal/commercial-legal/CLAUDE.md`.
      Flags deviations, assesses risk, generates specific redline language, and
      routes to the right approver. Loaded by /commercial-legal:review when a
      vendor MSA, services agreement, or similar is detected.
  - id: ai-tool-handoff
    kind: skill
    path: corporate-legal/skills/ai-tool-handoff
    description: >
      Detects when Luminance, Kira, or a similar bulk-review tool is in use,
      hands off the high-volume clause extraction to it, and QAs its output per
      the trust level in
      `~/.claude/plugins/config/claude-for-legal/corporate-legal/CLAUDE.md`. Use
      when user says "send to Luminance", "bulk review", "AI extraction", or
      when diligence-issue-extraction hits a high-volume category.
  - id: board-minutes
    kind: skill
    path: corporate-legal/skills/board-minutes
    description: >
      Drafts board or committee meeting minutes in your house format.
      Auto-detects upcoming board and committee meetings from your calendar,
      asks for the agenda and any slides or pre-read materials, and produces a
      complete draft in the format learned from your seed minutes. Also handles
      written consents in lieu of meetings. Trigger: "board minutes", "draft
      minutes", "upcoming board meeting", "committee minutes", "written
      consent", or calendar detection of an upcoming board or committee event.
  - id: closing-checklist
    kind: skill
    path: corporate-legal/skills/closing-checklist
    description: >
      What's blocking close — maintain the closing checklist with status,
      critical path, and days to close. Self-updating: ingests new items from
      diligence findings and schedule builds, tracks status, surfaces what's
      blocking. Use when user says "closing checklist", "what's left to close",
      "checklist status", "add to the checklist", or on a scheduled status pull.
  - id: cold-start-interview-3
    kind: skill
    path: corporate-legal/skills/cold-start-interview
    description: >
      House cold-start interview (request list + prior memo), or --new-deal for
      deal-specific context. Modular: identifies which practice areas apply
      (M&A, Board & Secretary, Public Company, Entity Management), then asks
      targeted questions for each active module and writes only the relevant
      sections to the plugin config. Use on fresh install, when CLAUDE.md still
      has [PLACEHOLDER] markers, when starting a new deal, or to re-check
      integrations or refresh a module.
  - id: customize-3
    kind: skill
    path: corporate-legal/skills/customize
    description: >
      Guided customization of your corporate practice profile — change one thing
      without re-running the whole cold-start interview. Adjust risk posture,
      escalation contacts, active modules (M&A / Board / Public Company / Entity
      Management), materiality thresholds, disclosure schedule format, consent
      precedents, or matter workspace paths. Use when the user says "change my
      [thing]", "update my profile", "edit my config", or "customize".
  - id: deal-team-summary
    kind: skill
    path: corporate-legal/skills/deal-team-summary
    description: >
      Aggregate diligence findings into a deal team briefing at the right
      altitude for the audience — exec summary for leadership, working summary
      for the team. Use when user says "brief the deal team", "what's the state
      of diligence", "summarize findings for [audience]", "deal update", or on
      the briefing cadence.
  - id: diligence-issue-extraction
    kind: skill
    path: corporate-legal/skills/diligence-issue-extraction
    description: >
      Read VDR documents and extract issues per house categories and materiality
      thresholds, producing findings in house memo format. Use when user says
      "review the data room", "extract issues from [folder]", "diligence
      review", "what's in the VDR", or points at VDR documents.
  - id: entity-compliance
    kind: skill
    path: corporate-legal/skills/entity-compliance
    description: >
      Entity compliance tracker — initialize, report upcoming deadlines, update
      status, run health audit, export to CSV. Maintains a
      compliance-tracker.yaml built from the entity table, calculates filing
      deadlines by entity and jurisdiction, and surfaces what's due in the next
      30/60/90 days. Use when user says "entity compliance", "filing deadlines",
      "annual reports due", "entity tracker", "what filings are due", "entity
      health", or "good standing".
  - id: integration-management
    kind: skill
    path: corporate-legal/skills/integration-management
    description: >
      Post-closing M&A integration tracker — phased workplan, consent tracking,
      contract assignment at scale, weekly status reports. Initializes from
      whatever deal artifacts are available (purchase agreement, deal summary,
      closing checklist) and connects to deal-context.md and
      closing-checklist.yaml from the M&A cold-start. Use when user says
      "integration", "post-close", "post-closing", "consents outstanding",
      "contract assignment", "integration status", or "what's left on the deal".
  - id: material-contract-schedule
    kind: skill
    path: corporate-legal/skills/material-contract-schedule
    description: >
      Build the material contracts disclosure schedule from diligence findings,
      applying the purchase agreement's Material Contract definition and
      formatting per the agreement's schedule format. Use when user says "build
      the contracts schedule", "disclosure schedule", "schedule 3.X", "material
      contracts list", or when drafting disclosure schedules.
  - id: matter-workspace-3
    kind: skill
    path: corporate-legal/skills/matter-workspace
    description: >
      Manage matter workspaces — create, list, switch, close, or detach the
      active matter so multi-client practitioners keep one client's context
      separate from every other. Read by any substantive skill that needs to
      know what matter it's working in. Use when user says "new matter", "switch
      matter", "list matters", "close matter", or wants to work at
      practice-level only.
  - id: tabular-review
    kind: skill
    path: corporate-legal/skills/tabular-review
    description: >
      Tabular review — one row per document, one column per data point, every
      cell cited to source. Built for M&A diligence ("review these 200 target
      contracts for change-of-control, assignment, and MAC clauses") but works
      for any batch review that needs a spreadsheet out the other end. Use when
      user says "tabular review", "review grid", "build a grid", "extract these
      fields from these contracts", "review these documents for X, Y, Z", "give
      me a spreadsheet of", "batch review", or points at a folder of documents
      and asks to compare them.
  - id: written-consent
    kind: skill
    path: corporate-legal/skills/written-consent
    description: >
      Draft a unanimous written consent of the board or a committee in house
      format, with precedent search from the consents repository. Handles
      multi-resolution consents, director conflict flags, state-law notice
      requirements, and signatory tracking, with a built-in scope warning for
      major one-off actions. Use when user says "written consent", "unanimous
      consent", "board consent", "consent in lieu", "UWC", or describes an
      action needing board approval without a meeting.
  - id: cold-start-interview-4
    kind: skill
    path: employment-legal/skills/cold-start-interview
    description: >
      Cold-start setup — learns your jurisdictional footprint and escalation
      rules from your handbook and termination memos. Asks which states and
      countries have employees, reads seed documents, and builds a
      jurisdiction-aware escalation table. Use on fresh install, when CLAUDE.md
      still has [PLACEHOLDER] markers, or when re-running with --redo or
      --check-integrations.
  - id: customize-4
    kind: skill
    path: employment-legal/skills/customize
    description: >
      Guided customization of your employment practice profile — change one
      thing without re-running the whole cold-start interview. Adjust
      jurisdictional footprint, risk posture, escalation contacts, hiring review
      rules, termination review rules, handbook positions, investigation
      preferences, or matter workspace paths. Use when the user says "change my
      [thing]", "add a jurisdiction", "update my profile", "edit my config", or
      "customize".
  - id: expansion-kickoff
    kind: skill
    path: employment-legal/skills/expansion-kickoff
    description: >
      Kick off international expansion planning for a new country — gathers
      intake, runs EOR vs. entity framing, drafts cross-functional questions,
      surfaces country-specific flags, and creates a persistent tracker. Use
      when someone says "we're hiring in [country]", "expansion to [country]",
      or "first hire in [country]".
  - id: expansion-update
    kind: skill
    path: employment-legal/skills/expansion-update
    description: >
      Update the status of an in-progress international expansion project —
      recalculates what is now unblocked, flags anything overdue, and surfaces
      the next priorities. Use when work has happened since the last session and
      the expansion tracker needs to reflect the current state.
  - id: handbook-updates
    kind: skill
    path: employment-legal/skills/handbook-updates
    description: >
      Diff a proposed handbook change against the current version, flag ripple
      effects and state supplement impacts. Use when user says "update the
      handbook", "add this to the handbook", "handbook change", or has a policy
      ready for insertion.
  - id: hiring-review
    kind: skill
    path: employment-legal/skills/hiring-review
    description: >
      Review an offer letter and any restrictive covenants — jurisdiction check
      included. Substantive rules (covenant enforceability, pay-transparency,
      salary-history limits, exemption criteria) are researched per hire, not
      stored. Use when the user says "review this offer", "can we use a
      non-compete here", "check this offer letter", "hiring in [state]", or
      attaches an offer.
  - id: internal-investigation
    kind: skill
    path: employment-legal/skills/internal-investigation
    description: >
      Reference: shared framework for managing internal investigations from
      intake through final memo — privileged investigation log, document
      processing with needle-finding, source coverage tracking, Q&A against the
      log, memo drafting, and audience summaries. Loaded by /investigation-open,
      /investigation-add, /investigation-query, /investigation-memo, and
      /investigation-summary; not invoked directly.
  - id: international-expansion
    kind: skill
    path: employment-legal/skills/international-expansion
    description: >
      Reference: implementation-planning framework for international hiring —
      EOR vs. entity decision framing, cross-functional triggers for
      tax/finance/HR, structured outside-counsel briefing requests, and a
      persistent gap tracker. Loaded by /expansion-kickoff and
      /expansion-update; not invoked directly.
  - id: investigation-add
    kind: skill
    path: employment-legal/skills/investigation-add
    description: >
      Add data to an open investigation — documents, interview notes, or
      observations. Processes batches against the documented pull criteria,
      surfaces significant items, and logs everything reviewed for coverage
      verification. Use when new evidence, interview notes, or document
      productions come in for an open investigation.
  - id: investigation-memo
    kind: skill
    path: employment-legal/skills/investigation-memo
    description: >
      Draft or update the privileged investigation memo from the investigation
      log. Use when an investigation is far enough along to write the first memo
      cut, or when new data has been added and the existing draft needs
      updating.
  - id: investigation-open
    kind: skill
    path: employment-legal/skills/investigation-open
    description: >
      Open a new internal investigation matter — runs intake, generates the
      sources checklist, and creates the persistent investigation log. Use when
      a complaint or allegation comes in and the attorney needs to stand up a
      privileged investigation workspace.
  - id: investigation-query
    kind: skill
    path: employment-legal/skills/investigation-query
    description: >
      Ask questions against an open investigation log — what witnesses said,
      where accounts conflict, what gaps exist, what the strongest evidence is
      on each issue. Use when the attorney needs to query the investigation
      record without re-reading every entry.
  - id: investigation-summary
    kind: skill
    path: employment-legal/skills/investigation-summary
    description: >
      Draft an audience-specific summary from the privileged investigation memo
      — HR, leadership, or outside counsel versions. Use when an investigation
      memo needs to be communicated to an audience that should not see the full
      privileged work product.
  - id: leave-tracker
    kind: skill
    path: employment-legal/skills/leave-tracker
    description: >
      Check open leaves for deadline alerts and required decisions. Surfaces
      only the leaves that require an action and explains why — not a status
      board. Use weekly, or whenever the attorney needs to know which leaves
      have upcoming designation, certification, or exhaustion deadlines.
  - id: log-leave
    kind: skill
    path: employment-legal/skills/log-leave
    description: >
      Add a new leave to the leave register with the minimum information needed
      to start tracking deadlines. Use when an employee goes on leave and you
      want the tracker to watch designation, certification, and exhaustion
      clocks from day one.
  - id: matter-workspace-4
    kind: skill
    path: employment-legal/skills/matter-workspace
    description: >
      Manage matter workspaces — new, list, switch, close, or detach (practice-
      level). Creates, lists, switches, closes, and detaches the active matter
      so context from one client engagement never leaks into another. Use when a
      multi-client practitioner says "new matter", "switch matter", "list my
      matters", "close this matter", or needs to manage which matter is active.
  - id: policy-drafting
    kind: skill
    path: employment-legal/skills/policy-drafting
    description: >
      Draft an employment policy with state supplements where law differs across
      the jurisdictional footprint. Use when the user says "draft a [topic]
      policy", "we need a policy on", "update our [topic] policy", or names a
      policy gap.
  - id: termination-review
    kind: skill
    path: employment-legal/skills/termination-review
    description: >
      Termination review — high-risk flag detection, severance + release, and
      final pay timing by jurisdiction. Jurisdiction-specific rules and release
      consideration periods are researched per review, not stored. Use when the
      user says "reviewing a termination", "can we fire this person", "term
      review", or describes a termination scenario.
  - id: wage-hour-qa
    kind: skill
    path: employment-legal/skills/wage-hour-qa
    description: >
      Jurisdiction-aware wage/hour and employment Q&A — classification,
      overtime, meal/rest breaks, leave, final pay — answered for the specific
      state/country with the controlling rule researched and cited rather than
      stated from memory. Use when the user asks any employment law question, or
      says "what's the rule in [state]", "is this exempt", "do we have to pay
      overtime for", or "can we classify this as".
  - id: worker-classification
    kind: skill
    path: employment-legal/skills/worker-classification
    description: >
      Classify a proposed worker engagement — employee, IC, temp, or vendor — by
      running the applicable jurisdiction tests and flagging misclassification
      gaps between the intended arrangement and what the facts actually support.
      Prospective use only. Use when someone says "we want to bring on a
      contractor", "is this a vendor or a temp", "how should we classify this
      person", or describes a proposed working arrangement.
  - id: cocounsel-legal
    kind: mcp
    path: external_plugins/cocounsel-legal/.mcp.json
  - id: deep-research
    kind: skill
    path: external_plugins/cocounsel-legal/skills/deep-research
    description: >
      Use this skill whenever a user specifically requests legal research or
      Westlaw Deep Research, asks for CoCounsel Legal or cocounsel legal
      support, or asks a question that requires explaining, analyzing, or
      synthesizing U.S. law.
  - id: cease-desist
    kind: skill
    path: ip-legal/skills/cease-desist
    description: >
      Draft a cease-and-desist letter (send mode) or triage one you received
      (receive mode). Use when asserting your rights against an infringer with a
      demand letter calibrated to your enforcement posture, or when an incoming
      C&D needs triage into a structured options memo with a recommendation.
  - id: clearance
    kind: skill
    path: ip-legal/skills/clearance
    description: >
      Trademark clearance first pass — knockout + similar-marks check producing
      a flag list, not a clearance opinion. Use when a new mark is proposed,
      when asked whether a mark is available or to run a knockout search, or
      when assessing likelihood-of-confusion factors before a full professional
      search. This skill never concludes a mark is clear.
  - id: cold-start-interview-5
    kind: skill
    path: ip-legal/skills/cold-start-interview
    description: >
      Run the cold-start interview to learn your IP practice and write your
      practice profile. Use on first install when the practice profile is
      missing or still contains placeholders, when re-onboarding with --redo, or
      when re-probing integrations with --check-integrations after connecting or
      disconnecting an MCP. This is the ONLY skill that should run on a fresh
      install.
  - id: customize-5
    kind: skill
    path: ip-legal/skills/customize
    description: >
