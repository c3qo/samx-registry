    path: partner-built/zoom-plugin/skills/zoom-mcp
    description: Guidance for the bundled Zoom MCP connectors. Use after routing to
      an MCP workflow when planning or troubleshooting tool-based access to
      meetings, recordings, meeting assets, or transcripts. Route Zoom Docs
      requests to the dedicated Docs MCP server and Whiteboard-specific requests
      to `zoom-mcp/whiteboard`.
  - id: whiteboard
    kind: skill
    path: partner-built/zoom-plugin/skills/zoom-mcp/whiteboard
    description: >
      Guidance for the bundled Zoom Whiteboard MCP connector. Use for Whiteboard
      MCP auth,

      endpoints, ID mapping, and tool workflows such as list_whiteboards and
      get_a_whiteboard.

      Prefer this skill when the request is specifically about Whiteboard MCP
      rather than general Zoom MCP.
  - id: pdf
    kind: mcp
    path: pdf-viewer/.mcp.json
  - id: view-pdf
    kind: skill
    path: pdf-viewer/skills/view-pdf
    description: Interactive PDF viewer. Use when the user wants to open, show, or
      view a PDF and collaborate on it visually — annotate, highlight, stamp,
      fill form fields, place signature/initials, or review markup together. Not
      for summarization or text extraction (use native Read instead).
  - id: competitive-brief-2
    kind: skill
    path: product-management/skills/competitive-brief
    description: Create a competitive analysis brief for one or more competitors or
      a feature area. Use when informing product strategy or feature
      prioritization, building sales battle cards, prepping board or investor
      materials, or deciding where to differentiate vs. achieve parity.
  - id: metrics-review
    kind: skill
    path: product-management/skills/metrics-review
    description: Review and analyze product metrics with trend analysis and
      actionable insights. Use when running a weekly, monthly, or quarterly
      metrics review, investigating a sudden spike or drop, comparing
      performance against targets, or turning raw numbers into a scorecard with
      recommended actions.
  - id: product-brainstorming
    kind: skill
    path: product-management/skills/product-brainstorming
    description: Brainstorm product ideas, explore problem spaces, and challenge
      assumptions as a thinking partner. Use when exploring a new opportunity,
      generating solutions to a product problem, stress-testing an idea, or when
      a PM needs to think out loud with a sharp sparring partner before
      converging on a direction.
  - id: roadmap-update
    kind: skill
    path: product-management/skills/roadmap-update
    description: Update, create, or reprioritize your product roadmap. Use when
      adding a new initiative and deciding what moves to make room, shifting
      priorities after new information comes in, moving timelines due to a
      dependency slip, or building a Now/Next/Later view from scratch.
  - id: sprint-planning
    kind: skill
    path: product-management/skills/sprint-planning
    description: Plan a sprint — scope work, estimate capacity, set goals, and draft
      a sprint plan. Use when kicking off a new sprint, sizing a backlog against
      team availability (accounting for PTO and meetings), deciding what's P0
      vs. stretch, or handling carryover from the last sprint.
  - id: stakeholder-update
    kind: skill
    path: product-management/skills/stakeholder-update
    description: Generate a stakeholder update tailored to audience and cadence. Use
      when writing a weekly or monthly status for leadership, announcing a
      launch, escalating a risk or blocker, or translating the same progress
      into exec-brief, engineering-detail, or customer-facing versions.
  - id: synthesize-research
    kind: skill
    path: product-management/skills/synthesize-research
    description: Synthesize user research from interviews, surveys, and feedback
      into structured insights. Use when you have a pile of interview notes,
      survey responses, or support tickets to make sense of, need to extract
      themes and rank findings by frequency and impact, or want to turn raw
      feedback into roadmap recommendations.
  - id: write-spec
    kind: skill
    path: product-management/skills/write-spec
    description: Write a feature spec or PRD from a problem statement or feature
      idea. Use when turning a vague idea or user request into a structured
      document, scoping a feature with goals and non-goals, defining success
      metrics and acceptance criteria, or breaking a big ask into a phased spec.
  - id: memory-management
    kind: skill
    path: productivity/skills/memory-management
    description: Two-tier memory system that makes Claude a true workplace
      collaborator. Decodes shorthand, acronyms, nicknames, and internal
      language so Claude understands requests like a colleague would. CLAUDE.md
      for working memory, memory/ directory for the full knowledge base.
  - id: start-3
    kind: skill
    path: productivity/skills/start
    description: Initialize the productivity system and open the dashboard. Use when
      setting up the plugin for the first time, bootstrapping working memory
      from your existing task list, or decoding the shorthand (nicknames,
      acronyms, project codenames) you use in your todos.
  - id: task-management
    kind: skill
    path: productivity/skills/task-management
    description: Simple task management using a shared TASKS.md file. Reference this
      when the user asks about their tasks, wants to add/complete tasks, or
      needs help tracking commitments.
  - id: update
    kind: skill
    path: productivity/skills/update
    description: Sync tasks and refresh memory from your current activity. Use when
      pulling new assignments from your project tracker into TASKS.md, triaging
      stale or overdue tasks, filling memory gaps for unknown people or
      projects, or running a comprehensive scan to catch todos buried in chat
      and email.
  - id: account-research-2
    kind: skill
    path: sales/skills/account-research
    description: Research a company or person and get actionable sales intel. Works
      standalone with web search, supercharged when you connect enrichment tools
      or your CRM. Trigger with "research [company]", "look up [person]", "intel
      on [prospect]", "who is [name] at [company]", or "tell me about
      [company]".
  - id: call-prep-2
    kind: skill
    path: sales/skills/call-prep
    description: Prepare for a sales call with account context, attendee research,
      and suggested agenda. Works standalone with user input and web research,
      supercharged when you connect your CRM, email, chat, or transcripts.
      Trigger with "prep me for my call with [company]", "I'm meeting with
      [company] prep me", "call prep [company]", or "get me ready for
      [meeting]".
  - id: call-summary
    kind: skill
    path: sales/skills/call-summary
    description: Process call notes or a transcript — extract action items, draft
      follow-up email, generate internal summary. Use when pasting rough notes
      or a transcript after a discovery, demo, or negotiation call, drafting a
      customer follow-up, logging the activity for your CRM, or capturing
      objections and next steps for your team.
  - id: competitive-intelligence
    kind: skill
    path: sales/skills/competitive-intelligence
    description: Research your competitors and build an interactive battlecard.
      Outputs an HTML artifact with clickable competitor cards and a comparison
      matrix. Trigger with "competitive intel", "research competitors", "how do
      we compare to [competitor]", "battlecard for [competitor]", or "what's new
      with [competitor]".
  - id: create-an-asset
    kind: skill
    path: sales/skills/create-an-asset
    description: Generate tailored sales assets (landing pages, decks, one-pagers,
      workflow demos) from your deal context. Describe your prospect, audience,
      and goal — get a polished, branded asset ready to share with customers.
  - id: daily-briefing
    kind: skill
    path: sales/skills/daily-briefing
    description: Start your day with a prioritized sales briefing. Works standalone
      when you tell me your meetings and priorities, supercharged when you
      connect your calendar, CRM, and email. Trigger with "morning briefing",
      "daily brief", "what's on my plate today", "prep my day", or "start my
      day".
  - id: draft-outreach
    kind: skill
    path: sales/skills/draft-outreach
    description: Research a prospect then draft personalized outreach. Uses web
      research by default, supercharged with enrichment and CRM. Trigger with
      "draft outreach to [person/company]", "write cold email to [prospect]",
      "reach out to [name]".
  - id: forecast
    kind: skill
    path: sales/skills/forecast
    description: Generate a weighted sales forecast with best/likely/worst
      scenarios, commit vs. upside breakdown, and gap analysis. Use when
      preparing a quarterly forecast call, assessing gap-to-quota from a
      pipeline CSV, deciding which deals to commit vs. call upside, or checking
      pipeline coverage against your number.
  - id: pipeline-review
    kind: skill
    path: sales/skills/pipeline-review
    description: Analyze pipeline health — prioritize deals, flag risks, get a
      weekly action plan. Use when running a weekly pipeline review, deciding
      which deals to focus on this week, spotting stale or stuck opportunities,
      auditing for hygiene issues like bad close dates, or identifying
      single-threaded deals.
  - id: business-pulse
    kind: skill
    path: small-business/skills/business-pulse
    description: >
      Produces a one-page cross-functional business snapshot for SMB owners —
      cash position (QuickBooks), sales trend (PayPal/Square), pipeline movement
      (HubSpot), this week's commitments (Calendar), urgent watch-list items
      (Gmail/Slack), and the single most important thing needing attention
      today. Proactively tries every available connector and gracefully scopes
      to whatever is connected — one connector gives a partial pulse; the full
      stack gives the full picture. Trigger when the user asks how the business
      is doing, wants a snapshot, a weekly summary, a Monday brief, or says
      anything like "what am I missing" or "catch me up on the business."
  - id: call-list
    kind: skill
    path: small-business/skills/call-list
    description: Ranks the top-5 leads most worth calling today, supplies talking
      points from email history, blocks time on the calendar, and drafts
      follow-up messages. Accepts optional count and date arguments.
  - id: canva-creator
    kind: skill
    path: small-business/skills/canva-creator
    description: >
      Takes an approved content brief and executes a campaign end-to-end: builds
      the posting calendar, generates Canva designs for social posts, drafts
      caption and email copy, and stages social sends in HubSpot. Canva is used
      for social posts only (Instagram, Facebook, X, LinkedIn) — email content
      is drafted as plain text and surfaced inline for the owner to send from
      their own tool. Every step requires explicit owner approval. Use when the
      user says "make the content," "generate the posts," "create the assets,"
      "turn this into a campaign," or hands off an approved brief for execution.
  - id: cash-flow-snapshot
    kind: skill
    path: small-business/skills/cash-flow-snapshot
    description: >
      Reads AR/AP, historical cash timing, and known fixed costs from
      QuickBooks, PayPal, Stripe, or Square — or a CSV upload — and produces a
      30/60/90-day cash flow forecast with percentage-variance confidence bands
      and named risk flags. Delivers a chat summary and a downloadable XLSX. Use
      when the user asks "forecast my cash flow," "will I make payroll,"
      mentions "runway," or says "cash crunch." Falls back to CSV upload when no
      connector is live.
  - id: close-month
    kind: skill
    path: small-business/skills/close-month
    description: Closes the month — reconciles QB vs payment processors, flags gaps,
      writes P&L narrative, exports close packet. Accepts optional month and
      save-to arguments.
  - id: content-strategy
    kind: skill
    path: small-business/skills/content-strategy
    description: >
      Analyzes sales data from PayPal and QuickBooks to find top performers and
      slow movers, layers in seasonality, and produces a prioritized 30-day
      content brief: what to push, what offers to run, what to hold. Strategic
      output only — no calendars or assets. Use when the user asks what to post,
      wants a content plan, asks what's selling, or what to promote this month.
  - id: contract-review
    kind: skill
    path: small-business/skills/contract-review
    description: >
      Lightweight NDA, MSA, and vendor contract review for SMBs without legal on
      staff. Reads contracts from local files, Gmail attachments, or DocuSign
      envelopes; flags non-standard terms; explains risks in plain English; and
      outputs a marked-up redline as a separate DOCX. Use when the user says
      "review this contract," "what am I signing," "red flags," "flag any
      concerns," "check the payment terms," or uploads/forwards a contract or
      legal agreement.
  - id: crm-cleanup
    kind: skill
    path: small-business/skills/crm-cleanup
    description: Scans HubSpot for stale deals, duplicate contacts, and missing
      fields, then fixes what the owner approves. Accepts optional scope
      argument for deals, contacts, or all.
  - id: crm-maintenance
    kind: skill
    path: small-business/skills/crm-maintenance
    description: >
      Keeps HubSpot current without the owner opening it: creates and updates
      contacts and deals from email and calendar context, logs notes and calls,
      and flags stale records. The "stop doing data entry" skill. Use when the
      user asks to update the CRM, log a call, clean up HubSpot, or add context
      to a deal.
  - id: customer-pulse-check
    kind: skill
    path: small-business/skills/customer-pulse-check
    description: Synthesizes themes from PayPal disputes, HubSpot tickets, and
      review exports into a top-3 fixable issues list with drafted response
      templates. Accepts optional since-date argument.
  - id: customer-pulse
    kind: skill
    path: small-business/skills/customer-pulse
    description: >
      Aggregates PayPal disputes, HubSpot feedback and tickets, and email
      sentiment (plus pasted or exported Google/Yelp reviews) into a themes
      report with verbatim evidence and a "do these three things this week"
      list. Use when the user asks how customers are feeling, for review
      analysis, what people are saying, or about disputes.
  - id: friday-brief
    kind: skill
    path: small-business/skills/friday-brief
    description: Delivers the Friday end-of-week pulse — revenue vs prior week, top
      sellers, wins and watches. Accepts optional lookback window of 7 or 14
      days.
  - id: handle-complaint
    kind: skill
    path: small-business/skills/handle-complaint
    description: Handles an incoming customer complaint end-to-end — pulls context,
      drafts a response, and suggests an operational fix. Accepts optional email
      or ticket ID argument.
  - id: invoice-chase
    kind: skill
    path: small-business/skills/invoice-chase
    description: >
      Drafts overdue-invoice reminder emails from QuickBooks and PayPal data,
      matched to each customer's payment history and tone (gentle for good
      customers, firm for repeat late payers). Sends via PayPal with owner
      approval; non-PayPal invoices queue as mail drafts. Use when the user asks
      "who owes me money," mentions overdue invoices, or wants to follow up on
      unpaid invoices.
  - id: job-post-builder
    kind: skill
    path: small-business/skills/job-post-builder
    description: >
      Builds end-to-end hiring packets — job post, structured interview guide
      with scoring rubric, and offer letter template — from a hiring brief.
      Triggers on: "help me hire", "we're hiring for", "write a job post", "job
      description", "JD", "open role", "create a job ad", "interview questions",
      "scoring rubric", "draft an offer letter", "send an offer", "make a hiring
      packet", or any request to recruit for a position. When in doubt, trigger
      — covers the full hiring workflow from job post through DocuSign envelope
      creation via browser. Does NOT screen or rank applicants.
  - id: lead-triage
    kind: skill
    path: small-business/skills/lead-triage
    description: >
      Scores inbound HubSpot leads by engagement signals, company fit, and
      urgency markers to produce a "call these 5 today" list with talking
      points, drafts the follow-ups, and blocks Calendar time. Use when the user
      asks to prioritize leads, who to call first, or about their pipeline.
  - id: margin-analyzer
    kind: skill
    path: small-business/skills/margin-analyzer
    description: >
      Analyzes unit economics by product or service using PayPal merchant
      insights and QuickBooks cost data, benchmarks against inflation and cost
      changes, and shows pricing-scenario data (e.g. "a 5% increase historically
      correlates with ~3% volume drop"). Surfaces analysis only — does not
      recommend a price. Use when the user asks about raising prices, pricing,
      margin analysis, what to charge, whether costs are eating into profit, or
      how a price change might affect their business. Trigger even if the user
      doesn't say "margin" explicitly — phrases like "am I making enough?",
      "should I charge more?", or "my costs are going up" all call for this
      skill.
  - id: monday-brief
    kind: skill
    path: small-business/skills/monday-brief
    description: Generates a one-page Monday morning briefing — cash, sales,
      pipeline, week ahead, top three to-dos. Accepts optional post destination
      and save-to arguments.
  - id: month-end-prep
    kind: skill
    path: small-business/skills/month-end-prep
    description: >
      Walks an SMB owner through month-end close: reconciles QuickBooks against
      PayPal (and Square/Stripe) settlements, flags uncategorized transactions,
      suspicious duplicates, and missing receipts, then writes a plain-English
      P&L narrative and exports a close packet (xlsx + one-page PDF). Use when
      the user says "close the month," "month-end," "reconcile," "what's
      missing," "P&L," or asks why revenue or margin changed this month.
  - id: month-heads-up
    kind: skill
    path: small-business/skills/month-heads-up
    description: Runs on the 25th — shows the next 30-day cash-flow outlook and
      flags anything that needs attention before month-end. Accepts optional 30
      or 60 day horizon.
  - id: plan-payroll
    kind: skill
    path: small-business/skills/plan-payroll
    description: Forecasts cash, ranks overdue invoices, and stages PayPal reminders
      so the owner can confidently run payroll. Accepts optional horizon and
      payroll-date arguments.
  - id: price-check
    kind: skill
    path: small-business/skills/price-check
    description: Produces a margin-by-product table and three pricing-scenario data
      views so the owner can see the full financial picture before making a
      pricing decision. Accepts optional product name argument.
  - id: quarterly-review
    kind: skill
    path: small-business/skills/quarterly-review
    description: Generates a full QBR narrative — revenue trend, margin trend,
      customer health, top opportunities and risks — as a presentation-ready PDF
      or deck. Accepts optional quarter and save-to arguments.
  - id: review-contract-2
    kind: skill
    path: small-business/skills/review-contract
    description: Reviews a contract in plain English, surfaces red flags with
      severity ratings, and produces a marked-up docx/PDF with suggested
      redlines. Accepts optional file path or DocuSign envelope ID.
  - id: run-campaign
    kind: skill
    path: small-business/skills/run-campaign
    description: Runs an end-to-end marketing campaign — sales analysis, content
      brief, Canva assets, HubSpot send. Accepts optional lookback and channel
      arguments.
  - id: sales-brief
    kind: skill
    path: small-business/skills/sales-brief
    description: Surfaces top and bottom sellers, identifies seasonality patterns,
      and produces a 2-week content brief to push winners and clear slow movers.
      Accepts optional lookback window of 30, 60, or 90 days.
  - id: smb-onboard
    kind: skill
    path: small-business/skills/smb-onboard
    description: >
      Claude as the trainer. Walks an SMB owner through connecting their first
      two tools, runs one recipe to prove immediate value, interviews them about
      their business (industry, size, top three headaches), stores that context
      persistently so every other skill benefits, and sets a weekly check-in
      cadence. Use when the owner is getting started or says any of: "set me
      up," "setup," "help me get set up," "get started," "help me get started,"
      "get me started," "what can you do," "I'm new to this," or is in their
      first session.
  - id: smb-router
    kind: skill
    path: small-business/skills/smb-router
    description: >
      The front door to the Small Business plugin. Listens to what the owner
      needs right now — vague or specific — and routes them to the best skill or
      slash command for the moment. Also serves as a guide: explains what's
      available, suggests what to try next, and adapts recommendations based on
      stored business context. Trigger whenever the owner asks "what can you
      do," "help me with my business," "what should I focus on," "I don't know
      where to start," or any open-ended business request that doesn't clearly
      match a single skill.
  - id: tax-prep
    kind: skill
    path: small-business/skills/tax-prep
    description: Prepares tax-season materials — quarterly estimated tax calculation
      or year-end 1099 prep — and produces an accountant handoff packet. Accepts
      optional mode and year arguments.
  - id: tax-season-organizer
    kind: skill
    path: small-business/skills/tax-season-organizer
    description: >
      Prepares tax-season materials for small business owners — framed as
      deliverables for their accountant, not tax advice. Two modes: (1)
      quarterly estimated tax calculation — pulls YTD net income from QuickBooks
      and calculates the federal income tax + self-employment tax liability and
      quarterly payment due; (2) year-end 1099 prep — scans QuickBooks, PayPal,
      and Stripe for contractors paid over $600, builds a 1099-NEC candidate
      list with missing W-9 flags, and produces a plain-English summary a CPA
      can work from directly.

      Trigger this skill whenever the user mentions: quarterly taxes, estimated
      tax payment, how much to set aside for taxes, 1099s, 1099-NEC, year-end
      tax prep, contractor payments, W-9s, or any phrase suggesting they are
      preparing for a tax deadline or handing materials to an accountant. Also
      trigger proactively when a user asks about net profit or YTD income in a
      context that suggests they are worried about their tax bill.
  - id: ticket-deflector
    kind: skill
    path: small-business/skills/ticket-deflector
    description: >
      Reads a forwarded customer email or ticket, pulls order/refund status from
      PayPal and account history from HubSpot, drafts a tone-matched reply in
      the owner's writing voice, and can issue a PayPal refund with explicit
      owner approval. Use when the user says "draft a response," "answer this
      customer," "where's my order," or "I want a refund."
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
