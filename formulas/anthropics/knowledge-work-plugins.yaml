# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: anthropics/knowledge-work-plugins
name: Knowledge Work Plugins
description: "Multi-domain Cowork/Claude Code plugin pack: research, support,
  data, design, eng, finance, HR, legal, marketing, ops, sales, SMB, Zoom."
source:
  type: git
  url: https://github.com/anthropics/knowledge-work-plugins
  revision: 71fe6548e9b0e3ad07dd1f5c959da76a3106195b
capabilities:
  - id: single-cell-rna-qc
    kind: skill
    path: bio-research/skills/single-cell-rna-qc
    description: Performs quality control on single-cell RNA-seq data (.h5ad or .h5
      files) using scverse best practices with MAD-based filtering and
      comprehensive visualizations. Use when users request QC analysis,
      filtering low-quality cells, assessing data quality, or following
      scverse/scanpy best practices for single-cell analysis.
  - id: ticket-triage
    kind: skill
    path: customer-support/skills/ticket-triage
    description: Triage and prioritize a support ticket or customer issue. Use when
      a new ticket comes in and needs categorization, assigning P1-P4 priority,
      deciding which team should handle it, or checking whether it's a duplicate
      or known issue before routing.
  - id: analyze
    kind: skill
    path: data/skills/analyze
    description: Answer data questions -- from quick lookups to full analyses. Use
      when looking up a single metric, investigating what's driving a trend or
      drop, comparing segments over time, or preparing a formal data report for
      stakeholders.
  - id: instrument-data-to-allotrope
    kind: skill
    path: bio-research/skills/instrument-data-to-allotrope
    description: Convert laboratory instrument output files (PDF, CSV, Excel, TXT)
      to Allotrope Simple Model (ASM) JSON format or flattened 2D CSV. Use this
      skill when scientists need to standardize instrument data for LIMS
      systems, data lakes, or downstream analysis. Supports auto-detection of
      instrument types. Outputs include full ASM JSON, flattened CSV for easy
      import, and exportable Python code for data engineers. Common triggers
      include converting instrument files, standardizing lab data, preparing
      data for upload to LIMS/ELN systems, or generating parser code for
      production pipelines.
  - id: nextflow-development
    kind: skill
    path: bio-research/skills/nextflow-development
    description: Run nf-core bioinformatics pipelines (rnaseq, sarek, atacseq) on
      sequencing data. Use when analyzing RNA-seq, WGS/WES, or ATAC-seq
      data—either local FASTQs or public datasets from GEO/SRA. Triggers on
      nf-core, Nextflow, FASTQ analysis, variant calling, gene expression,
      differential expression, GEO reanalysis, GSE/GSM/SRR accessions, or
      samplesheet creation.
  - id: scientific-problem-selection
    kind: skill
    path: bio-research/skills/scientific-problem-selection
    description: This skill should be used when scientists need help with research
      problem selection, project ideation, troubleshooting stuck projects, or
      strategic scientific decisions. Use this skill when users ask to pitch a
      new research idea, work through a project problem, evaluate project risks,
      plan research strategy, navigate decision trees, or get help choosing what
      scientific problem to work on. Typical requests include "I have an idea
      for a project", "I'm stuck on my research", "help me evaluate this
      project", "what should I work on", or "I need strategic advice about my
      research".
  - id: scvi-tools
    kind: skill
    path: bio-research/skills/scvi-tools
    description: Deep learning for single-cell analysis using scvi-tools. This skill
      should be used when users need (1) data integration and batch correction
      with scVI/scANVI, (2) ATAC-seq analysis with PeakVI, (3) CITE-seq
      multi-modal analysis with totalVI, (4) multiome RNA+ATAC analysis with
      MultiVI, (5) spatial transcriptomics deconvolution with DestVI, (6) label
      transfer and reference mapping with scANVI/scArches, (7) RNA velocity with
      veloVI, or (8) any deep learning-based single-cell method. Triggers
      include mentions of scVI, scANVI, totalVI, PeakVI, MultiVI, DestVI,
      veloVI, sysVI, scArches, variational autoencoder, VAE, batch correction,
      data integration, multi-modal, CITE-seq, multiome, reference mapping,
      latent space.
  - id: start
    kind: skill
    path: bio-research/skills/start
    description: Set up your bio-research environment and explore available tools.
      Use when first getting oriented with the plugin, checking which
      literature, drug-discovery, or visualization MCP servers are connected, or
      surveying available analysis skills before starting a new project.
  - id: cowork-plugin-customizer
    kind: skill
    path: cowork-plugin-management/skills/cowork-plugin-customizer
    description: >
      Customize a Claude Code plugin for a specific organization's tools and
      workflows. Use when: customize plugin, set up plugin, configure plugin,
      tailor plugin, adjust plugin settings, customize plugin connectors,
      customize plugin skill, tweak plugin, modify plugin configuration.
  - id: create-cowork-plugin
    kind: skill
    path: cowork-plugin-management/skills/create-cowork-plugin
    description: >
      Guide users through creating a new plugin from scratch in a cowork
      session. Use when users want to create a plugin, build a plugin, make a
      new plugin, develop a plugin, scaffold a plugin, start a plugin from
      scratch, or design a plugin. This skill requires Cowork mode with access
      to the outputs directory for delivering the final .plugin file.
  - id: customer-escalation
    kind: skill
    path: customer-support/skills/customer-escalation
    description: Package an escalation for engineering, product, or leadership with
      full context. Use when a bug needs engineering attention beyond normal
      support, multiple customers report the same issue, a customer is
      threatening to churn, or an issue has sat unresolved past its SLA.
  - id: customer-research
    kind: skill
    path: customer-support/skills/customer-research
    description: Multi-source research on a customer question or topic with source
      attribution. Use when a customer asks something you need to look up,
      investigating whether a bug has been reported before, checking what was
      previously told to a specific account, or gathering background before
      drafting a response.
  - id: draft-response
    kind: skill
    path: customer-support/skills/draft-response
    description: Draft a professional customer-facing response tailored to the
      situation and relationship. Use when answering a product question,
      responding to an escalation or outage, delivering bad news like a delay or
      won't-fix, declining a feature request, or replying to a billing issue.
  - id: kb-article
    kind: skill
    path: customer-support/skills/kb-article
    description: Draft a knowledge base article from a resolved issue or common
      question. Use when a ticket resolution is worth documenting for
      self-service, the same question keeps coming up, a workaround needs to be
      published, or a known issue should be communicated to customers.
  - id: build-dashboard
    kind: skill
    path: data/skills/build-dashboard
    description: Build an interactive HTML dashboard with charts, filters, and
      tables. Use when creating an executive overview with KPI cards, turning
      query results into a shareable self-contained report, building a team
      monitoring snapshot, or needing multiple charts with filters in one
      browser-openable file.
  - id: create-viz
    kind: skill
    path: data/skills/create-viz
    description: Create publication-quality visualizations with Python. Use when
      turning query results or a DataFrame into a chart, selecting the right
      chart type for a trend or comparison, generating a plot for a report or
      presentation, or needing an interactive chart with hover and zoom.
  - id: data-context-extractor
    kind: skill
    path: data/skills/data-context-extractor
    description: >
      Generate or improve a company-specific data analysis skill by extracting
      tribal knowledge from analysts.

      BOOTSTRAP MODE - Triggers: "Create a data context skill", "Set up data
      analysis for our warehouse", "Help me create a skill for our database",
      "Generate a data skill for [company]" → Discovers schemas, asks key
      questions, generates initial skill with reference files

      ITERATION MODE - Triggers: "Add context about [domain]", "The skill needs
      more info about [topic]", "Update the data skill with
      [metrics/tables/terminology]", "Improve the [domain] reference" → Loads
      existing skill, asks targeted questions, appends/updates reference files

      Use when data analysts want Claude to understand their company's specific
      data warehouse, terminology, metrics definitions, and common query
      patterns.
  - id: data-visualization
    kind: skill
    path: data/skills/data-visualization
    description: Create effective data visualizations with Python (matplotlib,
      seaborn, plotly). Use when building charts, choosing the right chart type
      for a dataset, creating publication-quality figures, or applying design
      principles like accessibility and color theory.
  - id: explore-data
    kind: skill
    path: data/skills/explore-data
    description: Profile and explore a dataset to understand its shape, quality, and
      patterns. Use when encountering a new table or file, checking null rates
      and column distributions, spotting data quality issues like duplicates or
      suspicious values, or deciding which dimensions and metrics to analyze.
  - id: sql-queries
    kind: skill
    path: data/skills/sql-queries
    description: Write correct, performant SQL across all major data warehouse
      dialects (Snowflake, BigQuery, Databricks, PostgreSQL, etc.). Use when
      writing queries, optimizing slow SQL, translating between dialects, or
      building complex analytical queries with CTEs, window functions, or
      aggregations.
  - id: statistical-analysis
    kind: skill
    path: data/skills/statistical-analysis
    description: Apply statistical methods including descriptive stats, trend
      analysis, outlier detection, and hypothesis testing. Use when analyzing
      distributions, testing for significance, detecting anomalies, computing
      correlations, or interpreting statistical results.
  - id: validate-data
    kind: skill
    path: data/skills/validate-data
    description: QA an analysis before sharing -- methodology, accuracy, and bias
      checks. Use when reviewing an analysis before a stakeholder presentation,
      spot-checking calculations and aggregation logic, verifying a SQL query's
      results look right, or assessing whether conclusions are actually
      supported by the data.
  - id: write-query
    kind: skill
    path: data/skills/write-query
    description: Write optimized SQL for your dialect with best practices. Use when
      translating a natural-language data need into SQL, building a multi-CTE
      query with joins and aggregations, optimizing a query against a large
      partitioned table, or getting dialect-specific syntax for Snowflake,
      BigQuery, Postgres, etc.
  - id: accessibility-review
    kind: skill
    path: design/skills/accessibility-review
    description: Run a WCAG 2.1 AA accessibility audit on a design or page. Trigger
      with "audit accessibility", "check a11y", "is this accessible?", or when
      reviewing a design for color contrast, keyboard navigation, touch target
      size, or screen reader behavior before handoff.
  - id: design-critique
    kind: skill
    path: design/skills/design-critique
    description: Get structured design feedback on usability, hierarchy, and
      consistency. Trigger with "review this design", "critique this mockup",
      "what do you think of this screen?", or when sharing a Figma link or
      screenshot for feedback at any stage from exploration to final polish.
  - id: design-handoff
    kind: skill
    path: design/skills/design-handoff
    description: Generate developer handoff specs from a design. Use when a design
      is ready for engineering and needs a spec sheet covering layout, design
      tokens, component props, interaction states, responsive breakpoints, edge
      cases, and animation details.
  - id: design-system
    kind: skill
    path: design/skills/design-system
    description: Audit, document, or extend your design system. Use when checking
      for naming inconsistencies or hardcoded values across components, writing
      documentation for a component's variants, states, and accessibility notes,
      or designing a new pattern that fits the existing system.
  - id: research-synthesis
    kind: skill
    path: design/skills/research-synthesis
    description: Synthesize user research into themes, insights, and
      recommendations. Use when you have interview transcripts, survey results,
      usability test notes, support tickets, or NPS responses that need to be
      distilled into patterns, user segments, and prioritized next steps.
  - id: user-research
    kind: skill
    path: design/skills/user-research
    description: Plan, conduct, and synthesize user research. Trigger with "user
      research plan", "interview guide", "usability test", "survey design",
      "research questions", or when the user needs help with any aspect of
      understanding their users through research.
  - id: ux-copy
    kind: skill
    path: design/skills/ux-copy
    description: Write or review UX copy — microcopy, error messages, empty states,
      CTAs. Trigger with "write copy for", "what should this button say?",
      "review this error message", or when naming a CTA, wording a confirmation
      dialog, filling an empty state, or writing onboarding text.
  - id: architecture
    kind: skill
    path: engineering/skills/architecture
    description: Create or evaluate an architecture decision record (ADR). Use when
      choosing between technologies (e.g., Kafka vs SQS), documenting a design
      decision with trade-offs and consequences, reviewing a system design
      proposal, or designing a new component from requirements and constraints.
  - id: code-review
    kind: skill
    path: engineering/skills/code-review
    description: Review code changes for security, performance, and correctness.
      Trigger with a PR URL or diff, "review this before I merge", "is this code
      safe?", or when checking a change for N+1 queries, injection risks,
      missing edge cases, or error handling gaps.
  - id: debug
    kind: skill
    path: engineering/skills/debug
    description: Structured debugging session — reproduce, isolate, diagnose, and
      fix. Trigger with an error message or stack trace, "this works in staging
      but not prod", "something broke after the deploy", or when behavior
      diverges from expected and the cause isn't obvious.
  - id: deploy-checklist
    kind: skill
    path: engineering/skills/deploy-checklist
    description: Pre-deployment verification checklist. Use when about to ship a
      release, deploying a change with database migrations or feature flags,
      verifying CI status and approvals before going to production, or
      documenting rollback triggers ahead of time.
  - id: documentation
    kind: skill
    path: engineering/skills/documentation
    description: Write and maintain technical documentation. Trigger with "write
      docs for", "document this", "create a README", "write a runbook",
      "onboarding guide", or when the user needs help with any form of technical
      writing — API docs, architecture docs, or operational runbooks.
  - id: incident-response
    kind: skill
    path: engineering/skills/incident-response
    description: Run an incident response workflow — triage, communicate, and write
      postmortem. Trigger with "we have an incident", "production is down", an
      alert that needs severity assessment, a status update mid-incident, or
      when writing a blameless postmortem after resolution.
  - id: standup
    kind: skill
    path: engineering/skills/standup
    description: Generate a standup update from recent activity. Use when preparing
      for daily standup, summarizing yesterday's commits and PRs and ticket
      moves, formatting work into yesterday/today/blockers, or structuring a few
      rough notes into a shareable update.
  - id: system-design
    kind: skill
    path: engineering/skills/system-design
    description: Design systems, services, and architectures. Trigger with "design a
      system for", "how should we architect", "system design for", "what's the
      right architecture for", or when the user needs help with API design, data
      modeling, or service boundaries.
  - id: tech-debt
    kind: skill
    path: engineering/skills/tech-debt
    description: Identify, categorize, and prioritize technical debt. Trigger with
      "tech debt", "technical debt audit", "what should we refactor", "code
      health", or when the user asks about code quality, refactoring priorities,
      or maintenance backlog.
  - id: testing-strategy
    kind: skill
    path: engineering/skills/testing-strategy
    description: Design test strategies and test plans. Trigger with "how should we
      test", "test strategy for", "write tests for", "test plan", "what tests do
      we need", or when the user needs help with testing approaches, coverage,
      or test architecture.
  - id: digest
    kind: skill
    path: enterprise-search/skills/digest
    description: Generate a daily or weekly digest of activity across all connected
      sources. Use when catching up after time away, starting the day and
      wanting a summary of mentions and action items, or reviewing a week's
      decisions and document updates grouped by project.
  - id: knowledge-synthesis
    kind: skill
    path: enterprise-search/skills/knowledge-synthesis
    description: Combines search results from multiple sources into coherent,
      deduplicated answers with source attribution. Handles confidence scoring
      based on freshness and authority, and summarizes large result sets
      effectively.
  - id: search-strategy
    kind: skill
    path: enterprise-search/skills/search-strategy
    description: Query decomposition and multi-source search orchestration. Breaks
      natural language questions into targeted searches per source, translates
      queries into source-specific syntax, ranks results by relevance, and
      handles ambiguity and fallback strategies.
  - id: search
    kind: skill
    path: enterprise-search/skills/search
    description: Search across all connected sources in one query. Trigger with
      "find that doc about...", "what did we decide on...", "where was the
      conversation about...", or when looking for a decision, document, or
      discussion that could live in chat, email, cloud storage, or a project
      tracker.
  - id: source-management
    kind: skill
    path: enterprise-search/skills/source-management
    description: Manages connected MCP sources for enterprise search. Detects
      available sources, guides users to connect new ones, handles source
      priority ordering, and manages rate limiting awareness.
  - id: audit-support
    kind: skill
    path: finance/skills/audit-support
    description: Support SOX 404 compliance with control testing methodology, sample
      selection, and documentation standards. Use when generating testing
      workpapers, selecting audit samples, classifying control deficiencies, or
      preparing for internal or external audits.
  - id: close-management
    kind: skill
    path: finance/skills/close-management
    description: Manage the month-end close process with task sequencing,
      dependencies, and status tracking. Use when planning the close calendar,
      tracking close progress, identifying blockers, or sequencing close
      activities by day.
  - id: financial-statements
    kind: skill
    path: finance/skills/financial-statements
    description: Generate financial statements (income statement, balance sheet,
      cash flow) with period-over-period comparison and variance analysis. Use
      when preparing a monthly or quarterly P&L, closing the books and need to
      flag material variances, comparing actuals to budget, building a financial
      summary for leadership review, or looking up GAAP presentation
      requirements and period-end adjustments.
  - id: journal-entry-prep
    kind: skill
    path: finance/skills/journal-entry-prep
    description: Prepare journal entries with proper debits, credits, and supporting
      documentation for month-end close. Use when booking accruals, prepaid
      amortization, fixed asset depreciation, payroll entries, revenue
      recognition, or any manual journal entry.
  - id: journal-entry
    kind: skill
    path: finance/skills/journal-entry
    description: Prepare journal entries with proper debits, credits, and supporting
      detail. Use when booking month-end accruals (AP, payroll, prepaid),
      recording depreciation or amortization, posting revenue recognition or
      deferred revenue adjustments, or documenting an entry for audit review.
  - id: reconciliation
    kind: skill
    path: finance/skills/reconciliation
    description: Reconcile accounts by comparing GL balances to subledgers, bank
      statements, or third-party data. Use when performing bank reconciliations,
      GL-to-subledger recs, intercompany reconciliations, or identifying and
      categorizing reconciling items.
  - id: sox-testing
    kind: skill
    path: finance/skills/sox-testing
    description: Generate SOX sample selections, testing workpapers, and control
      assessments. Use when planning quarterly or annual SOX 404 testing,
      pulling a sample for a control (revenue, P2P, ITGC, close), building a
      testing workpaper template, or evaluating and classifying a control
      deficiency.
  - id: variance-analysis
    kind: skill
    path: finance/skills/variance-analysis
    description: Decompose financial variances into drivers with narrative
      explanations and waterfall analysis. Use when analyzing budget vs. actual,
      period-over-period changes, revenue or expense variances, or preparing
      variance commentary for leadership.
  - id: comp-analysis
    kind: skill
    path: human-resources/skills/comp-analysis
    description: Analyze compensation — benchmarking, band placement, and equity
      modeling. Trigger with "what should we pay a [role]", "is this offer
      competitive", "model this equity grant", or when uploading comp data to
      find outliers and retention risks.
  - id: draft-offer
    kind: skill
    path: human-resources/skills/draft-offer
    description: Draft an offer letter with comp details and terms. Use when a
      candidate is ready for an offer, assembling a total comp package (base,
      equity, signing bonus), writing the offer letter text itself, or prepping
      negotiation guidance for the hiring manager.
  - id: interview-prep
    kind: skill
    path: human-resources/skills/interview-prep
    description: Create structured interview plans with competency-based questions
      and scorecards. Trigger with "interview plan for", "interview questions
      for", "how should we interview", "scorecard for", or when the user is
      preparing to interview candidates.
  - id: onboarding
    kind: skill
    path: human-resources/skills/onboarding
    description: Generate an onboarding checklist and first-week plan for a new
      hire. Use when someone has a start date coming up, building the pre-start
      task list (accounts, equipment, buddy), scheduling Day 1 and Week 1, or
      setting 30/60/90-day goals for a new team member.
  - id: org-planning
    kind: skill
    path: human-resources/skills/org-planning
    description: Headcount planning, org design, and team structure optimization.
      Trigger with "org planning", "headcount plan", "team structure", "reorg",
      "who should we hire next", or when the user is thinking about team size,
      reporting structure, or organizational design.
  - id: people-report
    kind: skill
    path: human-resources/skills/people-report
    description: Generate headcount, attrition, diversity, or org health reports.
      Use when pulling a headcount snapshot for leadership, analyzing turnover
      trends by team, preparing diversity representation metrics, or assessing
      span of control and flight risk across the org.
  - id: performance-review
    kind: skill
    path: human-resources/skills/performance-review
    description: Structure a performance review with self-assessment, manager
      template, and calibration prep. Use when review season kicks off and you
      need a self-assessment template, writing a manager review for a direct
      report, prepping rating distributions and promotion cases for calibration,
      or turning vague feedback into specific behavioral examples.
  - id: policy-lookup
    kind: skill
    path: human-resources/skills/policy-lookup
    description: Find and explain company policies in plain language. Trigger with
      "what's our PTO policy", "can I work remotely from another country", "how
      do expenses work", or any plain-language question about benefits, travel,
      leave, or handbook rules.
  - id: recruiting-pipeline
    kind: skill
    path: human-resources/skills/recruiting-pipeline
    description: Track and manage recruiting pipeline stages. Trigger with
      "recruiting update", "candidate pipeline", "how many candidates", "hiring
      status", or when the user discusses sourcing, screening, interviewing, or
      extending offers.
  - id: brief
    kind: skill
    path: legal/skills/brief
    description: Generate contextual briefings for legal work — daily summary, topic
      research, or incident response. Use when starting your day and need a scan
      of legal-relevant items across email, calendar, and contracts, when
      researching a specific legal question across internal sources, or when a
      developing situation (data breach, litigation threat, regulatory inquiry)
      needs rapid context.
  - id: compliance-check
    kind: skill
    path: legal/skills/compliance-check
    description: Run a compliance check on a proposed action, product feature, or
      business initiative, surfacing applicable regulations, required approvals,
      and risk areas. Use when launching a feature that touches personal data,
      when marketing or product proposes something with regulatory implications,
      or when you need to know which approvals and jurisdictional requirements
      apply before proceeding.
  - id: legal-response
    kind: skill
    path: legal/skills/legal-response
    description: Generate a response to a common legal inquiry using configured
      templates, with built-in escalation checks for situations that shouldn't
      use a templated reply. Use when responding to data subject requests,
      litigation hold notices, vendor legal questions, NDA requests from
      business teams, or subpoenas.
  - id: legal-risk-assessment
    kind: skill
    path: legal/skills/legal-risk-assessment
    description: Assess and classify legal risks using a severity-by-likelihood
      framework with escalation criteria. Use when evaluating contract risk,
      assessing deal exposure, classifying issues by severity, or determining
      whether a matter needs senior counsel or outside legal review.
  - id: meeting-briefing
    kind: skill
    path: legal/skills/meeting-briefing
    description: Prepare structured briefings for meetings with legal relevance and
      track resulting action items. Use when preparing for contract
      negotiations, board meetings, compliance reviews, or any meeting where
      legal context, background research, or action tracking is needed.
  - id: review-contract
    kind: skill
    path: legal/skills/review-contract
    description: Review a contract against your organization's negotiation playbook
      — flag deviations, generate redlines, provide business impact analysis.
      Use when reviewing vendor or customer agreements, when you need
      clause-by-clause analysis against standard positions, or when preparing a
      negotiation strategy with prioritized redlines and fallback positions.
  - id: signature-request
    kind: skill
    path: legal/skills/signature-request
    description: Prepare and route a document for e-signature — run a pre-signature
      checklist, configure signing order, and send for execution. Use when a
      contract is finalized and ready to sign, when verifying entity names,
      exhibits, and signature blocks before sending, or when setting up an
      envelope with sequential or parallel signers.
  - id: triage-nda
    kind: skill
    path: legal/skills/triage-nda
    description: Rapidly triage an incoming NDA and classify it as GREEN (standard
      approval), YELLOW (counsel review), or RED (full legal review). Use when a
      new NDA arrives from sales or business development, when screening for
      embedded non-solicits, non-competes, or missing carveouts, or when
      deciding whether an NDA can be signed under standard delegation.
  - id: vendor-check
    kind: skill
    path: legal/skills/vendor-check
    description: Check the status of existing agreements with a vendor across all
      connected systems — CLM, CRM, email, and document storage — with gap
      analysis and upcoming deadlines. Use when onboarding or renewing a vendor,
      when you need a consolidated view of what's signed and what's missing
      (MSA, DPA, SOW), or when checking for approaching expirations and
      surviving obligations.
  - id: brand-review
    kind: skill
    path: marketing/skills/brand-review
    description: Review content against your brand voice, style guide, and messaging
      pillars, flagging deviations by severity with specific before/after fixes.
      Use when checking a draft before it ships, when auditing copy for voice
      consistency and terminology, or when screening for unsubstantiated claims,
      missing disclaimers, and other legal flags.
  - id: campaign-plan
    kind: skill
    path: marketing/skills/campaign-plan
    description: Generate a full campaign brief with objectives, audience,
      messaging, channel strategy, content calendar, and success metrics. Use
      when planning a product launch, lead-gen push, or awareness campaign, when
      you need a week-by-week content calendar with dependencies, or when
      translating a marketing goal into a structured, executable plan.
  - id: competitive-brief
    kind: skill
    path: marketing/skills/competitive-brief
    description: Research competitors and generate a positioning and messaging
      comparison with content gaps, opportunities, and threats. Use when
      building sales battlecards, when finding positioning gaps and messaging
      angles competitors haven't claimed, or when a competitor makes a move and
      you need to assess the impact.
  - id: content-creation
    kind: skill
    path: marketing/skills/content-creation
    description: Draft marketing content across channels — blog posts, social media,
