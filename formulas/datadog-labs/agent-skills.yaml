schemaVersion: 1
id: datadog-labs/agent-skills
name: Datadog Skills for AI Agents
description: Datadog APM, audit, docs, apps, browser SDK, LLM Obs, delivery reqs.
source:
  type: git
  url: https://github.com/datadog-labs/agent-skills
  revision: 8dc06447c18ad78c4d982f86c163de6ba693c037
capabilities:
  - id: dd-apm
    kind: skill
    path: dd-apm
    description: APM - install, onboard, instrument, enable, set up, configure,
      traces, services, dependencies, performance analysis. Use for any request
      involving Datadog APM setup, instrumentation (SSI, ddtrace, agent
      install), or analysis.
  - id: dd-audit
    kind: skill
    path: dd-audit
    description: Audit Trail investigations - who changed what, key compromise, cost
      spike root cause, compliance evidence (SOC 2/PCI), and AI activity
      auditing.
  - id: dd-browser-sdk
    kind: skill
    path: dd-browser-sdk
    description: >
      Datadog Browser SDK — RUM, Logs, Session Replay, profiling, product
      analytics, and error tracking setup, configuration, and migration. Use
      when upgrading Browser SDK versions, setting up RUM or Logs, or
      troubleshooting browser-side Datadog instrumentation.
  - id: dd-docs
    kind: skill
    path: dd-docs
    description: Datadog docs lookup using docs.datadoghq.com/llms.txt and linked
      Markdown pages.
  - id: datadog-app
    kind: skill
    path: dd-apps/datadog-app
    description: Guides developers building Datadog Apps with TypeScript, React, the
      @datadog/apps scaffolder, and @datadog/vite-plugin. Use when a user wants
      to scaffold, run, debug, upgrade, build, upload, publish, upload without
      publishing (draft upload), add an upload-no-publish script, set up CI/CD,
      trigger/poll Workflow Automation, choose DDSQL or Action Catalog for
      backend data access, or query app datastores with DDSQL, including backend
      function troubleshooting.
  - id: llm-obs-eval-pipeline
    kind: skill
    path: dd-llmo/llm-obs-eval-pipeline
    description: End-to-end LLM Observability pipeline for an instrumented ml_app —
      classify production traces, root-cause failures, bootstrap evaluators,
      then (optionally) sample + publish a dataset, generate + run an
      experiment, and analyze results. Six narrated phases with a standardized
      banner and a "continue" checkpoint between each. Pure orchestration over
      the dd-llmo sub-skills (`llm-obs-session-classify`, `llm-obs-trace-rca`,
      `llm-obs-eval-bootstrap`, `llm-obs-experiment-py-bootstrap`,
      `llm-obs-experiment-analyzer`). Use when user says "run the eval
      pipeline", "go from traces to evals", "bootstrap evals end to end",
      "classify then RCA then bootstrap", "build an eval set from scratch",
      "onboard me to datasets and experiments", "walk me through experiments",
      "I have an ml_app, now what", "LLM Obs onboarding", "guided experiment
      setup", "from traces to experiments", or wants a deterministic, narrated
      tour from production data through evaluators, datasets, and experiments.
      Stop early with `--stop-after <phase>` to short-circuit at evaluators or
      dataset, or resume mid-flow with `--start-at <phase>`.
  - id: agent-install
    kind: skill
    path: dd-apm/k8s-ssi/agent-install
    description: Install the Datadog Agent on Kubernetes using the Datadog Operator
      — required before enabling Single Step Instrumentation (SSI), which
      automatically instruments applications for APM without code changes. Only
      use if no Datadog Agent is deployed on the cluster yet.
  - id: enable-ssi
    kind: skill
    path: dd-apm/k8s-ssi/enable-ssi
    description: Enable Single Step Instrumentation (SSI) on Kubernetes —
      automatically instruments applications for APM without code changes. Only
      use if the Datadog Agent is already running on the cluster — if not, use
      agent-install first.
  - id: onboarding-summary
    kind: skill
    path: dd-apm/k8s-ssi/onboarding-summary
    description: Generate a live Single Step Instrumentation (SSI) onboarding
      confirmation report — verifies APM instrumentation is working end-to-end
      with deep links into the Datadog UI. Only use after agent-install and
      enable-ssi have both completed successfully.
  - id: troubleshoot-ssi
    kind: skill
    path: dd-apm/k8s-ssi/troubleshoot-ssi
    description: Diagnose and fix Single Step Instrumentation (SSI) issues on
      Kubernetes — SSI automatically instruments applications for APM without
      code changes. Only use if the agent and SSI are already configured but
      traces are missing or instrumentation is not working.
  - id: verify-ssi
    kind: skill
    path: dd-apm/k8s-ssi/verify-ssi
    description: Verify Single Step Instrumentation (SSI) is working end-to-end on
      Kubernetes — SSI automatically instruments applications for APM without
      code changes. Only use after enable-ssi has run.
  - id: agent-install-2
    kind: skill
    path: dd-apm/linux-ssi/agent-install
    description: Install the Datadog Agent on Linux hosts via SSH with Single Step
      Instrumentation (SSI) enabled — SSI automatically instruments applications
      for APM without code changes. Only use if no agent is installed yet.
  - id: enable-ssi-2
    kind: skill
    path: dd-apm/linux-ssi/enable-ssi
    description: Configure Unified Service Tags and verify Single Step
      Instrumentation (SSI) injection on Linux hosts — SSI automatically
      instruments applications for APM without code changes. Only use if the
      Datadog Agent is already installed.
  - id: onboarding-summary-2
    kind: skill
    path: dd-apm/linux-ssi/onboarding-summary
    description: Generate a live Single Step Instrumentation (SSI) onboarding
      confirmation report for Linux hosts — verifies APM instrumentation is
      working end-to-end with deep links into the Datadog UI. Only use after
      agent-install and enable-ssi have both completed.
  - id: troubleshoot-ssi-2
    kind: skill
    path: dd-apm/linux-ssi/troubleshoot-ssi
    description: Diagnose and fix Single Step Instrumentation (SSI) issues on Linux
      hosts — SSI automatically instruments applications for APM without code
      changes. Only use if the agent and SSI are configured but traces are
      missing or instrumentation is not working.
  - id: verify-ssi-2
    kind: skill
    path: dd-apm/linux-ssi/verify-ssi
    description: Verify Single Step Instrumentation (SSI) is working end-to-end on
      Linux hosts — SSI automatically instruments applications for APM without
      code changes. Only use after enable-ssi has run.
  - id: service-remapping
    kind: skill
    path: dd-apm/service-remapping
    description: Create and manage APM service remapping rules — rewrite service
      names at ingestion time to collapse noisy inferred entities, clean up
      auto-generated names, handle org renames, or normalize naming conventions.
      Use for any request involving service renaming, service mapping, inferred
      service cleanup, peer.service normalization, or collapsing fragmented
      service names.
  - id: ai-activity-audit
    kind: skill
    path: dd-audit/ai-activity-audit
    description: Audit what the Bits AI assistant (MCP server) has done in your
      Datadog org — tool calls by user, resources accessed, and anomaly flags
      for AI governance.
  - id: compliance-report
    kind: skill
    path: dd-audit/compliance-report
    description: Generate auditor-ready compliance evidence from Datadog Audit Trail
      for SOC 2 and PCI DSS. Maps framework controls to specific query patterns
      and produces formatted output.
  - id: cost-spike-investigation
    kind: skill
    path: dd-audit/cost-spike-investigation
    description: Investigate a Datadog product usage or cost spike by correlating
      Usage Metering data (when/what spiked) with Audit Trail config changes
      (who changed what in the preceding window).
  - id: key-compromise
    kind: skill
    path: dd-audit/key-compromise
    description: Investigate a potentially compromised Datadog API key — timeline of
      actions, geo/IP breakdown, endpoints called, anomaly flags, and
      remediation steps.
  - id: security-investigation
    kind: skill
    path: dd-audit/security-investigation
    description: Answer "who did what" security questions from Audit Trail —
      deletions, config changes, login activity, permission changes, actions
      from a specific user or IP.
  - id: upgrade-v7
    kind: skill
    path: dd-browser-sdk/upgrade-v7
    description: >
      Upgrade Datadog Browser SDK from v6 to v7. Use when encountering removed
      options like betaEncodeCookieOptions, allowFallbackToLocalStorage,
      trackBfcacheViews, usePciIntake, or when a project references
      datadoghq-browser-agent.com CDN with /v6/ paths.
  - id: llm-obs-eval-bootstrap
    kind: skill
    path: dd-llmo/llm-obs-eval-bootstrap
    description: Bootstrap evaluators from production traces — by default propose
      online LLM-judge evaluators and, after you confirm, create them in Datadog
      as disabled drafts (never auto-enabled); on request emit Python SDK code
      or a framework-agnostic JSON spec instead. Use when user says "bootstrap
      evaluators", "generate evaluators", "create evals from traces", "eval
      bootstrap", "write evaluators", "build eval suite", "publish evaluators",
      or wants to generate BaseEvaluator/LLMJudge code or online judge configs
      from production LLM trace data. Works with ml_app and optional RCA report
      or failure hypothesis.
  - id: llm-obs-experiment-analyzer
    kind: skill
    path: dd-llmo/llm-obs-experiment-analyzer
    description: Analyze LLM experiment results. Handles single or comparative
      experiments, exploratory or Q&A modes. Use when user says "analyze
      experiment", "compare experiments", "analyze against baseline", or
      provides one or two experiment IDs for analysis.
  - id: llm-obs-experiment-py-bootstrap
    kind: skill
    path: dd-llmo/llm-obs-experiment-py-bootstrap
    description: Generates a self-contained Python experiment client that uses the
      ddtrace.llmobs SDK. Emits either a runnable .py script or a Jupyter .ipynb
      notebook matching the canonical DataDog reference notebook style. Use when
      the user says "generate Python experiment", "write an SDK experiment",
      "create a ddtrace experiment", "Python notebook experiment", "use the LLM
      Obs SDK", or has `ddtrace` installed and wants idiomatic SDK code.
  - id: llm-obs-session-classify
    kind: skill
    path: dd-llmo/llm-obs-session-classify
    description: >
      Classify whether user intent was satisfied in a Datadog LLM Obs trace or
      session. Three modes: (1) session_id — classify a single CMD+I assistant
      session with RUM; (2) trace_id — classify a single LLM Obs trace without
      RUM; (3) ml_app — sample and classify multiple sessions or traces from a
      given LLM app. Output is compact by default (verdict + one-sentence
      reason). Use when evaluating satisfaction, classifying sessions/traces,
      labeling data, or generating signal for llm-obs-eval-pipeline or
      llm-obs-trace-rca.
  - id: llm-obs-trace-rca
    kind: skill
    path: dd-llmo/llm-obs-trace-rca
    description: Root cause analysis on production LLM traces. Diagnoses why an LLM
      application is failing — works from eval judge verdicts, runtime errors,
      or structural anomalies depending on what signals are present. Walks the
      span tree from symptom to root cause. Use when user says "what's wrong
      with my app", "why is my eval failing", "analyze errors", "root cause
      analysis", "diagnose failures", or wants to understand production failure
      patterns.
  - id: dd-logs
    kind: skill
    path: dd-logs
    description: Log management - search, archives, metrics, and cost control.
  - id: dd-monitors
    kind: skill
    path: dd-monitors
    description: Monitor management - list, search, file-based create, and alerting
      best practices.
  - id: dd-pup
    kind: skill
    path: dd-pup
    description: Datadog CLI (Rust). OAuth2 auth with token refresh.
  - id: ownership-agent
    kind: skill
    path: dd-security/csm/ownership-agent
    description: >
      Generate a BYOD ownership preferences reference table for a customer.
      Walks through preference types, generates CSV, and provides upload
      instructions (UI, API, cloud storage, or Terraform). Use when asked about
      BYOD setup, preferences reference table, k9_ownership_preferences, or
      ownership customization.
  - id: triage-flaky-test
    kind: skill
    path: dd-software-delivery/triage-flaky-test
    description: Load when investigating a specific flaky test. Gets history,
      failure pattern, and category, then recommends fix, quarantine, or
      escalate.
  - id: unblock-pr
    kind: skill
    path: dd-software-delivery/unblock-pr
    description: Load when investigating a failing PR CI pipeline or checking PR
      health. Attributes each CI failure as flaky, infra, or regression,
      proposes a targeted action, and reports code coverage and quality/security
      status.
  - id: agent-skills
    kind: skill
    path: .
    description: Datadog skills for AI agents. Essential monitoring, logging,
      tracing and observability.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
