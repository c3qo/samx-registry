  - id: engine-e2e
    kind: skill
    path: .cursor/skills/engine-e2e
    description: Run Wix Engine (mobile-apps-engine) iOS E2E tests locally to
      validate RNN changes. Use when you need to test RNN fixes against the
      Engine's Detox test suite.
  - id: ios26-navigation
    kind: skill
    path: .cursor/skills/ios26-navigation
    description: Reference for iOS 26 navigation bar, tab bar, toolbar, and Liquid
      Glass building blocks (UITab, scroll-edge effects, search placement,
      shared-background platter, UIButton glass configurations, UIGlassEffect /
      UIGlassContainerEffect, UINavigationItem.style navigator/browser/editor,
      UICornerConfiguration / concentric corners, UISheetPresentationController,
      SF Symbols 7) plus the internal view hierarchy of UIBarButtonItem and
      UIToolbar, and how react-native-navigation maps to all of it. Use when
      adding or fixing iOS 26 behavior in RNN's top bar, bottom tabs, bar
      buttons, toolbar, modals, or any glass-styled custom chrome; when
      investigating iOS 26-only regressions; or when deciding how to expose a
      new iOS 26 capability through RNN options.
