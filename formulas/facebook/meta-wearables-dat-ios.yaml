schemaVersion: 1
id: facebook/meta-wearables-dat-ios
name: Meta Wearables Device Access Toolkit for iOS
description: "iOS DAT SDK for Meta glasses: core, camera, display, mock device,
  docs, samples."
source:
  type: git
  url: https://github.com/facebook/meta-wearables-dat-ios
  revision: a739e94181221e7f321304273bcda2272821b163
capabilities:
  - id: camera-streaming
    kind: skill
    path: plugins/mwdat-ios/skills/camera-streaming
    description: Stream, video frames, photo capture, resolution/frame rate configuration
  - id: dat-conventions
    kind: skill
