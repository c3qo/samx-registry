# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: learn.microsoft.com/microsoft-learn
name: Microsoft Learn
description: Microsoft Learn remote MCP server at
  https://learn.microsoft.com/api/mcp. Search trusted Microsoft docs to power
  your development. Setup guides for Claude Code, Codex, Cursor, and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/microsoft-learn
capabilities:
  - id: microsoft-learn
    kind: mcp
    spec:
      serverName: microsoft-learn
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://learn.microsoft.com/api/mcp
