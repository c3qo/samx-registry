# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: peec.ai/peec-ai
name: Peec AI
description: Peec AI remote MCP server at https://api.peec.ai/mcp. Analyze your
  brand&#x27;s visibility across LLMs. Setup guides for Claude Code, Codex,
  Cursor, and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/peec-ai
capabilities:
  - id: peec-ai
    kind: mcp
    spec:
      serverName: peec-ai
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://api.peec.ai/mcp
