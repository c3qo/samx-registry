# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: daloopa.com/daloopa
name: Daloopa
description: Daloopa remote MCP server at https://mcp.daloopa.com/server/mcp.
  Financial fundamental data and KPIs with hyperlinks. Setup guides for Claude
  Code, Codex, Cursor, and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/daloopa
capabilities:
  - id: daloopa
    kind: mcp
    spec:
      serverName: daloopa
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://mcp.daloopa.com/server/mcp
