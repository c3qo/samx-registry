# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: surveymonkey.com/surveymonkey
name: SurveyMonkey
description: SurveyMonkey remote MCP server at https://mcp.surveymonkey.com/mcp.
  Design surveys, collect responses, and analyze results. Setup guides for
  Claude Code, Codex, Cursor, and VS Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/surveymonkey
capabilities:
  - id: surveymonkey
    kind: mcp
    spec:
      serverName: surveymonkey
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://mcp.surveymonkey.com/mcp
