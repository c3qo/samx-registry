# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: audible.com/audible
name: Audible
description: Audible remote MCP server at https://mcp.audible.com/mcp. Ask for
  audiobook recommendations. Setup guides for Claude Code, Codex, Cursor, and VS
  Code.
source:
  type: virtual
  origin:
    type: remote
    url: https://mcpservers.org/remote-mcp-servers/audible
capabilities:
  - id: audible
    kind: mcp
    spec:
      serverName: audible
      transport: remote
      sourceFormat: direct
      config:
        type: streamable-http
        url: https://mcp.audible.com/mcp
