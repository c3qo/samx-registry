# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: streamlit/agent-skills
name: Agent Skills for Streamlit Development
description: Meta-skill bootstrap for Streamlit app work; discovers
  version-matched bundled docs.
source:
  type: git
  url: https://github.com/streamlit/agent-skills
  revision: d84e3344dade2b689f3d9164f55f346106344dfd
capabilities:
  - id: developing-with-streamlit
    kind: skill
    path: developing-with-streamlit
    description: "Use for ALL Streamlit tasks: creating, editing, debugging,
      beautifying, styling, theming, optimizing, or deploying Streamlit apps.
      Also custom components, st.components.v2, HTML/JS/CSS work. Discovers and
      loads version-matched reference docs from the user's installed Streamlit
      (>=1.57). Triggers: streamlit, st., dashboard, app.py, beautify, style,
      CSS, color, background, theme, button, widget styling, custom component,
      st.components, CCv2, session state, performance, cache, fragment, slow
      rerun, deploy."
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
