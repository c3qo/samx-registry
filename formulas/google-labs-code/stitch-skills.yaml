# yaml-language-server: $schema=../../schemas/formula.v1.schema.json
schemaVersion: 1
id: google-labs-code/stitch-skills
name: Stitch Skills
description: "Agent skills for Google Stitch: design, build, utility workflows."
source:
  type: git
  url: https://github.com/google-labs-code/stitch-skills
  revision: fac732417e1b05525686fb78141a517b05f5d57e
capabilities:
  - id: react-components
    kind: skill
    path: plugins/stitch-build/skills/react-components
    description: Converts Stitch designs into modular Vite and React components
      using system-level networking and AST-based validation.
  - id: react-native
    kind: skill
    path: plugins/stitch-build/skills/react-native
    description: Convert Stitch HTML designs to React Native components with StyleSheet
  - id: remotion
    kind: skill
    path: plugins/stitch-build/skills/remotion
    description: Generate walkthrough videos from Stitch projects using Remotion
      with smooth transitions, zooming, and text overlays
  - id: shadcn-ui
    kind: skill
    path: plugins/stitch-build/skills/shadcn-ui
    description: Expert guidance for integrating and building applications with
      shadcn/ui components, including component discovery, installation,
      customization, and best practices.
  - id: code-to-design
    kind: skill
    path: plugins/stitch-design/skills/code-to-design
    description: Convert frontend code (Vite, React, etc.) to a Stitch Design by
      chaining static HTML extraction, design system extraction, and file
      upload. **ALWAYS** use this skill when the user's intent is to move
      existing web apps or React components into Stitch (e.g., requests to
      "save", "migrate", or "upload"). You must use this skill even for simple
      "save" operations, as it is the only way to ensure the design system is
      extracted and assets are properly linked.
  - id: extract-design-md
    kind: skill
    path: plugins/stitch-design/skills/extract-design-md
    description: Extract a comprehensive design system (DESIGN.md) directly from
      frontend source code — React, Vue, Svelte, Angular, plain HTML/CSS, or any
      web framework. Analyzes component files, stylesheets, Tailwind configs,
      theme definitions, and design tokens to produce a rich, Stitch-compatible
      design system document. Use this skill whenever the user wants to
      reverse-engineer a design system from an existing codebase, audit the
      visual language of a project, extract design tokens from source files, or
      understand the styling patterns in a frontend repo — even if they just say
      "what does this app look like?" or "pull out the design from this code."
  - id: extract-static-html
    kind: skill
    path: plugins/stitch-design/skills/extract-static-html
    description: Extract self-contained static HTML from a built web application or
      React components by inlining CSS and images. Use this skill whenever you
      need to capture a specific UI state, share a static version of a page, or
      prepare assets for Stitch upload, even if the user just asks to 'save the
      HTML' or 'mock the view'.
  - id: generate-design
    kind: skill
    path: plugins/stitch-design/skills/generate-design
    description: Generate new screens from text prompts or images, edit existing
      screens with prompts and design system tokens, and generate design
      variants using Stitch MCP. Includes prompt enhancement pipeline, design
      mappings, professional UI/UX terminology, design tokens and theme system
      capabilities.
  - id: manage-design-system
    kind: skill
    path: plugins/stitch-design/skills/manage-design-system
    description: Manage design systems in Stitch using MCP tools. Includes retrieval
      of assets, creating/updating design systems in Stitch, and applying them
      to screens.
  - id: upload-to-stitch
    kind: skill
    path: plugins/stitch-design/skills/upload-to-stitch
    description: Upload local assets (images, mockups, extracted HTML, design
      markdown) to a Stitch project. ALWAYS use this skill when you need to
      upload visual assets, HTML pages, or design docs to Stitch, particularly
      when direct MCP tool calls fail or truncate due to base64 token limits.
  - id: design-md
    kind: skill
    path: plugins/stitch-utilities/skills/design-md
    description: Analyze Stitch projects and synthesize a semantic design system
      into DESIGN.md files
  - id: enhance-prompt
    kind: skill
    path: plugins/stitch-utilities/skills/enhance-prompt
    description: Transforms vague UI ideas into polished, Stitch-optimized prompts.
      Enhances specificity, adds UI/UX keywords, injects design system context,
      and structures output for better generation results.
  - id: stitch-loop
    kind: skill
    path: plugins/stitch-utilities/skills/stitch-loop
    description: Teaches agents to iteratively build websites using Stitch with an
      autonomous baton-passing loop pattern
  - id: taste-design
    kind: skill
    path: plugins/stitch-utilities/skills/taste-design
    description: Semantic Design System Skill for Google Stitch. Generates
      agent-friendly DESIGN.md files that enforce premium, anti-generic UI
      standards — strict typography, calibrated color, asymmetric layouts,
      perpetual micro-motion, and hardware-accelerated performance.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
