schemaVersion: 1
id: livekit/agent-skills
name: LiveKit Agent Skills
description: Reusable skills for LiveKit voice AI agent dev + simulation tests.
source:
  type: git
  url: https://github.com/livekit/agent-skills
  revision: 8e7c931b8324bcb891ff4029fe6bd4f894385204
capabilities:
  - id: livekit-agents
    kind: skill
    path: skills/livekit-agents
    description: 'Build voice AI agents with LiveKit Cloud and the Agents SDK. Use
      when the user asks to "build a voice agent", "create a LiveKit agent",
      "add voice AI", "implement handoffs", "structure agent workflows", or is
      working with LiveKit Agents SDK. Provides opinionated guidance for the
      recommended path: LiveKit Cloud + LiveKit Inference. REQUIRES writing
      tests for all implementations.'
  - id: livekit-simulations
    kind: skill
    path: skills/livekit-simulations
    description: Generate targeted test scenarios for a LiveKit voice or chat agent
      and run them as simulations — locally, from the agent's own code plus what
      the user wants stress-tested. Use whenever the user wants to "test my
      agent", "what should I test", "create/generate simulation scenarios",
      "make a sim test suite", "use lk agent simulate", "stress-test the X
      flow", "set up scenarios for my agent", or wants to probe edge cases /
      refusals / regressions before shipping. Generates scenarios on the user's
      machine (their code is never uploaded) and lets the user deeply steer what
      gets tested. Trigger even without the word "simulation" when the user
      clearly wants to decide what to test and verify how their agent behaves
      across realistic conversations. Not for building a new agent from scratch
      (use the livekit-agents skill), load-testing, or ordinary unit tests.
requirements:
  env: []
hooks:
  mode: explicit
  entries: []
advisories: []
